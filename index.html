<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>相风</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    min-height: 100dvh;
    background: linear-gradient(135deg, #0c0e1a 0%, #1a1e3a 30%, #0d1b2a 60%, #0a0e1a 100%);
    display: flex; justify-content: center; align-items: center; padding: 20px;
    position: relative;
  }
  body::before {
    content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 50%, rgba(0,122,255,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0,242,254,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .app {
    max-width: 600px; width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    padding: 48px 32px 40px;
    text-align: center;
    position: relative; z-index: 1;
  }
  .logo { font-size: 12px; font-weight: 700; letter-spacing: 4px; background: linear-gradient(135deg, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; margin-bottom: 8px; }
  h1 { font-size: 36px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .subtitle { color: rgba(255,255,255,0.35); font-size: 14px; margin-bottom: 36px; }
  .products { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: flex; align-items: center; gap: 16px;
    padding: 20px 24px; border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    text-decoration: none; color: inherit;
    transition: all 0.3s; text-align: left;
  }
  .card:hover { border-color: rgba(0,122,255,0.3); background: rgba(255,255,255,0.07); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,122,255,0.1); }
  .card .icon { font-size: 36px; flex-shrink: 0; }
  .card .info h3 { color: #fff; font-size: 16px; font-weight: 600; }
  .card .info p { color: rgba(255,255,255,0.35); font-size: 12px; margin-top: 2px; }
  .card .arrow { margin-left: auto; color: rgba(255,255,255,0.15); font-size: 20px; }
  .footer { margin-top: 32px; color: rgba(255,255,255,0.15); font-size: 11px; }
</style>
</head>
<body>
<div class="app">
  <div class="logo">✦ 相风</div>
  <h1>相风</h1>
  <p class="subtitle">知识之境 · 科技向学</p>
  <div class="products">
    <a class="card" href="physics_lab/">
      <span class="icon">🔬</span>
      <div class="info">
        <h3>相风 · 物理</h3>
        <p>初中物理 13 模块 · 互动实验学习</p>
      </div>
      <span class="arrow">›</span>
    </a>
    <a class="card" href="pet_word_game/pet_word_detective.html">
      <span class="icon">🐾</span>
      <div class="info">
        <h3>相风 · 词侦</h3>
        <p>剑桥 PET (B1) · 在阅读中识词</p>
      </div>
      <span class="arrow">›</span>
    </a>
  </div>
  <div class="footer">© 2026 相风</div>
</div>
</body>
</html>
