// ── App State ──
const DATA_KEY = 'pet_word_detective_data';
let data = loadData();
let currentUser = data.currentUser || null;
let gameState = null; // { words:[], idx, score, streak, maxStreak, correct, wrong, wrongWords, answered }

function loadData() {
  try { return JSON.parse(localStorage.getItem(DATA_KEY)) || { users: {}, currentUser: null }; }
  catch(e) { return { users: {}, currentUser: null }; }
}
function saveData() {
  data.currentUser = currentUser;
  try { localStorage.setItem(DATA_KEY, JSON.stringify(data)); } catch(e) {}
}

function getUsers() { return Object.keys(data.users).sort(); }
function getUser(name) { return data.users[name]; }
function createUser(name) {
  name = name.trim();
  if (!name) return false;
  if (!data.users[name]) {
    data.users[name] = { totalScore: 0, gamesPlayed: 0, bestScore: 0, maxStreak: 0, totalCorrect: 0, totalWrong: 0, achievements: [], history: [] };
  }
  currentUser = name;
  saveData();
  return true;
}
function deleteUser(name) {
  delete data.users[name];
  if (currentUser === name) {
    const users = getUsers();
    currentUser = users.length > 0 ? users[0] : null;
  }
  saveData();
}

const $ = id => document.getElementById(id);
const body = () => document.getElementById('appBody');

function render(html) {
  body().innerHTML = html;
}

// ── Login View ──
function showLogin() {
  const users = getUsers();
  let userCards = users.map(u => {
    const d = data.users[u];
    const isCurrent = u === currentUser;
    return `<div class="card flex-center" style="justify-content:space-between;cursor:pointer;${isCurrent?'border-color:rgba(0,122,255,0.3);':''}" onclick="selectUser('${u}')">
      <span style="color:#fff;font-weight:500;">🐾 ${u}</span>
      <span style="display:flex;align-items:center;gap:8px;">
        <span class="muted">${d.totalScore} 分 | ${d.gamesPlayed} 局</span>
        ${isCurrent ? '<span class="badge badge-green">当前</span>' : ''}
        <span style="color:rgba(255,255,255,0.2);font-size:18px;">›</span>
      </span>
    </div>`;
  }).join('');

  render(`<div class="fade-in">
    <div class="text-center mb-12">
      <div style="font-size:48px;margin-bottom:4px;">🐾</div>
      <p class="muted">选一个名字，开始你的单词冒险</p>
    </div>
    ${userCards ? `<div class="flex" style="flex-direction:column;gap:6px;margin-bottom:16px;">${userCards}</div>` : ''}
    <div class="card" style="text-align:center;">
      <p class="muted mb-8">✨ 新同学</p>
      <div class="flex" style="gap:8px;">
        <input class="input" id="newUserName" placeholder="输入你的名字" onkeydown="if(event.key==='Enter')createUserBtn()">
        <button class="btn btn-primary" onclick="createUserBtn()">出发 →</button>
      </div>
    </div>
  </div>`);
  setTimeout(() => {
    const inp = document.getElementById('newUserName');
    if (inp) inp.focus();
  }, 100);
}

function selectUser(name) {
  currentUser = name;
  saveData();
  showMenu();
}

function createUserBtn() {
  const inp = document.getElementById('newUserName');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  createUser(name);
  showMenu();
}

    { id: 'master', name: '词汇达人', icon: '🥇', desc: '累计获得 1000 分', check: u => u.totalScore >= 1000 },
    { id: 'combo5', name: '连击高手', icon: '⚡', desc: '单局连击达到 5 次', check: u => u.maxStreak >= 5 },
    { id: 'combo10', name: '火热爱学习', icon: '🔥', desc: '单局连击达到 10 次', check: u => u.maxStreak >= 10 },
    { id: 'scholar', name: '学霸', icon: '🏆', desc: '累计获得 1500 分', check: u => u.totalScore >= 1500 },
    { id: 'linguist', name: '语言大师', icon: '👑', desc: '累计获得 2000 分', check: u => u.totalScore >= 2000 },
  ];
  let badges = allAchievements.filter(a => unlocked.includes(a.id)).slice(0, 4).map(a => a.icon).join(' ');

  render(`<div class="fade-in">
    <div class="card" style="background:rgba(0,122,255,0.08);border-color:rgba(0,122,255,0.15);margin-bottom:16px;">
      <div class="flex" style="justify-content:space-between;align-items:center;">
        <span style="color:#fff;font-weight:600;font-size:16px;">🐾 ${currentUser}</span>
        <span style="color:rgba(255,255,255,0.4);font-size:12px;">${u.totalScore} 分 | ${u.gamesPlayed} 局</span>
      </div>
      ${badges ? `<div style="margin-top:4px;">${badges}</div>` : ''}
    </div>

    <div class="text-center mb-12">
      <div style="font-size:32px;margin-bottom:4px;">🔍</div>
      <div style="color:#fff;font-size:18px;font-weight:700;">单词侦探</div>
      <p class="muted">在阅读中识词 · 在语境中理解</p>
    </div>

    <button class="btn btn-primary btn-block btn-lg mb-12" onclick="startGame()">▶ 开始挑战</button>
    <button class="btn btn-secondary btn-block mb-12" onclick="showAchievements()">🏆 成就墙</button>

    <div class="card text-center" style="margin-bottom:12px;">
      <span class="muted">📚 ${WORDS.length} 词 | 📝 每轮 20 题 | 🎯 剑桥 PET (B1)</span>
    </div>

    <div class="flex" style="justify-content:center;">
      <button class="btn btn-sm btn-secondary" onclick="showLogin()">🔄 切换用户</button>
      <button class="btn btn-sm btn-secondary" onclick="showUserMgr()">👥 用户管理</button>
    </div>
  </div>`);
}

// ── Game View ──
function startGame() {
  const round = [...WORDS].sort(() => Math.random() - 0.5).slice(0, 20);
  gameState = { words: round, idx: 0, score: 0, streak: 0, maxStreak: 0, correct: 0, wrong: 0, wrongWords: [], answered: false };
  showQuestion();
}

function showQuestion() {
  if (!gameState) return;
  const { words, idx, score, streak } = gameState;
  if (idx >= words.length) { showResult(); return; }

  const word = words[idx];
  const sentence = word[2].replace(new RegExp(word[0], 'i'), '____');
  const others = WORDS.filter(w => w[1] !== word[1]).sort(() => Math.random() - 0.5).slice(0, 3);
  let options = [word[1], ...others.map(w => w[1])].sort(() => Math.random() - 0.5);
  gameState.answered = false;

  const streakText = streak >= 3 ? `🔥🔥 ${streak}连击` : streak >= 2 ? `🔥 ${streak}` : '';

  render(`<div class="fade-in">
    <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:8px;">
      <button class="btn btn-sm btn-secondary" onclick="confirmBack()">← 返回</button>
      <span style="color:#fff;font-weight:600;">第 ${idx+1}/${words.length} 题</span>
      <div class="flex" style="gap:8px;">
        ${streakText ? `<span style="color:#FF9F0A;font-size:12px;">${streakText}</span>` : ''}
        <span style="color:#FFD700;font-weight:700;">${score} 分</span>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" style="width:${(idx/words.length)*100}%"></div></div>

    <div class="card" style="margin-bottom:12px;border-left:3px solid #007AFF;">
      <p class="muted" style="font-size:11px;margin-bottom:6px;">📖 读句子，选出划线词的意思</p>
      <p style="color:#fff;font-size:17px;line-height:1.6;margin-bottom:8px;">${sentence}</p>
      <p style="color:#4facfe;font-size:20px;font-weight:700;">🔍 ${word[0]}</p>
    </div>

    <div id="optionsArea" style="display:flex;flex-direction:column;gap:8px;">
      ${options.map((o, i) => `<div class="option-btn"><button class="btn" id="opt${i}" onclick="selectOption(${i},'${o}','${word[1]}')">${o}</button></div>`).join('')}
    </div>
    <div id="feedback" style="margin-top:10px;text-align:center;min-height:24px;"></div>
  </div>`);
  window.currentOptions = options;
  window.currentAnswer = word[1];
}

function selectOption(idx, chosen, answer) {
  if (gameState.answered) return;
  gameState.answered = true;

  const correct = chosen === answer;
  const opts = document.querySelectorAll('.option-btn .btn');
  opts.forEach((btn, i) => {
    btn.disabled = true;
    const txt = window.currentOptions[i];
    if (txt === answer) btn.classList.add('correct');
    else if (i === idx && !correct) btn.classList.add('wrong');
  });

  if (correct) {
    gameState.streak++;
    gameState.correct++;
    const bonus = gameState.streak >= 2 ? gameState.streak * 2 : 0;
    gameState.score += 10 + bonus;
    gameState.maxStreak = Math.max(gameState.maxStreak, gameState.streak);
    const msgs = ['🎉 正确！', '✨ 太棒了！', '👏 答对了！', '⭐ 非常好！', '🌟 继续加油！'];
    let fb = msgs[Math.floor(Math.random() * msgs.length)];
    if (bonus > 0) fb += ` 连击 +${bonus}`;
    document.getElementById('feedback').innerHTML = `<span style="color:#34C759;font-weight:500;">${fb}</span>`;
  } else {
    gameState.streak = 0;
    gameState.wrong++;
    gameState.score = Math.max(0, gameState.score - 5);
    gameState.wrongWords.push({ en: window.currentAnswer, zh: answer });
    document.getElementById('feedback').innerHTML = `<span style="color:#FF453A;font-weight:500;">✗ ${answer}（-5）</span>`;
  }

  setTimeout(() => {
    gameState.idx++;
    showQuestion();
  }, 1200);
}

function confirmBack() {
  if (confirm('当前进度不会保存，确定退出吗？')) showMenu();
}

// ── Result View ──
function showResult() {
  const g = gameState;
  if (!g) return;
  const u = getUser(currentUser);
  if (!u) return;

  const total = g.words.length;
  const pct = g.correct / total;
  const stars = Math.round(pct * 5);

  // Save
  u.totalScore = Math.max(0, u.totalScore + g.score);
  u.gamesPlayed++;
  u.bestScore = Math.max(u.bestScore, g.score);
  u.maxStreak = Math.max(u.maxStreak, g.maxStreak);
  u.totalCorrect += g.correct;
  u.totalWrong += g.wrong;
  u.history = u.history || [];
  u.history.push({ date: new Date().toISOString().slice(0,10), score: g.score, correct: g.correct, wrong: g.wrong });

  // Check achievements
  const allAch = [
    { id: 'first_game', name: '初次挑战', icon: '🎯', check: u => u.gamesPlayed >= 1 },
    { id: 'newbie', name: '单词新手', icon: '🌱', check: u => u.totalScore >= 200 },
    { id: 'apprentice', name: '英语学徒', icon: '🥈', check: u => u.totalScore >= 500 },
    { id: 'master', name: '词汇达人', icon: '🥇', check: u => u.totalScore >= 1000 },
    { id: 'combo5', name: '连击高手', icon: '⚡', check: u => u.maxStreak >= 5 },
    { id: 'combo10', name: '火热爱学习', icon: '🔥', check: u => u.maxStreak >= 10 },
    { id: 'scholar', name: '学霸', icon: '🏆', check: u => u.totalScore >= 1500 },
    { id: 'linguist', name: '语言大师', icon: '👑', check: u => u.totalScore >= 2000 },
  ];
  u.achievements = u.achievements || [];
  let newAch = [];
  allAch.forEach(a => {
    if (!u.achievements.includes(a.id) && a.check(u)) {
      u.achievements.push(a.id);
      newAch.push(a);
    }
  });
  saveData();

  const starHTML = Array(5).fill(0).map((_, i) => i < stars ? '⭐' : '☆').join('');

  render(`<div class="slide-up">
    <div style="text-align:center;margin-bottom:12px;">
      ${newAch.length > 0 ? `<div class="card" style="background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.2);margin-bottom:12px;text-align:center;">
        <div style="font-size:40px;">${newAch[0].icon}</div>
        <div style="color:#FFD700;font-weight:600;">🎉 解锁成就: ${newAch[0].name}</div>
      </div>` : ''}
      <div style="font-size:36px;margin-bottom:4px;">${starHTML}</div>
      <div style="color:#fff;font-size:24px;font-weight:700;">${g.score} 分</div>
    </div>

    <div class="stats mb-12">
      <div class="stat-card"><span class="num" style="color:#34C759;">${g.correct}</span><span class="label">✅ 正确</span></div>
      <div class="stat-card"><span class="num" style="color:#FF453A;">${g.wrong}</span><span class="label">❌ 错误</span></div>
      <div class="stat-card"><span class="num" style="color:#FF9F0A;">${g.maxStreak}</span><span class="label">⚡ 最高连击</span></div>
    </div>

    <div class="text-center muted" style="margin-bottom:12px;">累计: ${u.totalScore} 分 | 共 ${u.gamesPlayed} 局</div>

    ${g.wrongWords.length > 0 ? `<div class="card" style="margin-bottom:12px;">
      <p style="color:#FF453A;font-size:12px;font-weight:600;margin-bottom:6px;">📝 需要复习的词:</p>
      ${g.wrongWords.slice(0,10).map(w => `<div style="color:rgba(255,255,255,0.7);font-size:13px;padding:2px 0;">${w.en} — ${w.zh}</div>`).join('')}
    </div>` : `<div class="text-center" style="color:#34C759;font-size:15px;margin-bottom:12px;">全部正确！太棒了 🎉</div>`}

    <div class="flex" style="gap:8px;">
      <button class="btn btn-primary btn-block btn-lg" onclick="startGame()">再来一轮 ▶</button>
      <button class="btn btn-secondary btn-block btn-lg" onclick="showMenu()">返回主页</button>
    </div>
  </div>`);
}

// ── Achievements View ──
function showAchievements() {
  const u = getUser(currentUser);
  if (!u) return;
  const unlocked = u.achievements || [];
  const allAch = [
    { id: 'first_game', name: '初次挑战', icon: '🎯', desc: '完成第一轮游戏' },
    { id: 'newbie', name: '单词新手', icon: '🌱', desc: '累计获得 200 分' },
    { id: 'apprentice', name: '英语学徒', icon: '🥈', desc: '累计获得 500 分' },
    { id: 'master', name: '词汇达人', icon: '🥇', desc: '累计获得 1000 分' },
    { id: 'combo5', name: '连击高手', icon: '⚡', desc: '单局连击达到 5 次' },
    { id: 'combo10', name: '火热爱学习', icon: '🔥', desc: '单局连击达到 10 次' },
    { id: 'scholar', name: '学霸', icon: '🏆', desc: '累计获得 1500 分' },
    { id: 'linguist', name: '语言大师', icon: '👑', desc: '累计获得 2000 分' },
  ];

  render(`<div class="fade-in">
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:32px;">🏆</div>
      <div style="color:#fff;font-size:18px;font-weight:700;">成就墙</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
      ${allAch.map(a => {
        const has = unlocked.includes(a.id);
        return `<div class="card" style="text-align:center;${has?'border-color:rgba(255,215,0,0.2);':'opacity:0.4;'}">
          <div style="font-size:28px;margin-bottom:4px;">${a.icon}</div>
          <div style="color:#fff;font-size:13px;font-weight:600;">${a.name}</div>
          <div style="font-size:11px;color:rgba(255,255,255,0.35);">${a.desc}</div>
          <div style="margin-top:4px;"><span class="badge ${has?'badge-green':'badge-blue'}">${has?'✅ 已获得':'🔒 未解锁'}</span></div>
        </div>`;
      }).join('')}
    </div>
    <button class="btn btn-secondary btn-block" onclick="showMenu()">← 返回</button>
  </div>`);
}

// ── User Management View ──
function showUserMgr() {
  const users = getUsers();
  render(`<div class="fade-in">
    <div style="text-align:center;margin-bottom:12px;">
      <div style="font-size:32px;">👥</div>
      <div style="color:#fff;font-size:18px;font-weight:700;">用户管理</div>
    </div>
    ${users.length > 0 ? users.map(u => {
      const d = data.users[u];
      const isCurrent = u === currentUser;
      return `<div class="card" style="margin-bottom:8px;">
        <div class="flex" style="justify-content:space-between;align-items:center;">
          <span style="color:#fff;font-weight:500;">🐾 ${u} ${isCurrent?'<span class="badge badge-green">当前</span>':''}</span>
          <span class="muted">${d.totalScore} 分 | ${d.gamesPlayed} 局</span>
        </div>
        <div class="flex mt-8" style="gap:6px;">
          ${!isCurrent ? `<button class="btn btn-sm btn-secondary" onclick="switchUser('${u}')">切换</button>` : ''}
          <button class="btn btn-sm btn-danger" onclick="deleteUserConfirm('${u}')">🗑 删除</button>
        </div>
      </div>`;
    }).join('') : '<p class="text-center muted">还没有用户</p>'}
    <div class="text-center muted mt-8" style="font-size:11px;">共 ${users.length} 个用户</div>
    <div class="flex mt-12">
      <button class="btn btn-secondary btn-block" onclick="showMenu()">← 返回</button>
      <button class="btn btn-primary btn-block" onclick="showCreateUser()">➕ 新建用户</button>
    </div>
  </div>`);
}

function switchUser(name) {
  currentUser = name;
  saveData();
  showUserMgr();
}

function deleteUserConfirm(name) {
  if (!confirm(`确定要删除用户「${name}」吗？\n所有学习记录将永久丢失。`)) return;
  deleteUser(name);
  showUserMgr();
}

function showCreateUser() {
  render(`<div class="fade-in">
    <div class="text-center mb-12">
      <div style="font-size:32px;">✨</div>
      <div style="color:#fff;font-size:18px;font-weight:700;">新建用户</div>
    </div>
    <div class="card">
      <input class="input" id="newUserMgr" placeholder="输入用户名" onkeydown="if(event.key==='Enter')createMgrUser()">
      <div class="flex mt-8">
        <button class="btn btn-secondary btn-block" onclick="showUserMgr()">取消</button>
        <button class="btn btn-primary btn-block" onclick="createMgrUser()">创建</button>
      </div>
    </div>
  </div>`);
  setTimeout(() => { const i = document.getElementById('newUserMgr'); if (i) i.focus(); }, 100);
}

function createMgrUser() {
  const inp = document.getElementById('newUserMgr');
  if (!inp) return;
  const name = inp.value.trim();
  if (!name) return;
  createUser(name);
  showMenu();
}

// ── Init ──
if (currentUser && getUser(currentUser)) showMenu();
else showLogin();
</script>
</body>
</html>
