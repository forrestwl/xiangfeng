<script>
// ── Storage Key ──
const STORAGE_KEY = 'physics_sound_ch1';

// ── State ──
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Missions ──

  { id: 'observe', label: '🔬 观察', title: '声音的产生与传播', desc: '观看音叉振动产生声波，以及真空铃实验。点击"播放"观看演示。', doneLabel: '已观看' },

// ── Canvas & Animation ──
const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let exploreMedium = 0; // 0=air, 1=water, 2=steel
let useVacuum = false;

const MEDIA = [
  { name: '空气', speed: 340, color: '#FF9500', bg: '#fff8e8' },
  { name: '水', speed: 1500, color: '#007AFF', bg: '#e8f4ff' },
  { name: '钢铁', speed: 5200, color: '#34C759', bg: '#e8f8ee' }
];

function getMedium() { return MEDIA[exploreMedium]; }

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawObserve(W, H) {
  // Background
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  if (useVacuum) {
    // Bell jar experiment
    drawBellJar(W, H);
    return;
  }

  // Tuning fork on left
  const forkX = 160, forkY = 180;
  const vibrate = isPlaying ? Math.sin(animTime * 0.3) * 6 : 0;

  // Tuning fork base
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(forkX - 20, forkY + 10, 40, 20);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(forkX - 5, forkY - 40, 10, 50);

  // Prongs
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(forkX - 12 + vibrate, forkY - 40);
  ctx.lineTo(forkX - 12 + vibrate, forkY + 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(forkX + 12 - vibrate, forkY - 40);
  ctx.lineTo(forkX + 12 - vibrate, forkY + 10);
  ctx.stroke();

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('音叉', forkX, forkY + 40);

  // Sound waves (circles expanding from fork)
  if (isPlaying) {
    const t = animTime;
    for (let i = 0; i < 5; i++) {
      const radius = 30 + ((t * 1.5 + i * 50) % 200);
      if (radius > 250) continue;
      const alpha = Math.max(0, 1 - radius / 250);
      ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.6})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(forkX, forkY - 15, radius, 0, Math.PI * 2);
      ctx.stroke();

      // Compression zones (darker rings)
      if (radius % 40 < 15) {
        ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.3})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(forkX, forkY - 15, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Ear on the right
    ctx.fillStyle = '#f0c8a0';
    ctx.beginPath();
    ctx.ellipse(W - 80, forkY - 15, 20, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e0b090';
    ctx.beginPath();
    ctx.ellipse(W - 80, forkY - 15, 10, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sound reaching ear indicator
    const distToEar = W - 80 - forkX;
    const anyWave = (t * 1.5) % 200 > 180;
    if (anyWave) {
      ctx.fillStyle = '#FF9500';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('👂 听到声音', W - 80, forkY + 50);
    }
  }

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  if (!isPlaying) {
    ctx.fillText('▶ 点击下方"播放"按钮开始演示', W / 2, H - 20);
  }

  // Bell jar toggle hint
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('💡 点击左上角按钮切换真空实验', 10, H - 20);
}

function drawBellJar(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Bell jar (glass dome)
  const cx = W / 2, cy = 160;
  ctx.strokeStyle = 'rgba(100, 180, 255, 0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 140, 120, 0, Math.PI, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy, 140, 120, 0, 0, Math.PI);
  ctx.stroke();

  // Glass shine
  ctx.strokeStyle = 'rgba(100, 180, 255, 0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx - 20, cy - 20, 60, 50, -0.2, Math.PI, 0);
  ctx.stroke();

  // Base plate
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(cx - 100, cy + 80, 200, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx - 90, cy + 85, 180, 5);

  // Bell inside
  ctx.fillStyle = '#c8a060';
  ctx.beginPath();
  ctx.arc(cx, cy - 10, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#b89050';
  ctx.fillRect(cx - 3, cy - 30, 6, 20);
  // Clapper
  const swing = isPlaying ? Math.sin(animTime * 0.5) * 4 : 0;
  ctx.fillStyle = '#a08040';
  ctx.beginPath();
  ctx.arc(cx + swing, cy + 15, 8, 0, Math.PI * 2);
  ctx.fill();

  // Air particles (decrease when vacuum)
  const particleCount = isPlaying ? Math.max(5, 30 - animTime * 2) : 30;
  ctx.fillStyle = `rgba(100, 149, 237, ${0.3 * particleCount / 30})`;
  for (let i = 0; i < particleCount; i++) {
    const angle = Math.random() * Math.PI;
    const r = 20 + Math.random() * 100;
    const px = cx - 80 + Math.random() * 160;
    const py = cy - 80 + Math.random() * 140;
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vacuum pump
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx + 130, cy + 40, 30, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx + 140, cy + 90, 10, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(cx + 145, cy + 65, 10, 0, Math.PI * 2);
  ctx.fill();

  // Status
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  if (particleCount > 20) {
    ctx.fillText('🔔 钟声响起（有空气）', cx, cy + 130);
  } else if (particleCount > 5) {
    ctx.fillText('🔕 钟声越来越弱（正在抽气）', cx, cy + 130);
  } else {
    ctx.fillText('🔇 听不到钟声了（真空）', cx, cy + 130);
  }

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.fillText('真空罩实验（抽气机在右侧）', cx, H - 20);
}

function drawExplore(W, H) {
  const med = getMedium();
  ctx.fillStyle = med.bg;
  ctx.fillRect(0, 0, W, H);

  // Medium buttons
  const btnW = 100, btnH = 36, startX = (W - (btnW * 3 + 20)) / 2;
  MEDIA.forEach((m, i) => {
    const x = startX + i * (btnW + 10);
    const y = 12;
    ctx.fillStyle = i === exploreMedium ? m.color : '#eee';
    roundRect(ctx, x, y, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = i === exploreMedium ? '#fff' : '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(m.name, x + btnW / 2, y + btnH / 2);
  });

  // Sound source
  const srcX = 100, srcY = 200;
  ctx.fillStyle = '#FF9500';
  ctx.beginPath();
  ctx.arc(srcX, srcY, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🔊', srcX, srcY + 5);

  // Receiver
  const rx = W - 100, ry = 200;
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.arc(rx, ry, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText('👂', rx, ry + 6);

  // Wave propagation
  if (isPlaying) {
    const speed = med.speed;
    const dist = rx - srcX;
    const t = animTime;
    const waveSpeed = 0.5 + speed / 3400;

    for (let i = 0; i < 3; i++) {
      const progress = ((t * waveSpeed + i * 60) % (dist + 60)) - 30;
      if (progress < 0) continue;
      const x = srcX + progress;
      const alpha = Math.max(0.1, 1 - progress / dist);
      const radius = 8 + Math.sin(progress * 0.1) * 4;

      ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, srcY - 10, radius * 2, 0, Math.PI * 2);
      ctx.stroke();

      // Compression
      ctx.fillStyle = `rgba(255, 149, 0, ${alpha * 0.15})`;
      ctx.beginPath();
      ctx.arc(x, srcY - 10, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Check if wave reached receiver
    const reached = (t * waveSpeed) % (dist + 60) > dist;
    if (reached) {
      ctx.fillStyle = '#34C759';
      ctx.font = '12px sans-serif';
      ctx.fillText('✅ 已接收', rx, ry + 40);
    }
  }

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('声源', srcX, srcY + 40);
  ctx.fillText('接收器', rx, ry + 40);

  // Speed display on canvas
  ctx.fillStyle = med.color;
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`${med.speed} m/s`, W / 2, H - 10);

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('点击上方介质按钮切换，点击下方"播放"观察声波传播', W / 2, 80);
  }
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Show a visual based on challenge
  const lines = ch.goal.split('');
  let line = '';
  let lineY = 60;
  ch.goal.split('').forEach((ch, i) => {
    line += ch;
    if (line.length > 25 || i === ch.goal.length - 1) {
      ctx.fillText(line.trim(), W / 2, lineY);
      line = '';
      lineY += 28;
    }
  });

  // Input area
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(ctx, W / 2 - 80, H / 2 - 30, 160, 50, 10);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText(`答案输入框（${ch.unit}）`, W / 2, H / 2 + 50);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

// ── Mission Switching ──
function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索过各介质。 <button onclick="startExplore()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = `${m.desc} <button onclick="startExplore()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = `${m.desc} 当前第 ${state.challengeIdx + 1}/${CHALLENGES.length} 关。`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    drawChallengeUI();
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  // Update speed display
  if (state.currentMission === 1) {
    const med = getMedium();
    document.getElementById('dispMedium').textContent = med.name;
    document.getElementById('dispSpeed').textContent = med.speed + ' m/s';
    document.getElementById('dispMedium').className = `value ${med === MEDIA[0] ? 'air' : med === MEDIA[1] ? 'water' : 'solid'}`;
    document.getElementById('dispSpeed').className = `value ${med === MEDIA[0] ? 'air' : med === MEDIA[1] ? 'water' : 'solid'}`;
  }

  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');

  // Progress dots
  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  // Challenge HUD
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx + 1}/${CHALLENGES.length} 关`;
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 40) + '...' || '';
  }

  // Quiz overlay
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function drawChallengeUI() {
  // Canvas overlay for challenge input
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';

  // Word-wrap the goal text
  const words = ch.goal;
  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of words) {
    line += c;
    if (ctx.measureText(line).width > maxW) {
      lines.push(line.slice(0, -1));
      line = c;
    }
  }
  if (line) lines.push(line);

  let y = 40;
  lines.forEach(l => {
    ctx.fillText(l.trim(), W / 2, y);
    y += 26;
  });

  // Answer buttons for challenge 3 (medium choice)
  if (state.challengeIdx === 2) {
    const btns = ['空气', '水', '钢铁'];
    const btnW = 120, btnH = 50;
    const totalW = btns.length * btnW + (btns.length - 1) * 12;
    const startX = (W - totalW) / 2;
    btns.forEach((b, i) => {
      const bx = startX + i * (btnW + 12);
      const by = 140;
      ctx.fillStyle = i === exploreMedium ? '#FF9500' : '#eee';
      roundRect(ctx, bx, by, btnW, btnH, 10);
      ctx.fill();
      ctx.fillStyle = i === exploreMedium ? '#fff' : '#666';
      ctx.font = '16px sans-serif';
      ctx.fillText(b, bx + btnW / 2, by + btnH / 2 + 6);
    });
  } else {
    // Show formula hint
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '14px sans-serif';
    if (state.challengeIdx === 0 || state.challengeIdx === 1) {
      ctx.fillText('提示: s = v × t ÷ 2（回声往返）', W / 2, y + 30);
    } else if (state.challengeIdx === 3) {
      ctx.fillText('提示: 两次声音 = 空气和铁传播时间差', W / 2, y + 30);
    } else if (state.challengeIdx === 4) {
      ctx.fillText('提示: Δs = (v₂ - v₁) × t', W / 2, y + 30);
    }
  }
}

// ── Observe ──
function startObserve() {
  useVacuum = false;
  isPlaying = true;
  animTime = 0;
  document.getElementById('modeToggle').textContent = '切换到真空实验';
  // Auto-mark done after some time
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();
      }
    }
  }, 4000);
}

// Toggle vacuum
document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  useVacuum = !useVacuum;
  if (useVacuum) {
    document.getElementById('modeToggle').textContent = '切换回音叉演示';
    animTime = 0;
    isPlaying = true;
  } else {
    document.getElementById('modeToggle').textContent = '切换到真空实验';
    animTime = 0;
    isPlaying = true;
  }
});

// ── Explore ──
function startExplore() {
  isPlaying = true;
  animTime = 0;
}

// Canvas click for explore medium selection
canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;

  const btnW = 100, btnH = 36;
  const W = canvas.width;
  const startX2 = (W - (btnW * 3 + 20)) / 2;

  // Check medium buttons
  if (y >= 12 && y <= 12 + btnH) {
    for (let i = 0; i < 3; i++) {
      const bx = startX2 + i * (btnW + 10);
      if (x >= bx && x <= bx + btnW) {
        exploreMedium = i;
        isPlaying = true;
        animTime = 0;
        updateUI();
        return;
      }
    }
  }

  // Click receiver to mark done
  const rx = W - 100, ry = 200;
  if (Math.hypot(x - rx, y - ry) < 30) {
    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();
    }
  }
});

// ── Challenge ──
function drawChallengeUI() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';

  // Word wrap
  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) {
      lines.push(line);
      line = '';
    }
  }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 28; });

  // Answer buttons
  const btnW = 140, btnH = 46;
  let options;
  if (state.challengeIdx === 2) {
    options = ['0: 空气', '1: 水', '2: 钢铁'];
  } else {
    options = ['输入答案', '看提示'];
  }

  const totalW = options.length * btnW + (options.length - 1) * 12;
  const startX = (W - totalW) / 2;
  options.forEach((b, i) => {
    const bx = startX + i * (btnW + 12);
    const by = 160;
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, bx, by, btnW, btnH, 10);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '15px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(b, bx + btnW / 2, by + btnH / 2);
  });

  // Hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  const hints = [
    '提示: s = v×t÷2（往返路程要除以2）',
    '提示: s = v×t',
    '点击选择对应数字',
    '提示: Δt = L/v₁ - L/v₂，代入求解L',
    '提示: Δs = Δv × t'
  ];
  ctx.fillText(hints[state.challengeIdx] || '', W / 2, H - 10);
}

function checkChallengeAnswer(input) {
  const ch = CHALLENGES[state.challengeIdx];
  if (!ch) return false;
  if (state.challengeIdx === 2) {
    return Math.abs(input - ch.answer) <= ch.tolerance;
  }
  return Math.abs(input - ch.answer) <= ch.tolerance;
}

// Canvas click for challenges
canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;

  // If challenge 3 (medium choice), check clicks on answer buttons
  if (state.challengeIdx === 2) {
    const btnW = 140, btnH = 46;
    const totalW = 3 * btnW + 24;
    const startX2 = (canvas.width - totalW) / 2;
    for (let i = 0; i < 3; i++) {
      const bx = startX2 + i * (btnW + 12);
      const by = 160;
      if (x >= bx && x <= bx + btnW) {
        if (checkChallengeAnswer(i)) {
          state.challengeIdx++;
          if (state.challengeIdx >= CHALLENGES.length) {
            if (!state.done.includes(2)) state.done.push(2);
            saveState();
            updateUI();
          } else {
            saveState();
            updateUI();
          }
        }
        return;
      }
    }
  }

  // For other challenges, prompt for answer input
  const userInput = prompt('输入你的答案（数字）:', '');
  if (userInput === null) return;
  const num = parseFloat(userInput);
  if (isNaN(num)) return;

  if (checkChallengeAnswer(num)) {
    state.challengeIdx++;
    if (state.challengeIdx >= CHALLENGES.length) {
      if (!state.done.includes(2)) state.done.push(2);
      saveState();
      updateUI();
      alert('🎉 恭喜通关！');
    } else {
      saveState();
      updateUI();
    }
  } else {
    alert('❌ 答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// ── Quiz ──
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx + 1}. ${q.q}`;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? `✅ 正确！${q.explain}`
    : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();
