<script>
// ── Storage Key ──
const STORAGE_KEY = 'physics_sound_ch1';

// ── State ──
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Missions ──
const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '声音的产生与传播', desc: '观看音叉振动产生声波，以及真空铃实验。点击"播放"观看演示。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '不同介质中的声速', desc: '点击切换介质（空气/水/钢铁），观察声波传播速度的差异。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '声速闯关', desc: '运用声速和回声知识完成挑战！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成几道选择题，巩固今天学的知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '开启真空，看声波还能传到接收器吗？', type: 'vacuum' },
  { goal: '点击介质按钮，找出哪种介质传声最快！', type: 'speed_race' },
  { goal: '调节距离，找到能听到回声的最短位置', type: 'echo' },
  { goal: '调节温度，让声速匹配目标值 🎯', type: 'temp' },
  { goal: '选择介质和距离，让声音恰好走 2 秒', type: 'timed' }
];

const QUIZ_POOL = [
  { q: '声音是由物体的什么产生的？', opts: ['A. 运动', 'B. 振动', 'C. 热传递', 'D. 分子扩散'], ans: 1,
    explain: '声音是由物体振动产生的。一切发声的物体都在振动，振动停止发声也停止。' },
  { q: '声音不能在下列哪个介质中传播？', opts: ['A. 空气', 'B. 水', 'C. 真空', 'D. 钢铁'], ans: 2,
    explain: '声音的传播需要介质，真空不能传声。月球上宇航员只能通过无线电交流。' },
  { q: '15℃时，声音在空气中的传播速度约为？', opts: ['A. 340 m/s', 'B. 1500 m/s', 'C. 5200 m/s', 'D. 3×10⁸ m/s'], ans: 0,
    explain: '15℃时声速约340m/s。1500m/s是水中声速，5200m/s是钢铁中声速，3×10⁸m/s是光速。' },
  { q: '声音在下列哪种介质中传播最快？', opts: ['A. 空气', 'B. 水', 'C. 钢铁', 'D. 真空'], ans: 2,
    explain: '声音在固体中传播最快，液体次之，气体最慢。钢铁中约5200m/s，水中约1500m/s，空气中约340m/s。' },
  { q: '人对着山崖喊话，经0.2s听到回声，人距山崖约多远？', opts: ['A. 34m', 'B. 68m', 'C. 17m', 'D. 136m'], ans: 0,
    explain: 's = v×t/2 = 340×0.2/2 = 34m。注意回声走的是往返路程，所以要除以2。' }
];

// ── Canvas & Animation ──
const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let exploreMedium = 0; // 0=air, 1=water, 2=steel
let useVacuum = false;

const MEDIA = [
  { name: '空气', speed: 340, color: '#FF9500', bg: '#fff8e8' },
  { name: '水', speed: 1500, color: '#007AFF', bg: '#e8f4ff' },
  { name: '钢铁', speed: 5200, color: '#34C759', bg: '#e8f8ee' }
];

function getMedium() { return MEDIA[exploreMedium]; }

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawObserve(W, H) {
  // Background
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  if (useVacuum) {
    // Bell jar experiment
    drawBellJar(W, H);
    return;
  }

  // Tuning fork on left
  const forkX = 160, forkY = 180;
  const vibrate = isPlaying ? Math.sin(animTime * 0.3) * 6 : 0;

  // Tuning fork base
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(forkX - 20, forkY + 10, 40, 20);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(forkX - 5, forkY - 40, 10, 50);

  // Prongs
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(forkX - 12 + vibrate, forkY - 40);
  ctx.lineTo(forkX - 12 + vibrate, forkY + 10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(forkX + 12 - vibrate, forkY - 40);
  ctx.lineTo(forkX + 12 - vibrate, forkY + 10);
  ctx.stroke();

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('音叉', forkX, forkY + 40);

  // Sound waves (circles expanding from fork)
  if (isPlaying) {
    const t = animTime;
    for (let i = 0; i < 5; i++) {
      const radius = 30 + ((t * 1.5 + i * 50) % 200);
      if (radius > 250) continue;
      const alpha = Math.max(0, 1 - radius / 250);
      ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.6})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(forkX, forkY - 15, radius, 0, Math.PI * 2);
      ctx.stroke();

      // Compression zones (darker rings)
      if (radius % 40 < 15) {
        ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.3})`;
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.arc(forkX, forkY - 15, radius, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Ear on the right
    ctx.fillStyle = '#f0c8a0';
    ctx.beginPath();
    ctx.ellipse(W - 80, forkY - 15, 20, 25, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e0b090';
    ctx.beginPath();
    ctx.ellipse(W - 80, forkY - 15, 10, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    // Sound reaching ear indicator
    const distToEar = W - 80 - forkX;
    const anyWave = (t * 1.5) % 200 > 180;
    if (anyWave) {
      ctx.fillStyle = '#FF9500';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('👂 听到声音', W - 80, forkY + 50);
    }
  }

  // Instructions
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  if (!isPlaying) {
    ctx.fillText('▶ 点击下方"播放"按钮开始演示', W / 2, H - 20);
  }

  // Bell jar toggle hint
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('💡 点击左上角按钮切换真空实验', 10, H - 20);
}

function drawBellJar(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Bell jar (glass dome)
  const cx = W / 2, cy = 160;
  ctx.strokeStyle = 'rgba(100, 180, 255, 0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 140, 120, 0, Math.PI, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(cx, cy, 140, 120, 0, 0, Math.PI);
  ctx.stroke();

  // Glass shine
  ctx.strokeStyle = 'rgba(100, 180, 255, 0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx - 20, cy - 20, 60, 50, -0.2, Math.PI, 0);
  ctx.stroke();

  // Base plate
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(cx - 100, cy + 80, 200, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx - 90, cy + 85, 180, 5);

  // Bell inside
  ctx.fillStyle = '#c8a060';
  ctx.beginPath();
  ctx.arc(cx, cy - 10, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#b89050';
  ctx.fillRect(cx - 3, cy - 30, 6, 20);
  // Clapper
  const swing = isPlaying ? Math.sin(animTime * 0.5) * 4 : 0;
  ctx.fillStyle = '#a08040';
  ctx.beginPath();
  ctx.arc(cx + swing, cy + 15, 8, 0, Math.PI * 2);
  ctx.fill();

  // Air particles (decrease when vacuum)
  const particleCount = isPlaying ? Math.max(5, 30 - animTime * 2) : 30;
  ctx.fillStyle = `rgba(100, 149, 237, ${0.3 * particleCount / 30})`;
  for (let i = 0; i < particleCount; i++) {
    const angle = Math.random() * Math.PI;
    const r = 20 + Math.random() * 100;
    const px = cx - 80 + Math.random() * 160;
    const py = cy - 80 + Math.random() * 140;
    ctx.beginPath();
    ctx.arc(px, py, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Vacuum pump
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx + 130, cy + 40, 30, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(cx + 140, cy + 90, 10, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.arc(cx + 145, cy + 65, 10, 0, Math.PI * 2);
  ctx.fill();

  // Status
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  if (particleCount > 20) {
    ctx.fillText('🔔 钟声响起（有空气）', cx, cy + 130);
  } else if (particleCount > 5) {
    ctx.fillText('🔕 钟声越来越弱（正在抽气）', cx, cy + 130);
  } else {
    ctx.fillText('🔇 听不到钟声了（真空）', cx, cy + 130);
  }

  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.fillText('真空罩实验（抽气机在右侧）', cx, H - 20);
}

function drawExplore(W, H) {
  const med = getMedium();
  ctx.fillStyle = med.bg;
  ctx.fillRect(0, 0, W, H);

  // Medium buttons
  const btnW = 100, btnH = 36, startX = (W - (btnW * 3 + 20)) / 2;
  MEDIA.forEach((m, i) => {
    const x = startX + i * (btnW + 10);
    const y = 12;
    ctx.fillStyle = i === exploreMedium ? m.color : '#eee';
    roundRect(ctx, x, y, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = i === exploreMedium ? '#fff' : '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(m.name, x + btnW / 2, y + btnH / 2);
  });

  // Sound source
  const srcX = 100, srcY = 200;
  ctx.fillStyle = '#FF9500';
  ctx.beginPath();
  ctx.arc(srcX, srcY, 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🔊', srcX, srcY + 5);

  // Receiver
  const rx = W - 100, ry = 200;
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.arc(rx, ry, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText('👂', rx, ry + 6);

  // Wave propagation
  if (isPlaying) {
    const speed = med.speed;
    const dist = rx - srcX;
    const t = animTime;
    const waveSpeed = 0.5 + speed / 3400;

    for (let i = 0; i < 3; i++) {
      const progress = ((t * waveSpeed + i * 60) % (dist + 60)) - 30;
      if (progress < 0) continue;
      const x = srcX + progress;
      const alpha = Math.max(0.1, 1 - progress / dist);
      const radius = 8 + Math.sin(progress * 0.1) * 4;

      ctx.strokeStyle = `rgba(255, 149, 0, ${alpha * 0.5})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(x, srcY - 10, radius * 2, 0, Math.PI * 2);
      ctx.stroke();

      // Compression
      ctx.fillStyle = `rgba(255, 149, 0, ${alpha * 0.15})`;
      ctx.beginPath();
      ctx.arc(x, srcY - 10, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    // Check if wave reached receiver
    const reached = (t * waveSpeed) % (dist + 60) > dist;
    if (reached) {
      ctx.fillStyle = '#34C759';
      ctx.font = '12px sans-serif';
      ctx.fillText('✅ 已接收', rx, ry + 40);
    }
  }

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('声源', srcX, srcY + 40);
  ctx.fillText('接收器', rx, ry + 40);

  // Speed display on canvas
  ctx.fillStyle = med.color;
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(`${med.speed} m/s`, W / 2, H - 10);

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('点击上方介质按钮切换，点击下方"播放"观察声波传播', W / 2, 80);
  }
}

// ── Challenge Game State ──
var chState = {}; // per-challenge interactive state

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  const med = getMedium();

  // Goal text at top
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const goal = ch.goal;
  const maxW = W - 40;
  let lines = [], line = '';
  for (let c of goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let gy = 24;
  lines.forEach(l => { ctx.fillText(l.trim(), W/2, gy); gy += 20; });

  const srcX = 80, srcY = H/2 + 10;

  if (ch.type === 'vacuum') {
    // Bell jar - simpler version
    const cx = srcX, cy = srcY - 20;
    // Jar
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    roundRect(ctx, cx - 50, cy - 50, 100, 100, 12);
    ctx.stroke();
    // Bell
    ctx.fillStyle = '#c8a060';
    ctx.beginPath(); ctx.arc(cx, cy - 10, 16, 0, Math.PI * 2); ctx.fill();
    // Clapper
    const swinging = isPlaying && !chState.vacuumOn;
    const sw = swinging ? Math.sin(animTime * 0.3) * 3 : 0;
    ctx.fillStyle = '#a08040';
    ctx.beginPath(); ctx.arc(cx + sw, cy + 10, 6, 0, Math.PI * 2); ctx.fill();
    // Vacuum indicator
    ctx.fillStyle = chState.vacuumOn ? 'rgba(100,149,237,0.5)' : 'rgba(200,200,200,0.08)';
    ctx.fillRect(cx - 40, cy - 40, 80, 80);
    // Label
    ctx.fillStyle = chState.vacuumOn ? '#4facfe' : 'rgba(255,255,255,0.4)';
    ctx.font = '12px sans-serif';
    ctx.fillText(chState.vacuumOn ? '🔇 真空 - 声音无法传播' : '🔊 空气 - 声音可传播', cx, cy + 60);
    // Wave animation if NOT vacuum
    if (!chState.vacuumOn && isPlaying) {
      for (let i = 0; i < 3; i++) {
        const px = cx + 20 + (animTime * 2 + i * 40) % 120;
        ctx.strokeStyle = `rgba(255,149,0,${0.5 - px/240})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, cy, 8 + i * 2, 0, Math.PI * 2); ctx.stroke();
      }
    }
    // Receiver on right
    const rxx = W - 60;
    ctx.fillStyle = chState.vacuumOn ? 'rgba(255,255,255,0.2)' : 'rgba(52,199,89,0.5)';
    ctx.beginPath(); ctx.arc(rxx, cy + 5, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.fillText('👂', rxx, cy + 10);
    // Vacuum toggle button on canvas
    const btnX = W/2 - 50, btnY = H - 55;
    ctx.fillStyle = chState.vacuumOn ? '#4facfe' : 'rgba(255,255,255,0.08)';
    roundRect(ctx, btnX, btnY, 100, 32, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif';
    ctx.fillText(chState.vacuumOn ? '🔛 关闭真空' : '🔘 开启真空', W/2, btnY + 16);
    // Status
    if (chState.done) {
      ctx.fillStyle = '#34C759'; ctx.font = '15px sans-serif'; ctx.fillText('✅ 观察成功！声波需要介质传播', W/2, H/2 + 100);
    }

  } else if (ch.type === 'speed_race') {
    // Three buttons for media
    const lanes = ['空气', '水', '钢铁'];
    const speeds = [340, 1500, 5200];
    const bw = 90, bh = 40, gap = 14;
    const tw = bw * 3 + gap * 2;
    const sx = (W - tw) / 2;
    lanes.forEach((n, i) => {
      const x = sx + i * (bw + gap), by = gy + 20;
      ctx.fillStyle = chState.raceClicked && chState.raceClicked.includes(i) ? MEDIA[i].color : 'rgba(255,255,255,0.06)';
      roundRect(ctx, x, by, bw, bh, 10); ctx.fill();
      ctx.fillStyle = chState.raceClicked && chState.raceClicked.includes(i) ? '#fff' : 'rgba(255,255,255,0.5)';
      ctx.font = '15px sans-serif'; ctx.fillText(n, x + bw/2, by + bh/2);
      // Speed display
      if (chState.raceClicked && chState.raceClicked.includes(i)) {
        ctx.fillStyle = MEDIA[i].color; ctx.font = '13px sans-serif';
        ctx.fillText(speeds[i] + ' m/s', x + bw/2, by + bh + 18);
      }
    });
    // Animation if a medium is racing
    if (chState.racing !== undefined && isPlaying) {
      const idx = chState.racing;
      const sx2 = 30, ex = W - 30;
      const progress = (animTime * 0.3 * (speeds[idx] / 340)) % 1;
      const bx = sx2 + (ex - sx2) * progress;
      ctx.fillStyle = MEDIA[idx].color;
      ctx.beginPath(); ctx.arc(bx, srcY + 20, 10, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.fillText('🔊', bx, srcY + 24);
      // Finish line
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(ex, srcY - 30); ctx.lineTo(ex, srcY + 70); ctx.stroke();
      if (progress > 0.95) {
        // Mark this medium as done racing
        if (chState.racingDone === undefined) chState.racingDone = {};
        chState.racingDone[idx] = true;
      }
    } else {
      // Draw finish line even when not racing
      const ex = W - 30;
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(ex, srcY - 30); ctx.lineTo(ex, srcY + 70); ctx.stroke();
    }
    // Status
    if (chState.raceClicked && chState.raceClicked.length >= 3 && !chState.done) {
      // Auto-complete when all three clicked
    }
    if (chState.done) {
      ctx.fillStyle = '#34C759'; ctx.font = '15px sans-serif';
      ctx.fillText('✅ 钢铁传声最快！固体 > 液体 > 气体', W/2, H - 20);
    }

  } else if (ch.type === 'echo') {
    // Speaker on left, wall on right at variable distance
    const wallX = 150 + chState.echoDist * 2.5;
    const wy = srcY;
    // Speaker
    ctx.fillStyle = '#FF9500'; ctx.beginPath(); ctx.arc(50, wy, 14, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.fillText('🔊', 50, wy + 4);
    // Wall
    ctx.fillStyle = '#5a4a3a';
    ctx.fillRect(wallX - 3, wy - 50, 6, 100);
    ctx.fillStyle = '#8a7a6a';
    ctx.font = '20px sans-serif'; ctx.fillText('🏔️', wallX + 8, wy + 6);
    // Distance label
    const distM = chState.echoDist;
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '11px sans-serif';
    ctx.fillText(distM + 'm', 60 + (wallX - 60) / 2, wy + 30);
    // Emit button
    const ebx = W/2 - 45, eby = H - 55;
    ctx.fillStyle = chState.echoEmitting ? '#FF9500' : 'rgba(255,255,255,0.06)';
    roundRect(ctx, ebx, eby, 90, 32, 8); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif';
    ctx.fillText('🔊 发声', W/2, eby + 16);
    // Wave animation
    if (chState.echoEmitting) {
      for (let i = 0; i < 3; i++) {
        const px = 50 + (animTime * 3 + i * 50) % (wallX - 50);
        ctx.strokeStyle = `rgba(255,149,0,${0.6 - px/(wallX-50)*0.5})`;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, wy - 5, 6 + i * 3, 0, Math.PI * 2); ctx.stroke();
      }
      // Echo return
      const echoDelay = distM * 2 / 340 * 60; // frames
      if (animTime > echoDelay && animTime < echoDelay + 30) {
        const epx = wallX - (animTime - echoDelay) * 3;
        if (epx > 50) {
          ctx.strokeStyle = `rgba(79,172,254,${0.8 - (wallX - epx)/(wallX-50)*0.5})`;
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(epx, wy - 5, 8, 0, Math.PI * 2); ctx.stroke();
        }
      }
      // Check if echo heard (round trip > 100ms = 34m at 340m/s one way)
      // Actually min echo distance: s = v * t / 2 = 340 * 0.1 / 2 = 17m
    }
    if (chState.done) {
      ctx.fillStyle = '#34C759'; ctx.font = '15px sans-serif';
      ctx.fillText('✅ 找到回声距离：' + chState.echoAnswer + 'm', W/2, H - 20);
    }

  } else if (ch.type === 'temp') {
    // Speed gauge
    const gx = W/2, gy2 = srcY - 10;
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(gx, gy2 + 20, 60, 0, Math.PI); ctx.stroke();
    // Current speed
    const currentSpeed = 331 + 0.6 * chState.tempVal;
    const angle = Math.PI * (currentSpeed - 331) / (355 - 331);
    const lx = gx + 50 * Math.cos(Math.PI - angle);
    const ly = gy2 + 20 - 50 * Math.sin(Math.PI - angle);
    ctx.strokeStyle = currentSpeed >= chState.tempTarget - 1 && currentSpeed <= chState.tempTarget + 1 ? '#34C759' : '#FF9500';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(gx, gy2 + 20); ctx.lineTo(lx, ly); ctx.stroke();
    // Display speed
    ctx.fillStyle = '#fff'; ctx.font = '28px sans-serif'; ctx.textBaseline = 'middle';
    ctx.fillText(Math.round(currentSpeed) + ' m/s', W/2, gy2 + 60);
    // Target
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = '14px sans-serif';
    ctx.fillText('🎯 目标: ' + chState.tempTarget + ' m/s', W/2, gy2 + 85);
    // Temperature bar
    const barX = 30, barW = W - 60, barY = H - 50, barH = 10;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(ctx, barX, barY, barW, barH, 5); ctx.fill();
    const fillW = (chState.tempVal - 0) / (40 - 0) * barW;
    ctx.fillStyle = fillW / barW < 0.3 ? '#4facfe' : fillW / barW < 0.7 ? '#FF9500' : '#FF3B30';
    roundRect(ctx, barX, barY, fillW, barH, 5); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.font = '11px sans-serif'; ctx.textBaseline = 'top';
    ctx.fillText('0°C', barX, barY + barH + 4);
    ctx.fillText('40°C', barX + barW - 30, barY + barH + 4);
    ctx.fillStyle = '#fff'; ctx.font = '12px sans-serif'; ctx.textBaseline = 'bottom';
    ctx.fillText('🌡️ ' + Math.round(chState.tempVal) + '°C', W/2, barY - 4);
    if (chState.done) {
      ctx.fillStyle = '#34C759'; ctx.font = '15px sans-serif';
      ctx.fillText('✅ 匹配成功！声速 = ' + Math.round(currentSpeed) + ' m/s', W/2, gy2 + 115);
    }

  } else if (ch.type === 'timed') {
    // Race track
    const ty = srcY;
    // Start line
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(30, ty - 40); ctx.lineTo(30, ty + 40); ctx.stroke();
    // Finish line (checkered)
    const finX = 170 + chState.timedDist * 2.8;
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(finX - 2, ty - 40, 4, 80);
    // Animate if running
    if (chState.timedRunning && isPlaying) {
      const spd = MEDIA[chState.timedMedium].speed;
      const travelTime = chState.timedDist / spd;
      const progress = Math.min(1, animTime * 0.5 / travelTime);
      const cx2 = 30 + (finX - 30) * progress;
      ctx.fillStyle = MEDIA[chState.timedMedium].color;
      ctx.beginPath(); ctx.arc(cx2, ty, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '14px sans-serif'; ctx.fillText('🔊', cx2, ty + 4);
      // Elapsed time
      ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif';
      ctx.fillText((animTime * 0.5).toFixed(1) + 's', W/2, ty + 70);
    }
    // Medium indicator
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.font = '12px sans-serif';
    ctx.fillText('介质: ' + MEDIA[chState.timedMedium].name + ' | 距离: ' + chState.timedDist + 'm', W/2, ty + 100);
    if (chState.done) {
      ctx.fillStyle = '#34C759'; ctx.font = '15px sans-serif';
      ctx.fillText('✅ 完成！' + MEDIA[chState.timedMedium].name + ' / ' + chState.timedDist + 'm = 2.0s', W/2, H - 20);
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

// ── Mission Switching ──
function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索过各介质。 <button onclick="startExplore()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = `${m.desc} <button onclick="startExplore()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = `${m.desc} 第 ${state.challengeIdx + 1}/${CHALLENGES.length} 关 | ${CHALLENGES[state.challengeIdx].goal}`;
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    if (!chState._init) { initChallenge(); chState._init = true; }
    renderChallengeControls();
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  // Update speed display
  if (state.currentMission === 1) {
    const med = getMedium();
    document.getElementById('dispMedium').textContent = med.name;
    document.getElementById('dispSpeed').textContent = med.speed + ' m/s';
    document.getElementById('dispMedium').className = `value ${med === MEDIA[0] ? 'air' : med === MEDIA[1] ? 'water' : 'solid'}`;
    document.getElementById('dispSpeed').className = `value ${med === MEDIA[0] ? 'air' : med === MEDIA[1] ? 'water' : 'solid'}`;
  }

  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');

  // Progress dots
  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  // Challenge HUD
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx + 1}/${CHALLENGES.length} 关`;
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 40) + '...' || '';
  }

  // Quiz overlay
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

// ── Observe ──
function startObserve() {
  useVacuum = false;
  isPlaying = true;
  animTime = 0;
  document.getElementById('modeToggle').textContent = '切换到真空实验';
  // Auto-mark done after some time
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();
      }
    }
  }, 4000);
}

// Toggle vacuum
document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  useVacuum = !useVacuum;
  if (useVacuum) {
    document.getElementById('modeToggle').textContent = '切换回音叉演示';
    animTime = 0;
    isPlaying = true;
  } else {
    document.getElementById('modeToggle').textContent = '切换到真空实验';
    animTime = 0;
    isPlaying = true;
  }
});

// ── Explore ──
function startExplore() {
  isPlaying = true;
  animTime = 0;
}

// Canvas click for explore medium selection
canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;

  const btnW = 100, btnH = 36;
  const W = canvas.width;
  const startX2 = (W - (btnW * 3 + 20)) / 2;

  // Check medium buttons
  if (y >= 12 && y <= 12 + btnH) {
    for (let i = 0; i < 3; i++) {
      const bx = startX2 + i * (btnW + 10);
      if (x >= bx && x <= bx + btnW) {
        exploreMedium = i;
        isPlaying = true;
        animTime = 0;
        updateUI();
        return;
      }
    }
  }

  // Click receiver to mark done
  const rx = W - 100, ry = 200;
  if (Math.hypot(x - rx, y - ry) < 30) {
    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();
    }
  }
});

// ── Challenge HTML Controls ──

  const desc = document.getElementById('missionDesc');

      '<span style="font-size:11px;color:rgba(255,255,255,0.3);">提示：声音需要介质（空气）才能传播</span></div>';

  } else if (ch.type === 'speed_race') {
    const allClicked = chState.raceClicked && chState.raceClicked.length >= 3;

      '<span style="font-size:13px;color:rgba(255,255,255,0.6);">点击画布上的介质按钮（空气/水/钢铁），观察哪个传声最快</span>' +
      (allClicked && !chState.done
        ? '<button onclick="completeChallenge()" style="padding:8px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">✅ 我知道答案了 - 钢铁最快！</button>'
        : '') +
      '<span style="font-size:11px;color:rgba(255,255,255,0.3);">提示：固体 > 液体 > 气体</span></div>';

  } else if (ch.type === 'echo') {
    const dist = chState.echoDist || 5;
    desc.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;">' +
      '<span style="font-size:13px;color:rgba(255,255,255,0.6);">🎛️ 距离: <b style="color:#fff;">' + dist + 'm</b></span>' +
      '<input type="range" min="5" max="50" value="' + dist + '" oninput="adjustEcho(this.value)" style="width:100%;accent-color:#FF9500;">' +
      '<div style="display:flex;gap:6px;">' +
      '<button onclick="emitEcho()" style="flex:1;padding:8px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">🔊 发声</button>' +
      (chState.echoResult !== undefined
        ? '<span style="flex:1;padding:8px;border-radius:8px;text-align:center;font-size:13px;font-weight:500;' +
          (chState.echoResult ? 'background:rgba(52,199,89,0.15);color:#34C759;">✅ 听到回声！' : 'background:rgba(255,59,48,0.1);color:#FF3B30;">❌ 没有回声') + '</span>'
        : '') +
      '</div>' +
      (chState.echoResult && !chState.done
        ? '<button onclick="completeChallenge()" style="padding:8px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">✅ 记下这个距离，通关！</button>'
        : '') +
      '<span style="font-size:11px;color:rgba(255,255,255,0.3);">提示：回声需要 ≥0.1s 的时间差 (≥17m)</span></div>';

  } else if (ch.type === 'temp') {
    const val = Math.round(chState.tempVal);
    desc.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;">' +
      '<span style="font-size:13px;color:rgba(255,255,255,0.6);">🌡️ 温度: <b style="color:#fff;">' + val + '°C</b></span>' +
      '<input type="range" min="0" max="40" value="' + val + '" oninput="adjustTemp(this.value)" style="width:100%;accent-color:#FF9500;">' +
      '<div style="font-size:12px;color:rgba(255,255,255,0.4);text-align:center;">当前声速: ' + Math.round(331 + 0.6 * val) + ' m/s &nbsp;|&nbsp; 🎯 目标: ' + chState.tempTarget + ' m/s</div>' +
      (chState.done ? '<span style="text-align:center;color:#34C759;font-size:13px;font-weight:600;">✅ 匹配成功！</span>' : '') +
      '<span style="font-size:11px;color:rgba(255,255,255,0.3);">提示：v = 331 + 0.6T（T为°C）</span></div>';

  } else if (ch.type === 'timed') {
    desc.innerHTML = '<div style="display:flex;flex-direction:column;gap:6px;">' +
      '<span style="font-size:13px;color:rgba(255,255,255,0.6);">🔄 介质: <b style="color:#fff;">' + MEDIA[chState.timedMedium].name + '</b></span>' +

      '</div>' +
      '<span style="font-size:13px;color:rgba(255,255,255,0.6);">📏 距离: <b style="color:#fff;">' + chState.timedDist + 'm</b></span>' +

      '<div style="font-size:12px;color:rgba(255,255,255,0.4);text-align:center;">🏁 预计: ' + (chState.timedDist / MEDIA[chState.timedMedium].speed).toFixed(2) + 's &nbsp;|&nbsp; 🎯 目标: 2.0s</div>' +
      '<button onclick="startTimedRace()" style="padding:8px;background:#FF9500;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;">▶ 发射</button>' +
      (chState.done ? '<span style="text-align:center;color:#34C759;font-size:13px;font-weight:600;">✅ 精准命中 2.0s！</span>' : '') +
      '<span style="font-size:11px;color:rgba(255,255,255,0.3);">提示：t = d / v，找距离让时间 = 2.0s</span></div>';
  }
}

// ── Challenge Helpers ──
function adjustEcho(v) {
  chState.echoDist = parseInt(v);
  chState.echoResult = undefined;
  chState.echoEmitting = false;
  renderChallengeControls();
}

function emitEcho() {
  chState.echoEmitting = true;
  chState.echoResult = undefined;
  animTime = 0;
  isPlaying = true;
  // Calculate echo: round trip >= 0.1s = distance >= 17m
  const dist = chState.echoDist;
  const roundTripTime = dist * 2 / 340;
  setTimeout(() => {
    chState.echoResult = roundTripTime >= 0.1;
    chState.echoEmitting = false;
    isPlaying = false;
    if (chState.echoResult) {
      chState.echoAnswer = dist;
    }
    renderChallengeControls();
  }, 1000 + roundTripTime * 1000);
}

function adjustTemp(v) {
  chState.tempVal = parseInt(v);
  const speed = 331 + 0.6 * chState.tempVal;
  if (Math.abs(speed - chState.tempTarget) <= 1) {
    chState.done = true;
    isPlaying = false;
    renderChallengeControls();
  }
  drawScene();
}

function setTimedMedium(i) {
  chState.timedMedium = i;
  chState.timedRunning = false;
  isPlaying = false;
  // Adjust dist slider max based on medium
  chState.timedDist = Math.min(chState.timedDist, i===0 ? 2000 : i===1 ? 9000 : 30000);
  renderChallengeControls();
  drawScene();
}

function adjustTimedDist(v) {
  chState.timedDist = parseInt(v);
  renderChallengeControls();
  drawScene();
}

function startTimedRace() {
  chState.timedRunning = true;
  isPlaying = true;
  animTime = 0;
  const spd = MEDIA[chState.timedMedium].speed;
  const targetTime = 2.0;
  const requiredDist = spd * targetTime;
  const tolerance = 5; // meters tolerance
  setTimeout(() => {
    chState.timedRunning = false;
    isPlaying = false;
    if (Math.abs(chState.timedDist - requiredDist) <= tolerance) {
      chState.done = true;
    }
    renderChallengeControls();
  }, 2500);
}

// ── Canvas click for challenges ──
canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const W = canvas.width, H = canvas.height;
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];

  if (ch.type === 'vacuum') {
    // Vacuum toggle button
    const btnX = W/2 - 50, btnY = H - 55;
    if (x >= btnX && x <= btnX + 100 && y >= btnY && y <= btnY + 32) {
      chState.vacuumOn = !chState.vacuumOn;
      if (!chState.vacuumOn) { isPlaying = true; animTime = 0; }
      else { isPlaying = false; }
      if (chState.vacuumOn) {
        // Vacuum means no sound - mark success after brief animation
        chState.done = true;
        if (!chState._obsDone) {
          chState._obsDone = true;
        }
      }
      drawScene();
    }

  } else if (ch.type === 'speed_race') {
    // Medium buttons
    const bw = 90, bh = 40, gap = 14;
    const tw = bw * 3 + gap * 2;
    const sx = (W - tw) / 2;
    // Recalculate goal text height
    let calcGy = 24;
    const goal = ch.goal;
    let gLines = [], gLine = '';
    for (let c of goal) { gLine += c; if (gLine.length > 25) { gLines.push(gLine); gLine = ''; } }
    if (gLine) gLines.push(gLine);
    calcGy = 24 + gLines.length * 20;

    for (let i = 0; i < 3; i++) {
      const bx = sx + i * (bw + gap), by = calcGy + 20;
      if (x >= bx && x <= bx + bw && y >= by && y <= by + bh) {
        if (!chState.raceClicked) chState.raceClicked = [];
        if (!chState.raceClicked.includes(i)) {
          chState.raceClicked.push(i);
          chState.racing = i;
          animTime = 0;
          isPlaying = true;
          setTimeout(() => {
            if (chState.raceClicked && chState.raceClicked.length >= 3) {
              renderChallengeControls();
            }
          }, 2000);
        }
        drawScene();
        return;
      }
    }
  }
});

function completeChallenge() {
  state.challengeIdx++;
  if (state.challengeIdx >= CHALLENGES.length) {
    if (!state.done.includes(2)) state.done.push(2);
    saveState();
    updateUI();
  } else {
    saveState();
    updateUI();
  }
}

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  chState = {}; // reset all game state
  saveState();
  updateUI();
}

// ── Quiz ──
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx + 1}. ${q.q}`;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? `✅ 正确！${q.explain}`
    : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
