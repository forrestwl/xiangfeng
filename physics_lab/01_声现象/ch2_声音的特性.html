<script>
const STORAGE_KEY = 'physics_sound_ch2';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [], currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0, quizIdx: saved.quizIdx || 0, quizDone: saved.quizDone || []
};
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '波形图演示', desc: '观看正弦波展示响度（振幅）和音调（频率）的区别。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '调整波形参数', desc: '拖动滑块改变振幅和频率，观察波形变化。切换不同波形了解音色。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '辨音闯关', desc: '根据描述调整波形参数，匹配目标！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成几道选择题，巩固声音特性的知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '调整振幅到 80 以上（增大响度）', check: a => a >= 80, field: 'amp' },
  { goal: '调整频率到 200 Hz 以下（降低音调）', check: (a,f) => f <= 180, field: 'freq' },
  { goal: '把振幅降到 20 以下（减小响度）', check: a => a <= 22, field: 'amp' },
  { goal: '调整频率到 600 Hz 以上（提高音调）', check: (a,f) => f >= 580, field: 'freq' },
  { goal: '切换到三角波（改变音色）', check: (a,f,t) => t === 1, field: 'timbre' }
];

const QUIZ_POOL = [
  { q: '声音的响度与什么有关？', opts: ['A. 频率', 'B. 振幅', 'C. 波形', 'D. 介质'], ans: 1, explain: '响度与振幅有关，振幅越大响度越大。' },
  { q: '声音的音调与什么有关？', opts: ['A. 振幅', 'B. 频率', 'C. 介质', 'D. 温度'], ans: 1, explain: '音调与频率有关，频率越高音调越高。' },
  { q: '人能听到的声音频率范围是？', opts: ['A. 20-2000 Hz', 'B. 20-20000 Hz', 'C. 200-20000 Hz', 'D. 0-20000 Hz'], ans: 1, explain: '人的听觉频率范围是 20-20000 Hz，低于20Hz为次声波，高于20000Hz为超声波。' },
  { q: '"闻其声知其人"是利用了声音的什么特性？', opts: ['A. 响度', 'B. 音调', 'C. 音色', 'D. 声速'], ans: 2, explain: '不同人发声的音色不同，"闻其声知其人"就是利用音色来辨别。' },
  { q: '男低音和女高音中的"低"和"高"指的是？', opts: ['A. 响度', 'B. 音调', 'C. 音色', 'D. 声速'], ans: 1, explain: '男低音音调低（频率低），女高音音调高（频率高），这里指的是音调。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let amp = 50, freq = 440, timbre = 0, animTime = 0, animId;

function getTimbreName() { return ['正弦波', '三角波', '方波'][timbre] || '正弦波'; }

function drawWave() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = '#eee';
  ctx.lineWidth = 1;
  for (let y = H/2; y < H; y += 25) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let y = H/2; y > 0; y -= 25) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();

  // Draw wave
  const centerY = H / 2;
  const maxAmp = Math.min(amp, 100) * (centerY - 15) / 100;
  const freqRad = freq / 200 * Math.PI * 2;
  const phase = animTime * 0.05;

  ctx.strokeStyle = '#AF52DE';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let x = 0; x < W; x += 1) {
    let y;
    const rad = x / W * 3 * Math.PI * freqRad + phase;
    if (timbre === 0) {
      y = centerY - maxAmp * Math.sin(rad);
    } else if (timbre === 1) {
      // Triangle wave
      const t = (rad % (Math.PI * 2)) / (Math.PI * 2);
      y = centerY - maxAmp * (t < 0.5 ? 4 * t - 1 : 3 - 4 * t);
    } else {
      // Square wave
      const t = rad % (Math.PI * 2);
      y = centerY - maxAmp * (t < Math.PI ? 1 : -1);
    }
    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('振幅（响度）', 10, 20);
  ctx.fillStyle = '#AF52DE';
  ctx.font = '14px sans-serif';
  ctx.fillText(`A = ${amp.toFixed(0)}`, 10, 18);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.textAlign = 'right';
  ctx.fillText('频率（音调）', W - 10, 20);
  ctx.fillStyle = '#AF52DE';
  ctx.fillText(`f = ${freq.toFixed(0)} Hz`, W - 10, 18);

  // Timbre label
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText(`音色: ${getTimbreName()}`, W / 2, H - 12);

  if (state.currentMission === 2) {
    const ch = CHALLENGES[state.challengeIdx];
    if (ch) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      roundRect(ctx, W/2-150, H-50, 300, 30, 8);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`🎯 ${ch.goal.slice(0, 30)}`, W/2, H-30);
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

function animate() {
  animTime += 1;
  drawWave();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  document.getElementById('waveControls').style.display = (state.currentMission <= 1) ? 'flex' : 'none';

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看。 <button onclick="if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">✅ 标记完成</button>';
    else desc.innerHTML = `${m.desc} 观察波形：<br>• 响度 = 振幅（波峰高度）<br>• 音调 = 频率（波峰密度）<br>• 音色 = 波形形状`;
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索。';
    else desc.innerHTML = `${m.desc}<br>点击下方音色按钮切换波形。`;
    // Show sliders for explore
    let ctrl = document.getElementById('waveControls');
    let ampVal = document.getElementById('dispAmp');
    let freqVal = document.getElementById('dispFreq');
    let timbreVal = document.getElementById('dispTimbre');
    ctrl.innerHTML = `
      <div class="ctrl"><span class="label">响度: </span><input type="range" min="5" max="100" value="${amp}" oninput="amp=parseFloat(this.value);updateUI();"> <span class="value" id="dispAmp">${amp.toFixed(0)}</span></div>
      <div class="ctrl"><span class="label">音调: </span><input type="range" min="50" max="1000" value="${freq}" oninput="freq=parseFloat(this.value);updateUI();"> <span class="value" id="dispFreq">${freq.toFixed(0)} Hz</span></div>
      <div class="ctrl"><span class="label">音色: </span>
        <button class="timbre-btn ${timbre===0?'active':''}" onclick="timbre=0;updateUI()">正弦</button>
        <button class="timbre-btn ${timbre===1?'active':''}" onclick="timbre=1;updateUI()">三角</button>
        <button class="timbre-btn ${timbre===2?'active':''}" onclick="timbre=2;updateUI()">方波</button>
      </div>`;
    if (!state.done.includes(1)) {
      setTimeout(() => { if (state.currentMission === 1) { state.done.push(1); saveState(); updateUI(); } }, 8000);
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 重新挑战</button>';
    else desc.innerHTML = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关：${CHALLENGES[state.challengeIdx].goal}`;
    drawChallengeHUD();
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) desc.innerHTML = '✅ 测验已完成。 <button onclick="startQuiz()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
    document.getElementById('quizOverlay').className = state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
    if (state.quizIdx < QUIZ_POOL.length) showQuiz();
  }

  // Update display values
  document.getElementById('dispAmp').textContent = amp.toFixed(0);
  document.getElementById('dispFreq').textContent = freq.toFixed(0) + ' Hz';
  document.getElementById('dispTimbre').textContent = getTimbreName();

  // Auto-check challenges in explore mode
  if (state.currentMission === 2) {
    const ch = CHALLENGES[state.challengeIdx];
    if (ch) {
      let passed = false;
      if (ch.field === 'amp') passed = ch.check(amp);
      else if (ch.field === 'freq') passed = ch.check(amp, freq);
      else if (ch.field === 'timbre') passed = ch.check(amp, freq, timbre);
      if (passed) {
        state.challengeIdx++;
        if (state.challengeIdx >= CHALLENGES.length) {
          if (!state.done.includes(2)) state.done.push(2);
          saveState(); updateUI();
          alert('🎉 恭喜通关！');
        } else { saveState(); updateUI(); }
      }
    }
  }

  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });
}

function drawChallengeHUD() {
  document.getElementById('challengeHud').className = 'challenge-hud show';
  document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
  document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
}

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// ── Quiz ──
function startQuiz() {
  state.quizIdx = 0; state.quizDone = []; saveState();
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

// ── Init ──
switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
