const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animTime = 0, animId, isPlaying = false;
let exploreApp = 0; // 0=sonar, 1=ultrasound, 2=cleaning

const APPS = [
  { name: '声呐', icon: '🚢', desc: '发射超声波 → 遇障碍反射 → 接收回波 → 计算距离' },
  { name: 'B超', icon: '🏥', desc: '超声波穿透人体 → 不同组织反射差异 → 生成图像' },
  { name: '超声波清洗', icon: '🧼', desc: '超声波在液体中产生空化效应 → 气泡爆破去污' }
];

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  if (state.currentMission === 0) drawSonarDemo(W, H);
  else if (state.currentMission === 1) drawExploreScene(W, H);
  else if (state.currentMission === 2) drawChallengeScene(W, H);
}

function drawSonarDemo(W, H) {
  // Ship at top
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.moveTo(W/2-30, 20);
  ctx.lineTo(W/2-40, 50);
  ctx.lineTo(W/2+40, 50);
  ctx.lineTo(W/2+30, 20);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(W/2-5, 30, 10, 20);
  // Ship label
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🚢 声呐', W/2, 18);

  // Water
  ctx.fillStyle = 'rgba(0,122,255,0.08)';
  ctx.fillRect(0, 50, W, 250);
  // Water waves
  ctx.strokeStyle = 'rgba(0,122,255,0.15)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    for (let x = 0; x < W; x += 2) {
      const y = 55 + i * 20 + Math.sin((x + animTime * 2) * 0.02) * 3;
      x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }

  // Sea floor
  ctx.fillStyle = '#c8a060';
  ctx.beginPath();
  ctx.moveTo(0, H-20);
  for (let x = 0; x <= W; x += 10) {
    const y = H - 20 + Math.sin(x * 0.03 + 1) * 8;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // Fish school
  if (animTime > 80) {
    for (let i = 0; i < 5; i++) {
      const fx = 200 + i * 30 + Math.sin(animTime * 0.02 + i) * 20;
      const fy = 160 + Math.sin(animTime * 0.03 + i * 2) * 10;
      ctx.fillStyle = '#FF9500';
      ctx.font = '16px sans-serif';
      ctx.fillText('🐟', fx, fy);
    }
  }

  // Sonar waves
  if (isPlaying) {
    const t = animTime;
    // Transmit pulse
    const pulseY = 55 + (t * 2 % 240);
    if (pulseY < H - 30) {
      const alpha = Math.max(0, 1 - pulseY / 280);
      ctx.strokeStyle = `rgba(0, 200, 100, ${alpha})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(W/2, 55, pulseY, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Echo return
    const echoDelay = 80;
    if (t > echoDelay) {
      const echoY = 55 + ((t - echoDelay) * 2 % 240);
      if (echoY < H - 30) {
        const alpha = Math.max(0, 1 - echoY / 280);
        ctx.strokeStyle = `rgba(255, 100, 50, ${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.arc(W/2, 55, echoY, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Distance display
    const dist = Math.round((t * 2 % 240) * 5);
    document.getElementById('dispDist').textContent = dist + ' m';
    if (animTime > 120) {
      ctx.fillStyle = '#34C759';
      ctx.font = '13px sans-serif';
      ctx.fillText('✅ 检出鱼群！距离约 ' + (animTime > 120 ? '450' : '?') + ' m', W/2, H-40);
    }
  }
}

function drawExploreScene(W, H) {
  const app = APPS[exploreApp];

  // App selector buttons
  const btnW = 120, btnH = 36;
  const startX = (W - (btnW * 3 + 20)) / 2;
  APPS.forEach((a, i) => {
    const bx = startX + i * (btnW + 10);
    const by = 8;
    ctx.fillStyle = i === exploreApp ? '#34C759' : '#eee';
    roundRect(ctx, bx, by, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = i === exploreApp ? '#fff' : '#666';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(a.icon + ' ' + a.name, bx + btnW/2, by + btnH/2);
  });

  // Scene
  if (exploreApp === 0) {
    drawSonarMini(W, H);
  } else if (exploreApp === 1) {
    drawBScan(W, H);
  } else {
    drawCleaning(W, H);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(APPS[exploreApp].desc, W/2, H - 8);
}

function drawSonarMini(W, H) {
  ctx.fillStyle = 'rgba(0,122,255,0.05)';
  ctx.fillRect(0, 50, W, H-50);
  ctx.fillStyle = '#c8a060';
  ctx.fillRect(0, H-20, W, 20);

  ctx.fillStyle = '#ffffff';
  ctx.font = '48px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🚢', W/2, 80);

  if (isPlaying) {
    const t = animTime;
    const wave = (t * 1.5) % 200;
    ctx.strokeStyle = `rgba(0,200,100,${Math.max(0,1-wave/200)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(W/2, 80, wave, 0, Math.PI*2);
    ctx.stroke();

    if (t > 40) {
      const echo = ((t-40)*1.5) % 200;
      ctx.strokeStyle = `rgba(255,100,50,${Math.max(0,1-echo/200)})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(W/2, 80, echo, 0, Math.PI*2);
      ctx.stroke();
    }
  }
}

function drawBScan(W, H) {
  // Body outline
  ctx.fillStyle = '#f0e8e0';
  roundRect(ctx, W/2-60, 50, 120, 200, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  roundRect(ctx, W/2-60, 50, 120, 200, 10);
  ctx.stroke();

  // Ultrasound probe
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(W/2-15, 40, 30, 15);

  // Scan lines
  if (isPlaying) {
    const t = animTime;
    for (let i = 0; i < 10; i++) {
      const x = W/2 - 50 + i * 10 + Math.sin(t*0.05 + i*3) * 2;
      const y = 55 + i * 18;
      ctx.fillStyle = `rgba(0, 200, 100, ${0.1 + Math.sin(t*0.1 + i)*0.1})`;
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Screen
  ctx.fillStyle = '#000';
  ctx.fillRect(W/2+80, 55, 100, 80);
  ctx.fillStyle = '#0a0';
  ctx.font = '8px sans-serif';
  for (let i = 0; i < 20; i++) {
    const y = 58 + i * 3;
    ctx.fillRect(W/2+82, y, 40 + Math.sin(i*2+animTime*0.05)*20, 2);
  }
  ctx.strokeStyle = '#0a0';
  ctx.strokeRect(W/2+80, 55, 100, 80);
  ctx.fillStyle = '#fff';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('B超影像', W/2+130, 145);
}

function drawCleaning(W, H) {
  // Beaker
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W/2-70, 60);
  ctx.lineTo(W/2-70, 220);
  ctx.lineTo(W/2+70, 220);
  ctx.lineTo(W/2+70, 60);
  ctx.stroke();

  // Water
  ctx.fillStyle = 'rgba(0,122,255,0.15)';
  roundRect(ctx, W/2-68, 70, 136, 148, 0);
  ctx.fill();

  // Object to clean
  ctx.fillStyle = '#c8a060';
  roundRect(ctx, W/2-20, 140, 40, 30, 5);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('脏物', W/2, 158);

  // Bubbles (cavitation)
  if (isPlaying) {
    for (let i = 0; i < 12; i++) {
      const bx = W/2 - 55 + Math.random() * 110;
      const by = 210 - ((animTime * 2 + i * 30) % 140) - 10;
      const r = 2 + Math.random() * 4;
      ctx.fillStyle = `rgba(255,255,255,${0.3 + Math.random()*0.5})`;
      ctx.beginPath();
      ctx.arc(bx, by, r, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Transducer
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fillRect(W/2-25, 55, 50, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('超声波换能器', W/2, 52);
}

function drawChallengeScene(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];

  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = [], line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; }
  }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });

  if (state.challengeIdx === 3) {
    const opts = ['A.声呐', 'B.B超', 'C.次声波预报', 'D.超声波清洗'];
    const bw = 180, bh = 44, cols = 2;
    const totalW = cols * bw + (cols-1) * 12;
    const sx = (W - totalW) / 2;
    opts.forEach((o, i) => {
      const bx = sx + (i%2) * (bw + 12);
      const by = 140 + Math.floor(i/2) * (bh + 10);
      ctx.fillStyle = 'rgba(255,255,255,0.04)';
      roundRect(ctx, bx, by, bw, bh, 10);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '14px sans-serif';
      ctx.textBaseline = 'middle';
      ctx.fillText(o, bx + bw/2, by + bh/2);
    });
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  const hint = ['提示: s = v×t÷2', '提示: 注意单位换算 cm', '提示: cm为单位', '点击选择答案', '提示: t = 2s/v'][state.challengeIdx] || '';
  ctx.fillText(hint, W/2, H-10);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    desc.innerHTML = done ? '✅ 已观看。' : `${m.desc} <button onclick="isPlaying=true;animTime=0;setTimeout(()=>{if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}},5000);updateUI()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;">▶ 播放演示</button>`;
  } else if (state.currentMission === 1) {
    desc.innerHTML = done ? '✅ 已探索。' : `点击上方按钮切换不同应用场景：声呐、B超、超声波清洗。`;
  } else if (state.currentMission === 2) {
    if (done) desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 重新挑战</button>';
    else desc.innerHTML = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    document.getElementById('challengeHud').className = 'challenge-hud show';
    document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0,35) + '...' || '';
  } else {
    if (done) desc.innerHTML = '✅ 已完成。 <button onclick="startQuiz()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
    document.getElementById('quizOverlay').className = state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
    if (state.quizIdx < QUIZ_POOL.length) showQuiz();
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const cls = i === state.currentMission ? 'tab active' : state.done.includes(i) ? 'tab done' : 'tab';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${state.done.includes(i)?'<span class="tab-check">✅</span>':''}</div>`;
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission === 1) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleX;
    const btnW = 120, btnH = 36;
    const startX = (canvas.width - (btnW*3 + 20)) / 2;
    if (y >= 8 && y <= 8+btnH) {
      for (let i=0; i<3; i++) {
        const bx = startX + i*(btnW+10);
        if (x >= bx && x <= bx+btnW) {
          exploreApp = i; isPlaying = true; animTime = 0; updateUI();
          setTimeout(() => { if (state.currentMission === 1 && !state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); } }, 5000);
          return;
        }
      }
    }
  }

  if (state.currentMission === 2 && state.challengeIdx === 3) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleX;
    const bw = 180, bh = 44, cols = 2;
    const totalW = cols * bw + (cols-1) * 12;
    const sx = (canvas.width - totalW) / 2;
    for (let i=0; i<4; i++) {
      const bx = sx + (i%2)*(bw+12);
      const by = 140 + Math.floor(i/2)*(bh+10);
      if (x >= bx && x <= bx+bw && y >= by && y <= by+bh) {
        if (i === 2) { state.challengeIdx++; saveState(); updateUI(); }
        else { alert('❌ 再想想！次声波预报是利用了次声波，不是超声波。'); }
        return;
      }
    }
  }

  if (state.currentMission === 2 && state.challengeIdx !== 3) {
    const input = prompt('输入答案（数字）:', '');
    if (input === null) return;
    const num = parseFloat(input);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState(); updateUI();
        alert('🎉 恭喜通关！');
      } else { saveState(); updateUI(); }
    } else { alert('❌ 不对，再想想！'); }
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

         '关键点：<em>超声波频率高</em>、<em>回声测距 s = vt/2</em>、<em>B超利用超声波</em>。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
</body>
</html>
