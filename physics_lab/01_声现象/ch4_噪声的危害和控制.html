<script>
const STORAGE_KEY = 'physics_sound_ch4';

let state = { done: saved.done || [], currentMission: saved.currentMission || 0, quizIdx: saved.quizIdx || 0, quizDone: saved.quizDone || [], challengeDone: saved.challengeDone || [] };

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '波形对比', desc: '查看乐音与噪声的波形差异，了解不同分贝等级的声音。', doneLabel: '已观看' },

];

const QUIZ_POOL = [
  { q: '从物理学角度看，噪声是？', opts: ['A. 响度太大的声音', 'B. 音调太高的声音', 'C. 发声体无规则振动发出的声音', 'D. 难听的声音'], ans: 2, explain: '从物理角度，噪声是发声体做无规则振动时发出的声音，波形杂乱无章。' },
  { q: '下列措施中，属于在传播过程中减弱噪声的是？', opts: ['A. 禁止鸣笛', 'B. 戴耳塞', 'C. 建隔音墙', 'D. 安装消声器'], ans: 2, explain: '隔音墙在声音传播路径上阻挡噪声，属于传播过程中防治。禁止鸣笛和消声器是声源处防治，耳塞是人耳处防治。' },
  { q: '为了保证休息和睡眠，声音不能超过？', opts: ['A. 40 dB', 'B. 50 dB', 'C. 70 dB', 'D. 90 dB'], ans: 1, explain: '为了保护听力，声音不能超过90dB；为保证工作和学习，不能超过70dB；为保证休息和睡眠，不能超过50dB。' },
  { q: '"掩耳盗铃"是在哪个环节防治噪声？', opts: ['A. 声源处', 'B. 传播过程中', 'C. 人耳处', 'D. 以上都不是'], ans: 2, explain: '掩耳盗铃是在人耳处减弱噪声——堵住耳朵不让声音进入。' },
  { q: '下列哪个不是噪声的危害？', opts: ['A. 损害听力', 'B. 影响睡眠', 'C. 引发心脏病', 'D. 增强记忆力'], ans: 3, explain: '噪声的危害包括损害听力、影响睡眠、引发心血管疾病等，但不会增强记忆力。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId, animTime = 0;
let showNoise = false;
let dragItem = null;

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  if (state.currentMission === 0) drawWaveCompare(W, H);
  else if (state.currentMission === 1) drawPrevention(W, H);
  else if (state.currentMission === 2) drawDBMatching(W, H);
  else drawScene3(W, H);
}

function drawWaveCompare(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H/3); ctx.lineTo(W, H/3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H*2/3); ctx.lineTo(W, H*2/3); ctx.stroke();

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';

  // Toggle button
  ctx.fillStyle = showNoise ? '#FF3B30' : '#34C759';
  roundRect(ctx, W/2-60, 5, 120, 30, 15);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '14px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText(showNoise ? '🚨 噪声' : '🎵 乐音', W/2, 20);

  // Top wave - regular (music) or noise
  const cy1 = H / 3;
  ctx.strokeStyle = showNoise ? '#FF3B30' : '#34C759';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x < W; x += 1) {
    let y;
    if (showNoise) {
      y = cy1 + (Math.random() - 0.5) * 70;
    } else {
      y = cy1 - 30 * Math.sin(x * 0.04 + animTime * 0.03);
    }
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  // Bottom wave - always music (for comparison)
  const cy2 = H * 2 / 3;
  ctx.strokeStyle = '#34C759';
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let x = 0; x < W; x += 1) {
    const y = cy2 - 20 * Math.sin(x * 0.06 + animTime * 0.02);
    x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.stroke();

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.textAlign = 'center';
  ctx.fillText(showNoise ? '噪声波形（无规则振动）' : '乐音波形（规律振动）', W/2, H/3 - 8);
  ctx.fillText('乐音波形（规律振动，对比参考）', W/2, H*2/3 - 8);

  // dB meter
  const dB = showNoise ? 70 + Math.random() * 20 : 40 + Math.random() * 10;
  document.getElementById('dispType').textContent = showNoise ? '噪声' : '乐音';
  document.getElementById('dispDB').textContent = dB.toFixed(0) + ' dB';
  document.getElementById('dispType').className = `value ${showNoise ? 'red' : 'green'}`;
  document.getElementById('dispDB').className = `value ${dB > 70 ? 'red' : dB > 50 ? 'orange' : 'green'}`;

  // Progress tip
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('💡 点击上方按钮切换乐音/噪声对比', W/2, H-8);
}

function drawPrevention(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Three columns
  const cols = [
    { x: 10, w: 248, label: '🔇 声源处', color: '#34C759' },
    { x: 268, w: 248, label: '📡 传播过程中', color: '#007AFF' },
    { x: 526, w: 248, label: '👂 人耳处', color: '#FF9500' }
  ];

  cols.forEach(c => {
    ctx.fillStyle = '#141626';
    roundRect(ctx, c.x, 10, c.w, 280, 10);
    ctx.fill();
    ctx.fillStyle = c.color;
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(c.label, c.x + c.w/2, 16);
  });

  // Items
  const items = PREVENTION_ITEMS;
  const placed = state.challengeDone || [];
  const perCol = 3;
  items.forEach((item, i) => {
    if (placed.includes(i)) return;
    const idx = i % items.length;
    const col = Math.floor(i / perCol) % 3;
    const row = i % perCol;
    const c = cols[col];
    const ix = c.x + 10;
    const iy = 45 + row * 45;

    // Glow if being dragged
    ctx.fillStyle = '#fff';
    roundRect(ctx, ix, iy, c.w-20, 36, 8);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    roundRect(ctx, ix, iy, c.w-20, 36, 8);
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.text, ix + (c.w-20)/2, iy + 18);
  });

  // Targets (drop zones at bottom of each column)
  cols.forEach((c, ci) => {
    ctx.fillStyle = 'rgba(200,200,200,0.3)';
    roundRect(ctx, c.x+5, 235, c.w-10, 45, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('📥 拖放至此', c.x + c.w/2, 258);
  });
}

function drawDBMatching(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const matched = state.quizDone || [];

  // Left column - dB levels
  DB_MATCHING.forEach((item, i) => {
    const y = 15 + i * 46;
    const done = matched.includes(i);

    ctx.fillStyle = done ? '#e8f8ee' : '#fff';
    roundRect(ctx, 30, y, 120, 38, 8);
    ctx.fill();
    if (!done) { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; roundRect(ctx, 30, y, 120, 38, 8); ctx.stroke(); }

    ctx.fillStyle = done ? '#34C759' : '#333';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(item.level, 90, y + 19);
    if (done) ctx.fillText('✅', 140, y + 19);
  });

  // Right column - scenes (shuffled for display)
  const shuffled = [...DB_MATCHING].sort((a,b) => a.scene.localeCompare(b.scene));
  shuffled.forEach((item, i) => {
    const y = 15 + i * 46;
    const done = matched.includes(DB_MATCHING.indexOf(item));

    ctx.fillStyle = done ? '#e8f8ee' : '#fff';
    roundRect(ctx, 220, y, 180, 38, 8);
    ctx.fill();
    if (!done) { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 1; roundRect(ctx, 220, y, 180, 38, 8); ctx.stroke(); }

    ctx.fillStyle = done ? '#34C759' : '#333';
    ctx.font = '13px sans-serif';
    ctx.fillText(item.scene, 310, y + 19);
  });

  // Instruction
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('点击左侧分贝值，再点击对应的场景进行配对', W/2, H-8);
}

function drawScene3(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📝 点击下方"测验"选项卡开始答题', W/2, H/2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function animate() {
  animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (!done) desc.innerHTML = `${m.desc}<br>点击波形图上方的按钮切换乐音/噪声。`;
    else desc.innerHTML = '✅ 已观察。';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已掌握防治三环节。';
    else desc.innerHTML = `${m.desc}<br>将下方的措施拖拽到对应的防治环节中。`;
  } else if (state.currentMission === 2) {
    if (done) desc.innerHTML = '✅ 全部配对完成！';
    else desc.innerHTML = `${m.desc}<br>点击左侧分贝值，再点击右侧对应场景。`;
  } else {
    if (done) desc.innerHTML = '✅ 已完成测验。 <button onclick="startQuiz()" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const cls = i === state.currentMission ? 'tab active' : state.done.includes(i) ? 'tab done' : 'tab';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${state.done.includes(i)?'<span class="tab-check">✅</span>':''}</div>`;
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('noiseDisplay').style.display = state.currentMission === 0 ? 'flex' : 'none';
}

// Canvas click handlers
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;

  // Mission 0: toggle noise/music
  if (state.currentMission === 0) {
    if (y >= 5 && y <= 35 && x >= canvas.width/2-60 && x <= canvas.width/2+60) {
      showNoise = !showNoise;
      // Mark done after viewing both
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();
      }
      return;
    }
  }

  // Mission 2: DB matching
  if (state.currentMission === 2) {
    const matched = state.quizDone || [];
    // Check if clicking a dB level
    for (let i = 0; i < DB_MATCHING.length; i++) {
      const by = 15 + i * 46;
      if (x >= 30 && x <= 150 && y >= by && y <= by + 38 && !matched.includes(i)) {
        // Then expect click on scene
        const sceneY = prompt(`选择 ${DB_MATCHING[i].level} 对应的场景序号：\n0:听觉下限 1:轻声细语 2:正常交谈 3:繁忙公路 4:摩托车引擎 5:喷气式飞机起飞`, '');
        if (sceneY !== null && parseInt(sceneY) === i) {
          const m = state.quizDone || [];
          m.push(i);
          state.quizDone = m;
          saveState();
          if (m.length >= DB_MATCHING.length) {
            if (!state.done.includes(2)) state.done.push(2);
            saveState();
            alert('🎉 全部配对正确！');
          }
          updateUI();
        } else if (sceneY !== null) {
          alert('❌ 配对的场景不对，再想想！');
        }
        return;
      }
    }
  }
});

function startQuiz() {
  state.quizIdx = 0; state.quizDone = []; saveState();
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => { el.style.pointerEvents = 'none'; if (i === q.ans) el.className = 'quiz-opt correct'; else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
