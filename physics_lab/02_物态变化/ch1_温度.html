<script>

let observeTemp = 25, exploreEnv = 0, dragTemp = 25;
const ENVIRONMENTS = [
  { name: '冰水混合物', temp: 0, color: '#e8f4ff', icon: '🧊' },
  { name: '室内', temp: 25, color: '#fff8e8', icon: '🏠' },
  { name: '温水', temp: 50, color: '#ffe0c0', icon: '☕' },
  { name: '沸水', temp: 100, color: '#ffccc0', icon: '♨️' }
];

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawThermometer(cx, cy, temp, size) {
  const s = size || 1;
  const bulbR = 16 * s, tubeW = 8 * s, tubeH = 140 * s, topY = cy - tubeH/2, bulbY = cy + tubeH/2;
  // Tube background
  ctx.fillStyle = '#141626';
  roundRect(ctx, cx-tubeW/2-2, topY-4, tubeW+4, tubeH+8, 4*s); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1.5*s;
  roundRect(ctx, cx-tubeW/2-2, topY-4, tubeW+4, tubeH+8, 4*s); ctx.stroke();
  // Scale marks
  for (let i = 0; i <= 10; i++) {
    const y = topY + i * (tubeH/10);
    const markLen = (i % 5 === 0) ? 12*s : 8*s;
    ctx.strokeStyle = i % 5 === 0 ? '#333' : '#999'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx-tubeW/2-2, y); ctx.lineTo(cx-tubeW/2-2-markLen, y); ctx.stroke();
    if (i % 5 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = `${10*s}px sans-serif`; ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
      ctx.fillText(i*10 + '', cx-tubeW/2-6-markLen, y);
    }
  }
  // Bulb
  ctx.fillStyle = '#e04040';
  ctx.beginPath(); ctx.arc(cx, bulbY, bulbR, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#c03030'; ctx.lineWidth = 1; ctx.stroke();
  // Liquid column
  const minY = topY + 4, maxY = bulbY - bulbR - 2;
  const liquidH = (temp / 100) * (maxY - minY);
  const liquidTop = maxY - liquidH;
  if (liquidH > 0) {
    const grad = ctx.createLinearGradient(0, minY, 0, maxY);
    grad.addColorStop(0, '#ff6666'); grad.addColorStop(1, '#cc0000');
    ctx.fillStyle = grad;
    roundRect(ctx, cx-tubeW/2+2, liquidTop, tubeW-4, maxY - liquidTop, 2*s); ctx.fill();
    // Capillary highlight
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    roundRect(ctx, cx-tubeW/2+2, liquidTop, (tubeW-4)/3, maxY - liquidTop, 2*s); ctx.fill();
  }
  // Temperature text
  ctx.fillStyle = '#ffffff'; ctx.font = `bold ${14*s}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(Math.round(temp) + '°C', cx, topY + tubeH + 10);
}

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  // Draw large thermometer center
  drawThermometer(W/2, H/2 - 10, observeTemp, 1.4);
  // Control buttons
  const btnY = H - 80;
  ctx.fillStyle = '#FF9500';
  roundRect(ctx, W/2 - 100, btnY, 80, 36, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('升温+', W/2 - 60, btnY + 18);
  ctx.fillStyle = '#007AFF';
  roundRect(ctx, W/2 + 20, btnY, 80, 36, 8); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('降温-', W/2 + 60, btnY + 18);
  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击"升温"或"降温"观察液柱变化', W/2, H - 30);
  // Scale label
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('℃', W/2 + 110, 30);
}

function drawExplore(W, H) {
  const env = ENVIRONMENTS[exploreEnv];
  ctx.fillStyle = env.color; ctx.fillRect(0, 0, W, H);
  // Environment icon and name
  ctx.font = '40px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(env.icon, 100, 80);
  ctx.fillStyle = '#ffffff'; ctx.font = '16px sans-serif';
  ctx.fillText(env.name, 100, 130);
  // Scene items
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.font = '14px sans-serif';
  const items = [
    { x: 250, y: 140, w: 120, h: 80, label: '场景' },
    { x: 400, y: 140, w: 120, h: 80, label: '场景' }
  ];
  if (exploreEnv === 0) { ctx.fillStyle = '#d0e8ff'; roundRect(ctx, 250, 130, 120, 90, 8); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fillText('🧊 冰块', 310, 165); roundRect(ctx, 400, 130, 120, 90, 8); ctx.fill(); ctx.fillText('💧 水', 460, 165); }
  else if (exploreEnv === 1) { ctx.fillStyle = '#f0e8d0'; roundRect(ctx, 250, 130, 120, 90, 8); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fillText('🪑 桌椅', 310, 165); roundRect(ctx, 400, 130, 120, 90, 8); ctx.fill(); ctx.fillText('📚 书本', 460, 165); }
  else if (exploreEnv === 2) { ctx.fillStyle = '#ffe0b0'; roundRect(ctx, 250, 130, 120, 90, 8); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fillText('☕ 杯子', 310, 165); roundRect(ctx, 400, 130, 120, 90, 8); ctx.fill(); ctx.fillText('♨️ 热气', 460, 165); }
  else { ctx.fillStyle = '#ffd0c0'; roundRect(ctx, 250, 130, 120, 90, 8); ctx.fill(); ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.fillText('🔥 火焰', 310, 165); roundRect(ctx, 400, 130, 120, 90, 8); ctx.fill(); ctx.fillText('💨 蒸汽', 460, 165); }
  // Thermometer
  drawThermometer(W/2, H/2 + 50, env.temp, 1.0);
  // Scene selector buttons
  const btnW = 100, btnH = 34;
  const startX = (W - (ENVIRONMENTS.length * btnW + (ENVIRONMENTS.length-1) * 8)) / 2;
  ENVIRONMENTS.forEach((e, i) => {
    const bx = startX + i * (btnW + 8);
    ctx.fillStyle = i === exploreEnv ? '#FF9500' : '#eee';
    roundRect(ctx, bx, 8, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = i === exploreEnv ? '#fff' : '#666';
    ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(e.icon + e.name, bx + btnW/2, btnH/2 + 8);
  });
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击上方场景切换，观察温度计示数变化', W/2, H - 8);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40; let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 40; lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  // Visual aid: draw a thermometer for reading challenges
  if (state.challengeIdx === 0) {
    drawThermometer(W/2, y + 60, 36, 1.0);
    ctx.fillStyle = '#FF9500'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('↑ 上图中温度计示数是多少？', W/2, y + 160);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif';
    ctx.fillText('点击画面任意位置输入答案', W/2, H - 20);
  }
}

function animate() {
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); drawScene(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  const btns = state.currentMission === 0
    ? (done ? '✅ 已观看' : '点击温度计旁按钮控制温度')
    : state.currentMission === 1
    ? (done ? '✅ 已探索' : '点击上方场景切换')
    : state.currentMission === 2
    ? (done ? '🎉 闯关完成！' : `第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`)
    : (done ? '✅ 已测验' : '点击下方开始测验');
  desc.textContent = btns;
  document.getElementById('tempDisplay').style.display = (state.currentMission <= 1) ? 'flex' : 'none';
  if (state.currentMission === 1) {
    document.getElementById('dispTemp').textContent = ENVIRONMENTS[exploreEnv].temp + ' °C';
  } else if (state.currentMission === 0) {
    document.getElementById('dispTemp').textContent = observeTemp + ' °C';
  }
  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m,i) => {
    const isActive = i === state.currentMission, isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✓</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');
  // Progress dots
  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot'+i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '第 ' + (state.challengeIdx+1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 30) + '...' || '';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();
}

// Canvas click handler
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
  const W = canvas.width, H = canvas.height;

  if (state.currentMission === 0) {
    // Check button clicks
    const btnY = H - 80;
    if (y >= btnY && y <= btnY + 36) {
      if (x >= W/2 - 100 && x <= W/2 - 20) { observeTemp = Math.min(100, observeTemp + 5); if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } updateUI(); }
      if (x >= W/2 + 20 && x <= W/2 + 100) { observeTemp = Math.max(0, observeTemp - 5); if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } updateUI(); }
    }
  } else if (state.currentMission === 1) {
    const btnW = 100, btnH = 34;
    const startX = (W - (ENVIRONMENTS.length * btnW + (ENVIRONMENTS.length-1) * 8)) / 2;
    if (y >= 8 && y <= 8 + btnH) {
      for (let i = 0; i < ENVIRONMENTS.length; i++) {
        const bx = startX + i * (btnW + 8);
        if (x >= bx && x <= bx + btnW) { exploreEnv = i; if (!state.done.includes(1)) { state.done.push(1); saveState(); } updateUI(); return; }
      }
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    // Special case: challenge 1 (thermometer range) has two-part answer
    if (state.challengeIdx === 1) {
      const a1 = prompt('体温计量程的下限是多少°C？(提示: 35)');
      if (a1 === null) return;
      const a2 = prompt('体温计量程的上限是多少°C？');
      if (a2 === null) return;
      if (parseFloat(a2) === ch.answer) {
        state.challengeIdx++;
        if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); alert('恭喜通关！'); }
        saveState(); updateUI();
      } else alert('答案不对，再想想！体温计量程为35-42°C');
      return;
    }
    const userInput = prompt('输入你的答案（数字）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); alert('恭喜通关！'); }
      else alert('回答正确！继续下一关');
      saveState(); updateUI();
    } else alert('答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2); if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// Quiz
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx+1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o,i) => '<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el,i) => { el.style.pointerEvents = 'none'; if (i === q.ans) el.className = 'quiz-opt correct'; else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx === q.ans ? '正确！'+q.explain : '正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
