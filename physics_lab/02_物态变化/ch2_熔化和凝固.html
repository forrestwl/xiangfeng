<script>
const STORAGE_KEY = 'physics_wen_tai_bian_hua_ch2';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = { done: saved.done || [], currentMission: saved.currentMission || 0, challengeIdx: saved.challengeIdx || 0, quizIdx: saved.quizIdx || 0, quizDone: saved.quizDone || [] };
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '观察', title: '晶体熔化曲线', desc: '观看海波晶体加热时温度-时间变化曲线。点击播放。', doneLabel: '已观看' },
  { id: 'explore', label: '探索', title: '晶体vs非晶体', desc: '点击切换晶体/非晶体，对比熔化曲线差异。', doneLabel: '已探索' },
  { id: 'challenge', label: '挑战', title: '熔化闯关', desc: '熔点判断、晶体非晶体辨别。', doneLabel: '已闯关' },
  { id: 'quiz', label: '测验', title: '知识检测', desc: '完成选择题巩固知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '海波的熔点为48°C。加热海波到48°C时，它可能处于什么状态？(0=固态,1=固液共存,2=液态,3=以上都可能)', answer: 3, unit: '', tolerance: 0 },
  { goal: '晶体熔化时，温度保持不变的这段温度叫什么？(填入数字: 0=熔点/1=沸点/2=凝固点)', answer: 0, unit: '', tolerance: 0 },
  { goal: '下列物质中，哪个是非晶体？(0=海波,1=冰,2=玻璃,3=食盐)', answer: 2, unit: '', tolerance: 0 },
  { goal: '晶体在熔化过程中，温度不变，需要___热？(0=吸热,1=放热)', answer: 0, unit: '', tolerance: 0 },
  { goal: '水结冰是凝固过程，凝固点是多少°C？', answer: 0, unit: '°C', tolerance: 1 }
];

const QUIZ_POOL = [
  { q: '晶体和非晶体的重要区别是？', opts: ['A. 有无固定熔点', 'B. 透明与否', 'C. 颜色不同', 'D. 形状不同'], ans: 0, explain: '晶体有固定的熔点（熔化时温度不变），非晶体没有固定的熔点。' },
  { q: '下列物质中属于晶体的是？', opts: ['A. 玻璃', 'B. 沥青', 'C. 冰', 'D. 松香'], ans: 2, explain: '冰是晶体，有固定的熔点0°C。玻璃、沥青、松香都是非晶体。' },
  { q: '晶体在熔化过程中', opts: ['A. 温度升高，吸热', 'B. 温度不变，吸热', 'C. 温度降低，放热', 'D. 温度不变，放热'], ans: 1, explain: '晶体熔化时吸收热量但温度保持不变，这部分热量用于破坏晶体结构。' },
  { q: '下列现象属于凝固的是？', opts: ['A. 冰变成水', 'B. 蜡油变成蜡块', 'C. 水变成水蒸气', 'D. 碘变成碘蒸气'], ans: 1, explain: '凝固是物质从液态变成固态的过程。蜡油变成蜡块是凝固，冰变成水是熔化。' },
  { q: '冬天在室外，气温-10°C，河面结冰。此时冰水混合物的温度是？', opts: ['A. -10°C', 'B. 0°C', 'C. 5°C', 'D. 10°C'], ans: 1, explain: '冰水混合物在标准大气压下温度为0°C，这是冰的熔点和水的凝固点。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0, isPlaying = false;
let meltTime = 0, isCrystal = true;

// Melting curve data for crystal (海波, mp=48°C)
function getCrystalTemp(t) {
  if (t < 30) return 40 + t * 0.2;
  if (t < 60) return 48; // 熔化平台
  return 48 + (t - 60) * 0.3;
}
function getNonCrystalTemp(t) {
  return 40 + t * 0.4; // 没有熔点，持续升温
}
function getTemp(t) { return isCrystal ? getCrystalTemp(t) : getNonCrystalTemp(t); }
function getState(t) {
  if (!isCrystal) return '软化中';
  if (t < 30) return '固态';
  if (t < 60) return '固液共存';
  return '液态';
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawGraph(W, H, highlightT) {
  // Draw axes
  const pad = { left: 60, right: 30, top: 30, bottom: 40 };
  const gW = W - pad.left - pad.right, gH = H - pad.top - pad.bottom;
  const tMax = 120, tempMax = 80, tempMin = 35;
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.left, pad.top); ctx.lineTo(pad.left, pad.top+gH); ctx.lineTo(pad.left+gW, pad.top+gH); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText('时间/min', pad.left + gW/2, pad.top + gH + 8);
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('温度/°C', 12, pad.top + gH/2);
  ctx.textAlign = 'right'; ctx.textBaseline = 'top';
  // Y-axis labels
  for (let t = 40; t <= 80; t += 10) {
    const y = pad.top + gH - (t - tempMin) / (tempMax - tempMin) * gH;
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px sans-serif'; ctx.fillText(t, pad.left - 6, y-5);
    ctx.strokeStyle = '#eee'; ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left+gW, y); ctx.stroke();
  }
  // X-axis labels
  for (let t = 0; t <= tMax; t += 20) {
    const x = pad.left + t / tMax * gW;
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(t, x, pad.top + gH + 2);
  }
  // Draw curve
  ctx.strokeStyle = isCrystal ? '#FF9500' : '#888'; ctx.lineWidth = 2;
  ctx.beginPath();
  for (let t = 0; t <= Math.min(meltTime, tMax); t++) {
    const x = pad.left + t / tMax * gW;
    const temp = getTemp(t);
    const y = pad.top + gH - (temp - tempMin) / (tempMax - tempMin) * gH;
    if (t === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  // Current point
  if (meltTime <= tMax) {
    const cx = pad.left + meltTime / tMax * gW;
    const cTemp = getTemp(meltTime);
    const cy = pad.top + gH - (cTemp - tempMin) / (tempMax - tempMin) * gH;
    ctx.fillStyle = '#FF3B30'; ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText(Math.round(cTemp) + '°C', cx+8, cy);
  }
  // Melting point mark (crystal)
  if (isCrystal) {
    const mpY = pad.top + gH - (48 - tempMin) / (tempMax - tempMin) * gH;
    ctx.strokeStyle = 'rgba(255,149,0,0.3)'; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(pad.left, mpY); ctx.lineTo(pad.left+gW, mpY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#FF9500'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
    ctx.fillText('熔点48°C', pad.left+gW-60, mpY-2);
  }
}

function drawObserve(W, H) {
  drawGraph(W, H);
  // Legend
  ctx.fillStyle = '#FF9500'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText('海波（晶体）熔化曲线', 15, 10);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif';
  ctx.fillText('状态: ' + getState(meltTime), 15, 28);
  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.textAlign = 'center';
    ctx.fillText('点击下方"播放"开始观察熔化过程', W/2, H - 12);
  }
}

function drawExplore(W, H) {
  drawGraph(W, H);
  // Toggle button
  const btnW = 140, btnH = 36;
  const bx = W/2 - btnW/2;
  ctx.fillStyle = isCrystal ? '#FF9500' : '#888';
  roundRect(ctx, bx, 6, btnW, btnH, 8); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(isCrystal ? '晶体（海波）' : '非晶体（玻璃）', W/2, btnH/2 + 6);
  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击按钮切换晶体/非晶体，观察曲线差异', W/2, H - 12);
  // Legend
  ctx.fillStyle = '#ffffff'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('点击画布切换', 15, 12);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40; let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 40; lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  // Draw a small graph for context
  if (state.challengeIdx === 0 || state.challengeIdx === 1) {
    const oldCrystal = isCrystal; isCrystal = true;
    const oldTime = meltTime; meltTime = 80;
    drawGraph(W, 200);
    meltTime = oldTime; isCrystal = oldCrystal;
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击画面任意位置输入答案', W/2, H - 15);
}

function animate() {
  if (isPlaying && state.currentMission < 2) {
    meltTime += 0.5;
    if (meltTime > 120) { meltTime = 0; isPlaying = false; if (state.currentMission === 0 && !state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } }
    const temp = getTemp(meltTime);
    document.getElementById('dispTemp').textContent = Math.round(temp) + ' °C';
    document.getElementById('dispState').textContent = getState(meltTime);
  }
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); drawScene(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  const txt = state.currentMission === 0
    ? (done ? '✅ 已观看' : '点击下方按钮播放熔化过程')
    : state.currentMission === 1
    ? (done ? '✅ 已探索' : '点击按钮切换晶体/非晶体')
    : state.currentMission === 2
    ? (done ? '🎉 闯关完成！' : `第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`)
    : (done ? '✅ 已测验' : '点击下方开始测验');
  desc.textContent = txt;
  document.getElementById('infoDisplay').style.display = (state.currentMission <= 1) ? 'flex' : 'none';
  document.getElementById('missionTabs').innerHTML = MISSIONS.map((m,i) => {
    const isActive = i === state.currentMission, isDone = state.done.includes(i);
    return `<div class="${isActive?'tab active':isDone?'tab done':'tab'}" onclick="switchMission(${i})">${m.label}${isDone?'<span class="tab-check">✓</span>':''}</div>`;
  }).join('');
  MISSIONS.forEach((_, i) => {
    document.getElementById('pdot'+i).className = state.done.includes(i) ? 'dot done' : i === state.currentMission ? 'dot active' : 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '第 '+(state.challengeIdx+1)+'/'+CHALLENGES.length+' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal||'').slice(0,30)+'...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
  const W = canvas.width;
  if (state.currentMission === 0) {
    const btnY = canvas.height - 50;
    if (!isPlaying) { isPlaying = true; meltTime = 0; }
  } else if (state.currentMission === 1) {
    const btnW = 140, btnH = 36, bx = W/2 - btnW/2;
    if (y >= 6 && y <= 6+btnH && x >= bx && x <= bx+btnW) { isCrystal = !isCrystal; meltTime = 0; isPlaying = true; if (!state.done.includes(1)) { state.done.push(1); saveState(); } updateUI(); }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) return;
    const ch = CHALLENGES[state.challengeIdx]; if (!ch) return;
    const userInput = prompt('输入答案（数字）:', ''); if (userInput === null) return;
    const num = parseFloat(userInput); if (isNaN(num)) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); alert('恭喜通关！'); }
      else alert('回答正确！继续下一关');
      saveState(); updateUI();
    } else alert('答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0; const idx = state.done.indexOf(2); if(idx>=0) state.done.splice(idx,1);
  saveState(); updateUI();
}
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) { if(!state.done.includes(3)){state.done.push(3);saveState();} updateUI(); return; }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx+1)+'. '+q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{ el.style.pointerEvents='none'; if(i===q.ans) el.className='quiz-opt correct'; else if(i===idx&&idx!==q.ans) el.className='quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx===q.ans ? '正确！'+q.explain : '正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
