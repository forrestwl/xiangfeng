<script>

];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0, isPlaying = false;
let boilTemp = 90, boilPhase = 0; // 0=加热, 1=沸腾
let exploreMode = 0; // 0=蒸发, 1=沸腾

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#f8f4f0'; ctx.fillRect(0, 0, W, H);
  // Beaker
  const bx = W/2 - 80, by = H/2 - 80;
  ctx.fillStyle = '#e8e4e0';
  roundRect(ctx, bx, by+20, 160, 140, 8); ctx.fill();
  // Water
  const waterH = boilTemp < 100 ? 10 + (boilTemp - 90) * 5 : 60;
  ctx.fillStyle = 'rgba(100,180,255,0.5)';
  roundRect(ctx, bx+8, by+150-waterH-8, 144, waterH, 4); ctx.fill();
  // Bubbles
  const t = animTime;
  if (boilPhase === 1) {
    for (let i = 0; i < 8; i++) {
      const px = bx + 20 + Math.random() * 120;
      const py = by + 150 - ((t*2 + i*30) % 120);
      const r = 3 + Math.random() * 6;
      ctx.fillStyle = 'rgba(255,255,255,'+ (0.7 - py/200) +')';
      ctx.beginPath(); ctx.arc(px, py, r, 0, Math.PI*2); ctx.fill();
    }
    // Steam
    for (let i = 0; i < 5; i++) {
      const sx = bx + 30 + Math.sin(t*0.1+i)*40 + i*15;
      const sy = by - 10 - (t*1.5+i*20)%80;
      ctx.fillStyle = 'rgba(200,200,200,'+(0.3 - sy/300)+')';
      ctx.beginPath(); ctx.arc(sx, sy, 8+Math.sin(t+i)*3, 0, Math.PI*2); ctx.fill();
    }
  } else if (isPlaying) {
    // Small bubbles during heating
    for (let i = 0; i < 3; i++) {
      const px = bx + 30 + Math.random() * 100;
      const py = by + 130 + Math.sin(t*2+i)*5;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath(); ctx.arc(px, py, 2, 0, Math.PI*2); ctx.fill();
    }
  }
  // Beaker outline
  ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 2;
  roundRect(ctx, bx, by+20, 160, 140, 8); ctx.stroke();
  // Heat source
  ctx.fillStyle = '#FF9500';
  ctx.beginPath(); ctx.moveTo(bx-10, by+168); ctx.lineTo(bx+170, by+168); ctx.lineTo(bx+80, by+190); ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#e08000';
  ctx.beginPath(); ctx.moveTo(bx+20, by+168); ctx.lineTo(bx+50, by+178); ctx.lineTo(bx+80, by+168); ctx.closePath(); ctx.fill();
  // Temperature display
  ctx.fillStyle = '#ffffff'; ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
  const displayTemp = boilPhase === 1 ? 100 : Math.round(boilTemp);
  ctx.fillText(displayTemp + '°C', W/2, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px sans-serif';
  ctx.fillText(boilPhase === 1 ? '沸腾中（温度不变）' : '加热中', W/2, 62);
  // Label
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击播放观察水沸腾全过程', W/2, H - 10);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  // Mode selector
  const btnW = 140, btnH = 36;
  const modes = ['蒸发', '沸腾'];
  const startX = (W - (2*btnW + 10)) / 2;
  modes.forEach((m, i) => {
    const bx = startX + i * (btnW + 10);
    ctx.fillStyle = i === exploreMode ? '#FF9500' : '#eee';
    roundRect(ctx, bx, 10, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = i === exploreMode ? '#fff' : '#666';
    ctx.font = '14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(m, bx + btnW/2, btnH/2 + 10);
  });
  if (exploreMode === 0) {
    // Evaporation scene - clothes drying
    ctx.fillStyle = '#e0f0e0'; ctx.fillRect(0, 50, W, H-50);
    // Clothes line
    ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(40, 80); ctx.lineTo(W-40, 80); ctx.stroke();
    // Clothes
    const clothes = ['👕', '👖', '🧦'];
    clothes.forEach((c, i) => {
      ctx.font = '36px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(c, 120 + i*180, 110);
      // Water droplets
      if (isPlaying) {
        for (let d=0; d<3; d++) {
          const dx = 110 + i*180 + Math.sin(animTime+d)*20;
          const dy = 130 + d*8 + (animTime*3)%20;
          ctx.fillStyle = 'rgba(100,180,255,0.6)';
          ctx.beginPath(); ctx.arc(dx, dy, 2, 0, Math.PI*2); ctx.fill();
        }
      }
    });
    // Sun
    ctx.fillStyle = '#FFD700';
    ctx.beginPath(); ctx.arc(W-60, 60, 25, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    for (let a=0; a<8; a++) { const ang = a*Math.PI/4; ctx.beginPath(); ctx.moveTo(W-60+Math.cos(ang)*30, 60+Math.sin(ang)*30); ctx.lineTo(W-60+Math.cos(ang)*40, 60+Math.sin(ang)*40); ctx.stroke(); }
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('蒸 发——液体表面任何温度下都能进行的汽化现象', W/2, 200);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px sans-serif';
    ctx.fillText('特点：缓慢、表面进行、任何温度、吸热', W/2, 225);
  } else {
    // Boiling scene
    ctx.fillStyle = '#fff0e8'; ctx.fillRect(0, 50, W, H-50);
    // Pot
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(ctx, W/2-70, 70, 140, 100, 6); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(W/2-75, 75, 150, 8);
    // Boiling water
    ctx.fillStyle = 'rgba(100,180,255,0.4)';
    ctx.beginPath(); ctx.ellipse(W/2, 120, 50, 15, 0, 0, Math.PI*2); ctx.fill();
    if (isPlaying) {
      for (let i=0; i<10; i++) {
        const px = W/2-40+Math.random()*80;
        const py = 120 - (animTime*2 + i*15)%90;
        ctx.fillStyle = 'rgba(255,255,255,'+(0.7-py/150)+')';
        ctx.beginPath(); ctx.arc(px, py, 3+Math.random()*5, 0, Math.PI*2); ctx.fill();
      }
      for (let i=0; i<6; i++) {
        const sx = W/2-30+Math.sin(animTime*0.1+i)*40+i*12;
        const sy = 65 - (animTime*2+i*20)%70;
        ctx.fillStyle = 'rgba(200,200,200,'+(0.4-sy/200)+')';
        ctx.beginPath(); ctx.arc(sx, sy, 6+Math.sin(animTime+i)*2, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle = '#FF9500'; ctx.beginPath(); ctx.moveTo(W/2-50, 178); ctx.lineTo(W/2+50, 178); ctx.lineTo(W/2, 195); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('沸 腾——液体内部和表面同时进行的剧烈汽化', W/2, 220);
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '12px sans-serif';
    ctx.fillText('特点：剧烈、内部表面同时、达到沸点、吸热但温度不变', W/2, 242);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击上方按钮切换蒸发与沸腾对比', W/2, H - 10);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40; let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 50; lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  // Visual aid
  if (state.challengeIdx === 0) {
    ctx.fillStyle = '#FF9500'; ctx.font = '28px sans-serif';
    ctx.fillText('🌡️ 100°C?', W/2, y+30);
  } else if (state.challengeIdx === 1) {
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '14px sans-serif';
    ctx.fillText('⛰️ 高山 → 气压低 → 沸点___', W/2, y+30);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击画面输入答案', W/2, H - 15);
}

function animate() {
  if (isPlaying && state.currentMission === 0) {
    if (!boilPhase && boilTemp < 99.5) { boilTemp += 0.3; }
    else if (!boilPhase) { boilPhase = 1; }
    document.getElementById('dispTemp').textContent = boilPhase === 1 ? '100 °C' : Math.round(boilTemp) + ' °C';
    document.getElementById('dispState').textContent = boilPhase === 1 ? '沸腾中' : '加热中';
  }
  if (isPlaying) animTime += 0.05;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); drawScene(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  desc.textContent = state.currentMission === 0
    ? (done ? '✅ 已观看' : '点击画布播放沸腾实验')
    : state.currentMission === 1
    ? (done ? '✅ 已探索' : '点击上方切换蒸发/沸腾')
    : state.currentMission === 2
    ? (done ? '🎉 闯关完成！' : `第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`)
    : (done ? '✅ 已测验' : '点击下方开始测验');
  document.getElementById('infoDisplay').style.display = (state.currentMission <= 1) ? 'flex' : 'none';
  document.getElementById('missionTabs').innerHTML = MISSIONS.map((m,i) => {
    const isActive = i === state.currentMission, isDone = state.done.includes(i);
    return `<div class="${isActive?'tab active':isDone?'tab done':'tab'}" onclick="switchMission(${i})">${m.label}${isDone?'<span class="tab-check">✓</span>':''}</div>`;
  }).join('');
  MISSIONS.forEach((_, i) => {
    document.getElementById('pdot'+i).className = state.done.includes(i) ? 'dot done' : i === state.currentMission ? 'dot active' : 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '第 '+(state.challengeIdx+1)+'/'+CHALLENGES.length+' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal||'').slice(0,30)+'...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
  const W = canvas.width;
  if (state.currentMission === 0) {
    if (!isPlaying) { isPlaying = true; boilTemp = 90; boilPhase = 0; animTime = 0; }
    else if (boilPhase === 1) { isPlaying = false; if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } }
  } else if (state.currentMission === 1) {
    const btnW = 140, btnH = 36, startX = (W - (2*btnW + 10)) / 2;
    if (y >= 10 && y <= 10+btnH) {
      if (x >= startX && x <= startX+btnW) { exploreMode = 0; isPlaying = true; animTime = 0; if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); } }
      if (x >= startX+btnW+10 && x <= startX+2*btnW+10) { exploreMode = 1; isPlaying = true; animTime = 0; if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); } }
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) return;
    const ch = CHALLENGES[state.challengeIdx]; if (!ch) return;
    const userInput = prompt('输入答案（数字）:', ''); if (userInput === null) return;
    const num = parseFloat(userInput); if (isNaN(num)) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); alert('恭喜通关！'); }
      else alert('回答正确！继续下一关');
      saveState(); updateUI();
    } else alert('答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0; const idx = state.done.indexOf(2); if(idx>=0) state.done.splice(idx,1);
  saveState(); updateUI();
}
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) { if(!state.done.includes(3)){state.done.push(3);saveState();} updateUI(); return; }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx+1)+'. '+q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{ el.style.pointerEvents='none'; if(i===q.ans) el.className='quiz-opt correct'; else if(i===idx&&idx!==q.ans) el.className='quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx===q.ans ? '正确！'+q.explain : '正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

         '高压锅通过<em>增大气压</em>来提高水的沸点，使食物更快煮熟。'
  },
  3: {

    body: '通过几道选择题来检验你是否理解了汽化和液化。\n\n' +
         '关键点：<em>汽化吸热液化放热</em>、<em>蒸发与沸腾的区别</em>、<em>沸点与气压的关系</em>。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
