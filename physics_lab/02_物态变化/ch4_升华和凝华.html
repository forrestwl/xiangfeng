  { q: '升华是指物质从什么状态直接变成什么状态？', opts: ['A. 固态→液态', 'B. 固态→气态', 'C. 液态→气态', 'D. 气态→固态'], ans: 1, explain: '升华是物质从固态直接变成气态的过程，不经过液态。升华吸热。' },

  { q: '干冰升华时，周围会出现大量白雾，这是因为？', opts: ['A. 干冰变成白雾', 'B. 水蒸气液化', 'C. 二氧化碳液化', 'D. 空气凝结'], ans: 1, explain: '干冰升华吸热使周围温度降低，空气中的水蒸气遇冷液化成小水滴，形成白雾。' },
  { q: '下列物态变化中，需要吸热的是？', opts: ['A. 凝华', 'B. 液化', 'C. 升华', 'D. 凝固'], ans: 2, explain: '升华（固态→气态）需要吸收热量。凝华、液化、凝固都是放热过程。' },
  { q: '冬天冰冻的衣服变干（没有化成水），属于什么现象？', opts: ['A. 熔化', 'B. 汽化', 'C. 升华', 'D. 液化'], ans: 2, explain: '冰冻的衣服上的冰直接从固态变成水蒸气，不经过液态，属于升华现象。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0, isPlaying = false;
let observeMode = 0; // 0=干冰升华, 1=碘凝华
let exploreIdx = -1;

// Six state changes data
const CHANGES = [
  { from: '固态', to: '液态', name: '熔化', icon: '🧊→💧', color: '#FF9500', ex: '冰融化成水' },
  { from: '液态', to: '固态', name: '凝固', icon: '💧→🧊', color: '#007AFF', ex: '水结成冰' },
  { from: '液态', to: '气态', name: '汽化', icon: '💧→💨', color: '#34C759', ex: '水蒸发为水蒸气' },
  { from: '气态', to: '液态', name: '液化', icon: '💨→💧', color: '#FF3B30', ex: '水蒸气液化' },
  { from: '固态', to: '气态', name: '升华', icon: '🧊→💨', color: '#AF52DE', ex: '干冰升华' },
  { from: '气态', to: '固态', name: '凝华', icon: '💨→🧊', color: '#FF9500', ex: '霜的形成' }
];

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
}

function drawObserve(W, H) {
  if (observeMode === 0) {
    // Dry ice sublimation
    ctx.fillStyle = '#e8f0f8'; ctx.fillRect(0, 0, W, H);
    // Table
    ctx.fillStyle = '#c8b898'; ctx.fillRect(80, H-80, W-160, 20);
    // Dry ice block
    ctx.fillStyle = '#141626'; ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 2;
    roundRect(ctx, W/2-50, H-120, 100, 50, 6); ctx.fill(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.08)'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('干冰 (-78.5°C)', W/2, H-95);
    // CO2 cloud (white mist)
    if (isPlaying) {
      for (let i = 0; i < 20; i++) {
        const px = W/2 - 60 + Math.sin(animTime*2 + i*1.5)*80 + (i-10)*4;
        const py = H-135 - (animTime*1.5 + i*8) % 100;
        const alpha = Math.max(0, 0.5 - ((animTime*1.5 + i*8) % 100) / 200);
        ctx.fillStyle = 'rgba(220,230,240,'+alpha+')';
        ctx.beginPath(); ctx.arc(px, py, 8+Math.sin(animTime+i)*3, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('固态CO₂（干冰）→ 气态CO₂（升华吸热）', W/2, 40);
  } else {
    // Iodine deposition
    ctx.fillStyle = '#f5f0e0'; ctx.fillRect(0, 0, W, H);
    // Test tube / flask
    ctx.fillStyle = 'rgba(200,220,240,0.3)'; ctx.strokeStyle = 'rgba(100,150,200,0.5)'; ctx.lineWidth = 2;
    roundRect(ctx, W/2-60, 50, 120, 200, 10); ctx.fill(); ctx.stroke();
    // Iodine crystals at bottom
    ctx.fillStyle = '#8B5CF6';
    for (let i = 0; i < 8; i++) {
      const cx = W/2-40 + Math.random()*80;
      const cy = 220 + Math.random()*20;
      ctx.beginPath(); ctx.arc(cx, cy, 3+Math.random()*3, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('碘晶体', W/2, 255);
    // Iodine vapor (purple)
    if (isPlaying) {
      for (let i = 0; i < 12; i++) {
        const vx = W/2-40 + Math.sin(animTime+i*2)*40;
        const vy = 200 - (animTime*2 + i*15) % 160;
        ctx.fillStyle = 'rgba(139,92,246,'+(0.4 - vy/400)+')';
        ctx.beginPath(); ctx.arc(vx, vy, 4+Math.sin(animTime+i)*2, 0, Math.PI*2); ctx.fill();
      }
      // Crystals forming at top (cool area)
      if (animTime > 2) {
        for (let i = 0; i < 6; i++) {
          const cx = W/2-35 + Math.sin(i*2.3)*40;
          const cy = 65 + Math.sin(i*1.7)*15;
          ctx.fillStyle = '#8B5CF6';
          ctx.beginPath(); ctx.arc(cx, cy, 2+Math.sin(animTime*0.5+i)*1.5, 0, Math.PI*2); ctx.fill();
        }
      }
    }
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('碘蒸气上升，遇冷→碘晶体（凝华放热）', W/2, 310);
  }
  // Toggle button
  const btnW = 120, btnH = 32;
  const startX = (W - (2*btnW + 10)) / 2;
  ['干冰升华', '碘凝华'].forEach((m, i) => {
    const bx = startX + i*(btnW+10);
    ctx.fillStyle = i === observeMode ? '#AF52DE' : '#eee';
    roundRect(ctx, bx, 10, btnW, btnH, 8); ctx.fill();
    ctx.fillStyle = i === observeMode ? '#fff' : '#666';
    ctx.font = '12px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(m, bx+btnW/2, btnH/2+10);
  });
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击上方切换实验，点击画布播放', W/2, H - 10);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  // Title
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('六种物态变化', W/2, 25);
  // Draw 6 change buttons in 2x3 grid
  const cols = 3, rows = 2;
  const cw = 140, ch = 48, gap = 10;
  const startX = (W - (cols*cw + (cols-1)*gap)) / 2;
  const startY = 45;
  CHANGES.forEach((c, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const bx = startX + col*(cw+gap), by = startY + row*(ch+gap);
    const isSelected = exploreIdx === i;
    ctx.fillStyle = isSelected ? c.color : '#fff';
    ctx.strokeStyle = isSelected ? c.color : '#ddd';
    ctx.lineWidth = 2;
    roundRect(ctx, bx, by, cw, ch, 10); ctx.fill(); ctx.stroke();
    ctx.fillStyle = isSelected ? '#fff' : c.color;
    ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(c.icon+' '+c.name, bx+cw/2, by+ch/2+2);
  });
  // Detail panel
  if (exploreIdx >= 0) {
    const c = CHANGES[exploreIdx];
    const py = startY + 2*(ch+gap) + 10;
    ctx.fillStyle = '#141626'; roundRect(ctx, 60, py, W-120, 80, 10); ctx.fill();
    ctx.fillStyle = c.color; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(c.name+'：'+c.from+' → '+c.to, W/2, py+25);
    ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif';
    ctx.fillText('实例：'+c.ex, W/2, py+50);
    const heat = (exploreIdx === 0 || exploreIdx === 2 || exploreIdx === 4) ? '吸热' : '放热';
    ctx.fillStyle = '#FF9500'; ctx.font = '12px sans-serif';
    ctx.fillText('过程'+heat, W/2, py+70);
  }
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击上方按钮查看各物态变化的详情', W/2, H - 10);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40; let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 50; lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  // Visual hints
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  if (state.challengeIdx === 0) ctx.fillText('🧳 樟脑丸由固态直接变为气态', W/2, y+20);
  else if (state.challengeIdx === 1) ctx.fillText('❄️ 冰花是水蒸气直接变成冰晶', W/2, y+20);
  else if (state.challengeIdx === 2) ctx.fillText('☁️ 干冰升华 → 降温 → 水蒸气液化', W/2, y+20);
  else if (state.challengeIdx === 3) ctx.fillText('💡 钨丝先变成钨蒸气，再附着在玻璃上', W/2, y+20);
  else if (state.challengeIdx === 4) ctx.fillText('⛄ 雪不经熔化直接变成水蒸气', W/2, y+20);
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('点击画面输入答案', W/2, H - 15);
}

function animate() {
  if (isPlaying) animTime += 0.05;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); drawScene(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  desc.textContent = state.currentMission === 0
    ? (done ? '✅ 已观看' : '点击画布播放，切换实验')
    : state.currentMission === 1
    ? (done ? '✅ 已探索' : '点击查看各物态变化')
    : state.currentMission === 2
    ? (done ? '🎉 闯关完成！' : `第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`)
    : (done ? '✅ 已测验' : '点击下方开始测验');
  document.getElementById('infoDisplay').style.display = state.currentMission === 0 ? 'flex' : 'none';
  if (state.currentMission === 0) {
    document.getElementById('dispPhen').textContent = observeMode === 0 ? '干冰升华' : '碘凝华';
  }
  document.getElementById('missionTabs').innerHTML = MISSIONS.map((m,i) => {
    const isActive = i === state.currentMission, isDone = state.done.includes(i);
    return `<div class="${isActive?'tab active':isDone?'tab done':'tab'}" onclick="switchMission(${i})">${m.label}${isDone?'<span class="tab-check">✓</span>':''}</div>`;
  }).join('');
  MISSIONS.forEach((_, i) => {
    document.getElementById('pdot'+i).className = state.done.includes(i) ? 'dot done' : i === state.currentMission ? 'dot active' : 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '第 '+(state.challengeIdx+1)+'/'+CHALLENGES.length+' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal||'').slice(0,30)+'...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width, scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX, y = (e.clientY - rect.top) * scaleY;
  const W = canvas.width;
  if (state.currentMission === 0) {
    const btnW = 120, btnH = 32, startX = (W - (2*btnW + 10)) / 2;
    if (y >= 10 && y <= 10+btnH) {
      if (x >= startX && x <= startX+btnW) { observeMode = 0; isPlaying = true; animTime = 0; if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } }
      if (x >= startX+btnW+10 && x <= startX+2*btnW+10) { observeMode = 1; isPlaying = true; animTime = 0; if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); } }
    } else {
      isPlaying = !isPlaying; if (isPlaying) animTime = 0;
    }
  } else if (state.currentMission === 1) {
    const cols = 3, cw = 140, ch = 48, gap = 10;
    const startX = (W - (cols*cw + (cols-1)*gap)) / 2, startY = 45;
    for (let i = 0; i < CHANGES.length; i++) {
      const col = i % cols, row = Math.floor(i / cols);
      const bx = startX + col*(cw+gap), by = startY + row*(ch+gap);
      if (x >= bx && x <= bx+cw && y >= by && y <= by+ch) {
        exploreIdx = i;
        if (!state.done.includes(1)) { state.done.push(1); saveState(); }
        updateUI(); return;
      }
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) return;
    const ch = CHALLENGES[state.challengeIdx]; if (!ch) return;
    const userInput = prompt('输入答案（数字）:', ''); if (userInput === null) return;
    const num = parseFloat(userInput); if (isNaN(num)) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); alert('恭喜通关！'); }
      else alert('回答正确！继续下一关');
      saveState(); updateUI();
    } else alert('答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0; const idx = state.done.indexOf(2); if(idx>=0) state.done.splice(idx,1);
  saveState(); updateUI();
}
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) { if(!state.done.includes(3)){state.done.push(3);saveState();} updateUI(); return; }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx+1)+'. '+q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  document.querySelectorAll('.quiz-opt').forEach((el,i)=>{ el.style.pointerEvents='none'; if(i===q.ans) el.className='quiz-opt correct'; else if(i===idx&&idx!==q.ans) el.className='quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx===q.ans ? '正确！'+q.explain : '正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
