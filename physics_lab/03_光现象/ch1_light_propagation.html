<body>
<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="back" onclick="location.href='index.html'">←</span>
    <h1>光的传播</h1>
    <div class="progress-dots">
      进度 <span id="progressText">0/4</span>
      <span id="dotsContainer"></span>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="simCanvas" width="760" height="240"></canvas>
      <div class="mode-toggle" id="modeToggle" onclick="togglePinholeMode()">🔦 小孔成像</div>
      <div class="challenge-hud" id="challengeHud">
        <div class="ch-level" id="chLevel">第 1 关</div>
        <div class="ch-goal" id="chGoal">调整光源位置</div>
        <button class="ch-restart" onclick="resetChallenges()">↺ 重新挑战</button>
        <button class="quiz-close" id="quizClose" onclick="closeQuiz()" style="margin-top:10px;padding:6px 16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-size:12px;">✕ 关闭</button>
      </div>
      <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✅</div>
        <div class="toast-text" id="toastText">任务完成！</div>
        <div class="toast-sub" id="toastSub">真棒！继续下一关</div>
      </div>
      <div class="quiz-overlay" id="quizOverlay">

    showQuiz();        <div class="quiz-q" id="quizQ">题目加载中...</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult"></div>
        <button class="quiz-next" id="quizNext" style="display:none" onclick="quizNext()">下一题 →</button>
      </div>
    </div>

    <div class="info-panel">
      <div class="mission-label" id="missionLabel">🔬 观察</div>
      <div class="mission-title" id="missionTitle">光的直线传播</div>
      <div class="mission-desc" id="missionDesc">观看光的直线传播演示</div>
      <div class="angle-display" id="positionDisplay" style="display:none">
        <div class="angle-item">光源 Y <span class="value incident" id="sourceYVal">120</span></div>
        <div class="angle-item">影子高度 <span class="value reflected" id="shadowHeightVal">0px</span></div>
        <div class="angle-item"><span class="value equal" id="modeIndicator">⬤ 影子模式</span></div>
      </div>
      <div class="knowledge-box collapsed" id="knowledgeBox" onclick="toggleKnowledge()">
        <div class="kb-title"><span class="kb-toggle" id="kbToggle">▶</span> 💡 <span id="kbTitle">知识要点</span></div>
        <div class="kb-body" id="kbBody"></div>
      </div>
    </div>
  </div>

  <!-- Mission Tabs -->
  <div class="mission-tabs" id="missionTabs"></div>
</div>

<script>
// ══════════════════════════════════════════
// 1. DATA
// ══════════════════════════════════════════
const MISSIONS = [
  {
    id: 'observe', label: '🔬 观察', title: '光的直线传播演示',
    desc: '观看光源发光 → 光线直线传播 → 遇到障碍物形成影子。点击"播放"观看演示。',
    doneLabel: '已观看'
  },
  {
    id: 'explore', label: '✋ 探索', title: '拖拽光源',
    desc: '拖拽 🟠 光源上下左右移动，观察影子如何变化。试试切换到小孔成像模式！',
    doneLabel: '已探索'
  },
  {
    id: 'challenge', label: '🎯 挑战', title: '光学闯关',
    desc: '运用光的直线传播和小孔成像知识完成挑战！',
    doneLabel: '已闯关'
  },
  {
    id: 'quiz', label: '⭐ 测验', title: '知识检测',
    desc: '完成几道选择题，巩固今天学的知识。',
    doneLabel: '已完成'
  }
];

const CHALLENGES = [
  { goal: '移动光源，让影子遮住右侧的小红旗 🚩', type: 'shadow_cover', targetY: 60 },

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H - 50;

// Layout constants
const SOURCE_INIT_X = 80;
const SOURCE_INIT_Y = 120;
const SOURCE_MIN_X = 30;
const SOURCE_MAX_X = 340;
const SOURCE_MIN_Y = 25;
const SOURCE_MAX_Y = 215;
const SOURCE_RADIUS = 10;

const OBSTACLE_LEFT = 365;
const OBSTACLE_RIGHT = 395;
const OBSTACLE_TOP = 65;
const OBSTACLE_BOTTOM = 175;
const OBSTACLE_HEIGHT = OBSTACLE_BOTTOM - OBSTACLE_TOP;
const OBSTACLE_WIDTH = OBSTACLE_RIGHT - OBSTACLE_LEFT;

const SCREEN_X = 710;
const SCREEN_TOP = 5;
const SCREEN_BOTTOM = 235;

const HOLE_X = (OBSTACLE_LEFT + OBSTACLE_RIGHT) / 2;
const HOLE_Y = (OBSTACLE_TOP + OBSTACLE_BOTTOM) / 2;
const HOLE_RADIUS = 5;
const SOURCE_CANDLE_HALF = 12;

let mouseX = SOURCE_INIT_X, mouseY = SOURCE_INIT_Y;
let isDragging = false;

// ══════════════════════════════════════════
// 4. SOUND
// ══════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

function playComplete() {
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.25), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.3), 360);
}

// ══════════════════════════════════════════
// 5. PHYSICS
// ══════════════════════════════════════════
function getShadowBounds() {
  const sx = mouseX, sy = mouseY;
  const obsLeft = OBSTACLE_LEFT;
  const denom = obsLeft - sx;
  if (Math.abs(denom) < 1) return null;
  const K = (SCREEN_X - sx) / denom;
  const topY = sy + K * (OBSTACLE_TOP - sy);
  const bottomY = sy + K * (OBSTACLE_BOTTOM - sy);
  return { topY, bottomY, height: Math.abs(bottomY - topY), K: K };
}

function getPinholeImageY() {
  const sx = mouseX, sy = mouseY;
  const denom = HOLE_X - sx;
  if (Math.abs(denom) < 1) return null;
  const t = (SCREEN_X - HOLE_X) / denom;
  const imageY = HOLE_Y + t * (HOLE_Y - sy);
  return { imageY, mag: Math.abs(t) };
}

function getRayIntersection(targetY) {
  // Returns point where ray from source through target point on screen hits obstacle
  const sx = mouseX, sy = mouseY;
  const tObs = (OBSTACLE_LEFT - sx) / (SCREEN_X - sx);
  const yAtObs = sy + tObs * (targetY - sy);
  return { blocked: yAtObs >= OBSTACLE_TOP && yAtObs <= OBSTACLE_BOTTOM, yAtObs };
}

function clampSource() {
  mouseX = Math.max(SOURCE_MIN_X, Math.min(SOURCE_MAX_X, mouseX));
  mouseY = Math.max(SOURCE_MIN_Y, Math.min(SOURCE_MAX_Y, mouseY));
}

// ══════════════════════════════════════════
// 6. DRAWING
// ══════════════════════════════════════════
function drawScene(highlight) {
  ctx.clearRect(0, 0, W, H);
  const sx = mouseX, sy = mouseY;

  // Grid dots (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI*2); ctx.fill();
  }

  if (pinholeMode) {
    drawPinholeScene(sx, sy, highlight);
  } else {
    drawShadowScene(sx, sy, highlight);
  }
}

function drawShadowScene(sx, sy, highlight) {
  const sb = getShadowBounds();

  // ── Screen ──
  ctx.save();
  ctx.strokeStyle = '#8e8e93'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(SCREEN_X, SCREEN_TOP); ctx.lineTo(SCREEN_X, SCREEN_BOTTOM);
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#8e8e93'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('屏幕', SCREEN_X, SCREEN_BOTTOM + 16);

  // ── Shadow area (behind obstacle) ──
  if (sb) {
    const { topY, bottomY } = sb;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.beginPath();
    ctx.moveTo(OBSTACLE_RIGHT, OBSTACLE_TOP);
    ctx.lineTo(SCREEN_X, Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, topY)));
    ctx.lineTo(SCREEN_X, Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, bottomY)));
    ctx.lineTo(OBSTACLE_RIGHT, OBSTACLE_BOTTOM);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Deeper shadow near screen
    ctx.save();
    const grad = ctx.createLinearGradient(OBSTACLE_RIGHT, 0, SCREEN_X, 0);
    grad.addColorStop(0, 'rgba(0,0,0,0.03)');
    grad.addColorStop(1, 'rgba(0,0,0,0.13)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(OBSTACLE_RIGHT, OBSTACLE_TOP);
    ctx.lineTo(SCREEN_X, Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, topY)));
    ctx.lineTo(SCREEN_X, Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, bottomY)));
    ctx.lineTo(OBSTACLE_RIGHT, OBSTACLE_BOTTOM);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // ── Light rays ──
  const rayTargets = [SCREEN_TOP, SCREEN_TOP + 40, OBSTACLE_TOP - 5, HOLE_Y, OBSTACLE_BOTTOM + 5, SCREEN_BOTTOM - 40, SCREEN_BOTTOM];
  for (const ty of rayTargets) {
    const ri = getRayIntersection(ty);
    const t = (SCREEN_X - sx) !== 0 ? (OBSTACLE_LEFT - sx) / (SCREEN_X - sx) : 0;
    const yAtObs = sy + t * (ty - sy);
    const blocked = yAtObs >= OBSTACLE_TOP && yAtObs <= OBSTACLE_BOTTOM;

    if (blocked) {
      // Blocked ray - draw to obstacle edge only, dimmed
      ctx.save();
      ctx.strokeStyle = 'rgba(255,149,0,0.2)'; ctx.lineWidth = 1.2;
      ctx.setLineDash([3, 4]);
      const tObs = (OBSTACLE_LEFT - sx) / (SCREEN_X - sx);
      const yHit = sy + tObs * (ty - sy);
      if (tObs > 0 && tObs < 1) {
        ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(OBSTACLE_LEFT, yHit); ctx.stroke();
      }
      ctx.restore();
    } else {
      // Clear ray
      ctx.save();
      ctx.strokeStyle = 'rgba(255,149,0,0.35)'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(SCREEN_X, ty); ctx.stroke();
      ctx.restore();
    }
  }

  // Boundary rays (highlighted - through obstacle corners)
  ctx.save();
  ctx.shadowColor = 'rgba(255,149,0,0.4)'; ctx.shadowBlur = 8;
  ctx.strokeStyle = 'rgba(255,149,0,0.7)'; ctx.lineWidth = 2;
  // Top boundary ray
  const tTop = (SCREEN_X - sx) / (OBSTACLE_LEFT - sx);
  const topScreenY = sy + tTop * (OBSTACLE_TOP - sy);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(SCREEN_X, topScreenY); ctx.stroke();
  // Bottom boundary ray
  const bottomScreenY = sy + tTop * (OBSTACLE_BOTTOM - sy);
  ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(SCREEN_X, bottomScreenY); ctx.stroke();
  ctx.restore();

  // ── Obstacle ──
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.10)'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#636366';
  ctx.fillRect(OBSTACLE_LEFT, OBSTACLE_TOP, OBSTACLE_WIDTH, OBSTACLE_HEIGHT);
  ctx.fillStyle = '#48484a';
  ctx.fillRect(OBSTACLE_LEFT, OBSTACLE_TOP, 3, OBSTACLE_HEIGHT);
  ctx.restore();
  ctx.fillStyle = '#636366'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('障碍物', (OBSTACLE_LEFT + OBSTACLE_RIGHT) / 2, OBSTACLE_BOTTOM + 18);

  // ── Light source (sun icon) ──
  ctx.save();
  // Glow
  const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 28);
  glow.addColorStop(0, 'rgba(255,149,0,0.3)');
  glow.addColorStop(1, 'rgba(255,149,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();
  // Sun rays
  ctx.strokeStyle = 'rgba(255,149,0,0.5)'; ctx.lineWidth = 1.5;
  for (let a = 0; a < 8; a++) {
    const ang = a * Math.PI / 4;
    ctx.beginPath();
    ctx.moveTo(sx + 13 * Math.cos(ang), sy + 13 * Math.sin(ang));
    ctx.lineTo(sx + 18 * Math.cos(ang), sy + 18 * Math.sin(ang));
    ctx.stroke();
  }
  // Main circle
  ctx.shadowColor = 'rgba(255,149,0,0.4)'; ctx.shadowBlur = 12;
  ctx.fillStyle = '#FF9500';
  ctx.beginPath(); ctx.arc(sx, sy, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(sx - 3, sy - 3, 4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#FF9500'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('光源', sx, sy + 28);

  // ── Highlight on screen (lit areas) ──
  if (sb) {
    const { topY, bottomY } = sb;
    // Lit above shadow
    if (topY > SCREEN_TOP) {
      ctx.fillStyle = 'rgba(255,149,0,0.06)';
      ctx.fillRect(SCREEN_X - 3, SCREEN_TOP, 6, Math.min(topY, SCREEN_BOTTOM) - SCREEN_TOP);
    }
    // Lit below shadow
    if (bottomY < SCREEN_BOTTOM) {
      ctx.fillStyle = 'rgba(255,149,0,0.06)';
      ctx.fillRect(SCREEN_X - 3, Math.max(bottomY, SCREEN_TOP), 6, SCREEN_BOTTOM - Math.max(bottomY, SCREEN_TOP));
    }
  }

  // ── Shadow measurement label ──
  if (sb && currentMission > 0) {
    const { topY, bottomY, height } = sb;
    const sh = Math.round(height);
    const screenTopY = Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, topY));
    const screenBottomY = Math.max(SCREEN_TOP, Math.min(SCREEN_BOTTOM, bottomY));
    if (screenBottomY > screenTopY + 4) {
      ctx.save();
      ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth = 1;
      ctx.setLineDash([2, 3]);
      ctx.beginPath();
      ctx.moveTo(SCREEN_X + 12, screenTopY);
      ctx.lineTo(SCREEN_X + 12, screenBottomY);
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'left';
      ctx.fillText(`影子 ${sh}px`, SCREEN_X + 16, (screenTopY + screenBottomY) / 2 + 3);
      ctx.restore();
    }
  }

  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.04)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawPinholeScene(sx, sy, highlight) {
  // ── Wall with hole ──
  ctx.save();
  ctx.fillStyle = '#48484a';
  ctx.fillRect(OBSTACLE_LEFT, SCREEN_TOP - 5, OBSTACLE_WIDTH, HOLE_Y - HOLE_RADIUS - SCREEN_TOP + 5);
  ctx.fillRect(OBSTACLE_LEFT, HOLE_Y + HOLE_RADIUS, OBSTACLE_WIDTH, SCREEN_BOTTOM - HOLE_Y - HOLE_RADIUS + 5);
  ctx.restore();
  // Wall label
  ctx.fillStyle = '#636366'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('挡板', (OBSTACLE_LEFT + OBSTACLE_RIGHT) / 2, SCREEN_TOP + 14);

  // ── Hole ──
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,200,0.6)'; ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff9e6';
  ctx.beginPath(); ctx.arc(HOLE_X, HOLE_Y, HOLE_RADIUS, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(HOLE_X, HOLE_Y, HOLE_RADIUS - 2, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Screen ──
  ctx.save();
  ctx.strokeStyle = '#8e8e93'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(SCREEN_X, SCREEN_TOP); ctx.lineTo(SCREEN_X, SCREEN_BOTTOM);
  ctx.stroke();
  ctx.restore();
  ctx.fillStyle = '#8e8e93'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('屏幕', SCREEN_X, SCREEN_BOTTOM + 16);

  // ── Pinhole rays ──
  const ph = getPinholeImageY();
  if (ph) {
    const { imageY, mag } = ph;
    // Draw rays: from source through hole to screen
    ctx.save();
    ctx.strokeStyle = 'rgba(255,149,0,0.35)'; ctx.lineWidth = 1.5;
    // Top of source, through hole, to screen
    const srcTop = sy - SOURCE_CANDLE_HALF;
    const imgTop = HOLE_Y + (SCREEN_X - HOLE_X) / (HOLE_X - sx) * (HOLE_Y - srcTop);
    ctx.beginPath(); ctx.moveTo(sx, srcTop); ctx.lineTo(HOLE_X, HOLE_Y); ctx.lineTo(SCREEN_X, imgTop); ctx.stroke();
    // Bottom of source, through hole, to screen
    const srcBot = sy + SOURCE_CANDLE_HALF;
    const imgBot = HOLE_Y + (SCREEN_X - HOLE_X) / (HOLE_X - sx) * (HOLE_Y - srcBot);
    ctx.beginPath(); ctx.moveTo(sx, srcBot); ctx.lineTo(HOLE_X, HOLE_Y); ctx.lineTo(SCREEN_X, imgBot); ctx.stroke();
    // Center ray
    ctx.strokeStyle = 'rgba(255,149,0,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(HOLE_X, HOLE_Y); ctx.lineTo(SCREEN_X, imageY); ctx.stroke();
    ctx.restore();

    // ── Image on screen (inverted candle) ──
    const imgHalf = mag * SOURCE_CANDLE_HALF;
    ctx.save();
    ctx.shadowColor = 'rgba(255,149,0,0.3)'; ctx.shadowBlur = 8;
    ctx.fillStyle = 'rgba(255,149,0,0.15)';
    ctx.beginPath(); ctx.arc(SCREEN_X, imageY, Math.max(imgHalf * 1.5, 10), 0, Math.PI*2); ctx.fill();
    // Inverted candle body (inverted)
    ctx.fillStyle = '#141626';
    ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 4;
    ctx.fillRect(SCREEN_X - 3, imageY - imgHalf, 6, imgHalf * 2);
    // Flame (inverted - at bottom since image is inverted)
    ctx.shadowColor = 'rgba(255,149,0,0.5)'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#FF9500';
    ctx.beginPath();
    ctx.moveTo(SCREEN_X, imageY + imgHalf + 8);
    ctx.lineTo(SCREEN_X - 5, imageY + imgHalf);
    ctx.lineTo(SCREEN_X + 5, imageY + imgHalf);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#FFCC00';
    ctx.beginPath();
    ctx.moveTo(SCREEN_X, imageY + imgHalf + 5);
    ctx.lineTo(SCREEN_X - 3, imageY + imgHalf);
    ctx.lineTo(SCREEN_X + 3, imageY + imgHalf);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
    ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('倒立实像', SCREEN_X, Math.min(SCREEN_BOTTOM + 4, imageY + imgHalf + 20));
  }

  // ── Light source (candle) ──
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.1)'; ctx.shadowBlur = 4;
  // Candle body
  ctx.fillStyle = '#141626';
  ctx.fillRect(sx - 4, sy - SOURCE_CANDLE_HALF, 8, SOURCE_CANDLE_HALF * 2);
  // Wick
  ctx.strokeStyle = '#8e8e93'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(sx, sy - SOURCE_CANDLE_HALF); ctx.lineTo(sx, sy - SOURCE_CANDLE_HALF - 4); ctx.stroke();
  // Flame
  ctx.shadowColor = 'rgba(255,149,0,0.5)'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#FF9500';
  ctx.beginPath();
  ctx.moveTo(sx, sy - SOURCE_CANDLE_HALF - 12);
  ctx.lineTo(sx - 5, sy - SOURCE_CANDLE_HALF - 3);
  ctx.lineTo(sx + 5, sy - SOURCE_CANDLE_HALF - 3);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FFCC00';
  ctx.beginPath();
  ctx.moveTo(sx, sy - SOURCE_CANDLE_HALF - 8);
  ctx.lineTo(sx - 3, sy - SOURCE_CANDLE_HALF - 3);
  ctx.lineTo(sx + 3, sy - SOURCE_CANDLE_HALF - 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#FF9500'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('蜡烛', sx, sy + SOURCE_CANDLE_HALF + 18);

  // ── Labels ──
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '10px -apple-system, sans-serif'; ctx.textAlign = 'center';
  // Hole label
  ctx.fillText('小孔', HOLE_X, HOLE_Y + 16);

  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.04)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ══════════════════════════════════════════
// 7. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0) return;
  isDragging = true;
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (isDragging && currentMission > 0 && currentMission < 3) {
    mouseX = pos.x; mouseY = pos.y;
    clampSource();
    drawScene(false);
    updatePositionDisplay();

    if (currentMission === 2) checkChallenge();
  } else if (currentMission >= 0) {
    if (currentMission > 0) {
      mouseX = pos.x; mouseY = pos.y;
      clampSource();
      drawScene(false);
      updatePositionDisplay();
      if (currentMission === 2) checkChallenge();
    }
  }
}

function onPointerUp(e) {
  isDragging = false;
  if (currentMission === 2) checkChallenge();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

// ══════════════════════════════════════════
// 8. UI UPDATES
// ══════════════════════════════════════════
function updatePositionDisplay() {
  const sb = getShadowBounds();
  const sh = sb ? Math.round(sb.height) : 0;
  document.getElementById('sourceYVal').textContent = Math.round(mouseY) + ' (' + Math.round(mouseX) + ')';
  document.getElementById('shadowHeightVal').textContent = sh + 'px';
  const modeEl = document.getElementById('modeIndicator');
  if (pinholeMode) {
    modeEl.textContent = '⬤ 小孔成像模式';
    modeEl.style.color = '#FF9500';
    const ph = getPinholeImageY();
    if (ph) {
      document.getElementById('shadowHeightVal').textContent = Math.round(ph.mag * SOURCE_CANDLE_HALF * 2) + 'px';
    }
  } else {
    modeEl.textContent = '⬤ 影子模式';
    modeEl.style.color = '#34C759';
  }
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

function togglePinholeMode() {
  pinholeMode = !pinholeMode;
  const btn = document.getElementById('modeToggle');
  btn.textContent = pinholeMode ? '☀️ 影子模式' : '🔦 小孔成像';
  btn.classList.toggle('active', pinholeMode);
  drawScene(false);
  updatePositionDisplay();
}

// ══════════════════════════════════════════
// 9. OBSERVE MISSION
// ══════════════════════════════════════════
let observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;

  // Reset to shadow mode for observation
  if (pinholeMode) togglePinholeMode();

  const steps = [
    { sy: 120, desc: '🌟 光源发光，向四周发出光线', delay: 600 },
    { sy: 120, desc: '➡️ 光在同种均匀介质中沿直线传播', delay: 600 },
    { sy: 120, desc: '🧱 遇到不透明障碍物，光线被阻挡', delay: 800 },
    { sy: 120, desc: '🌑 障碍物后方形成影子区域（暗区）', delay: 800 },
    { sy: 60, desc: '↕️ 光源向上移动，影子向下移动', delay: 500 },
    { sy: 180, desc: '↕️ 光源向下移动，影子向上移动', delay: 500 },
    { sy: 120, desc: '🔄 现在切换到小孔成像模式看看！', delay: 600, toggle: true }
  ];

  let stepIdx = 0;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      document.getElementById('missionDesc').innerHTML = '✅ 演示完成！点击"✋ 探索"继续学习。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '光沿直线传播！');

      mouseX = SOURCE_INIT_X; mouseY = SOURCE_INIT_Y;
      if (pinholeMode) togglePinholeMode();
      drawScene(false);
      updatePositionDisplay();
      return;
    }

    const s = steps[stepIdx];

    if (s.toggle) {
      if (!pinholeMode) togglePinholeMode();
      mouseY = 120;
    } else {
      if (pinholeMode) togglePinholeMode();
      mouseY = s.sy;
    }
    mouseX = SOURCE_INIT_X;
    drawScene(true);
    updatePositionDisplay();
    document.getElementById('missionDesc').textContent = s.desc;

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

// ══════════════════════════════════════════
// 10. EXPLORE MISSION
// ══════════════════════════════════════════
function checkExploreInsight() {
  const sh = getShadowBounds();
  const height = sh ? Math.round(sh.height) : 0;
  if (pinholeMode) {
    const ph = getPinholeImageY();
    document.getElementById('missionDesc').textContent =
      ph ? `小孔成像：蜡烛像在 Y=${Math.round(ph.imageY)}，放大 ${ph.mag.toFixed(1)} 倍 — 像总是倒立的！` :
           '拖动蜡烛，观察小孔成像的规律。像的大小会变化！';
  } else {
    document.getElementById('missionDesc').textContent =
      `拖拽光源改变位置！光源在 (${Math.round(mouseX)}, ${Math.round(mouseY)})，影子高度 ${height}px —— 影子位置随光源移动！`;
  }
}

// ══════════════════════════════════════════
// 11. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkChallenge() {
  if (currentMission !== 2) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;

  let passed = false;

  switch (ch.type) {
    case 'shadow_cover': {
      // Shadow must cover the flag at targetY on screen
      const sb = getShadowBounds();
      if (!sb) break;
      const { topY, bottomY } = sb;
      const flagY = ch.targetY;
      const inShadow = (flagY >= Math.min(topY, bottomY) && flagY <= Math.max(topY, bottomY));
      passed = inShadow && !pinholeMode;
      break;
    }
    case 'shadow_size': {
      // Shadow height = targetRatio * obstacle height
      const sb = getShadowBounds();
      if (!sb || pinholeMode) break;
      const ratio = sb.height / OBSTACLE_HEIGHT;
      passed = Math.abs(ratio - ch.targetRatio) <= ch.tolerance;
      break;
    }
    case 'pinhole_size': {
      // Pinhole image size > threshold
      if (!pinholeMode) break;
      const ph = getPinholeImageY();
      if (!ph) break;
      const imageHeight = ph.mag * SOURCE_CANDLE_HALF * 2;
      passed = imageHeight >= ch.threshold;
      break;
    }
    case 'light_target': {
      // Target on screen must be LIT (not in shadow)
      const sb = getShadowBounds();
      if (!sb || pinholeMode) break;
      const { topY, bottomY } = sb;
      const targetY = ch.targetY;
      const isLit = targetY < Math.min(topY, bottomY) || targetY > Math.max(topY, bottomY);
      passed = isLit;
      break;
    }
    case 'pinhole_invert': {
      // In pinhole mode, verify inversion: image is on opposite side of hole center vs source
      if (!pinholeMode) break;
      const ph = getPinholeImageY();
      if (!ph) break;
      const { imageY } = ph;
      // Image is inverted when imageY and sourceY are on opposite sides of HOLE_Y
      const srcSide = mouseY < HOLE_Y ? -1 : (mouseY > HOLE_Y ? 1 : 0);
      const imgSide = imageY < HOLE_Y ? -1 : (imageY > HOLE_Y ? 1 : 0);
      // Check image appears on screen
      const onScreen = imageY > SCREEN_TOP && imageY < SCREEN_BOTTOM;
      passed = srcSide !== 0 && imgSide !== 0 && srcSide !== imgSide && onScreen;
      break;
    }
  }

  if (passed) {
    challengeIdx++;
    state.challengeIdx = challengeIdx;
    saveState();

    if (challengeIdx >= CHALLENGES.length) {
      playComplete();
      markMissionDone(2);
      updateChallengeHud();
      document.getElementById('missionDesc').innerHTML = '🎉 所有关卡挑战成功！你掌握了光的直线传播和小孔成像！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      showToast('🏆', '全部通关！', '恭喜完成光学闯关！');
    } else {
      playHit();
      showToast('⭐', '闯关成功！', CHALLENGES[challengeIdx] ? `下一关：${CHALLENGES[challengeIdx].goal}` : '');
      updateChallengeHud();
      // Reset for next challenge
      mouseX = SOURCE_INIT_X; mouseY = SOURCE_INIT_Y;
      // Set appropriate mode for next challenge
      const nextCh = CHALLENGES[challengeIdx];
      const needsPinhole = nextCh.type === 'pinhole_size' || nextCh.type === 'pinhole_invert';
      if (needsPinhole && !pinholeMode) togglePinholeMode();
      else if (!needsPinhole && pinholeMode) togglePinholeMode();
      drawScene(false);
      updatePositionDisplay();
      document.getElementById('missionDesc').textContent = CHALLENGES[challengeIdx].goal;
    }
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      document.getElementById('chLevel').textContent = `第 ${challengeIdx + 1}/${CHALLENGES.length} 关`;
      document.getElementById('chGoal').textContent = CHALLENGES[challengeIdx].goal;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(i => i !== 2);
  saveState();
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  updateChallengeHud();
  mouseX = SOURCE_INIT_X; mouseY = SOURCE_INIT_Y;
  if (pinholeMode) togglePinholeMode();
  drawScene(false);
  updatePositionDisplay();
  updateTabs();
  updateDots();
}

// ══════════════════════════════════════════
// 12. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([...QUIZ_POOL]).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '光的传播已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML = `<span style="color:#007AFF;font-weight:400;">${quizIdx + 1}/${quizQuestions.length}</span> ${q.q}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerQuiz(i);
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${q.explain}`;
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + q.ans)}。${q.explain}`;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

// 13. MISSION NAVIGATION
// ══════════════════════════════════════════
const KNOWLEDGE = {
  0: {
    title: '💡 认识光的直线传播',
    body: '<em>光源</em>是自身能发光的物体，如太阳、蜡烛、电灯。\n\n' +
         '光在<em>同种均匀介质</em>中沿直线传播。\n\n' +
         '影子是光被<em>不透明物体</em>遮挡后形成的暗区。'
  },
  1: {
    title: '💡 探索规律',
    body: '🎯 核心规律：<em>光沿直线传播</em>\n\n' +
         '光源离障碍物越近，影子越大。\n\n' +
         '<em>小孔成像</em>成倒立实像，像的大小由<em>物距</em>和<em>像距</em>决定。\n\n' +

         '• <em>日食</em>：月球挡住太阳光\n' +
         '• <em>月食</em>：地球影子遮住月球\n' +

         '光在真空中的速度：<span class="kb-formula">3×10⁸ m/s</span>'
  },
  3: {
    title: '💡 检测你的掌握',
    body: '通过几道选择题来检验你是否真正理解了光的传播规律。\n\n' +
         '记得关键点：<em>光沿直线传播</em>、光速 <span class="kb-formula">3×10⁸ m/s</span>、<em>小孔成像</em>成倒立实像。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  // Clean up
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  const canvasWrap = document.getElementById('canvasWrap');

  // Reset UI
  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
  document.getElementById('modeToggle').classList.remove('show');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const positionDisplay = document.getElementById('positionDisplay');
  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      positionDisplay.style.display = 'none';
      document.getElementById('modeToggle').classList.remove('show');
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      if (observePhase === 2) {
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
      }
      mouseX = SOURCE_INIT_X; mouseY = SOURCE_INIT_Y;
      if (pinholeMode) togglePinholeMode();
      drawScene(false);
      break;

    case 1: // Explore
      positionDisplay.style.display = 'flex';
      document.getElementById('modeToggle').classList.add('show');
      if (pinholeMode) {
        document.getElementById('modeToggle').textContent = '☀️ 影子模式';
        document.getElementById('modeToggle').classList.add('active');
      } else {
        document.getElementById('modeToggle').textContent = '🔦 小孔成像';
        document.getElementById('modeToggle').classList.remove('active');
      }
      setKnowledge(1);
      descEl.textContent = '随意拖拽 🟠 光源，观察影子变化。点击左上角切换小孔成像模式！';
      updatePositionDisplay();
      drawScene(false);
      setTimeout(() => {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.textContent = '✅ 探索完成！你发现了光沿直线传播的规律！';
        }
      }, 8000);
      break;

    case 2: // Challenge
      positionDisplay.style.display = 'flex';
      document.getElementById('modeToggle').classList.add('show');
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      // Set mode for current challenge
      const ch = CHALLENGES[challengeIdx];
      if (ch) {
        const needsPinhole = ch.type === 'pinhole_size' || ch.type === 'pinhole_invert';
        if (needsPinhole && !pinholeMode) togglePinholeMode();
        else if (!needsPinhole && pinholeMode) togglePinholeMode();
      }
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        descEl.textContent = CHALLENGES[challengeIdx].goal;
      }
      if (pinholeMode) {
        document.getElementById('modeToggle').textContent = '☀️ 影子模式';
        document.getElementById('modeToggle').classList.add('active');
      } else {
        document.getElementById('modeToggle').textContent = '🔦 小孔成像';
        document.getElementById('modeToggle').classList.remove('active');
      }
      document.getElementById('modeToggle').classList.add('show');
      updateChallengeHud();
      updatePositionDisplay();
      drawScene(false);
      break;

    case 3: // Quiz
      positionDisplay.style.display = 'none';
      document.getElementById('modeToggle').classList.remove('show');
      setKnowledge(3);
      drawScene(false);
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
  }
}

// ══════════════════════════════════════════
// 14. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = `${m.label}<span class="tab-check">${state.done.includes(i) ? '✅' : ''}</span>`;
    el.onclick = () => switchMission(i);
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = `${state.done.length}/${MISSIONS.length}`;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 15. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
