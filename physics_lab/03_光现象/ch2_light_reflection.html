<script>
// ══════════════════════════════════════════
// 1. DATA
// ══════════════════════════════════════════
const MISSIONS = [
  {
    id: 'observe', label: '🔬 观察', title: '光的反射演示',
    desc: '观看一束激光射向平面镜，观察光的反射现象。点击"播放"按钮观看演示。',
    doneLabel: '已观看'
  },
  {
    id: 'explore', label: '✋ 探索', title: '拖拽激光笔',
    desc: '用手指或鼠标拖拽激光笔，改变入射角，观察反射角如何变化。发现规律了吗？',
    doneLabel: '已探索'
  },
  {
    id: 'challenge', label: '🎯 挑战', title: '反射闯关',
    desc: '调整激光笔的角度，让反射光照到指定的目标！',
    doneLabel: '已闯关'
  },
  {
    id: 'quiz', label: '⭐ 测验', title: '知识检测',
    desc: '完成几道选择题，巩固今天学的知识。',
    doneLabel: '已完成'
  }
];

const CHALLENGES = [
  { goal: '让反射光射中右侧的 🎯 靶心', targetX: 0.28, targetY: 0.25, tolerance: 0.05 },
  { goal: '让反射光射中左侧的 🎯 靶心', targetX: -0.28, targetY: 0.25, tolerance: 0.05 },
  { goal: '让入射角等于 45°', targetAngle: 45, tolerance: 3 },
  { goal: '让入射角等于 60°', targetAngle: 60, tolerance: 3 },
  { goal: '光线沿法线方向入射（入射角=0°）', targetAngle: 0, tolerance: 3 }
];

const QUIZ_POOL = [

// 3. CANVAS SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H - 50;
const MIRROR_LEN = 280;
const LASER_RADIUS = 140;
const TARGET_RADIUS = 14;

let mouseX = CX - 80, mouseY = CY - LASER_RADIUS;
let isDragging = false;
let currentMission = state.currentMission;

// ══════════════════════════════════════════
// 4. SOUND
// ══════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

function playComplete() {
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.25), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.3), 360);
}

// ══════════════════════════════════════════
// 5. PHYSICS
// ══════════════════════════════════════════
function getAngle() {
  const dx = mouseX - CX, dy = mouseY - CY;
  return Math.atan2(Math.abs(dx), -dy);
}

function getLaserPoint() {
  const dx = mouseX - CX, dy = mouseY - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 10) return { x: CX, y: CY - LASER_RADIUS };
  const r = Math.min(dist, LASER_RADIUS + 30);
  return { x: CX + dx / dist * r, y: CY + dy / dist * r };
}

function clampLaser() {
  const p = getLaserPoint();
  if (p.y > CY - 20) p.y = CY - 20;
  mouseX = p.x; mouseY = p.y;
}

function reflectRay(angle) {
  return { incident: angle, reflected: angle };
}

function getReflectedEnd(angle) {
  const side = mouseX < CX ? -1 : 1;
  const dx = -side * Math.sin(angle);
  const dy = -Math.cos(angle);
  let t = Infinity;
  if (dx > 0) t = Math.min(t, (W - CX) / dx);
  if (dx < 0) t = Math.min(t, -CX / dx);
  if (dy > 0) t = Math.min(t, (H - CY) / dy);
  if (dy < 0) t = Math.min(t, -CY / dy);
  return { x: CX + dx * t, y: CY + dy * t };
}

function distToRay(px, py, ox, oy, dx, dy) {
  const ex = px - ox, ey = py - oy;
  const dot = ex * dx + ey * dy;
  if (dot < 0) return Infinity;
  return Math.abs(ex * dy - ey * dx) / Math.hypot(dx, dy);
}

// ══════════════════════════════════════════
// 5. DRAWING
// ══════════════════════════════════════════
function drawScene(highlight) {
  ctx.clearRect(0, 0, W, H);
  const angle = getAngle();
  const ray = reflectRay(angle);
  const side = mouseX < CX ? -1 : 1;

  // Grid dots (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI*2); ctx.fill();
  }

  // Mirror
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.08)'; ctx.shadowBlur = 6;
  ctx.fillStyle = '#c7c7cc'; ctx.fillRect(CX - MIRROR_LEN/2, CY - 3, MIRROR_LEN, 6);
  ctx.fillStyle = '#8e8e93'; ctx.fillRect(CX - MIRROR_LEN/2, CY + 3, MIRROR_LEN, 2);
  ctx.restore();
  ctx.fillStyle = '#8e8e93'; ctx.font = '12px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('平面镜', CX, CY + 24);

  // Normal line (dashed)
  ctx.save();
  ctx.setLineDash([4, 6]); ctx.strokeStyle = '#c7c7cc'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(CX, CY - 10); ctx.lineTo(CX, CY - LASER_RADIUS - 20); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('法线', CX, CY - LASER_RADIUS - 28);

  // Incident ray
  const laser = { x: mouseX, y: mouseY };
  ctx.save();
  ctx.shadowColor = 'rgba(255, 149, 0, 0.5)'; ctx.shadowBlur = 12;
  ctx.strokeStyle = '#FF9500'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(laser.x, laser.y); ctx.lineTo(CX, CY); ctx.stroke();
  ctx.restore();

  // Reflected ray
  const refEnd = getReflectedEnd(angle);
  ctx.save();
  ctx.shadowColor = 'rgba(0, 122, 255, 0.5)'; ctx.shadowBlur = 12;
  ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(refEnd.x, refEnd.y); ctx.stroke();
  ctx.restore();

  // Laser source (draggable)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#FF9500'; ctx.beginPath(); ctx.arc(laser.x, laser.y, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(laser.x, laser.y, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#FF9500'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('激光笔', laser.x, laser.y + 24);

  // Angle arc - incident
  const incAngle = angle * 180 / Math.PI;
  ctx.strokeStyle = '#FF9500'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  const startA = -Math.PI/2, endA = -Math.PI/2 + (side > 0 ? 1 : -1) * angle;
  ctx.arc(CX, CY, 36, startA, endA);
  ctx.stroke();
  ctx.fillStyle = '#FF9500'; ctx.font = '12px -apple-system, sans-serif';
  const labelX = CX + (side > 0 ? 1 : -1) * 46;
  const labelY = CY - 36;
  ctx.textAlign = side > 0 ? 'left' : 'right';
  // Only show angle when mission is explore or challenge
  if (currentMission >= 1) {
    ctx.fillText(`${Math.round(incAngle)}°`, labelX, labelY + 4);
  }

  // Angle arc - reflected
  ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  const rsA = -Math.PI/2, rsE = -Math.PI/2 - (side > 0 ? 1 : -1) * angle;
  ctx.arc(CX, CY, 30, rsA, rsE);
  ctx.stroke();
  if (currentMission >= 1) {
    ctx.fillStyle = '#007AFF'; ctx.font = '12px -apple-system, sans-serif';
    const rlx = CX - (side > 0 ? 1 : -1) * 40;
    ctx.textAlign = side > 0 ? 'right' : 'left';
    ctx.fillText(`${Math.round(incAngle)}°`, rlx, CY - 28);
  }

  // Target (for challenges)
  if (currentMission === 2 && challengeIdx < CHALLENGES.length) {
    const ch = CHALLENGES[challengeIdx];
    if (ch.targetX !== undefined && ch.targetY !== undefined) {
      const tx = CX + ch.targetX * W, ty = CY - ch.targetY * H;
      ctx.save();
      ctx.shadowColor = 'rgba(255,59,48,0.4)'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#FF3B30'; ctx.beginPath(); ctx.arc(tx, ty, TARGET_RADIUS, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(tx, ty, 6, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#FF3B30'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('🎯', tx, ty - 22);

      // Check hit using ray-line distance
      const side = mouseX < CX ? -1 : 1;
      const rdx = -side * Math.sin(angle), rdy = -Math.cos(angle);
      const hitDist = distToRay(tx, ty, CX, CY, rdx, rdy);
      if (hitDist < TARGET_RADIUS + 8 && challengeIdx < CHALLENGES.length) {
        ctx.fillStyle = '#34C759'; ctx.font = 'bold 16px -apple-system, sans-serif';
        ctx.fillText('✅ 命中！', tx, ty + 40);
      }
    }
  }

  // Highlight for observe mode
  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.06)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ══════════════════════════════════════════
// 6. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0) return;
  isDragging = true;
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (isDragging && currentMission > 0 && currentMission < 3) {
    mouseX = pos.x; mouseY = pos.y;
    clampLaser();
    drawScene(false);
    updateAngleDisplay();

    // Check challenge objective
    if (currentMission === 2) checkChallenge();
  } else if (currentMission >= 0) {
    // Hover updates laser position in observe after demo, and in explore/challenge
    if (currentMission > 0) {
      mouseX = pos.x; mouseY = pos.y;
      clampLaser();
      drawScene(false);
      updateAngleDisplay();
      if (currentMission === 2) checkChallenge();
    }
  }
}

function onPointerUp(e) {
  isDragging = false;
  if (currentMission === 2) checkChallenge();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

function updateAngleDisplay() {
  const angle = Math.round(getAngle() * 180 / Math.PI);
  document.getElementById('incAngle').textContent = angle + '°';
  document.getElementById('refAngle').textContent = angle + '°';
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

// ══════════════════════════════════════════
// 8. OBSERVE MISSION
// ══════════════════════════════════════════
let observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;

  const steps = [
    { angle: 10, delay: 400 },
    { angle: 25, delay: 300 },
    { angle: 40, delay: 300 },
    { angle: 55, delay: 400 },
    { angle: 35, delay: 300 },
    { angle: 15, delay: 300 },
    { angle: 45, delay: 500, pause: true }
  ];

  let stepIdx = 0;
  const demoAngle = 45;
  const side = -1;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      document.getElementById('missionDesc').innerHTML = '✅ 演示完成！你可以点击"✋ 探索"继续学习。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '现在试试拖拽激光笔吧！');

      // Set laser to a nice starting position
      const finalAngle = 45 * Math.PI / 180;
      mouseX = CX - LASER_RADIUS * Math.sin(finalAngle);
      mouseY = CY - LASER_RADIUS * Math.cos(finalAngle);
      drawScene(false);
      updateAngleDisplay();
      return;
    }

    const s = steps[stepIdx];
    const rad = s.angle * Math.PI / 180;
    mouseX = CX - LASER_RADIUS * Math.sin(rad);
    mouseY = CY - LASER_RADIUS * Math.cos(rad);
    drawScene(true);
    updateAngleDisplay();
    document.getElementById('missionDesc').textContent =
      `入射角 = ${s.angle}°  →  反射角 = ${s.angle}°   入射角 = 反射角！`;

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

// ══════════════════════════════════════════
// 9. EXPLORE MISSION
// ══════════════════════════════════════════
function checkExploreInsight() {
  // After user drags around a bit, show the insight
  const angle = Math.round(getAngle() * 180 / Math.PI);
  document.getElementById('missionDesc').textContent =
    `拖拽激光笔改变入射角！入射角 = ${angle}°，反射角 = ${angle}° —— 它们总是相等的！`;
}

// ══════════════════════════════════════════
// 10. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkChallenge() {
  if (currentMission !== 2) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;

  const angle = getAngle();
  const angleDeg = Math.round(angle * 180 / Math.PI);
  let passed = false;

  if (ch.targetAngle !== undefined) {
    passed = Math.abs(angleDeg - ch.targetAngle) <= ch.tolerance;
  } else if (ch.targetX !== undefined) {
    const side = mouseX < CX ? -1 : 1;
    const rdx = -side * Math.sin(angle), rdy = -Math.cos(angle);
    const tx = CX + ch.targetX * W, ty = CY - ch.targetY * H;
    passed = distToRay(tx, ty, CX, CY, rdx, rdy) < TARGET_RADIUS + 8;
  }

  if (passed) {
    challengeIdx++;
    state.challengeIdx = challengeIdx;
    saveState();

    if (challengeIdx >= CHALLENGES.length) {
      playComplete();
      markMissionDone(2);
      updateChallengeHud();
      document.getElementById('missionDesc').innerHTML = '🎉 所有关卡挑战成功！你掌握了光的反射定律！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      showToast('🏆', '全部通关！', '恭喜完成反射闯关！');
    } else {
      playHit();
      showToast('⭐', '闯关成功！', CHALLENGES[challengeIdx] ? `下一关：${CHALLENGES[challengeIdx].goal}` : '');
      updateChallengeHud();
      // Reset laser position for next challenge
      mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
      drawScene(false);
      updateAngleDisplay();
      document.getElementById('missionDesc').textContent = CHALLENGES[challengeIdx].goal;
    }
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      document.getElementById('chLevel').textContent = `第 ${challengeIdx + 1}/${CHALLENGES.length} 关`;
      document.getElementById('chGoal').textContent = CHALLENGES[challengeIdx].goal;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(i => i !== 2);
  saveState();
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  updateChallengeHud();
  mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
  drawScene(false);
  updateAngleDisplay();
  updateTabs();
  updateDots();
}

// 11. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([...QUIZ_POOL]).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '光的反射已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML = `<span style="color:#007AFF;font-weight:400;">${quizIdx + 1}/${quizQuestions.length}</span> ${q.q}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerQuiz(i);
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${q.explain}`;
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + q.ans)}。${q.explain}`;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

// ══════════════════════════════════════════
// 12. MISSION NAVIGATION
// ══════════════════════════════════════════
const KNOWLEDGE = {

         '我们称 <em>入射光线</em>（射向镜面的光）和 <em>反射光线</em>（被镜面反射出去的光）。\n' +
         '过入射点 <em>垂直于镜面的直线</em> 叫做法线。'
  },
  1: {
    title: '💡 反射定律',
    body: '🎯 核心规律：<em>反射角等于入射角</em>（<span class="kb-formula">∠r = ∠i</span>）\n\n' +
         '入射角是入射光线与法线的夹角，反射角是反射光线与法线的夹角。\n\n' +
         '无论你怎么改变入射角，反射角 <em>始终相等</em>！这就是光的反射定律的核心。'
  },
  2: {
    title: '💡 反射定律的应用',
    body: '利用反射定律，我们可以 <em>精确控制光的传播方向</em>。\n\n' +
         '几个特殊角度：\n' +
         '• <em>垂直入射</em>（0°）→ 光沿原路返回\n' +
         '• <em>45°入射</em> → 反射光转90°\n' +
         '• <em>60°入射</em> → 反射光转120°\n\n' +
         '调整激光笔的入射角，让反射光精确命中目标吧！'
  },
  3: {
    title: '💡 检测你的掌握',
    body: '通过几道选择题来检验你是否真正理解了光的反射定律。\n\n' +
         '记得关键点：<em>反射角等于入射角</em>，且反射光线、入射光线和法线在同一平面内。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  // Clean up
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  const canvasWrap = document.getElementById('canvasWrap');

  // Reset UI
  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const angleDisplay = document.getElementById('angleDisplay');
  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      angleDisplay.style.display = 'none';
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      if (observePhase === 2) {
        descEl.textContent = '✅ 已观看过演示。再次播放或点击其他任务继续。';
        // Add replay button
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.textContent = m.desc;
        // Add play button
        descEl.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
      }
      // Set laser to default position
      mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
      drawScene(false);
      break;

    case 1: // Explore
      angleDisplay.style.display = 'flex';
      setKnowledge(1);
      descEl.textContent = '随意拖拽 🟠 激光笔，观察反射角的变化。发现什么规律了吗？提示：入射角始终 = 反射角！';
      updateAngleDisplay();
      drawScene(false);
      // Auto-mark as done after 5 seconds of exploration
      setTimeout(() => {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.textContent = '✅ ✅ 探索完成！你发现了反射定律：反射角 = 入射角！';
        }
      }, 8000);
      break;

    case 2: // Challenge
      angleDisplay.style.display = 'flex';
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        descEl.textContent = CHALLENGES[challengeIdx].goal;
      }
      updateChallengeHud();
      updateAngleDisplay();
      drawScene(false);
      break;

    case 3: // Quiz
      angleDisplay.style.display = 'none';
      setKnowledge(3);
      drawScene(false);
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
      break;
  }
}

// ══════════════════════════════════════════
// 13. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = `${m.label}<span class="tab-check">${state.done.includes(i) ? '✅' : ''}</span>`;
    el.onclick = () => switchMission(i);
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = `${state.done.length}/${MISSIONS.length}`;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 14. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
</script>
