<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">

    <div class="progress-dots">
      进度 <span id="progressText">0/4</span>
      <span id="dotsContainer"></span>
    </div>
  </div>

  <!-- Main Area -->

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="simCanvas" width="760" height="240"></canvas>
      <div class="challenge-hud" id="challengeHud">

      </div>
      <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">&#10004;&#65039;</div>

        <div class="toast-sub" id="toastSub">真棒！继续下一关</div>
      </div>
      <div class="quiz-overlay" id="quizOverlay">

    showQuiz();        <div class="quiz-q" id="quizQ">题目加载中...</div>

        <div class="quiz-result" id="quizResult"></div>

    </div>

    <div class="info-panel">

        <div class="angle-item">折射角 <span class="value refracted" id="refrAngle">0&#176;</span></div>

const TARGET_RADIUS = 14;

// ══════════════════════════════════════════
// 4. SOUND
// ══════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

function playComplete() {

// ══════════════════════════════════════════
// 5. PHYSICS — Snell's Law
// ══════════════════════════════════════════
function getIncidentAngle() {
  const dx = mouseX - CX, dy = mouseY - CY;
  return Math.atan2(Math.abs(dx), Math.abs(dy));
}

function getRefractionAngle(incAngle) {
  var sinR;
  if (refractionMode === 'air_to_water') {
    sinR = Math.sin(incAngle) * N_AIR / N_WATER;
  } else {
    sinR = Math.sin(incAngle) * N_WATER / N_AIR;
  }
  if (sinR > 1) return null; // total internal reflection
  return Math.asin(sinR);
}

function getLaserPoint() {
  const dx = mouseX - CX, dy = mouseY - CY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 10) {
    return refractionMode === 'air_to_water'
      ? { x: CX, y: CY - LASER_RADIUS }
      : { x: CX, y: CY + LASER_RADIUS };
  }
  const r = Math.min(dist, LASER_RADIUS + 30);
  return { x: CX + dx / dist * r, y: CY + dy / dist * r };
}

function clampLaser() {
  const p = getLaserPoint();
  if (refractionMode === 'air_to_water') {
    if (p.y > CY - 15) p.y = CY - 15;
  } else {
    if (p.y < CY + 15) p.y = CY + 15;
  }
  mouseX = p.x; mouseY = p.y;
}

function getRefractedEnd(incAngle, refrAngle) {
  const side = mouseX < CX ? -1 : 1;
  var dx, dy;
  if (refractionMode === 'air_to_water') {
    dx = side * Math.sin(refrAngle);
    dy = Math.cos(refrAngle); // downward into water
  } else {
    dx = side * Math.sin(refrAngle);
    dy = -Math.cos(refrAngle); // upward into air
  }

  var t = Infinity;
  if (dx > 0) t = Math.min(t, (W - CX) / dx);
  if (dx < 0) t = Math.min(t, -CX / dx);
  if (dy > 0) t = Math.min(t, (H - CY) / dy);
  if (dy < 0) t = Math.min(t, -CY / dy);
  return { x: CX + dx * t, y: CY + dy * t };
}

function distToRay(px, py, ox, oy, dx, dy) {
  const ex = px - ox, ey = py - oy;
  const dot = ex * dx + ey * dy;
  if (dot < 0) return Infinity;
  return Math.abs(ex * dy - ey * dx) / Math.hypot(dx, dy);
}

// ══════════════════════════════════════════
// 6. DRAWING
// ══════════════════════════════════════════
function drawScene(highlight) {
  ctx.clearRect(0, 0, W, H);

  const incAngle = getIncidentAngle();
  const refrAngle = getRefractionAngle(incAngle);
  const side = mouseX < CX ? -1 : 1;
  const incAngleDeg = incAngle * 180 / Math.PI;

  // === Background: Air (top) ===
  var airGrad = ctx.createLinearGradient(0, 0, 0, CY);
  airGrad.addColorStop(0, '#E8F4FD');
  airGrad.addColorStop(1, '#F0F8FF');
  ctx.fillStyle = airGrad;
  ctx.fillRect(0, 0, W, CY);

  // === Background: Water (bottom) ===
  var waterGrad = ctx.createLinearGradient(0, CY, 0, H);
  waterGrad.addColorStop(0, 'rgba(0, 122, 255, 0.08)');
  waterGrad.addColorStop(1, 'rgba(0, 122, 255, 0.20)');
  ctx.fillStyle = waterGrad;
  ctx.fillRect(0, CY, W, H - CY);

  // Air / Water labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('空气', 10, 18);
  ctx.fillText('水', 10, CY + 20);

  // === Water surface ===
  ctx.save();
  ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, CY);
  for (var x = 0; x <= W; x += 8) {
    ctx.lineTo(x, CY + Math.sin(x * 0.06) * 2.5);
  }
  ctx.stroke();

  // Surface glow
  ctx.strokeStyle = 'rgba(0, 122, 255, 0.15)'; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, CY + 4);
  for (x = 0; x <= W; x += 8) {
    ctx.lineTo(x, CY + 4 + Math.sin(x * 0.06) * 2.5);
  }
  ctx.stroke();
  ctx.restore();

  // === Normal line (dashed, vertical through CX) ===
  ctx.save();
  ctx.setLineDash([4, 6]); ctx.strokeStyle = '#c7c7cc'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(CX, 10); ctx.lineTo(CX, H - 10); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('法线', CX, H - 2);

  // Laser source position
  const laser = { x: mouseX, y: mouseY };

  // === Incident ray (orange, from laser to water surface) ===
  ctx.save();
  ctx.shadowColor = 'rgba(255, 149, 0, 0.5)'; ctx.shadowBlur = 12;
  ctx.strokeStyle = '#FF9500'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(laser.x, laser.y); ctx.lineTo(CX, CY); ctx.stroke();
  ctx.restore();

  // === Refracted ray (blue) ===
  if (refrAngle !== null) {
    const refEnd = getRefractedEnd(incAngle, refrAngle);
    ctx.save();
    ctx.shadowColor = 'rgba(0, 122, 255, 0.5)'; ctx.shadowBlur = 12;
    ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(CX, CY); ctx.lineTo(refEnd.x, refEnd.y); ctx.stroke();
    ctx.restore();
  } else {
    // Total internal reflection indicator
    ctx.fillStyle = '#FF3B30'; ctx.font = 'bold 14px -apple-system, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('⚡ 全反射！', CX + (side > 0 ? 60 : -60), CY + (refractionMode === 'water_to_air' ? -30 : 30));
  }

  // === Laser source (draggable orange dot) ===
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.15)'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#FF9500'; ctx.beginPath(); ctx.arc(laser.x, laser.y, 10, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(laser.x, laser.y, 5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.fillStyle = '#FF9500'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('激光笔', laser.x, laser.y + 24);

  // === Angle arcs ===

  // Incident angle arc (in the incident medium)
  ctx.strokeStyle = '#FF9500'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  if (refractionMode === 'air_to_water') {
    // Incident in air (above)
    if (side > 0) {
      ctx.arc(CX, CY, 36, -Math.PI/2, -Math.PI/2 + incAngle);
    } else {
      ctx.arc(CX, CY, 36, -Math.PI/2 - incAngle, -Math.PI/2, true);
    }
  } else {
    // Incident in water (below)
    if (side > 0) {
      ctx.arc(CX, CY, 36, Math.PI/2 - incAngle, Math.PI/2);
    } else {
      ctx.arc(CX, CY, 36, Math.PI/2, Math.PI/2 + incAngle);
    }
  }
  ctx.stroke();

  // Incident angle label
  if (currentMission >= 1) {
    ctx.fillStyle = '#FF9500'; ctx.font = '12px -apple-system, sans-serif';
    var incLabelX, incLabelY;
    if (refractionMode === 'air_to_water') {
      incLabelX = CX + (side > 0 ? 1 : -1) * 46;
      incLabelY = CY - 36;
    } else {
      incLabelX = CX + (side > 0 ? 1 : -1) * 46;
      incLabelY = CY + 40;
    }
    ctx.textAlign = side > 0 ? 'left' : 'right';
    ctx.fillText(Math.round(incAngleDeg) + '°', incLabelX, incLabelY + 4);
  }

  // Refraction angle arc (in the refracting medium)
  if (refrAngle !== null) {
    ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    if (refractionMode === 'air_to_water') {
      // Refraction in water (below)
      if (side > 0) {
        ctx.arc(CX, CY, 30, Math.PI/2 - refrAngle, Math.PI/2);
      } else {
        ctx.arc(CX, CY, 30, Math.PI/2, Math.PI/2 + refrAngle);
      }
    } else {
      // Refraction in air (above)
      if (side > 0) {
        ctx.arc(CX, CY, 30, -Math.PI/2, -Math.PI/2 + refrAngle);
      } else {
        ctx.arc(CX, CY, 30, -Math.PI/2 - refrAngle, -Math.PI/2, true);
      }
    }
    ctx.stroke();

    // Refraction angle label
    if (currentMission >= 1) {
      ctx.fillStyle = '#007AFF'; ctx.font = '12px -apple-system, sans-serif';
      var refLabelX, refLabelY;
      if (refractionMode === 'air_to_water') {
        refLabelX = CX + (side > 0 ? 1 : -1) * 40;
        refLabelY = CY + 34;
      } else {
        refLabelX = CX + (side > 0 ? 1 : -1) * 40;
        refLabelY = CY - 36;
      }
      ctx.textAlign = side > 0 ? 'left' : 'right';
      ctx.fillText(Math.round(refrAngle * 180 / Math.PI) + '°', refLabelX, refLabelY + 4);
    }
  }

  // === Target (for challenges) ===
  if (currentMission === 2 && challengeIdx < CHALLENGES.length) {
    const ch = CHALLENGES[challengeIdx];
    if (ch.targetX !== undefined && ch.targetY !== undefined) {
      const tx = CX + ch.targetX * W, ty = CY - ch.targetY * H;
      ctx.save();
      ctx.shadowColor = 'rgba(255,59,48,0.4)'; ctx.shadowBlur = 10;
      ctx.fillStyle = '#FF3B30'; ctx.beginPath(); ctx.arc(tx, ty, TARGET_RADIUS, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(tx, ty, 6, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#FF3B30'; ctx.font = 'bold 11px -apple-system, sans-serif'; ctx.textAlign = 'center';
      var emoji = challengeIdx === 0 ? '🐟' : '🎯';
      ctx.fillText(emoji, tx, ty - 22);

      // Check hit: distance from target to refracted ray
      if (refrAngle !== null) {
        var side2 = mouseX < CX ? -1 : 1;
        var rdx, rdy;
        if (refractionMode === 'air_to_water') {
          rdx = side2 * Math.sin(refrAngle); rdy = Math.cos(refrAngle);
        } else {
          rdx = side2 * Math.sin(refrAngle); rdy = -Math.cos(refrAngle);
        }
        var hitDist = distToRay(tx, ty, CX, CY, rdx, rdy);
        if (hitDist < TARGET_RADIUS + 8) {
          ctx.fillStyle = '#34C759'; ctx.font = 'bold 16px -apple-system, sans-serif';
          ctx.fillText('✅ 命中！', tx, ty + 40);
        }
      }
    }
  }

  // Highlight for observe mode
  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.06)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ══════════════════════════════════════════
// 7. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0) return;
  isDragging = true;
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (isDragging && currentMission > 0 && currentMission < 3) {
    mouseX = pos.x; mouseY = pos.y;
    clampLaser();
    drawScene(false);
    updateAngleDisplay();

    if (currentMission === 2) checkChallenge();
  } else if (currentMission >= 0) {
    if (currentMission > 0) {
      mouseX = pos.x; mouseY = pos.y;
      clampLaser();
      drawScene(false);
      updateAngleDisplay();
      if (currentMission === 2) checkChallenge();
    }
  }
}

function onPointerUp(e) {
  isDragging = false;
  if (currentMission === 2) checkChallenge();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

// ══════════════════════════════════════════
// 8. UI UPDATES
// ══════════════════════════════════════════
function updateAngleDisplay() {
  const incAngle = Math.round(getIncidentAngle() * 180 / Math.PI);
  const refrAngle = getRefractionAngle(getIncidentAngle());
  document.getElementById('incAngle').textContent = incAngle + '°';
  if (refrAngle !== null) {
    document.getElementById('refrAngle').textContent = Math.round(refrAngle * 180 / Math.PI) + '°';
  } else {
    document.getElementById('refrAngle').textContent = '—';
  }

  // Update comparison sign
  const comp = document.getElementById('comparisonSign');
  if (refractionMode === 'air_to_water') {
    comp.textContent = '∠r < ∠i';
    comp.style.color = '#34C759';
  } else {
    comp.textContent = '∠r > ∠i';
    comp.style.color = '#FF9500';
  }
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

// 9. TOGGLE REFRACTION MODE
// ══════════════════════════════════════════
function toggleMode() {
  refractionMode = refractionMode === 'air_to_water' ? 'water_to_air' : 'air_to_water';

  var toggleEl = document.getElementById('modeToggle');
  if (refractionMode === 'air_to_water') {
    toggleEl.textContent = '空气 → 水';
    toggleEl.className = 'mode-toggle';
  } else {
    toggleEl.textContent = '水 → 空气';
    toggleEl.className = 'mode-toggle water';
  }

  // Move laser to appropriate side
  if (refractionMode === 'air_to_water') {
    mouseX = Math.min(Math.max(mouseX, 30), W - 30);
    mouseY = Math.min(mouseY, CY - 30);
  } else {
    mouseX = Math.min(Math.max(mouseX, 30), W - 30);
    mouseY = Math.max(mouseY, CY + 30);
  }
  if (mouseY < 30) mouseY = CY + LASER_RADIUS;
  if (mouseY > H - 30) mouseY = CY - LASER_RADIUS;
  clampLaser();

  drawScene(false);
  updateAngleDisplay();

  playTone(440, 0.08, 'sine', 0.12);

  if (currentMission === 2) {
    updateChallengeHud();
    const ch = CHALLENGES[challengeIdx];
    if (ch && ch.mode !== 'any' && refractionMode !== ch.mode) {
      document.getElementById('missionDesc').textContent = '⚠️ 当前模式与关卡不匹配，请切换模式！';
    } else if (ch) {
      document.getElementById('missionDesc').textContent = ch.goal;
    }
  }
}

var observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;

  // Ensure we're in air_to_water mode for the demo
  if (refractionMode !== 'air_to_water') toggleMode();

  const steps = [
    { angle: 10, delay: 400 },
    { angle: 25, delay: 300 },
    { angle: 40, delay: 300 },
    { angle: 55, delay: 400 },
    { angle: 35, delay: 300 },
    { angle: 15, delay: 300 },
    { angle: 45, delay: 500, pause: true }
  ];

  var stepIdx = 0;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      document.getElementById('missionDesc').innerHTML = '✅ 演示完成！你可以点击"✋ 探索"继续学习。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '现在试试拖拽激光笔吧！');

      var finalAngle = 45 * Math.PI / 180;
      mouseX = CX - LASER_RADIUS * Math.sin(finalAngle);
      mouseY = CY - LASER_RADIUS * Math.cos(finalAngle);
      drawScene(false);
      updateAngleDisplay();
      return;
    }

    var s = steps[stepIdx];
    var rad = s.angle * Math.PI / 180;
    mouseX = CX - LASER_RADIUS * Math.sin(rad);
    mouseY = CY - LASER_RADIUS * Math.cos(rad);

    // Compute refraction angle for display
    var incAngle = getIncidentAngle();
    var refrAngle = getRefractionAngle(incAngle);
    var refrDeg = refrAngle !== null ? Math.round(refrAngle * 180 / Math.PI) : '?';

    drawScene(true);
    updateAngleDisplay();

    if (refrAngle !== null) {
      document.getElementById('missionDesc').textContent =
        '入射角 = ' + s.angle + '°  →  折射角 = ' + refrDeg + '°    折射角 < 入射角！';
    }

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

// ══════════════════════════════════════════
// 11. EXPLORE MISSION
// ══════════════════════════════════════════
function checkExploreInsight() {
  const incAngle = Math.round(getIncidentAngle() * 180 / Math.PI);
  const refrAngle = getRefractionAngle(getIncidentAngle());
  var refrDeg = refrAngle !== null ? Math.round(refrAngle * 180 / Math.PI) : '?';
  document.getElementById('missionDesc').textContent =
    '拖拽激光笔改变入射角！入射角 = ' + incAngle + '°，折射角 = ' + refrDeg + '°';
}

// ══════════════════════════════════════════
// 12. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkChallenge() {
  if (currentMission !== 2) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;
  if (ch.mode !== 'any' && refractionMode !== ch.mode) return;

  const incAngle = getIncidentAngle();
  const incAngleDeg = Math.round(incAngle * 180 / Math.PI);
  const refrAngle = getRefractionAngle(incAngle);
  var passed = false;

  if (ch.targetAngle !== undefined) {
    passed = Math.abs(incAngleDeg - ch.targetAngle) <= ch.tolerance;
  } else if (ch.targetRefractionAngle !== undefined) {
    if (refrAngle !== null) {
      var refrDeg = Math.round(refrAngle * 180 / Math.PI);
      passed = Math.abs(refrDeg - ch.targetRefractionAngle) <= ch.tolerance;
    }
  } else if (ch.targetX !== undefined) {
    if (refrAngle !== null) {
      var side = mouseX < CX ? -1 : 1;
      var rdx, rdy;
      if (refractionMode === 'air_to_water') {
        rdx = side * Math.sin(refrAngle); rdy = Math.cos(refrAngle);
      } else {
        rdx = side * Math.sin(refrAngle); rdy = -Math.cos(refrAngle);
      }
      const tx = CX + ch.targetX * W, ty = CY - ch.targetY * H;
      passed = distToRay(tx, ty, CX, CY, rdx, rdy) < TARGET_RADIUS + 8;
    }
  }

  if (passed) {
    challengeIdx++;
    state.challengeIdx = challengeIdx;
    saveState();

    if (challengeIdx >= CHALLENGES.length) {
      playComplete();
      markMissionDone(2);
      updateChallengeHud();
      document.getElementById('missionDesc').innerHTML = '🎉 所有关卡挑战成功！你掌握了光的折射规律！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      showToast('🏆', '全部通关！', '恭喜完成折射闯关！');
    } else {
      playHit();
      var nextGoal = CHALLENGES[challengeIdx] ? CHALLENGES[challengeIdx].goal : '';
      showToast('⭐', '闯关成功！', '下一关：' + nextGoal);
      updateChallengeHud();

      // Reset laser for next challenge
      if (refractionMode === 'air_to_water') {
        mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
      } else {
        mouseX = CX + 80; mouseY = CY + LASER_RADIUS;
      }
      drawScene(false);
      updateAngleDisplay();
      document.getElementById('missionDesc').textContent = CHALLENGES[challengeIdx].goal;
    }
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      const ch = CHALLENGES[challengeIdx];
      document.getElementById('chLevel').textContent = '第 ' + (challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
      var goalText = ch.goal;
      if (ch.mode !== 'any' && refractionMode !== ch.mode) {
        goalText = '⚠️ ' + ch.goal + ' （请切换模式）';
      }
      document.getElementById('chGoal').textContent = goalText;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(function(i) { return i !== 2; });
  saveState();
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  if (refractionMode !== 'air_to_water') toggleMode();
  updateChallengeHud();
  mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
  drawScene(false);
  updateAngleDisplay();
  updateTabs();
  updateDots();
}

// ══════════════════════════════════════════
// 13. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([].concat(QUIZ_POOL)).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '光的折射已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML = '<span style="color:#007AFF;font-weight:400;">' + (quizIdx + 1) + '/' + quizQuestions.length + '</span> ' + q.q;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach(function(opt, i) {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = String.fromCharCode(65 + i) + ') ' + opt;
    el.onclick = function() { answerQuiz(i); };
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach(function(el, i) {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = '<span style="color:#34C759;">✅ 正确！</span> ' + q.explain;
  } else {
    resultDiv.innerHTML = '<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ' + String.fromCharCode(65 + q.ans) + '。' + q.explain;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

// ══════════════════════════════════════════
// 14. MISSION NAVIGATION
// ══════════════════════════════════════════
const KNOWLEDGE = {
  0: {
    title: '💡 认识光的折射',
    body: '光从一种介质斜射入另一种介质时，<em>传播方向发生偏折</em>，这种现象叫做光的折射。\n\n' +
         '我们称 <em>入射光线</em>（射向界面的光）和 <em>折射光线</em>（进入另一种介质的光）。\n' +
         '过入射点 <em>垂直于界面的直线</em> 叫做法线。\n\n' +
         '<em>注意</em>：折射与反射不同，折射角不等于入射角！'
  },
  1: {
    title: '💡 折射规律',
    body: '🎯 核心规律：<em>折射角不等于入射角</em>\n\n' +
         '• 光从空气射入水中时，折射角 <em>小于</em> 入射角（偏向法线）\n' +
         '• 光从水中射入空气中时，折射角 <em>大于</em> 入射角（偏离法线）\n' +
         '• 入射角增大时，折射角也增大\n' +
         '• 垂直入射时，传播方向不变\n\n' +
         '记住口诀：<em>三线共面、两线分居、空气中角大</em>！'
  },
  2: {
    title: '💡 折射规律的应用',
    body: '利用折射规律，我们可以 <em>解释生活中的奇妙现象</em>。\n\n' +
         '• 筷子在水面“折断”——光从水到空气折射，看起来像是折断了\n' +
         '• 池水看起来比实际浅——折射让水底“抬升”\n' +
         '• 鱼的位置比看到的高——折射使光线偏移\n\n' +
         '调整激光笔的入射角，让折射光命中目标，掌握折射规律！'
  },
  3: {
    title: '💡 检测你的掌握',
    body: '通过几道选择题来检验你是否真正理解了光的折射规律。\n\n' +
         '记得关键点：<em>三线共面、两线分居、空气中角大</em>。还有“空气中角大”是最简单的判断方法！'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  // Clean up
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  const canvasWrap = document.getElementById('canvasWrap');

  // Reset UI
  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const angleDisplay = document.getElementById('angleDisplay');
  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      angleDisplay.style.display = 'none';
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      if (observePhase === 2) {
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
      }
      // Ensure air_to_water mode for observe
      if (refractionMode !== 'air_to_water') toggleMode();
      mouseX = CX - 80; mouseY = CY - LASER_RADIUS;
      drawScene(false);
      break;

    case 1: // Explore
      angleDisplay.style.display = 'flex';
      setKnowledge(1);
      descEl.textContent = '随意拖拽 🟠 激光笔，观察入射角和折射角的变化。发现什么规律了吗？';
      updateAngleDisplay();
      drawScene(false);
      // Auto-mark as done after 8 seconds of exploration
      setTimeout(function() {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.textContent = '✅ ✅ 探索完成！你发现了折射规律：空气→水时折射角 < 入射角！';
        }
      }, 8000);
      break;

    case 2: // Challenge
      angleDisplay.style.display = 'flex';
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        const ch = CHALLENGES[challengeIdx];
        descEl.textContent = ch.goal;
        // Ensure correct mode for challenge (air_to_water default)
        if (ch.mode !== 'any' && refractionMode !== ch.mode) {
          descEl.textContent = '⚠️ 请点击顶部工具栏的模式切换按钮切换模式！当前关卡需要：' + (ch.mode === 'water_to_air' ? '水→空气' : '空气→水');
        }
      }
      updateChallengeHud();
      updateAngleDisplay();
      drawScene(false);
      break;

    case 3: // Quiz
      angleDisplay.style.display = 'none';
      setKnowledge(3);
      drawScene(false);
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
  }
}

// ══════════════════════════════════════════
// 15. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach(function(m, i) {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = m.label + '<span class="tab-check">' + (state.done.includes(i) ? '✅' : '') + '</span>';
    el.onclick = function() { switchMission(i); };
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = state.done.length + '/' + MISSIONS.length;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach(function(m, i) {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 16. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
</script>
