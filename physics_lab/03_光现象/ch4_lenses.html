<div class="app">

const STORAGE_KEY = 'physics_optics_ch4';

}

// 3. CANVAS SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2; // 380, 120

const RAY_SPACING = 30;
const LENS_HEIGHT = 75;
const LENS_BULGE = 13;
const RAY_COLORS = ['#FF9500', '#FFD60A', '#FF9500'];
const FOCUS_MIN = 25;
const FOCUS_MAX = 240;

let lensType = 'convex';
let focalLength = 80;
let isDraggingFocus = false;
let mouseOverCanvas = false;

let currentMission = state.currentMission;
let challengeIdx = state.challengeIdx;
let quizIdx = state.quizIdx;
let quizAnswered = false;
let animeId = null;
let observePhase = 0;

// ══════════════════════════════════════════
// 4. SOUND
// ══════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

function playComplete() {
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.25), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.3), 360);
}

// ══════════════════════════════════════════
// 5. DRAWING
// ══════════════════════════════════════════
function drawScene(highlight) {
  ctx.clearRect(0, 0, W, H);

  // Grid dots (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI*2); ctx.fill();
  }

  // Main optical axis (horizontal dashed)
  ctx.save();
  ctx.setLineDash([4, 6]); ctx.strokeStyle = '#c7c7cc'; ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.moveTo(20, CY); ctx.lineTo(W-20, CY); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'left'; ctx.fillText('主光轴', W-65, CY-6);

  // Draw rays (before lens: horizontal; after lens: refracted)
  drawRays();

  // Draw lens
  drawLens();

  // Draw optical center O
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.beginPath(); ctx.arc(CX, CY, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('O', CX, CY + 16);

  // Draw focus and focal length
  drawFocus();

  // Draw challenge targets
  if (currentMission === 2) drawChallengeTargets();

  // Highlight for observe mode
  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.05)';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawLens() {
  ctx.save();
  ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2.8;
  ctx.shadowColor = 'rgba(0,122,255,0.12)'; ctx.shadowBlur = 6;

  if (lensType === 'convex') {
    // Convex: two arcs bulging outward
    ctx.beginPath();
    ctx.moveTo(CX, CY - LENS_HEIGHT);
    ctx.quadraticCurveTo(CX - LENS_BULGE, CY, CX, CY + LENS_HEIGHT);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(CX, CY - LENS_HEIGHT);
    ctx.quadraticCurveTo(CX + LENS_BULGE, CY, CX, CY + LENS_HEIGHT);
    ctx.stroke();
  } else {
    // Concave: two arcs bulging inward
    ctx.beginPath();
    ctx.moveTo(CX, CY - LENS_HEIGHT);
    ctx.quadraticCurveTo(CX + LENS_BULGE, CY, CX, CY + LENS_HEIGHT);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(CX, CY - LENS_HEIGHT);
    ctx.quadraticCurveTo(CX - LENS_BULGE, CY, CX, CY + LENS_HEIGHT);
    ctx.stroke();
  }

  ctx.restore();

  ctx.fillStyle = '#007AFF'; ctx.font = '11px -apple-system, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(lensType === 'convex' ? '凸透镜' : '凹透镜', CX, CY + LENS_HEIGHT + 18);
}

function drawRays() {
  const heights = [-RAY_SPACING, 0, RAY_SPACING];

  for (let i = 0; i < heights.length; i++) {
    const h = heights[i];
    const yAtLens = CY + h;
    const color = RAY_COLORS[i];

    // Ray before lens (horizontal from left to lens)
    ctx.save();
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.65;
    ctx.beginPath();
    ctx.moveTo(10, yAtLens);
    ctx.lineTo(CX, yAtLens);
    ctx.stroke();
    ctx.restore();

    if (Math.abs(h) < 1) {
      // Middle ray: goes straight through optical center
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(CX, yAtLens);
      ctx.lineTo(W - 10, yAtLens);
      ctx.stroke();
      ctx.restore();
    } else if (lensType === 'convex') {
      // Convex: ray bends toward focus (CX+f, CY)
      // Slope = -h/f (from lens point toward focus)
      const slope = -h / focalLength;
      const endX = W - 10;
      const endY = yAtLens + slope * (endX - CX);
      const clipEndY = Math.max(8, Math.min(H - 8, endY));

      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(CX, yAtLens);
      ctx.lineTo(endX, clipEndY);
      ctx.stroke();
      ctx.restore();
    } else {
      // Concave: ray diverges, appears from virtual focus (CX-f, CY)
      // Slope = h/f (away from axis)
      const slope = h / focalLength;
      const endX = W - 10;
      const endY = yAtLens + slope * (endX - CX);
      const clipEndY = Math.max(8, Math.min(H - 8, endY));

      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.moveTo(CX, yAtLens);
      ctx.lineTo(endX, clipEndY);
      ctx.stroke();
      ctx.restore();

      // Dashed extension backward to virtual focus
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = 0.3;
      ctx.setLineDash([3, 5]);
      ctx.beginPath();
      ctx.moveTo(CX, yAtLens);
      ctx.lineTo(CX - focalLength, CY);
      ctx.stroke();
      ctx.restore();
    }
  }
}

function drawFocus() {
  const fPos = lensType === 'convex' ? CX + focalLength : CX - focalLength;
  const isVirtual = lensType === 'concave';

  // Focal length bracket (from CX to focus)
  ctx.save();
  ctx.strokeStyle = '#c7c7cc'; ctx.lineWidth = 1;
  const bracketY = CY + 6;
  const fEnd = lensType === 'convex' ? CX + focalLength : CX - focalLength;
  ctx.beginPath();
  ctx.moveTo(CX, bracketY);
  ctx.lineTo(fEnd, bracketY);
  ctx.stroke();
  // Small ticks
  ctx.beginPath();
  ctx.moveTo(CX, bracketY - 3); ctx.lineTo(CX, bracketY + 3);
  ctx.moveTo(fEnd, bracketY - 3); ctx.lineTo(fEnd, bracketY + 3);
  ctx.stroke();
  ctx.restore();

  // Focal length label
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  const labelX = (CX + fEnd) / 2;
  ctx.fillText(`f = ${Math.round(focalLength)}px`, labelX, bracketY + 16);

  // Focus point
  ctx.save();
  if (isVirtual) {
    ctx.strokeStyle = '#007AFF'; ctx.lineWidth = 2.5;
    ctx.shadowColor = 'rgba(0,122,255,0.2)'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(fPos, CY, 7, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = '#007AFF'; ctx.beginPath(); ctx.arc(fPos, CY, 3, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle = '#007AFF';
    ctx.shadowColor = 'rgba(0,122,255,0.3)'; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(fPos, CY, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(fPos, CY, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();

  // F label (above)
  ctx.fillStyle = '#007AFF';
  ctx.font = 'bold 13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('F', fPos, CY - 12);

  // Virtual focus label for concave
  if (isVirtual) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('(虚焦点)', fPos, CY + 32);
  }
}

function drawChallengeTargets() {
  if (challengeIdx >= CHALLENGES.length) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch.showTarget) return;

  let tx;
  if (ch.requireType === 'concave') {
    tx = CX - ch.targetF;
  } else {
    tx = CX + ch.targetF;
  }

  // Draw target marker
  ctx.save();
  ctx.fillStyle = '#FF3B30';
  ctx.shadowColor = 'rgba(255,59,48,0.3)'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(tx, CY, 6, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#FF3B30';
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('▼ 目标位置', tx, CY + 38);
}

// ══════════════════════════════════════════
// 6. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0 || currentMission === 3) return;
  const pos = getCanvasPos(e);

  // Check if near focus point (mainly horizontal detection)
  const fPos = lensType === 'convex' ? CX + focalLength : CX - focalLength;
  if (Math.abs(pos.x - fPos) < 18 && Math.abs(pos.y - CY) < 25) {
    isDraggingFocus = true;
    e.preventDefault();
  }
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  mouseOverCanvas = true;

  if (isDraggingFocus && (currentMission === 1 || currentMission === 2)) {
    // Update focal length from drag position
    let newF = Math.abs(pos.x - CX);
    newF = Math.max(FOCUS_MIN, Math.min(FOCUS_MAX, newF));
    focalLength = newF;
    drawScene(false);
    updateFocalDisplay();

    if (currentMission === 2) checkChallenge();
  }
}

function onPointerUp(e) {
  if (isDraggingFocus) {
    isDraggingFocus = false;
    if (currentMission === 2) checkChallenge();
  }
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

// ══════════════════════════════════════════
// 7. UI UPDATES
// ══════════════════════════════════════════
function updateFocalDisplay() {
  document.getElementById('focalValue').textContent = Math.round(focalLength);
}

function toggleLensType() {
  lensType = lensType === 'convex' ? 'concave' : 'convex';
  document.getElementById('lensToggle').textContent =
    lensType === 'convex' ? '切换到凹透镜' : '切换到凸透镜';
  drawScene(false);
  updateFocalDisplay();
  if (currentMission === 2) checkChallenge();
}

function showLensControls(show) {
  document.getElementById('lensControls').style.display = show ? 'flex' : 'none';
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

// 8. OBSERVE MISSION
// ══════════════════════════════════════════
let observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;

  const steps = [
    { f: 100, type: 'convex', delay: 1600, label: '凸透镜：平行光线会聚到焦点 F' },
    { f: 60, type: 'convex', delay: 1300, label: '焦距越短，会聚能力越强（偏折更剧烈）' },
    { f: 160, type: 'convex', delay: 1300, label: '焦距越长，会聚点离透镜越远' },
    { f: 80, type: 'concave', delay: 1600, label: '凹透镜：平行光线发散，反向延长线过虚焦点' },
    { f: 50, type: 'concave', delay: 1300, label: '焦距越短，发散越明显' },
    { f: 150, type: 'concave', delay: 1300, label: '焦距越长，发散越平缓' },
  ];

  let stepIdx = 0;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      const desc = document.getElementById('missionDesc');
      desc.innerHTML = '✅ 演示完成！凸透镜会聚光线，凹透镜发散光线。<br><br> <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '试试"探索"任务拖拽焦点吧！');

      // Reset to default
      lensType = 'convex';
      focalLength = 80;
      document.getElementById('lensToggle').textContent = '切换到凹透镜';
      drawScene(false);
      updateFocalDisplay();
      return;
    }

    const s = steps[stepIdx];
    lensType = s.type;
    focalLength = s.f;
    document.getElementById('lensToggle').textContent =
      lensType === 'convex' ? '切换到凹透镜' : '切换到凸透镜';
    drawScene(true);
    updateFocalDisplay();
    document.getElementById('missionDesc').textContent = s.label;

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

// ══════════════════════════════════════════

// ══════════════════════════════════════════
// 10. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkChallenge() {
  if (currentMission !== 2) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;

  let passed = true;

  // Check required lens type
  if (ch.requireType && lensType !== ch.requireType) {
    passed = false;
  }

  // Check focal length tolerance
  if (Math.abs(focalLength - ch.targetF) > ch.tolerance) {
    passed = false;
  }

  if (passed) {
    challengeIdx++;
    state.challengeIdx = challengeIdx;
    saveState();

    if (challengeIdx >= CHALLENGES.length) {
      playComplete();
      markMissionDone(2);
      updateChallengeHud();
      const desc = document.getElementById('missionDesc');
      desc.innerHTML = '🎉 所有关卡挑战成功！你掌握了透镜的焦距调节！<br><br> <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      showToast('🏆', '全部通关！', '恭喜完成透镜闯关！');
    } else {
      playHit();
      const nextGoal = CHALLENGES[challengeIdx] ? CHALLENGES[challengeIdx].goal : '';
      showToast('⭐', '闯关成功！', nextGoal);
      updateChallengeHud();

      drawScene(false);
      updateFocalDisplay();
      const nextCh = CHALLENGES[challengeIdx];
      document.getElementById('missionDesc').textContent = nextCh ? nextCh.goal : '';
    }
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      document.getElementById('chLevel').textContent = `第 ${challengeIdx + 1}/${CHALLENGES.length} 关`;
      document.getElementById('chGoal').textContent = CHALLENGES[challengeIdx].goal;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(i => i !== 2);
  saveState();
  lensType = 'convex';
  focalLength = 80;
  document.getElementById('lensToggle').textContent = '切换到凹透镜';
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  updateChallengeHud();
  drawScene(false);
  updateFocalDisplay();
  updateTabs();
  updateDots();
}

// ══════════════════════════════════════════
// 11. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([...QUIZ_POOL]).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '透镜知识已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML = `<span style="color:#007AFF;font-weight:400;">${quizIdx + 1}/${quizQuestions.length}</span> ${q.q}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerQuiz(i);
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${q.explain}`;
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + q.ans)}。${q.explain}`;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body;
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      showLensControls(false);
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      lensType = 'convex';
      focalLength = 80;
      document.getElementById('lensToggle').textContent = '切换到凹透镜';
      if (observePhase === 2) {
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
      }
      drawScene(false);
      break;

    case 1: // Explore
      showLensControls(true);
      setKnowledge(1);
      lensType = 'convex';
      focalLength = 80;
      document.getElementById('lensToggle').textContent = '切换到凹透镜';
      descEl.textContent = '拖拽 🟠 F 点改变焦距，或者点击按钮切换透镜类型，观察光线变化！';
      drawScene(false);
      updateFocalDisplay();
      // Auto-mark as done after exploration
      setTimeout(() => {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.innerHTML = '✅ 探索完成！你了解了焦距对光线偏折的影响！<br><br>试试 "🎯 挑战" 任务吧！';
          showToast('✅', '探索完成', '了解了焦距的作用！');
        }
      }, 10000);
      break;

    case 2: // Challenge
      showLensControls(true);
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      focalLength = 80;
      lensType = 'convex';
      document.getElementById('lensToggle').textContent = '切换到凹透镜';
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        descEl.textContent = CHALLENGES[challengeIdx].goal;
      }
      updateChallengeHud();
      drawScene(false);
      updateFocalDisplay();
      break;

    case 3: // Quiz
      showLensControls(false);
      setKnowledge(3);
      drawScene(false);
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
  }
}

// ══════════════════════════════════════════
// 13. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = `${m.label}<span class="tab-check">${state.done.includes(i) ? '✅' : ''}</span>`;
    el.onclick = () => switchMission(i);
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = `${state.done.length}/${MISSIONS.length}`;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 14. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
</script>
