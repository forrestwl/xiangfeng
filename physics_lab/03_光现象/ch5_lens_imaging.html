<body>
<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="back" onclick="location.href='index.html'">←</span>

    <div class="progress-dots">
      进度 <span id="progressText">0/4</span>
      <span id="dotsContainer"></span>
    </div>
  </div>

  <!-- Main Area -->

    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="simCanvas" width="760" height="240"></canvas>
      <div class="challenge-hud" id="challengeHud">
        <div class="ch-level" id="chLevel">第 1 关</div>
        <div class="ch-goal" id="chGoal">把物体放在 2f 外</div>
        <button class="ch-restart" onclick="resetChallenges()">↺ 重新挑战</button>
        <button class="quiz-close" id="quizClose" onclick="closeQuiz()" style="margin-top:10px;padding:6px 16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-size:12px;">✕ 关闭</button>
      </div>
      <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✅</div>
        <div class="toast-text" id="toastText">任务完成！</div>
        <div class="toast-sub" id="toastSub">真棒！继续下一关</div>
      </div>
      <div class="quiz-overlay" id="quizOverlay">

    showQuiz();        <div class="quiz-q" id="quizQ">题目加载中...</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult"></div>
        <button class="quiz-next" id="quizNext" style="display:none" onclick="quizNext()">下一题 →</button>
      </div>
    </div>

    <div class="info-panel">
      <div class="mission-label" id="missionLabel">🔬 观察</div>
      <div class="mission-title" id="missionTitle">凸透镜成像演示</div>
      <div class="mission-desc" id="missionDesc">观看物体从远到近移动时成像如何变化</div>
      <div class="lens-display" id="lensDisplay" style="display:none">
        <div class="lens-item">物距 u <span class="l-value orange" id="uValue">--</span></div>
        <div class="lens-item">像距 v <span class="l-value blue" id="vValue">--</span></div>
        <div class="lens-item">放大率 <span class="l-value purple" id="magValue">--</span></div>
        <div class="lens-item">像的<span class="l-nature" id="imageNature">性质</span></div>
      </div>
      <div class="knowledge-box collapsed" id="knowledgeBox" onclick="toggleKnowledge()">
        <div class="kb-title"><span class="kb-toggle" id="kbToggle">▶</span> 💡 <span id="kbTitle">知识要点</span></div>

<script>
// ══════════════════════════════════════════
// 1. DATA
// ══════════════════════════════════════════
const MISSIONS = [
  {
    id: 'observe', label: '🔬 观察', title: '凸透镜成像演示',
    desc: '观看物体从远到近移动时，凸透镜所成的像如何变化。点击"播放"按钮观看演示。',
    doneLabel: '已观看'
  },
  {
    id: 'explore', label: '✋ 探索', title: '拖动物体',
    desc: '用手指或鼠标拖拽红色物体，改变物距 u，观察像的变化规律。',
    doneLabel: '已探索'
  },
  {
    id: 'challenge', label: '🎯 挑战', title: '成像闯关',
    desc: '根据提示调整物距，完成不同的成像挑战！',
    doneLabel: '已闯关'
  },
  {
    id: 'quiz', label: '⭐ 测验', title: '知识检测',
    desc: '完成几道选择题，巩固凸透镜成像规律。',
    doneLabel: '已完成'
  }
];

const CHALLENGES = [
  { goal: '把物体放在 2f 外，让像成在屏幕位置（照相机原理）', check: u => u > 162 },
  { goal: '让像变成倒立放大的实像（投影仪原理）', check: u => u > 82 && u < 158 },

// 3. CANVAS SETUP
// ══════════════════════════════════════════
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const CX = W / 2, CY = H / 2;
const F = 80; // focal length in pixels
const OBJ_H = 40; // object height in pixels
const MIN_U = 12;
const MAX_U = 360;
const LENS_HALF = 55;

let objX = CX - 200; // object x position (u = CX - objX)
let isDragging = false;
let currentMission = state.currentMission;
let challengeIdx = state.challengeIdx;
let quizIdx = state.quizIdx;

// ══════════════════════════════════════════
// 4. SOUND
// ══════════════════════════════════════════
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

function playComplete() {
  playTone(523, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(659, 0.15, 'sine', 0.25), 120);
  setTimeout(() => playTone(784, 0.15, 'sine', 0.25), 240);
  setTimeout(() => playTone(1047, 0.3, 'sine', 0.3), 360);
}

// ══════════════════════════════════════════
// 5. PHYSICS
// ══════════════════════════════════════════
function getU() {
  return Math.max(MIN_U, Math.min(MAX_U, CX - objX));
}

function calcImage() {
  const u = getU();
  const du = u - F;
  if (Math.abs(du) < 0.5) return null; // u = f, no image
  const v = (u * F) / du;
  const m = -v / u; // magnification (negative = inverted)
  const real = v > 0;
  const imgH = Math.abs(m) * OBJ_H;
  const imgX = real ? CX + v : CX + v; // v is negative for virtual
  return { u, v, m, real, imgH, imgX };
}

// ══════════════════════════════════════════
// 5. DRAWING
// ══════════════════════════════════════════
function drawScene(highlight) {
  ctx.clearRect(0, 0, W, H);
  const img = calcImage();
  const u = getU();

  // Grid dots (subtle)
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI*2); ctx.fill();
  }

  // ═════ Principal axis ═════
  ctx.save();
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = '#c7c7cc';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(20, CY); ctx.lineTo(W - 20, CY);
  ctx.stroke();
  ctx.restore();

  // ═════ Focal point markers ═════
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';

  function drawMarker(px, label, color) {
    ctx.fillStyle = color || '#86868b';
    ctx.beginPath(); ctx.arc(px, CY, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillText(label, px, CY + 18);
  }

  drawMarker(CX - 2*F, '2F', '#c7c7cc');
  drawMarker(CX - F, 'F', '#c7c7cc');
  drawMarker(CX + F, "F'", '#c7c7cc');
  drawMarker(CX + 2*F, "2F'", '#c7c7cc');

  // Lens center mark
  ctx.fillStyle = '#c7c7cc';
  ctx.beginPath(); ctx.arc(CX, CY, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.fillText('O', CX, CY + 16);

  // ═════ Convex Lens ═════
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = 4;
  ctx.fillStyle = 'rgba(0, 122, 255, 0.06)';
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 2;

  // Draw biconvex lens shape
  ctx.beginPath();
  ctx.moveTo(CX, CY - LENS_HALF);
  ctx.quadraticCurveTo(CX - 16, CY, CX, CY + LENS_HALF);
  ctx.quadraticCurveTo(CX + 16, CY, CX, CY - LENS_HALF);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Double-line detail inside lens
  ctx.strokeStyle = 'rgba(0, 122, 255, 0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(CX, CY - LENS_HALF + 6);
  ctx.quadraticCurveTo(CX - 10, CY, CX, CY + LENS_HALF - 6);
  ctx.quadraticCurveTo(CX + 10, CY, CX, CY - LENS_HALF + 6);
  ctx.closePath();
  ctx.stroke();
  ctx.restore();

  // Lens label
  ctx.fillStyle = '#007AFF';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('凸透镜', CX, CY - LENS_HALF - 10);

  // ═════ Object (Red Arrow) ═════
  const objTipY = CY - OBJ_H;
  ctx.save();
  ctx.shadowColor = 'rgba(255, 59, 48, 0.3)';
  ctx.shadowBlur = 8;
  ctx.strokeStyle = '#FF3B30';
  ctx.fillStyle = '#FF3B30';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Arrow shaft
  ctx.beginPath();
  ctx.moveTo(objX, CY);
  ctx.lineTo(objX, objTipY);
  ctx.stroke();

  // Arrowhead
  ctx.beginPath();
  ctx.moveTo(objX, objTipY);
  ctx.lineTo(objX - 7, objTipY + 12);
  ctx.lineTo(objX + 7, objTipY + 12);
  ctx.closePath();
  ctx.fill();

  // Draggable handle circle
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#FF3B30';
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.arc(objX, CY, 7, 0, Math.PI*2); ctx.fill();
  ctx.stroke();
  ctx.restore();

  // Object label
  ctx.fillStyle = '#FF3B30';
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('物体', objX, objTipY - 10);

  // ═════ Image (Blue Arrow) ═════
  if (img !== null) {
    const imgTipY = img.real ? CY + Math.min(img.imgH, 100) : CY - Math.min(img.imgH, 100);
    const drawImgX = Math.max(15, Math.min(W - 15, img.imgX));
    const isVirtual = !img.real;

    ctx.save();
    if (isVirtual) {
      ctx.setLineDash([6, 4]);
    }
    ctx.shadowColor = isVirtual ? 'rgba(175, 82, 222, 0.25)' : 'rgba(0, 122, 255, 0.3)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = isVirtual ? '#AF52DE' : '#007AFF';
    ctx.fillStyle = isVirtual ? '#AF52DE' : '#007AFF';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';

    // Arrow shaft
    ctx.beginPath();
    ctx.moveTo(drawImgX, CY);
    ctx.lineTo(drawImgX, imgTipY);
    ctx.stroke();

    // Arrowhead
    const tipDir = img.real ? 1 : -1;
    ctx.beginPath();
    ctx.moveTo(drawImgX, imgTipY);
    ctx.lineTo(drawImgX - 7, imgTipY - tipDir * 12);
    ctx.lineTo(drawImgX + 7, imgTipY - tipDir * 12);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Image label
    ctx.fillStyle = isVirtual ? '#AF52DE' : '#007AFF';
    ctx.font = 'bold 11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    const labelY = img.rely ? imgTipY + 16 : (img.imgH > 20 ? imgTipY - 10 : imgTipY + 16);
    if (img.real) {
      ctx.fillText('实像', drawImgX, imgTipY + 16);
    } else {
      ctx.fillText('虚像', drawImgX, imgTipY - 10);
    }
  } else {
    // u = f: show "不成像" text
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('不成像（平行光）', CX + 100, CY - 10);
  }

  // ═════ u / v annotations on axis ═════
  // u bracket
  if (u > 20) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 149, 0, 0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(CX, CY + 22);
    ctx.lineTo(objX, CY + 22);
    ctx.stroke();
    // tick marks
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(CX, CY + 18); ctx.lineTo(CX, CY + 26);
    ctx.moveTo(objX, CY + 18); ctx.lineTo(objX, CY + 26);
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#FF9500';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('u', (objX + CX) / 2, CY + 34);
  }

  // v bracket (for real images only)
  if (img !== null && img.real && img.imgX > CX && img.imgX < W - 15) {
    ctx.save();
    ctx.strokeStyle = 'rgba(0, 122, 255, 0.5)';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 4]);
    ctx.beginPath();
    ctx.moveTo(CX, CY + 22);
    ctx.lineTo(Math.min(img.imgX, W - 20), CY + 22);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(CX, CY + 18); ctx.lineTo(CX, CY + 26);
    ctx.moveTo(Math.min(img.imgX, W - 20), CY + 18); ctx.lineTo(Math.min(img.imgX, W - 20), CY + 26);
    ctx.stroke();
    ctx.restore();
    ctx.fillStyle = '#007AFF';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('v', (CX + Math.min(img.imgX, W - 20)) / 2, CY + 34);
  }

  // Show imaging summary on canvas top-left
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(8, 6, 210, 26);
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  let summary = '';
  if (img === null) {
    summary = 'u = f：不成像';
  } else {
    const size = Math.abs(img.m) > 1.02 ? '放大' : (Math.abs(img.m) < 0.98 ? '缩小' : '等大');
    const orientation = img.real ? '倒立' : '正立';
    const kind = img.real ? '实像' : '虚像';
    summary = `u = ${Math.round(u)}px  →  ${orientation}${size}${kind}`;
  }
  ctx.fillText(summary, 14, 23);

  // Highlight overlay
  if (highlight) {
    ctx.fillStyle = 'rgba(0,122,255,0.04)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ══════════════════════════════════════════
// 6. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0) return;
  isDragging = true;
}

function onPointerMove(e) {
  e.preventDefault();
  const pos = getCanvasPos(e);
  if (isDragging && currentMission > 0 && currentMission < 3) {
    // Drag the object horizontally
    objX = Math.max(15, Math.min(CX - MIN_U, pos.x));
    drawScene(false);
    updateDataDisplay();
    if (currentMission === 2) checkChallenge();
  } else if (currentMission > 0) {
    // Hover updates on first visit to explore
    objX = Math.max(15, Math.min(CX - MIN_U, pos.x));
    drawScene(false);
    updateDataDisplay();
    if (currentMission === 2) checkChallenge();
  }
}

function onPointerUp(e) {
  isDragging = false;
  if (currentMission === 2) checkChallenge();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

// ══════════════════════════════════════════
// 7. UI UPDATES
// ══════════════════════════════════════════
function updateDataDisplay() {
  const img = calcImage();
  const u = getU();

  const uEl = document.getElementById('uValue');
  const vEl = document.getElementById('vValue');
  const magEl = document.getElementById('magValue');
  const natEl = document.getElementById('imageNature');

  uEl.textContent = `${Math.round(u)}px (${(u/F).toFixed(1)}f)`;

  if (img === null) {
    vEl.textContent = '∞ 不成像';
    vEl.className = 'l-value blue';
    magEl.textContent = '--';
    natEl.textContent = '不成像（平行光）';
    natEl.className = 'l-nature none';
    return;
  }

  if (img.real) {
    vEl.textContent = `${Math.round(Math.abs(img.v))}px (${(Math.abs(img.v)/F).toFixed(1)}f)`;
    vEl.className = 'l-value blue';
  } else {
    vEl.textContent = `${Math.round(Math.abs(img.v))}px（同侧）`;
    vEl.className = 'l-value blue';
  }

  magEl.textContent = `×${Math.abs(img.m).toFixed(2)}`;

  const size = Math.abs(img.m) > 1.02 ? '放大' : (Math.abs(img.m) < 0.98 ? '缩小' : '等大');
  const orientation = img.real ? '倒立' : '正立';
  const kind = img.real ? '实像' : '虚像';

  natEl.textContent = `${orientation}${size}${kind}`;
  if (img.real) {
    natEl.className = 'l-nature';
  } else {
    natEl.className = 'l-nature virtual';
  }
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

// 8. OBSERVE MISSION
// ══════════════════════════════════════════
let observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;

  const steps = [
    { u: 240, delay: 1500, label: 'u > 2f：倒立·缩小·实像  应用：照相机' },
    { u: 160, delay: 1500, label: 'u = 2f：倒立·等大·实像' },
    { u: 110, delay: 1500, label: 'f < u < 2f：倒立·放大·实像  应用：投影仪' },
    { u: 80,  delay: 1500, label: 'u = f：不成像（平行光）' },
    { u: 50,  delay: 1500, label: 'u < f：正立·放大·虚像  应用：放大镜' }
  ];
  const totalDelay = steps.reduce((s, st) => s + st.delay, 0);

  let stepIdx = 0;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      document.getElementById('missionDesc').innerHTML =
        '✅ 演示完成！你观察了凸透镜成像的五种情况。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '现在试试拖动物体吧！');
      // Reset to starting position
      objX = CX - 160;
      drawScene(false);
      updateDataDisplay();
      return;
    }

    const s = steps[stepIdx];
    objX = CX - s.u;

    // Animate smooth transition
    const animSteps = 8;
    const startX = objX;
    const targetX = CX - s.u;
    objX = targetX;

    drawScene(true);
    const img = calcImage();
    updateDataDisplay();
    let natureText = s.label;

    document.getElementById('missionDesc').textContent = natureText;

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

function checkExploreInsight() {

  if (img === null) {
    document.getElementById('missionDesc').textContent =
      '当前 u = f，不成像！拖动物体改变物距观察变化。';

    const orientation = img.real ? '倒立' : '正立';
    const kind = img.real ? '实像' : '虚像';
    document.getElementById('missionDesc').textContent =
      `物距 u = ${Math.round(img.u)}px，成${orientation}${size}${kind}。拖动物体观察像的变化规律！`;
  }
}

// ══════════════════════════════════════════
// 10. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkChallenge() {
  if (currentMission !== 2) return;
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;

  const u = getU();
  const img = calcImage();
  let passed = false;

  try {
    passed = ch.check(u);
  } catch(e) {}

  if (passed) {
    challengeIdx++;
    state.challengeIdx = challengeIdx;
    saveState();

    if (challengeIdx >= CHALLENGES.length) {
      playComplete();
      markMissionDone(2);
      updateChallengeHud();
      document.getElementById('missionDesc').innerHTML =
        '🎉 所有关卡挑战成功！你掌握了凸透镜成像规律！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      showToast('🏆', '全部通关！', '恭喜完成成像闯关！');
    } else {
      playHit();
      showToast('⭐', '闯关成功！', CHALLENGES[challengeIdx] ? `下一关：${CHALLENGES[challengeIdx].goal}` : '');
      updateChallengeHud();
      // Reset to mid position for next challenge
      objX = CX - 165;
      drawScene(false);
      updateDataDisplay();
      document.getElementById('missionDesc').textContent = CHALLENGES[challengeIdx].goal;
    }
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      document.getElementById('chLevel').textContent = `第 ${challengeIdx + 1}/${CHALLENGES.length} 关`;
      document.getElementById('chGoal').textContent = CHALLENGES[challengeIdx].goal;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(i => i !== 2);
  saveState();
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  updateChallengeHud();
  objX = CX - 200;
  drawScene(false);
  updateDataDisplay();
  updateTabs();
  updateDots();
}

// ══════════════════════════════════════════
// 11. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([...QUIZ_POOL]).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML =
      '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '凸透镜成像已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML =
    `<span style="color:#007AFF;font-weight:400;">${quizIdx + 1}/${quizQuestions.length}</span> ${q.q}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerQuiz(i);
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${q.explain}`;
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + q.ans)}。${q.explain}`;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  // Clean up
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  const canvasWrap = document.getElementById('canvasWrap');

  // Reset UI
  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const lensDisplay = document.getElementById('lensDisplay');
  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      lensDisplay.style.display = 'none';
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      if (observePhase === 2) {
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
      }
      objX = CX - 160;
      drawScene(false);
      break;

    case 1: // Explore
      lensDisplay.style.display = 'flex';
      setKnowledge(1);
      descEl.textContent = '随意拖拽 🔴 物体左右移动，观察像的虚实、大小、正倒变化。';
      updateDataDisplay();
      drawScene(false);
      // Auto-mark as done after 8 seconds of exploration
      setTimeout(() => {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.textContent = '✅ 探索完成！你发现了凸透镜成像规律！';
        }
      }, 8000);
      break;

    case 2: // Challenge
      lensDisplay.style.display = 'flex';
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        descEl.textContent = CHALLENGES[challengeIdx].goal;
      }
      updateChallengeHud();
      updateDataDisplay();
      drawScene(false);
      break;

    case 3: // Quiz
      lensDisplay.style.display = 'none';
      setKnowledge(3);
      drawScene(false);
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
  }
}

// ══════════════════════════════════════════
// 13. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = `${m.label}<span class="tab-check">${state.done.includes(i) ? '✅' : ''}</span>`;
    el.onclick = () => switchMission(i);
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = `${state.done.length}/${MISSIONS.length}`;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 14. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
</script>
