<body>
<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <span class="back" onclick="location.href='index.html'">←</span>
    <h1>光的色散</h1>
    <div class="progress-dots">
      进度 <span id="progressText">0/4</span>
      <span id="dotsContainer"></span>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="simCanvas" width="760" height="240"></canvas>
      <div class="challenge-hud" id="challengeHud">
        <div class="ch-level" id="chLevel">第 1 关</div>
        <div class="ch-goal" id="chGoal">让彩色光谱投射到屏幕上</div>
        <button class="ch-restart" onclick="resetChallenges()">↺ 重新挑战</button>
        <button class="quiz-close" id="quizClose" onclick="closeQuiz()" style="margin-top:10px;padding:6px 16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-size:12px;">✕ 关闭</button>
      </div>
      <div class="toast" id="toast">
        <div class="toast-icon" id="toastIcon">✅</div>
        <div class="toast-text" id="toastText">任务完成！</div>
        <div class="toast-sub" id="toastSub">真棒！继续下一关</div>
      </div>
      <div class="quiz-overlay" id="quizOverlay">

    showQuiz();        <div class="quiz-q" id="quizQ">题目加载中...</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult"></div>
        <button class="quiz-next" id="quizNext" style="display:none" onclick="quizNext()">下一题 →</button>
      </div>
    </div>

    <div class="info-panel">
      <div class="mission-label" id="missionLabel">🔬 观察</div>
      <div class="mission-title" id="missionTitle">光的色散演示</div>
      <div class="mission-desc" id="missionDesc">观看白光如何通过三棱镜分解为彩色光谱</div>
      <div class="angle-display" id="angleDisplay" style="display:none">
        <div class="angle-item">入射偏角 <span class="value incident" id="incAngle">0°</span></div>
        <div class="angle-item">光谱位置 <span class="value reflected" id="specPos">居中</span></div>
        <div class="angle-item"><span class="value equal" id="equalSign">拖拽光源</span></div>
      </div>

];

// 4. SOUND

let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, duration, type, volume) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume || 0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch (e) { /* silent fail */ }
}

function playHit() {
  playTone(880, 0.15, 'sine', 0.25);
  setTimeout(() => playTone(1320, 0.2, 'sine', 0.2), 80);
}

// ══════════════════════════════════════════
// 5. PHYSICS
// ══════════════════════════════════════════
function getIncidentAngle() {
  const dx = PRISM_ENTRY.x - SOURCE_X;
  const dy = PRISM_ENTRY.y - sourceY;
  return Math.atan2(dy, dx);
}

function clampSource() {
  if (sourceY < 20) sourceY = 20;
  if (sourceY > 220) sourceY = 220;
}

function getSpectrumRays() {
  const incidentAngle = getIncidentAngle();
  const incidentDeg = incidentAngle * 180 / Math.PI;

  // Empirical: center exit angle varies with source position
  const t = (sourceY - 20) / 200; // 0 to 1
  const centerAngle = 0.30 - t * 0.55;

  // Dispersion spread: ~12 degrees total (0.21 rad)
  const spread = 0.21;
  const rays = [];
  for (let i = 0; i < 7; i++) {
    const frac = i / 6; // 0=red, 1=violet
    // Red bends least (most upward), violet bends most (most downward)
    const angle = centerAngle - spread / 2 + frac * spread;
    rays.push({
      color: SPECTRUM_COLORS[i],
      name: SPECTRUM_NAMES[i],
      angle: angle,
      index: i
    });
  }
  return { rays, incidentAngle, incidentDeg, centerAngle };
}

function getScreenHit(ray) {
  // Project ray from exit point to screen at x=700
  const dx = 700 - PRISM_EXIT.x;
  const dy = dx * Math.tan(ray.angle);
  return { x: 700, y: PRISM_EXIT.y + dy };
}

function allRaysOnScreen(rays) {
  let count = 0;
  for (const r of rays) {
    const hit = getScreenHit(r);
    if (hit.y >= 15 && hit.y <= 225) count++;
  }
  return count === 7;
}

function spectrumSpreadOnScreen(rays) {
  const hits = rays.map(r => getScreenHit(r));
  const ys = hits.map(h => h.y);
  return Math.max(...ys) - Math.min(...ys);
}

// ══════════════════════════════════════════
// 6. DRAWING
// ══════════════════════════════════════════
function isInExplore() {
  return currentMission === 1;
}
function isInChallenge() {
  return currentMission === 2;
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);

  if (canvasMode === 0) {
    drawDispersionScene();
  } else if (canvasMode === 1) {
    drawObjectColorScene();
  } else if (canvasMode === 2) {
    drawRGBScene();
  }
}

function drawDispersionScene() {
  const { rays, incidentAngle, incidentDeg } = getSpectrumRays();

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI * 2); ctx.fill();
  }

  // Screen (vertical line on right)
  ctx.save();
  ctx.strokeStyle = '#d2d2d7';
  ctx.lineWidth = 3;
  ctx.setLineDash([4, 6]);
  ctx.beginPath(); ctx.moveTo(700, 10); ctx.lineTo(700, 230); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('屏幕', 700, 244);

  // Draw spectrum hits on screen
  for (const ray of rays) {
    const hit = getScreenHit(ray);
    if (hit.y >= 0 && hit.y <= 240) {
      ctx.fillStyle = ray.color;
      ctx.beginPath(); ctx.arc(hit.x, hit.y, 4, 0, Math.PI * 2); ctx.fill();
      // Small label
      ctx.font = '9px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(ray.name, hit.x, hit.y + (hit.y > CY ? -10 : 14));
    }
  }

  // Prism (glass triangle)
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.06)';
  ctx.shadowBlur = 8;
  ctx.fillStyle = 'rgba(230, 240, 255, 0.25)';
  ctx.strokeStyle = '#b8b8be';
  ctx.lineWidth = 1.8;
  ctx.beginPath();
  ctx.moveTo(PRISM.leftTop.x, PRISM.leftTop.y);
  ctx.lineTo(PRISM.leftBot.x, PRISM.leftBot.y);
  ctx.lineTo(PRISM.apex.x, PRISM.apex.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  // Glass highlight
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PRISM.leftTop.x + 4, PRISM.leftTop.y + 8);
  ctx.lineTo(PRISM.apex.x - 8, PRISM.apex.y - 4);
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = '#8e8e93';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('三棱镜', PRISM_CENTER.x, PRISM_CENTER.y + 5);

  // White beam from source to prism entry
  const beamEnd = { x: PRISM_ENTRY.x, y: PRISM_ENTRY.y };
  ctx.save();
  ctx.shadowColor = 'rgba(255,255,200,0.5)';
  ctx.shadowBlur = 10;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(SOURCE_X, sourceY);
  ctx.lineTo(beamEnd.x, beamEnd.y);
  ctx.stroke();
  // Add a subtle white glow effect
  ctx.strokeStyle = 'rgba(255,255,200,0.3)';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(SOURCE_X, sourceY);
  ctx.lineTo(beamEnd.x, beamEnd.y);
  ctx.stroke();
  ctx.restore();

  // Inside prism: briefly show dispersion (fading white to colors)
  // Draw small colored fan inside prism
  const entryPoint = { x: PRISM_ENTRY.x + 2, y: PRISM_ENTRY.y };
  for (const ray of rays) {
    const insideAngle = ray.angle * 0.35; // Simplified inside path
    const endX = PRISM_EXIT.x;
    const endY = PRISM_EXIT.y;
    ctx.save();
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = ray.color;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(entryPoint.x, entryPoint.y);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
  }

  // Spectrum rays (7 colored rays exiting prism to right)
  for (const ray of rays) {
    const startX = PRISM_EXIT.x;
    const startY = PRISM_EXIT.y;
    // Extend to right edge or screen
    let endX = W;
    let endY = startY + (endX - startX) * Math.tan(ray.angle);
    // If ray hits screen first, stop there
    const screenHit = getScreenHit(ray);
    if (screenHit.x > startX && screenHit.x < W) {
      endX = screenHit.x;
      endY = screenHit.y;
    }

    ctx.save();
    ctx.shadowColor = ray.color;
    ctx.shadowBlur = 6;
    ctx.strokeStyle = ray.color;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.85;
    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
  }

  // Light source
  ctx.save();
  // Outer glow
  const grad = ctx.createRadialGradient(SOURCE_X, sourceY, 2, SOURCE_X, sourceY, 18);
  grad.addColorStop(0, 'rgba(255,255,255,0.8)');
  grad.addColorStop(0.4, 'rgba(255,255,220,0.3)');
  grad.addColorStop(1, 'rgba(255,255,220,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(SOURCE_X, sourceY, 18, 0, Math.PI * 2); ctx.fill();

  // Source body
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(SOURCE_X, sourceY, 10, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ffd';
  ctx.beginPath(); ctx.arc(SOURCE_X, sourceY, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  ctx.fillStyle = '#8e8e93';
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('白光', SOURCE_X, sourceY + 24);

  // Angle arc
  if (isInExplore() || isInChallenge()) {
    const angle = Math.abs(incidentAngle);
    ctx.strokeStyle = '#FF9500';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    // Arc from horizontal up to incident angle
    const startA = 0;
    const endA = incidentAngle;
    ctx.arc(SOURCE_X + 20, sourceY, 20, 0, endA);
    ctx.stroke();
    ctx.fillStyle = '#FF9500';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${Math.round(incidentDeg)}°`, SOURCE_X + 36, sourceY + (incidentAngle > 0 ? -6 : 16));
  }
}

function drawObjectColorScene() {
  // Three objects: red apple, green leaf, blue vase (simplified as circles)
  const objects = [
    { x: 500, y: 80, color: '#FF3B30', label: '红旗', shape: 'rect' },
    { x: 500, y: 140, color: '#34C759', label: '绿叶', shape: 'circle' },
    { x: 500, y: 200, color: '#007AFF', label: '蓝球', shape: 'circle' }
  ];

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI * 2); ctx.fill();
  }

  // Light source
  const lightColors = { white: '#fff', red: '#FF3B30', green: '#34C759', blue: '#007AFF' };
  const lightColorCode = lightColors[lightColor] || '#fff';

  ctx.save();
  const grad = ctx.createRadialGradient(120, CY, 2, 120, CY, 25);
  grad.addColorStop(0, lightColorCode);
  grad.addColorStop(0.4, lightColorCode + '55');
  grad.addColorStop(1, lightColorCode + '00');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(120, CY, 25, 0, Math.PI * 2); ctx.fill();
  ctx.shadowColor = lightColorCode + '66';
  ctx.shadowBlur = 12;
  ctx.fillStyle = lightColorCode;
  ctx.beginPath(); ctx.arc(120, CY, 12, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(120, CY, 5, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  const lightLabel = { white: '白光', red: '红光', green: '绿光', blue: '蓝光' };
  ctx.fillStyle = '#8e8e93';
  ctx.font = 'bold 11px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(lightLabel[lightColor] || '白光', 120, CY + 24);

  // Light rays to objects
  for (const obj of objects) {
    ctx.save();
    ctx.strokeStyle = lightColorCode + '44';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(145, CY); ctx.lineTo(obj.x - 25, obj.y); ctx.stroke();
    ctx.restore();
  }

  // Draw objects
  for (const obj of objects) {
    const objColor = obj.color;
    // Determine visible color: object reflects its own color if light contains it
    let visibleColor;
    if (lightColor === 'white') {
      visibleColor = objColor;
    } else if (lightColor === 'red') {
      visibleColor = (objColor === '#FF3B30') ? '#FF3B30' : '#222';
    } else if (lightColor === 'green') {
      visibleColor = (objColor === '#34C759') ? '#34C759' : '#222';
    } else if (lightColor === 'blue') {
      visibleColor = (objColor === '#007AFF') ? '#007AFF' : '#222';
    }

    ctx.save();
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 6;
    ctx.fillStyle = visibleColor;

    if (obj.shape === 'rect') {
      // Draw a flag shape
      const x = obj.x - 16, y = obj.y - 20;
      ctx.fillRect(x, y, 32, 24);
      ctx.fillStyle = '#8e8e93';
      ctx.fillRect(x - 2, y, 3, 28);
    } else {
      ctx.beginPath(); ctx.arc(obj.x, obj.y, 18, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '10px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(obj.label, obj.x, obj.y + 34);
  }

  // Show visible/target labels
  // If light is white or matches the object, show "可见" otherwise show "不可见"
  let yPos = 20;
  ctx.font = '10px -apple-system, sans-serif';
  ctx.textAlign = 'right';
  for (const obj of objects) {
    let visible;
    if (lightColor === 'white') visible = true;
    else if (lightColor === 'red') visible = (obj.color === '#FF3B30');
    else if (lightColor === 'green') visible = (obj.color === '#34C759');
    else if (lightColor === 'blue') visible = (obj.color === '#007AFF');

    ctx.fillStyle = visible ? '#34C759' : '#FF3B30';
    ctx.fillText(visible ? '● 可见' : '● 不可见', 460, yPos + 5);
    yPos += 60;
  }

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px -apple-system, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('选择下方色光按钮，观察物体颜色变化', 10, 16);
}

function drawRGBScene() {
  // Background
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Grid dots
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  for (let x = 40; x < W; x += 40) {
    ctx.beginPath(); ctx.arc(x, 40, 1, 0, Math.PI * 2); ctx.fill();
  }

  const rVal = rgbR / 255;
  const gVal = rgbG / 255;
  const bVal = rgbB / 255;

  // Three overlapping circles with additive blending
  const rPos = { x: 290, y: 130 };
  const gPos = { x: 370, y: 130 };
  const bPos = { x: 330, y: 75 };

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Red circle
  ctx.globalAlpha = Math.max(0.15, rVal * 0.7);
  ctx.fillStyle = '#FF3B30';
  ctx.beginPath(); ctx.arc(rPos.x, rPos.y, 55, 0, Math.PI * 2); ctx.fill();

  // Green circle
  ctx.globalAlpha = Math.max(0.15, gVal * 0.7);
  ctx.fillStyle = '#34C759';
  ctx.beginPath(); ctx.arc(gPos.x, gPos.y, 55, 0, Math.PI * 2); ctx.fill();

  // Blue circle
  ctx.globalAlpha = Math.max(0.15, bVal * 0.7);
  ctx.fillStyle = '#007AFF';
  ctx.beginPath(); ctx.arc(bPos.x, bPos.y, 55, 0, Math.PI * 2); ctx.fill();

  ctx.restore();

  // Labels
  ctx.font = 'bold 12px -apple-system, sans-serif';
  ctx.textAlign = 'center';

  ctx.fillStyle = '#FF3B30';
  ctx.fillText('R', rPos.x, rPos.y + 4);
  ctx.fillStyle = '#34C759';
  ctx.fillText('G', gPos.x, gPos.y + 4);
  ctx.fillStyle = '#007AFF';
  ctx.fillText('B', bPos.x, bPos.y + 4);

  // Separator line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(440, 20);
  ctx.lineTo(440, 220);
  ctx.stroke();

  // Result preview
  const mixR = Math.round(rVal * 255);
  const mixG = Math.round(gVal * 255);
  const mixB = Math.round(bVal * 255);
  const mixHex = `rgb(${mixR},${mixG},${mixB})`;

  ctx.fillStyle = '#ffffff';
  ctx.font = '13px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('混合结果', 570, 45);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.1)';
  ctx.shadowBlur = 6;
  ctx.fillStyle = mixHex;
  // Rounded rect for color swatch
  const sx = 510, sy = 58, sw = 120, sh = 70;
  const r4 = 10;
  ctx.beginPath();
  ctx.moveTo(sx + r4, sy);
  ctx.lineTo(sx + sw - r4, sy);
  ctx.quadraticCurveTo(sx + sw, sy, sx + sw, sy + r4);
  ctx.lineTo(sx + sw, sy + sh - r4);
  ctx.quadraticCurveTo(sx + sw, sy + sh, sx + sw - r4, sy + sh);
  ctx.lineTo(sx + r4, sy + sh);
  ctx.quadraticCurveTo(sx, sy + sh, sx, sy + sh - r4);
  ctx.lineTo(sx, sy + r4);
  ctx.quadraticCurveTo(sx, sy, sx + r4, sy);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // RGB values
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px "SF Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`R: ${mixR}  G: ${mixG}  B: ${mixB}`, 570, 148);

  if (rgbChallengeActive) {
    ctx.fillStyle = '#8e8e93';
    ctx.font = '11px -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('目标：用 RGB 三原色调出紫色', 570, 175);
    ctx.fillText('调整下方滑块匹配目标颜色', 570, 193);

    // Check match
    const rDiff = Math.abs(mixR - RGB_TARGET.r);
    const gDiff = Math.abs(mixG - RGB_TARGET.g);
    const bDiff = Math.abs(mixB - RGB_TARGET.b);
    const threshold = 28;
    const matched = rDiff <= threshold && gDiff <= threshold && bDiff <= threshold;
    ctx.fillStyle = matched ? '#34C759' : '#86868b';
    ctx.font = 'bold 13px -apple-system, sans-serif';
    ctx.fillText(matched ? '✅ 紫色匹配成功！' : `R${rDiff>threshold?'!':''} G${gDiff>threshold?'!':''} B${bDiff>threshold?'!':''}`, 570, 216);

    if (matched) {
      ctx.save();
      ctx.fillStyle = 'rgba(52,199,89,0.1)';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
  }
}

function setCanvasMode(mode) {

  document.querySelectorAll('.mode-btn').forEach(el => {

    rgbCtrls.classList.remove('show');

}

function setLightColor(color) {
  lightColor = color;
  document.querySelectorAll('.color-btn').forEach(el => {
    el.classList.toggle('active', el.dataset.color === color);
  });
  drawScene();
}

function updateRGBPreview() {
  rgbR = parseInt(document.getElementById('rgbR').value);
  rgbG = parseInt(document.getElementById('rgbG').value);
  rgbB = parseInt(document.getElementById('rgbB').value);
  document.getElementById('rgbValR').textContent = rgbR;
  document.getElementById('rgbValG').textContent = rgbG;
  document.getElementById('rgbValB').textContent = rgbB;
  document.getElementById('rgbSwatchMix').style.background = `rgb(${rgbR},${rgbG},${rgbB})`;

  if (rgbChallengeActive) {
    const rDiff = Math.abs(rgbR - RGB_TARGET.r);
    const gDiff = Math.abs(rgbG - RGB_TARGET.g);
    const bDiff = Math.abs(rgbB - RGB_TARGET.b);
    const threshold = 28;
    const matched = rDiff <= threshold && gDiff <= threshold && bDiff <= threshold;
    if (matched) {
      document.getElementById('rgbMatchStatus').textContent = '✅ 匹配！';
      document.getElementById('rgbMatchStatus').style.color = '#34C759';
      // Auto-advance challenge if applicable
      if (isInChallenge() && challengeIdx === 2) {
        setTimeout(() => {
          if (isInChallenge() && challengeIdx === 2) {
            playHit();
            advanceChallenge();
          }
        }, 400);
      }
    } else {
      document.getElementById('rgbMatchStatus').textContent = '调整中...';
      document.getElementById('rgbMatchStatus').style.color = '#86868b';
    }
  }

  drawScene();
}

let rgbChallengeCheckTimer = null;
function checkRGBChallengePass() {
  if (!rgbChallengeActive) return;
  if (rgbChallengeCheckTimer) return;
  rgbChallengeCheckTimer = setTimeout(() => {
    rgbChallengeCheckTimer = null;
    if (!isInChallenge()) return;
    const rDiff = Math.abs(rgbR - RGB_TARGET.r);
    const gDiff = Math.abs(rgbG - RGB_TARGET.g);
    const bDiff = Math.abs(rgbB - RGB_TARGET.b);
    const threshold = 28;
    if (rDiff <= threshold && gDiff <= threshold && bDiff <= threshold) {
      if (challengeIdx === 2 && currentMission === 2) {
        playHit();
        advanceChallenge();
      }
    }
  }, 500);
}

// ══════════════════════════════════════════
// 8. DRAG INTERACTION
// ══════════════════════════════════════════
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function onPointerDown(e) {
  if (currentMission === 0) return;
  if (canvasMode !== 0) return; // Only drag in dispersion mode
  isDragging = true;
}

function onPointerMove(e) {
  e.preventDefault();
  if (currentMission === 0) return; // Observe mode: no manual interaction
  const pos = getCanvasPos(e);
  if (canvasMode === 0 && (currentMission === 1 || currentMission === 2)) {
    sourceY = pos.y;
    clampSource();
    drawScene();
    updateAngleDisplay();

    if (currentMission === 2) checkAngleChallenge();
  }
}

function onPointerUp(e) {
  isDragging = false;
  if (canvasMode === 0 && currentMission === 2) checkAngleChallenge();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: true });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: true });

function updateAngleDisplay() {
  const angle = Math.round(getIncidentAngle() * 180 / Math.PI);
  document.getElementById('incAngle').textContent = Math.abs(angle) + '°';

  const { rays } = getSpectrumRays();
  const hits = rays.map(r => getScreenHit(r));
  const ys = hits.map(h => h.y);
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys);
  const centerY = (minY + maxY) / 2;

  let posText = '居中';
  if (centerY < 80) posText = '偏上';
  else if (centerY > 160) posText = '偏下';
  document.getElementById('specPos').textContent = posText;
}

function showToast(icon, text, sub) {
  const t = document.getElementById('toast');
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastText').textContent = text;
  document.getElementById('toastSub').textContent = sub || '';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function markMissionDone(idx) {
  if (!state.done.includes(idx)) {
    state.done.push(idx);
    saveState();
    updateTabs();
    updateDots();
  }
}

// 10. OBSERVE MISSION
// ══════════════════════════════════════════
let observeTimer = null;

function startObserve() {
  if (observePhase === 1) return;
  observePhase = 1;
  canvasMode = 0;

  const steps = [
    { sourceY: 40, delay: 500, label: '光源在上方 → 光谱偏下' },
    { sourceY: 70, delay: 400, label: '光源下移 → 光谱上移' },
    { sourceY: 110, delay: 450, label: '接近中心位置' },
    { sourceY: 130, delay: 400, label: '继续调整角度' },
    { sourceY: 160, delay: 450, label: '光谱继续上移' },
    { sourceY: 190, delay: 500, label: '光源在下方 → 光谱偏上' },
    { sourceY: 110, delay: 400, label: '回到最佳角度' },
    { sourceY: 95, delay: 600, label: '✅ 完整光谱投射到屏幕上！', pause: true }
  ];

  let stepIdx = 0;

  function step() {
    if (stepIdx >= steps.length) {
      observePhase = 2;
      markMissionDone(0);
      document.getElementById('missionDesc').innerHTML =
        '✅ 演示完成！你观察到白光通过三棱镜分解为七色光谱。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      showToast('✅', '观察完成', '现在试试"探索"模式吧！');
      sourceY = 95;
      drawScene();
      updateAngleDisplay();
      return;
    }

    const s = steps[stepIdx];
    sourceY = s.sourceY;
    drawScene();
    updateAngleDisplay();
    document.getElementById('missionDesc').textContent = s.label;

    stepIdx++;
    observeTimer = setTimeout(step, s.delay);
  }

  step();
}

// 12. CHALLENGE MISSION
// ══════════════════════════════════════════
function checkAngleChallenge() {
  if (currentMission !== 2) return;
  if (challengeIdx >= CHALLENGES.length) return;
  const ch = CHALLENGES[challengeIdx];
  if (ch.type !== 'angle') return;

  const { rays } = getSpectrumRays();
  if (ch.check(0, 0, rays)) {
    advanceChallenge();
  }
}

function advanceChallenge() {
  challengeIdx++;
  state.challengeIdx = challengeIdx;
  saveState();

  if (challengeIdx >= CHALLENGES.length) {
    playComplete();
    markMissionDone(2);
    updateChallengeHud();
    document.getElementById('missionDesc').innerHTML =
      '🎉 所有关卡挑战成功！你深入理解了光的色散原理！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    showToast('🏆', '全部通关！', '恭喜完成色散闯关！');
    // Hide RGB controls if visible
    document.getElementById('rgbControls').classList.remove('show');
    if (rgbChallengeActive) rgbChallengeActive = false;
  } else {
    playHit();
    showToast('⭐', '闯关成功！', CHALLENGES[challengeIdx] ? `下一关：${CHALLENGES[challengeIdx].goal}` : '');
    updateChallengeHud();
    document.getElementById('missionDesc').textContent = CHALLENGES[challengeIdx].goal;
    initChallengeMode();
  }
}

function initChallengeMode() {
  const ch = CHALLENGES[challengeIdx];
  if (!ch) return;

  canvasMode = 0;
  document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
  document.querySelector('.mode-btn[data-mode="0"]').classList.add('active');
  document.getElementById('colorButtons').style.display = 'none';
  document.getElementById('rgbControls').classList.remove('show');
  rgbChallengeActive = false;

  if (ch.type === 'angle') {
    // Reset source to reasonable position
    sourceY = 100;
    drawScene();
    updateAngleDisplay();
  } else if (ch.type === 'quiz') {
    // Show quiz overlay for this single question
    showChallengeQuiz(ch);
  } else if (ch.type === 'rgb') {
    // Switch to RGB mode
    canvasMode = 2;
    rgbChallengeActive = true;
    document.querySelector('.mode-btn[data-mode="2"]').classList.add('active');
    document.getElementById('rgbControls').classList.add('show');
    // Reset sliders
    rgbR = 0; rgbG = 0; rgbB = 0;
    document.getElementById('rgbR').value = 0;
    document.getElementById('rgbG').value = 0;
    document.getElementById('rgbB').value = 0;
    document.getElementById('rgbValR').textContent = '0';
    document.getElementById('rgbValG').textContent = '0';
    document.getElementById('rgbValB').textContent = '0';
    document.getElementById('rgbSwatchMix').style.background = '#000';
    document.getElementById('rgbSwatchTarget').style.background = `rgb(${RGB_TARGET.r},${RGB_TARGET.g},${RGB_TARGET.b})`;
    document.getElementById('rgbMatchStatus').textContent = '调整 RGB 滑块匹配紫色';
    document.getElementById('rgbMatchStatus').style.color = '#86868b';
    drawScene();
  }
}

function showChallengeQuiz(ch) {
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  quizAnswered = false;
  document.getElementById('quizQ').innerHTML = `<span style="color:#FF9500;font-weight:400;">挑战</span> ${ch.quizQ}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').textContent = '继续 →';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  ch.quizOpts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerChallengeQuiz(i, ch);
    container.appendChild(el);
  });
}

function answerChallengeQuiz(idx, ch) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    if (i === ch.quizAns) el.classList.add('correct');
    else if (i === idx && i !== ch.quizAns) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === ch.quizAns) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${ch.quizExplain}`;
    document.getElementById('quizNext').onclick = () => {
      document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
      advanceChallenge();
    };
    document.getElementById('quizNext').style.display = 'inline-block';
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + ch.quizAns)}。${ch.quizExplain}`;
    // Allow retry
    setTimeout(() => {
      quizAnswered = false;
      opts.forEach((el, i) => {
        el.classList.remove('correct', 'wrong');
        el.onclick = () => answerChallengeQuiz(i, ch);
      });
      resultDiv.innerHTML = '再试一次吧！';
      document.getElementById('quizNext').style.display = 'none';
    }, 2000);
  }
}

function updateChallengeHud() {
  const hud = document.getElementById('challengeHud');
  if (currentMission === 2) {
    hud.classList.add('show');
    if (challengeIdx < CHALLENGES.length) {
      document.getElementById('chLevel').textContent = `第 ${challengeIdx + 1}/${CHALLENGES.length} 关`;
      document.getElementById('chGoal').textContent = CHALLENGES[challengeIdx].goal;
    } else {
      document.getElementById('chLevel').textContent = '🏆 全部通关';
      document.getElementById('chGoal').textContent = '点击"↺ 重新挑战"再来一次';
    }
  } else {
    hud.classList.remove('show');
  }
}

function resetChallenges() {
  challengeIdx = 0;
  state.challengeIdx = 0;
  state.done = state.done.filter(i => i !== 2);
  saveState();
  document.getElementById('missionDesc').textContent = CHALLENGES[0].goal;
  updateChallengeHud();
  sourceY = 100;
  canvasMode = 0;
  rgbChallengeActive = false;
  document.getElementById('rgbControls').classList.remove('show');
  document.getElementById('colorButtons').style.display = 'none';
  document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
  document.querySelector('.mode-btn[data-mode="0"]').classList.add('active');
  drawScene();
  updateAngleDisplay();
  updateTabs();
  updateDots();
}

// 13. QUIZ MISSION
// ══════════════════════════════════════════
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startQuiz() {
  quizQuestions = shuffle([...QUIZ_POOL]).slice(0, QUIZ_PER_ROUND);
  quizIdx = 0;
  const overlay = document.getElementById('quizOverlay');
  overlay.classList.add('show');
  showQuestion();
}

function showQuestion() {
  if (quizIdx >= quizQuestions.length) {
    document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');
    markMissionDone(3);
    document.getElementById('missionDesc').innerHTML =
      '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    showToast('🎉', '全部完成！', '光的色散已学完！');
    return;
  }

  quizAnswered = false;
  const q = quizQuestions[quizIdx];
  document.getElementById('quizQ').innerHTML =
    `<span style="color:#007AFF;font-weight:400;">${quizIdx + 1}/${quizQuestions.length}</span> ${q.q}`;
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';

  const container = document.getElementById('quizOptions');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const el = document.createElement('div');
    el.className = 'quiz-opt';
    el.textContent = `${String.fromCharCode(65 + i)}) ${opt}`;
    el.onclick = () => answerQuiz(i);
    container.appendChild(el);
  });
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');

  opts.forEach((el, i) => {
    if (i === q.ans) el.classList.add('correct');
    else if (i === idx && i !== q.ans) el.classList.add('wrong');
    el.onclick = null;
  });

  const resultDiv = document.getElementById('quizResult');
  if (idx === q.ans) {
    resultDiv.innerHTML = `<span style="color:#34C759;">✅ 正确！</span> ${q.explain}`;
  } else {
    resultDiv.innerHTML = `<span style="color:#FF3B30;">❌ 选错了。</span> 正确答案是 ${String.fromCharCode(65 + q.ans)}。${q.explain}`;
  }

  document.getElementById('quizNext').style.display = 'inline-block';
}

function quizNext() {
  quizIdx++;
  showQuestion();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body;
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function switchMission(idx) {
  if (idx === currentMission) return;
  // Clean up
  if (observeTimer) { clearTimeout(observeTimer); observeTimer = null; }

  currentMission = idx;
  state.currentMission = idx;
  saveState();
  updateTabs();
  updateDots();

  // Reset canvas mode and controls
  canvasMode = 0;
  rgbChallengeActive = false;
  document.getElementById('rgbControls').classList.remove('show');
  document.getElementById('colorButtons').style.display = 'none';
  document.getElementById('modeButtons').style.display = 'none';
  document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
  document.querySelector('.mode-btn[data-mode="0"]').classList.add('active');

  // Reset UI
  document.getElementById('challengeHud').classList.remove('show');
  document.getElementById('quizOverlay').classList.remove('show');
    document.querySelector('.canvas-wrap').classList.remove('quiz-active');

  const m = MISSIONS[idx];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;

  const angleDisplay = document.getElementById('angleDisplay');
  const descEl = document.getElementById('missionDesc');

  switch (idx) {
    case 0: // Observe
      angleDisplay.style.display = 'none';
      setKnowledge(0);
      observePhase = state.done.includes(0) ? 2 : 0;
      if (observePhase === 2) {
        descEl.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
      } else {
        descEl.innerHTML = `${m.desc} <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>`;
      }
      sourceY = 110;
      drawScene();
      break;

    case 1: // Explore
      angleDisplay.style.display = 'flex';
      document.getElementById('modeButtons').style.display = 'flex';
      setKnowledge(1);
      descEl.textContent = '拖拽 ⚪ 白光光源，改变入射角度，观察光谱位置变化。试试切换不同显示模式！';
      updateAngleDisplay();
      drawScene();
      setTimeout(() => {
        if (currentMission === 1 && !state.done.includes(1)) {
          markMissionDone(1);
          descEl.textContent = '✅ 探索完成！你发现了入射角与光谱位置的关系！';
        }
      }, 10000);
      break;

    case 2: // Challenge
      angleDisplay.style.display = 'flex';
      setKnowledge(2);
      challengeIdx = state.challengeIdx || 0;
      if (challengeIdx >= CHALLENGES.length) {
        descEl.innerHTML = '🎉 所有关卡已通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
      } else {
        descEl.textContent = CHALLENGES[challengeIdx].goal;
        initChallengeMode();
      }
      updateChallengeHud();
      updateAngleDisplay();
      drawScene();
      break;

    case 3: // Quiz
      angleDisplay.style.display = 'none';
      setKnowledge(3);
      drawScene();
      if (state.done.includes(3)) {
        descEl.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
      } else {
        descEl.textContent = m.desc;
        startQuiz();
      }
      break;
  }
}

// ══════════════════════════════════════════
// 15. TABS & DOTS
// ══════════════════════════════════════════
function updateTabs() {
  const container = document.getElementById('missionTabs');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const el = document.createElement('div');
    el.className = 'tab';
    if (i === currentMission) el.classList.add('active');
    else if (state.done.includes(i)) el.classList.add('done');
    el.innerHTML = `${m.label}<span class="tab-check">${state.done.includes(i) ? '✅' : ''}</span>`;
    el.onclick = () => switchMission(i);
    container.appendChild(el);
  });
}

function updateDots() {
  document.getElementById('progressText').textContent = `${state.done.length}/${MISSIONS.length}`;
  const container = document.getElementById('dotsContainer');
  container.innerHTML = '';
  MISSIONS.forEach((m, i) => {
    const dot = document.createElement('span');
    dot.className = 'dot';
    if (state.done.includes(i)) dot.classList.add('done');
    else if (i === currentMission) dot.classList.add('active');
    container.appendChild(dot);
  });
}

// ══════════════════════════════════════════
// 16. INIT
// ══════════════════════════════════════════
function init() {
  updateTabs();
  updateDots();
  switchMission(state.currentMission || 0);
}

init();

function closeQuiz() { switchMission(0); }
</script>
