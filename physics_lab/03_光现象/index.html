<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NB物理 · 光现象</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    min-height: 100dvh;
    background: linear-gradient(135deg, #0c0e1a 0%, #1a1e3a 30%, #0d1b2a 60%, #0a0e1a 100%);
    display: flex; justify-content: center; align-items: center; padding: 20px;
    position: relative;
  }
  body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 20% 50%, rgba(0,122,255,0.08) 0%, transparent 50%); pointer-events: none; z-index: 0; }
  .app { width: 720px; max-width: 96vw; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); overflow: hidden; position: relative; z-index: 1; }
  .top-bar { display: flex; align-items: center; padding: 14px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .top-bar .back { font-size: 18px; cursor: pointer; opacity: 0.5; text-decoration: none; color: rgba(255,255,255,0.5); }
  .top-bar .back:hover { opacity: 1; color: #fff; }
  .top-bar h2 { font-size: 13px; font-weight: 600; margin-left: 10px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }
  .hero { padding: 32px 32px 20px; text-align: center; background: linear-gradient(180deg, rgba(0,122,255,0.08) 0%, transparent 100%); }
  .hero .icon-big { font-size: 42px; margin-bottom: 6px; }
  .hero h1 { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #007AFF 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .hero p { color: rgba(255,255,255,0.35); font-size: 14px; margin-top: 4px; }
  .hero .progress-module { display: inline-block; margin-top: 12px; padding: 4px 16px; border-radius: 20px; background: rgba(0,122,255,0.1); border: 1px solid rgba(0,122,255,0.15); font-size: 12px; color: #007AFF; }
  .grid { padding: 16px 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { display: block; padding: 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.03); text-decoration: none; color: inherit; transition: all 0.3s; }
  .card:hover { border-color: #007AFF; background: rgba(255,255,255,0.06); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,122,255,0.08); }
  .card .num { font-size: 11px; font-weight: 600; color: #007AFF; letter-spacing: 1px; }
  .card h3 { font-size: 16px; font-weight: 600; color: #fff; margin: 4px 0 2px; }
  .card p { font-size: 12px; color: rgba(255,255,255,0.3); line-height: 1.5; }
  .card .status { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
  .card .status.done { background: rgba(52,199,89,0.12); color: #34C759; border: 1px solid rgba(52,199,89,0.15); }
  .card .status.new { background: rgba(0,122,255,0.1); color: #007AFF; border: 1px solid rgba(0,122,255,0.15); }
  .card .status.partial { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4); border: 1px solid rgba(255,255,255,0.08); }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; padding: 12px 16px 24px; } .hero { padding: 24px 20px 16px; } }
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <a class="back" href="../index.html">←</a>
    <h2>相风 · 物理</h2>
  </div>
  <div class="hero">
    <div class="icon-big">🔦</div>
    <h1>光现象</h1>
    <p>光的传播 · 反射 · 折射 · 透镜 · 色散</p>
    <div class="progress-module" id="moduleProgress">加载中...</div>
  </div>
  <div class="grid" id="chapterGrid"></div>
</div>
<script>
var CHAPTERS = [
  { num: "1", title: "光的传播", desc: "光源、直线传播、影子", file: "ch1_light_propagation.html" },
  { num: "2", title: "光的反射", desc: "反射定律、平面镜成像", file: "ch2_light_reflection.html" },
  { num: "3", title: "光的折射", desc: "折射规律、现象解释", file: "ch3_light_refraction.html" },
  { num: "4", title: "透镜", desc: "凸/凹透镜、焦点", file: "ch4_lenses.html" },
  { num: "5", title: "凸透镜成像规律", desc: "照相机、投影仪、放大镜", file: "ch5_lens_imaging.html" },
  { num: "6", title: "光的色散", desc: "三棱镜、彩虹、三原色", file: "ch6_light_dispersion.html" }
];
function p() { var g=document.getElementById('chapterGrid'); var c=0; g.innerHTML=CHAPTERS.map(function(ch,i) {
  var k='physics_optics_'+(i===1?'ch2':'ch'+(i+1)); var a=false,m=0;
  try { var d=JSON.parse(localStorage.getItem(k)); if(d&&d.done){m=d.done.length;a=d.done.length>=4;} } catch(e){}
  if(a)c++; var sc=a?'done':(m>0?'partial':'new');
  var st=a?'✅ 已完成':(m>0?'🔄 进行中':'🆕 可学习');
  return '<a class="card" href="'+ch.file+'"><div class="num">'+ch.num+'</div><h3>'+ch.title+'</h3><p>'+ch.desc+'</p><span class="status '+sc+'">'+st+'</span></a>';
}).join(''); document.getElementById('moduleProgress').textContent='已完成 '+c+'/'+CHAPTERS.length+' 章'; }
p();
</script>
</body>
</html>
