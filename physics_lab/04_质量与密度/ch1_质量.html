  { goal: '一个中学生的质量大约是多少千克？', answer: 50, tolerance: 20 },
  { goal: '一枚一元硬币的质量约为多少克？', answer: 6, tolerance: 3 },
  { goal: '一只苹果的质量约为多少克？', answer: 200, tolerance: 80 },
  { goal: '一瓶矿泉水的质量约为多少克？（500mL）', answer: 500, tolerance: 50 }
];

const QUIZ_POOL = [
  { q: '质量是物体的什么？', opts: ['A. 形状', 'B. 所含物质的多少', 'C. 体积大小', 'D. 颜色'], ans: 1, explain: '质量是物体所含物质的多少，是物体的基本属性。' },
  { q: '质量的国际单位是？', opts: ['A. 牛顿', 'B. 千克', 'C. 克', 'D. 毫克'], ans: 1, explain: '质量的国际单位是千克（kg），常用单位还有克（g）、毫克（mg）、吨（t）。' },
  { q: '1 kg 铁和 1 kg 棉花，哪个质量大？', opts: ['A. 铁大', 'B. 棉花大', 'C. 一样大', 'D. 无法比较'], ans: 2, explain: '质量相同，都是 1 kg，所以一样大。铁密度大所以体积小，棉花密度小所以体积大。' },
  { q: '将一块橡皮泥捏成动物形状，质量会怎样变化？', opts: ['A. 变大', 'B. 变小', 'C. 不变', 'D. 先大后小'], ans: 2, explain: '形状改变但所含物质的多少不变，质量不变。质量不随形状、状态、位置而改变。' },
  { q: '以下哪个工具用于测量质量？', opts: ['A. 温度计', 'B. 天平', 'C. 刻度尺', 'D. 秒表'], ans: 1, explain: '天平是测量质量的工具，温度计测温度，刻度尺测长度，秒表测时间。' }
];

const KNOWLEDGE = {
  0: { title: '💡 认识质量', body: '<em>质量</em>是物体所含物质的多少，用符号 <em>m</em> 表示。\n\n质量是物体的<em>基本属性</em>，不随形状、状态、位置和温度而改变。\n\n国际单位：<em>千克（kg）</em>\n常用单位：吨（t）、克（g）、毫克（mg）\n<span class="kb-formula">1 kg = 1000 g</span>' },
  1: { title: '💡 天平的使用', body: '托盘天平使用步骤：\n1. <em>放平</em>：将天平放在水平台上\n2. <em>归零</em>：游码拨到零刻度，调平衡螺母\n3. <em>称量</em>：左物右码，用镊子加砝码\n4. <em>读数</em>：砝码质量 + 游码示数\n\n<span class="kb-formula">m(物) = m(砝码) + m(游码)</span>' },
  2: { title: '💡 常见物体质量', body: '记住常见物体的质量范围：\n• 鸡蛋 ≈ <em>50 g</em>\n• 苹果 ≈ <em>200 g</em>\n• 中学生 ≈ <em>50 kg</em>\n• 一元硬币 ≈ <em>6 g</em>\n• 一瓶水 ≈ <em>500 g</em>\n\n估测时找参照物对比。' },
  3: { title: '💡 质量考点', body: '重点：质量是<em>属性</em>，不随外界条件改变。\n\n易错：1kg铁和1kg棉花质量<em>一样大</em>。\n\n天平使用：<em>左物右码</em>，用镊子夹砝码，先大后小。' }
};

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId, animTime = 0, isPlaying = false;
let useDigital = false, demoPhase = 0;
let exploreMass = 0, isSliding = false, slideX = 0;

const W = canvas.width, H = canvas.height;

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}
function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  const m = state.currentMission;
  if (m === 0) drawObserve();
  else if (m === 1) drawExplore();
  else if (m === 2) drawChallenge();
  else drawIdle();
}

function drawBg() {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
}

function drawObserve() {
  drawBg();
  if (useDigital) { drawDigital(); return; }
  drawBeamBalance();

  if (isPlaying) {
    const t = animTime;
    // Animate the beam tilting
    const tilt = Math.sin(t * 0.05) * 0.2;
    const mass = 50 + Math.sin(t * 0.03) * 30;

    // Draw left pan with object
    const cx = W / 2, baseY = 190;
    // Left pan
    ctx.save();
    ctx.translate(cx - 100, baseY);
    ctx.rotate(tilt * 0.3);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(ctx, -30, 0, 60, 10, 3); ctx.fill();
    ctx.fillStyle = '#FF9500';
    ctx.fillRect(-15, -20, 30, 20);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('物体', 0, -5);
    ctx.restore();

    // Right pan with mass
    ctx.save();
    ctx.translate(cx + 100, baseY);
    ctx.rotate(-tilt * 0.3);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    roundRect(ctx, -30, 0, 60, 10, 3); ctx.fill();
    ctx.fillStyle = '#007AFF';
    ctx.fillRect(-15, -mass * 0.3, 30, mass * 0.3);
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(mass.toFixed(0) + 'g', 0, -mass * 0.3 - 5);
    ctx.restore();

    document.getElementById('dispMass').textContent = mass.toFixed(0) + ' g';
    document.getElementById('dispStatus').textContent = '⚖️ 测量中...';

    if (t > 120) {
      isPlaying = false;
      document.getElementById('dispStatus').textContent = '✅ 测量完成';
      if (!state.done.includes(0)) { state.done.push(0); saveState(); switchMission(state.currentMission); }
    }
  } else {
    drawBeamBalance();
    document.getElementById('dispMass').textContent = '—';
    document.getElementById('dispStatus').textContent = '⏸️ 等待开始';
  }
}

function drawBeamBalance() {
  const cx = W / 2, baseY = 190;
  // Stand
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(cx - 5, baseY - 10, 10, 80);
  ctx.fillRect(cx - 30, baseY + 60, 60, 8);
  // Beam
  ctx.strokeStyle = 'rgba(255,255,255,0.2)';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(cx - 120, baseY); ctx.lineTo(cx + 120, baseY); ctx.stroke();
  // Pointer
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(cx, baseY); ctx.lineTo(cx, baseY + 40); ctx.stroke();
  // Pans
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(cx - 130, baseY + 5, 40, 8);
  ctx.fillRect(cx + 90, baseY + 5, 40, 8);
  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('左盘（物体）', cx - 110, baseY + 35);
  ctx.fillText('右盘（砝码）', cx + 110, baseY + 35);
}

function drawDigital() {
  const cx = W / 2;
  // Screen
  ctx.fillStyle = 'rgba(10,12,26,0.8)';
  roundRect(ctx, cx - 120, 80, 240, 130, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(0,122,255,0.3)';
  ctx.lineWidth = 1;
  roundRect(ctx, cx - 120, 80, 240, 130, 12); ctx.stroke();

  if (isPlaying) {
    const t = animTime;
    const mass = 50 + Math.sin(t * 0.05) * 20 + Math.sin(t * 0.13) * 5;
    // Animate numbers rolling
    ctx.fillStyle = '#00f2fe';
    ctx.font = 'bold 48px "SF Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(mass.toFixed(1), cx, 150);

    // Glow effect
    ctx.shadowColor = '#00f2fe';
    ctx.shadowBlur = 20;
    ctx.fillText(mass.toFixed(1), cx, 150);
    ctx.shadowBlur = 0;

    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '14px sans-serif';
    ctx.fillText('g', cx + 110, 150);

    document.getElementById('dispMass').textContent = mass.toFixed(1) + ' g';
    document.getElementById('dispStatus').textContent = '📱 数字显示';

    if (t > 100) {
      isPlaying = false;
      if (!state.done.includes(0)) { state.done.push(0); saveState(); switchMission(state.currentMission); }
    }
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = 'bold 48px "SF Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('0.0', cx, 150);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '14px sans-serif';
    ctx.fillText('g', cx + 70, 150);
  }

  // Unit label
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('电子天平', cx, 230);
}

function drawExplore() {
  drawBg();

  // Balance beam with sliding weight
  const cx = W / 2, baseY = 170;

  // Scale bar
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.fillRect(60, baseY + 30, W - 120, 6);
  for (let i = 0; i <= 10; i++) {
    const x = 60 + i * (W - 120) / 10;
    ctx.fillStyle = i % 5 === 0 ? 'rgba(255,255,255,0.3)' : 'rgba(255,255,255,0.12)';
    ctx.fillRect(x, baseY + 25, 2, 16);
    if (i % 5 === 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(i * 10 + 'g', x, baseY + 55);
    }
  }

  // Slider
  const sx = 60 + (exploreMass / 100) * (W - 120);
  ctx.fillStyle = '#007AFF';
  ctx.beginPath();
  ctx.arc(sx, baseY + 33, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowColor = '#007AFF';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(sx, baseY + 33, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Mass display
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(exploreMass.toFixed(0) + ' g', cx, baseY - 20);

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '12px sans-serif';
  ctx.fillText('← 拖动滑块增加砝码质量 →', cx, baseY + 85);

  document.getElementById('dispMass').textContent = exploreMass.toFixed(0) + ' g';
  document.getElementById('dispStatus').textContent = '✋ 拖动上方滑块';
}

function drawChallenge() {
  drawBg();
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#fff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  let lines = [], line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > W - 60 && line.length > 8) { lines.push(line); line = ''; }
  }
  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  // Answer prompt
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 点击画布输入答案', W / 2, y + 40);
}

function drawIdle() {
  drawBg();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '16px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('📝 点击"测验"选项卡开始答题', W / 2, H / 2);
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.arcTo(x+w,y,x+w,y+r,r); ctx.lineTo(x+w,y+h-r);
  ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r);
  ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx; saveState(); updateUI(); setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  document.getElementById('dataDisplay').style.display = state.currentMission <= 1 ? 'flex' : 'none';
  document.getElementById('modeToggle').className = state.currentMission === 0 ? 'mode-toggle show' : 'mode-toggle';

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看。';
    else desc.innerHTML = `${m.desc} <button id="btnObserve">▶ 播放演示</button>`;
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索。';
    else desc.innerHTML = m.desc;
  } else if (state.currentMission === 2) {
    if (done) desc.innerHTML = '🎉 全部通关！ <button id="btnResetChallenge">🔄 重新挑战</button>';
    else desc.innerHTML = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    document.getElementById('challengeHud').className = 'challenge-hud show';
    document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0,30) + '...' || '';
  } else {
    if (done) desc.innerHTML = '✅ 已完成。 <button id="btnQuizRestart">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
    if (state.quizIdx < QUIZ_POOL.length) { document.getElementById('quizOverlay').className = 'quiz-overlay show'; document.querySelector('.canvas-wrap').className = 'canvas-wrap quiz-active'; showQuiz(); }
  }

  // Delegate button events
  setTimeout(function() {
    var b = document.getElementById('btnObserve');
    if (b) b.onclick = startObserve;
    var b2 = document.getElementById('btnResetChallenge');
    if (b2) b2.onclick = resetChallenges;
    var b3 = document.getElementById('btnQuizRestart');
    if (b3) b3.onclick = startQuiz;
  }, 10);

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const cls = i === state.currentMission ? 'tab active' : state.done.includes(i) ? 'tab done' : 'tab';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${state.done.includes(i)?'<span class="tab-check">✅</span>':''}</div>`;
  }).join('');

  for (let i = 0; i < 4; i++) {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  }
}

function startObserve() {
  useDigital = false; isPlaying = true; animTime = 0; demoPhase = 0;
  document.getElementById('modeToggle').textContent = '切换电子天平';
}
document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  useDigital = !useDigital; isPlaying = true; animTime = 0;
  document.getElementById('modeToggle').textContent = useDigital ? '切换托盘天平' : '切换电子天平';
});

// Canvas events
canvas.addEventListener('mousedown', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const sx = 60 + (exploreMass / 100) * (canvas.width - 120);
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  if (Math.abs(x - sx) < 30 && Math.abs(y - 203) < 20) { isSliding = true; }
});
canvas.addEventListener('mousemove', (e) => {
  if (!isSliding || state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  exploreMass = Math.max(0, Math.min(100, ((x - 60) / (canvas.width - 120)) * 100));
});
canvas.addEventListener('mouseup', () => {
  if (isSliding && state.currentMission === 1) {
    isSliding = false;
    if (exploreMass > 0 && !state.done.includes(1)) { state.done.push(1); saveState(); switchMission(state.currentMission); }
  }
});
canvas.addEventListener('touchstart', (e) => {
  if (state.currentMission !== 1) return;
  isSliding = true;
});
canvas.addEventListener('touchmove', (e) => {
  if (!isSliding || state.currentMission !== 1) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.touches[0].clientX - rect.left) * scaleX;
  exploreMass = Math.max(0, Math.min(100, ((x - 60) / (canvas.width - 120)) * 100));
}, { passive: false });
canvas.addEventListener('touchend', () => {
  if (isSliding && state.currentMission === 1) {
    isSliding = false;
    if (exploreMass > 0 && !state.done.includes(1)) { state.done.push(1); saveState(); switchMission(state.currentMission); }
  }
});
canvas.addEventListener('click', (e) => {
  if (state.currentMission === 2 && !state.done.includes(2)) {
    const input = prompt('输入你的答案（数字）:', '');
    if (input === null) return;
    const num = parseFloat(input);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState(); switchMission(state.currentMission);
        alert('🎉 恭喜通关！');
      } else { saveState(); switchMission(state.currentMission); }
    } else { alert('❌ 再想想！提示：联系生活经验。'); }
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); switchMission(state.currentMission);
}

function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); switchMission(state.currentMission); }
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); document.querySelector(".canvas-wrap").className = "canvas-wrap"; }
</script>
