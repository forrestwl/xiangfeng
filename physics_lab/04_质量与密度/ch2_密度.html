        <div class="data-item"><span class="label">密度: </span><span class="value blue" id="dispDensity">0 g/cm³</span></div>
        <div class="data-item"><span class="label">质量: </span><span class="value green" id="dispMass">0 g</span></div>

  <div class="mission-tabs" id="missionTabs"></div>
</div>

<script>
const STORAGE_KEY = 'physics_zhi_liang_yu_mi_du_ch2';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '体积-质量对比', desc: '观察相同体积的铁块和木块质量不同。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '密度计算器', desc: '拖拽调整质量和体积，观察密度的变化 ρ=m/V。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '密度计算闯关', desc: '运用密度公式 ρ=m/V 完成计算挑战！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成几道选择题，巩固密度的相关知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '一块铁块质量 158g，体积 20cm³，铁的密度是多少？(g/cm³)', answer: 7.9, unit: 'g/cm³', tolerance: 0.1 },
  { goal: '水的密度是 1g/cm³，200g 水的体积是多少 cm³？', answer: 200, unit: 'cm³', tolerance: 5 },
  { goal: '木块密度 0.6g/cm³，体积 50cm³，质量是多少克？', answer: 30, unit: 'g', tolerance: 2 },
  { goal: '一块体积为 10cm³ 的铝块质量 27g，铝的密度是多少 g/cm³？', answer: 2.7, unit: 'g/cm³', tolerance: 0.1 },
  { goal: '需要多少 cm³ 的铜（密度 8.9g/cm³）质量才能达到 178g？', answer: 20, unit: 'cm³', tolerance: 1 }
];

const QUIZ_POOL = [
  { q: '密度是物质的什么？', opts: ['A. 基本属性', 'B. 形状', 'C. 颜色', 'D. 温度计'], ans: 0, explain: '密度是物质的一种特性，不同物质的密度一般不同。' },
  { q: '密度的公式是？', opts: ['A. ρ = m/V', 'B. ρ = m×V', 'C. ρ = V/m', 'D. ρ = m+V'], ans: 0, explain: '密度 ρ = m/V，即质量除以体积。单位 g/cm³ 或 kg/m³。' },
  { q: '1 g/cm³ 等于多少 kg/m³？', opts: ['A. 1', 'B. 100', 'C. 1000', 'D. 10000'], ans: 2, explain: '1 g/cm³ = 1000 kg/m³。水的密度 1g/cm³ = 1000kg/m³。' },
  { q: '相同体积的铁和木头，哪个质量大？', opts: ['A. 铁', 'B. 木头', 'C. 一样大', 'D. 无法比较'], ans: 0, explain: '铁的密度（7.9g/cm³）> 木头的密度（约0.5g/cm³），相同体积下铁的质量更大。' },
  { q: '密度是物质的一种特性，它取决于？', opts: ['A. 质量', 'B. 体积', 'C. 物质种类和状态', 'D. 形状'], ans: 2, explain: '密度取决于物质种类和状态（温度、压强），与质量和体积无关（对于同种物质）。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let animId = null, animTime = 0;
let isPlaying = false;
let showLiquid = false;
let exploreMass2 = 100, exploreVol = 50;

const SUBSTANCES = [
  { name: '铁', density: 7.9, color: '#8a8a8a', dark: '#666' },
  { name: '铝', density: 2.7, color: '#c0c0c0', dark: '#888' },
  { name: '木头', density: 0.6, color: '#d4a76a', dark: '#b89050' }
];
const LIQUIDS = [
  { name: '水', density: 1.0, color: '#4dabf7' },
  { name: '油', density: 0.9, color: '#ffd43b' },
  { name: '水银', density: 13.6, color: '#adb5bd' }
];

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else { ctx.fillStyle = '#141626'; ctx.fillRect(0,0,W,H); }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  if (showLiquid) drawLiquidCompare(W, H);
  else drawSolidCompare(W, H);
}

function drawSolidCompare(W, H) {
  const cubes = [
    { name: '铁块', density: 7.9, color: '#8a8a8a', x: 100, size: 60 },
    { name: '铝块', density: 2.7, color: '#c0c0c0', x: 290, size: 60 },
    { name: '木块', density: 0.6, color: '#d4a76a', x: 480, size: 60 }
  ];
  // Label on top
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('相同体积（60×60=3600px²）的不同物质', W/2, 25);

  cubes.forEach((c, i) => {
    const cx = c.x, cy = 80;
    // Draw cube
    ctx.fillStyle = c.color;
    ctx.fillRect(cx, cy, c.size, c.size);
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.strokeRect(cx, cy, c.size, c.size);
    // Label
    ctx.fillStyle = '#ffffff';
    ctx.font = '13px sans-serif';
    ctx.fillText(c.name, cx + c.size/2, cy + c.size + 20);
    // Mass display (animated)
    const mass = c.density * (isPlaying ? 60 : 60);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '12px sans-serif';
    ctx.fillText('质量: ' + (c.density * 60).toFixed(1) + 'g', cx + c.size/2, cy + c.size + 40);
    // Density
    ctx.fillStyle = '#007AFF';
    ctx.font = '11px sans-serif';
    ctx.fillText('ρ=' + c.density + 'g/cm³', cx + c.size/2, cy + c.size + 56);
  });

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.fillText('▶ 点击下方"播放"按钮开始观察', W/2, H - 15);
  } else {
    ctx.fillStyle = '#34C759';
    ctx.font = '13px sans-serif';
    ctx.fillText('可以看到：体积相同，密度越大，质量越大！', W/2, H - 15);
  }
}

function drawLiquidCompare(W, H) {
  const items = [
    { name: '水(100mL)', density: 1.0, color: '#4dabf7', x: 120 },
    { name: '油(100mL)', density: 0.9, color: '#ffd43b', x: 320 },
    { name: '水银(100mL)', density: 13.6, color: '#adb5bd', x: 520 }
  ];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('相同体积（100mL）的不同液体', W/2, 25);

  items.forEach((item) => {
    const bx = item.x, by = 50, bw = 80, bh = 140;
    // Container
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, bw, bh);
    // Liquid fill
    ctx.fillStyle = item.color;
    ctx.fillRect(bx + 2, by + bh - 120, bw - 4, 120);
    ctx.globalAlpha = 0.3;
    ctx.fillRect(bx + 2, by + bh - 120, bw - 4, 120);
    ctx.globalAlpha = 1.0;
    // Name
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.fillText(item.name, bx + bw/2, by + bh + 18);
    // Mass
    const mass = item.density * 100;
    ctx.fillStyle = '#007AFF';
    ctx.font = '12px sans-serif';
    ctx.fillText('质量: ' + mass.toFixed(1) + 'g', bx + bw/2, by + bh + 38);
    // Density
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '11px sans-serif';
    ctx.fillText('ρ=' + item.density + 'g/cm³', bx + bw/2, by + bh + 54);
  });

  ctx.fillStyle = '#34C759';
  ctx.font = '13px sans-serif';
  ctx.fillText('水银密度最大，相同体积质量最大！', W/2, H - 10);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const density = exploreMass2 / exploreVol;
  // Mass slider
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillText('质量: ' + exploreMass2 + ' g', 30, 25);
  // Mass slider track
  const mX = 140, mY = 19, mW = 280;
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, mX, mY, mW, 12, 6);
  ctx.fill();
  const mRatio = exploreMass2 / 300;
  ctx.fillStyle = '#007AFF';
  roundRect(ctx, mX, mY, mRatio * mW, 12, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(mX + mRatio * mW, mY + 6, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Volume slider
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.fillText('体积: ' + exploreVol + ' cm³', 30, 55);
  const vX = 140, vY = 49, vW = 280;
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, vX, vY, vW, 12, 6);
  ctx.fill();
  const vRatio = exploreVol / 150;
  ctx.fillStyle = '#34C759';
  roundRect(ctx, vX, vY, vRatio * vW, 12, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#34C759';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(vX + vRatio * vW, vY + 6, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  // Cube visualization
  const cubeSize = Math.min(120, 40 + exploreVol * 0.6);
  const cx = W - 160, cy = 80;
  ctx.fillStyle = '#007AFF';
  ctx.globalAlpha = 0.15;
  ctx.fillRect(cx - cubeSize/2, cy, cubeSize, cubeSize);
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - cubeSize/2, cy, cubeSize, cubeSize);

  // Density display
  ctx.fillStyle = '#ffffff';
  ctx.font = '22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('ρ = ' + density.toFixed(2) + ' g/cm³', W/2, 110);

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('拖拽滑块调整质量和体积，观察密度变化', W/2, H - 15);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = []; let line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  // Show formula reminder
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('提示: ρ = m / V  变形: m = ρV  V = m/ρ', W/2, H-10);
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索过。 <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2))
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    else desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3))
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  }

  if (state.currentMission === 1) {
    const density = exploreMass2 / exploreVol;
    document.getElementById('dispDensity').textContent = density.toFixed(2) + ' g/cm³';
    document.getElementById('dispMass').textContent = exploreMass2 + ' g';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((mt, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + mt.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal.slice(0, 40) || '') + '...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// ── Observe ──
function startObserve() {
  showLiquid = false;
  isPlaying = true;
  animTime = 0;
  document.getElementById('modeToggle').textContent = '切换为液体对比';
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); }
    }
  }, 4000);
}

document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  showLiquid = !showLiquid;
  document.getElementById('modeToggle').textContent = showLiquid ? '切换为固体对比' : '切换为液体对比';
  isPlaying = true;
  animTime = 0;
});

// ── Explore ──
function startExplore() {
  isPlaying = true;
  animTime = 0;
}

let dragTarget = null; // 'mass' or 'vol'
canvas.addEventListener('mousedown', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const mY = 19, vY = 49;
  if (y >= mY - 12 && y <= mY + 24) { dragTarget = 'mass'; return; }
  if (y >= vY - 12 && y <= vY + 24) { dragTarget = 'vol'; return; }
});

canvas.addEventListener('mousemove', (e) => {
  if (!dragTarget || state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const mX = 140, mW = 280;
  const ratio = Math.max(0, Math.min(1, (x - mX) / mW));
  if (dragTarget === 'mass') { exploreMass2 = Math.round(ratio * 300); }
  else { exploreVol = Math.max(10, Math.round(ratio * 150)); }
  const density = exploreMass2 / exploreVol;
  document.getElementById('dispDensity').textContent = density.toFixed(2) + ' g/cm³';
  document.getElementById('dispMass').textContent = exploreMass2 + ' g';
  drawScene();
});

window.addEventListener('mouseup', () => {
  if (dragTarget && state.currentMission === 1) {
    if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); }
  }
  dragTarget = null;
});

canvas.addEventListener('touchstart', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const y = (e.touches[0].clientY - rect.top) * scaleX;
  if (y >= 7 && y <= 43) { dragTarget = 'mass'; }
  else if (y >= 37 && y <= 73) { dragTarget = 'vol'; }
});

canvas.addEventListener('touchmove', (e) => {
  if (!dragTarget || state.currentMission !== 1) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.touches[0].clientX - rect.left) * scaleX;
  const mX = 140, mW = 280;
  const ratio = Math.max(0, Math.min(1, (x - mX) / mW));
  if (dragTarget === 'mass') exploreMass2 = Math.round(ratio * 300);
  else exploreVol = Math.max(10, Math.round(ratio * 150));
  const density = exploreMass2 / exploreVol;
  document.getElementById('dispDensity').textContent = density.toFixed(2) + ' g/cm³';
  document.getElementById('dispMass').textContent = exploreMass2 + ' g';
  drawScene();
}, { passive: false });

canvas.addEventListener('touchend', () => {
  if (dragTarget && state.currentMission === 1) {
    if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); }
  }
  dragTarget = null;
});

// ── Challenge ──
canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 2) return;
  const userInput = prompt('输入答案（数字，保留一位小数即可）:', '');
  if (userInput === null) return;
  const num = parseFloat(userInput);
  if (isNaN(num)) return;
  const ch = CHALLENGES[state.challengeIdx];
  if (Math.abs(num - ch.answer) <= ch.tolerance) {
    state.challengeIdx++;
    if (state.challengeIdx >= CHALLENGES.length) {
      if (!state.done.includes(2)) state.done.push(2);
      saveState(); updateUI();
      alert('🎉 恭喜通关！密度计算掌握得很好！');
    } else { saveState(); updateUI(); }
  } else {
    alert('❌ 答案不对，再想想！提示：ρ=m/V');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// ── Quiz ──
function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => '<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? '✅ 正确！'+q.explain : '❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

  },
  1: {

    body: '密度公式：<span class="kb-formula">ρ = m / V</span>\n\n' +
         '其中 ρ 表示密度，m 表示质量，V 表示体积。\n\n' +
         '常用单位：<span class="kb-formula">g/cm³</span> 或 <span class="kb-formula">kg/m³</span>\n' +
         '换算关系：<span class="kb-formula">1 g/cm³ = 1000 kg/m³</span>\n\n' +
         '变形公式：<span class="kb-formula">m = ρV</span>  <span class="kb-formula">V = m/ρ</span>'
  },
  2: {

    body: '不同物质的密度一般不同，可以根据密度来 <em>鉴别物质</em>。\n\n' +
         '常见物质的密度（g/cm³）：\n' +
         '• 水：<em>1.0</em>   • 铁：<em>7.9</em>\n' +
         '• 铝：<em>2.7</em>   • 铜：<em>8.9</em>\n' +
         '• 水银：<em>13.6</em>   • 空气：<em>0.00129</em>'
  },
  3: {
    title: '💡 检测你的掌握',
    body: '通过几道选择题来检验你对密度概念、公式和应用的掌握程度。\n\n' +
         '关键点：密度 = 质量 / 体积；同种物质密度相同；<em>密度不随质量和体积改变</em>。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
