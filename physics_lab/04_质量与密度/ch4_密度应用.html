      <div class="mode-toggle" id="modeToggle">切换为材料鉴别</div>
      <div class="challenge-hud" id="challengeHud">
        <div class="ch-level" id="chLevel">🎯 第 1/5 关</div>
        <div class="ch-goal" id="chGoal">目标加载中...</div>
        <div class="ch-restart" onclick="resetChallenges()">🔄 重来</div>
      </div>
      <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-q" id="quizQ">题目加载中...</div>
        <div class="quiz-options" id="quizOptions"></div>
        <div class="quiz-result" id="quizResult"></div>
        <button class="quiz-next" id="quizNext" onclick="nextQuiz()">下一题</button>
        <button class="quiz-close" id="quizClose" onclick="closeQuiz()" style="margin-top:10px;padding:6px 16px;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.15);border-radius:8px;cursor:pointer;font-size:12px;">✕ 关闭</button>

    </div>
    <div class="info-panel">
      <div class="mission-label" id="missionLabel">🔬 观察</div>
      <div class="mission-title" id="missionTitle">空心与实心判断</div>
      <div class="mission-desc" id="missionDesc">观察空心和实心物体的密度差异。</div>
      <div class="data-display" id="dataDisplay" style="display:none">
        <div class="data-item"><span class="label">密度: </span><span class="value blue" id="dispDensity4">0 g/cm³</span></div>
      </div>
      <div class="knowledge-box collapsed" id="knowledgeBox" onclick="toggleKnowledge()">
        <div class="kb-title"><span class="kb-toggle" id="kbToggle">▶</span> 💡 <span id="kbTitle">知识要点</span></div>
        <div class="kb-body" id="kbBody"></div>
      </div>
    </div>
  </div>
  <div class="mission-tabs" id="missionTabs"></div>
</div>

<script>
const STORAGE_KEY = 'physics_zhi_liang_yu_mi_du_ch4';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '空心实心判断', desc: '比较实心球和空心球的密度差异。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '材料鉴别', desc: '根据密度值鉴别不同材料。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '盐水选种计算', desc: '运用密度知识解决盐水选种的实际问题！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成选择题，巩固密度是物质特性的知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '盐水的密度需要达到 1.1g/cm³ 才适合选种。现有 500mL 盐水质量 550g，密度是多少？是否合格？(输入密度值)', answer: 1.1, unit: 'g/cm³', tolerance: 0.05 },
  { goal: '需要配制 2kg 密度为 1.1g/cm³ 的盐水，体积是多少升？(1L=1000cm³)', answer: 1.82, unit: 'L', tolerance: 0.1 },
  { goal: '铜球质量 178g，体积 40cm³，铜密度 8.9g/cm³。是空心还是实心？(0=实心 1=空心)', answer: 1, unit: '', tolerance: 0 },
  { goal: '如果上题铜球是空心的，空心部分的体积是多少 cm³？', answer: 20, unit: 'cm³', tolerance: 3 },
  { goal: 'ρ钛=4.5g/cm³，一个钛合金零件体积 200cm³，质量 800g。该零件是纯钛还是钛合金？(0=纯钛 1=钛合金)', answer: 1, unit: '', tolerance: 0 }
];

const QUIZ_POOL = [
  { q: '密度是物质的什么？', opts: ['A. 形状', 'B. 特性', 'C. 颜色', 'D. 重量'], ans: 1, explain: '密度是物质的一种特性，不同物质的密度一般不同，可以用来鉴别物质。' },
  { q: '判断物体是空心还是实心，可以比较？', opts: ['A. 颜色', 'B. 密度与材料密度的关系', 'C. 形状', 'D. 温度'], ans: 1, explain: '如果物体的密度小于该材料的密度，说明是空心的。' },
  { q: '盐水选种利用了？', opts: ['A. 质量不同', 'B. 密度不同', 'C. 颜色不同', 'D. 温度不同'], ans: 1, explain: '盐水选种利用密度：饱满种子密度大沉底，干瘪种子密度小浮起。' },
  { q: '同种材料制成的实心物体和空心物体，谁的质量大（体积相同）？', opts: ['A. 实心大', 'B. 空心大', 'C. 一样大', 'D. 无法比较'], ans: 0, explain: '相同体积下，实心物体质量更大（因为材料密度相同，实心的体积就是材料体积）。' },
  { q: '用密度可以鉴别物质，这是因为？', opts: ['A. 密度与质量有关', 'B. 密度与体积有关', 'C. 不同物质密度一般不同', 'D. 密度与温度无关'], ans: 2, explain: '不同物质的密度一般不同，所以可以通过测量密度来粗略鉴别物质。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let animId = null, animTime = 0;
let isPlaying = false;
let showIdentify = false;
let exploreMatIdx = 0;

const MATERIALS = [
  { name: '金', density: 19.3, color: '#ffd700' },
  { name: '银', density: 10.5, color: '#c0c0c0' },
  { name: '铜', density: 8.9, color: '#b87333' },
  { name: '铁', density: 7.9, color: '#8a8a8a' },
  { name: '铝', density: 2.7, color: '#d0d0d5' }
];

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else { ctx.fillStyle = '#141626'; ctx.fillRect(0,0,W,H); }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  if (showIdentify) {
    drawIdentifyScene(W, H);
    return;
  }
  // Solid vs hollow balls
  const cx = W / 2;
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('相同外观的两个铜球', cx, 25);

  // Solid ball (left)
  const lx = 160, ly = 150;
  ctx.fillStyle = '#b87333';
  ctx.beginPath();
  ctx.arc(lx, ly, 50, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#a06020';
  ctx.beginPath();
  ctx.arc(lx, ly, 50, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(lx - 12, ly - 12, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.fillText('实心铜球', lx, ly + 72);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.fillText('质量: 890g', lx, ly + 90);
  ctx.fillText('体积: 100cm³', lx, ly + 106);

  // Hollow ball (right)
  const rx = W - 160, ry = 150;
  ctx.fillStyle = '#b87333';
  ctx.beginPath();
  ctx.arc(rx, ry, 50, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#a06020';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(rx, ry, 35, 0, Math.PI * 2);
  ctx.stroke();
  // Hollow center
  ctx.fillStyle = '#141626';
  ctx.beginPath();
  ctx.arc(rx, ry, 35, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath();
  ctx.arc(rx - 12, ry - 12, 22, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.fillText('空心铜球', rx, ry + 72);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.fillText('质量: 445g', rx, ry + 90);
  ctx.fillText('体积: 100cm³', rx, ry + 106);

  // Compare
  ctx.fillStyle = '#007AFF';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText('体积相同时，空心球质量小于实心球 → 空心球密度更小！', cx, 245);

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('▶ 点击"播放"查看密度对比', cx, H-10);
  }
}

function drawIdentifyScene(W, H) {
  const mx = 100, mw = 160;
  const items = [
    { name: '环 1', density: 19.2, suspect: '金' },
    { name: '环 2', density: 10.3, suspect: '银' },
    { name: '环 3', density: 7.8, suspect: '铁' }
  ];

  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('材料鉴别 — 测量密度查表对照', W/2, 25);

  items.forEach((item, i) => {
    const ix = 80 + i * 220, iy = 60;
    // Ring
    ctx.strokeStyle = '#b87333';
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.arc(ix + 50, iy + 40, 25, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(ix + 50, iy + 40, 22, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.fillText(item.name, ix + 50, iy + 85);
    ctx.fillStyle = '#007AFF';
    ctx.font = '12px sans-serif';
    ctx.fillText('ρ=' + item.density + ' g/cm³', ix + 50, iy + 103);
    ctx.fillStyle = '#34C759';
    ctx.font = '12px sans-serif';
    ctx.fillText('→ 可能是' + item.suspect, ix + 50, iy + 121);
  });

  // Density table
  ctx.fillStyle = '#141626';
  roundRect(ctx, 10, 195, W - 20, 95, 8);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'left';
  const tableLine = '密度表(g/cm³): 金19.3  银10.5  铜8.9  铁7.9  铝2.7  水1.0';
  ctx.fillText(tableLine, 20, 215);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '11px sans-serif';
  ctx.fillText('通过测量密度并与标准值对比，可以鉴别材料（纯度越高越接近标准值）', 20, 240);

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '11px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('▶ 点击"播放"查看鉴别过程', W/2, H-5);
  }
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const mat = MATERIALS[exploreMatIdx];
  const cx = W / 2;

  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('拖拽浏览不同材料的密度', cx, 25);

  // Material buttons
  const btnW = 90;
  const startX = (W - MATERIALS.length * btnW) / 2;
  for (let i = 0; i < MATERIALS.length; i++) {
    const bx = startX + i * btnW;
    ctx.fillStyle = i === exploreMatIdx ? MATERIALS[i].color : '#eee';
    ctx.strokeStyle = i === exploreMatIdx ? '#333' : '#ddd';
    ctx.lineWidth = i === exploreMatIdx ? 2 : 1;
    roundRect(ctx, bx + 2, 45, btnW - 4, 30, 8);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = i === exploreMatIdx ? (i === 0 ? '#333' : '#333') : '#666';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(MATERIALS[i].name, bx + btnW / 2, 60);
  }

  // Display material cube
  const cubeSize = 80;
  ctx.fillStyle = mat.color;
  ctx.fillRect(cx - cubeSize / 2, 100, cubeSize, cubeSize);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(cx - cubeSize / 2, 100, cubeSize, cubeSize);

  // Info
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText(mat.name + '  ρ = ' + mat.density + ' g/cm³', cx, 195);

  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px sans-serif';
  ctx.fillText('点击上方材料按钮切换', cx, 225);

  ctx.fillStyle = '#34C759';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('不同物质的密度不同 — 密度是物质的重要特性', cx, H-5);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = []; let line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('提示: ρ=m/V   V=m/ρ   空心: ρ物体<ρ材料', W/2, H-10);
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索过。 <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2))
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    else desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3))
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  }

  if (state.currentMission === 1) {
    document.getElementById('dispDensity4').textContent = MATERIALS[exploreMatIdx].density + ' g/cm³';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((mt, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + mt.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal.slice(0, 40) || '') + '...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// ── Observe ──
function startObserve() {
  showIdentify = false;
  isPlaying = true;
  animTime = 0;
  document.getElementById('modeToggle').textContent = '切换为材料鉴别';
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); }
    }
  }, 4000);
}

document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  showIdentify = !showIdentify;
  document.getElementById('modeToggle').textContent = showIdentify ? '切换为空心实心' : '切换为材料鉴别';
  isPlaying = true;
  animTime = 0;
});

// ── Explore ──
function startExplore() {
  exploreMatIdx = 0;
  isPlaying = true;
  animTime = 0;
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission === 1) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleX;
    const btnW = 90;
    const startX2 = (W - MATERIALS.length * btnW) / 2;
    if (y >= 45 && y <= 75) {
      for (let i = 0; i < MATERIALS.length; i++) {
        const bx = startX2 + i * btnW;
        if (x >= bx + 2 && x <= bx + btnW - 2) {
          exploreMatIdx = i;
          document.getElementById('dispDensity4').textContent = MATERIALS[i].density + ' g/cm³';
          if (!state.done.includes(1) && exploreMatIdx >= 2) { state.done.push(1); saveState(); updateUI(); }
          drawScene();
          return;
        }
      }
    }
  }
  if (state.currentMission !== 2) return;
  const userInput = prompt('输入答案（数字）:', '');
  if (userInput === null) return;
  const num = parseFloat(userInput);
  if (isNaN(num)) return;
  const ch = CHALLENGES[state.challengeIdx];
  if (Math.abs(num - ch.answer) <= ch.tolerance) {
    state.challengeIdx++;
    if (state.challengeIdx >= CHALLENGES.length) {
      if (!state.done.includes(2)) state.done.push(2);
      saveState(); updateUI();
      alert('🎉 恭喜通关！密度应用掌握得很好！');
    } else { saveState(); updateUI(); }
  } else {
    alert('❌ 答案不对，再想想！提示：ρ=m/V');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// ── Quiz ──
function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => '<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? '✅ 正确！'+q.explain : '❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}
