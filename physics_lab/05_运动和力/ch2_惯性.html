  { q: '惯性的定义是什么？', opts: ['A. 物体保持静止状态的性质', 'B. 物体保持匀速直线运动状态的性质', 'C. 物体保持静止或匀速直线运动状态不变的性质', 'D. 物体受力时的反应'], ans: 2, explain: '惯性是物体保持原来运动状态不变的性质，原来静止的保持静止，原来运动的保持匀速直线运动。' },
  { q: '关于惯性，下列说法正确的是？', opts: ['A. 只有运动物体有惯性', 'B. 只有静止物体有惯性', 'C. 一切物体都有惯性', 'D. 运动快的物体惯性大'], ans: 2, explain: '一切物体在任何情况下都有惯性，惯性是物体的固有属性。' },
  { q: '惯性与什么有关？', opts: ['A. 速度', 'B. 质量', 'C. 形状', 'D. 颜色'], ans: 1, explain: '惯性大小只与质量有关，质量越大惯性越大。与速度、形状等无关。' },
  { q: '刹车时人向前倾的原因是？', opts: ['A. 人受到向前的力', 'B. 人具有惯性', 'C. 车对人的推力', 'D. 地球引力'], ans: 1, explain: '刹车时车减速，人由于惯性保持原来的速度，所以向前倾。' },
  { q: '下列哪个不是利用惯性？', opts: ['A. 跳远助跑', 'B. 系安全带', 'C. 抖落衣服上的灰尘', 'D. 锤头松了锤柄撞地'], ans: 1, explain: '系安全带是防止惯性带来的危害，不是利用惯性。跳远助跑、抖落灰尘、锤柄撞地都是利用惯性。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
let animId = null, animTime = 0;
let isPlaying = false;
let showStartup = false;
let exploreCard = -1;

const SCENES = [
  { name: '刹车', desc: '车减速，人前倾' },
  { name: '启动', desc: '车加速，人后仰' }
];

const CARDS = [
  { title: '急刹车', desc: '乘客身体前倾', icon: '🚗' },
  { title: '启动车', desc: '乘客身体后仰', icon: '🚀' },
  { title: '转弯', desc: '乘客向外侧倒', icon: '↩' },
  { title: '敲击棋子', desc: '底部棋子飞出', icon: '♟' },
  { title: '跳起落下', desc: '落回原处', icon: '🦘' },
  { title: '抖落灰尘', desc: '灰尘脱离衣服', icon: '👕' }
];

function drawScene() {
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else { ctx.fillStyle = '#141626'; ctx.fillRect(0,0,W,H); }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r); ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r); ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const isBrake = !showStartup;

  // Road
  ctx.fillStyle = '#e0e0e0';
  ctx.fillRect(20, 200, W - 40, 40);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  for (let x = 40; x < W - 20; x += 40) {
    ctx.fillRect(x, 215, 20, 4);
  }

  // Car body
  const carX = 100, carY = 150;
  ctx.fillStyle = '#007AFF';
  roundRect(ctx, carX, carY, 100, 40, 8);
  ctx.fill();
  ctx.fillStyle = '#a0d0ff';
  roundRect(ctx, carX + 20, carY - 10, 30, 20, 4);
  ctx.fill();
  roundRect(ctx, carX + 50, carY - 10, 30, 20, 4);
  ctx.fill();
  // Wheels
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(carX + 20, carY + 40, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(carX + 80, carY + 40, 8, 0, Math.PI * 2);
  ctx.fill();

  // Person inside
  const personX = carX + 50;
  const tilt = isPlaying ? (isBrake ? -12 : 12) : 0;
  ctx.save();
  ctx.translate(personX, carY);
  ctx.rotate(tilt * Math.PI / 180);
  // Head
  ctx.fillStyle = '#f0c8a0';
  ctx.beginPath();
  ctx.arc(0, -18, 8, 0, Math.PI * 2);
  ctx.fill();
  // Body
  ctx.fillStyle = '#FF3B30';
  roundRect(ctx, -8, -10, 16, 20, 4);
  ctx.fill();
  ctx.restore();

  // Arrow indicator
  if (isPlaying) {
    ctx.fillStyle = '#FF9500';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    const arrowY = 100;
    if (isBrake) {
      // Forward arrow
      ctx.fillText('← 车减速', personX, arrowY);
      ctx.fillStyle = '#FF3B30';
      ctx.fillText('乘客前倾', personX, arrowY - 20);
    } else {
      ctx.fillText('→ 车加速', personX, arrowY);
      ctx.fillStyle = '#34C759';
      ctx.fillText('乘客后仰', personX, arrowY - 20);
    }
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText(isBrake ? '🚗 刹车 — 人由于惯性保持原速度，身体前倾' : '🚗 启动 — 人由于惯性保持原静止状态，身体后仰', W/2, H-5);

  if (!isPlaying) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText('▶ 点击"播放"按钮观察', W/2, 10);
  }
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('点击卡片了解惯性现象', W/2, 10);

  const cols = 3;
  const cardW = 160, cardH = 60, gap = 12;
  const totalW = cols * cardW + (cols - 1) * gap;
  const startX = (W - totalW) / 2;

  for (let i = 0; i < CARDS.length; i++) {
    const row = Math.floor(i / cols);
    const col = i % cols;
    const cx = startX + col * (cardW + gap);
    const cy = 40 + row * (cardH + gap);
    const isSelected = exploreCard === i;

    ctx.fillStyle = isSelected ? '#e8f8ee' : '#fff';
    ctx.strokeStyle = isSelected ? '#34C759' : '#e8e8ed';
    ctx.lineWidth = isSelected ? 2 : 1;
    roundRect(ctx, cx, cy, cardW, cardH, 10);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#ffffff';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(CARDS[i].icon + ' ' + CARDS[i].title, cx + 10, cy + 22);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '11px sans-serif';
    ctx.fillText(CARDS[i].desc, cx + 10, cy + 45);
  }

  if (exploreCard >= 0) {
    ctx.fillStyle = '#34C759';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('✅ 这些都是惯性现象！惯性无处不在', W/2, H-5);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('点击上方卡片学习惯性现象', W/2, H-5);
  }
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = []; let line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W/2, y); y += 28; });
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('核心思想：物体由于惯性保持原来的运动状态', W/2, H-10);
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看过演示。 <button onclick="startObserve()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索过。 <button onclick="startExplore()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    else desc.innerHTML = m.desc + ' <button onclick="startExplore()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2))
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    else desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3))
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#34C759;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('dataDisplay').style.display = 'none';
  }

  if (state.currentMission === 1) {
    document.getElementById('dispScene').textContent = showStartup ? '启动' : '刹车';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((mt, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + mt.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = (CHALLENGES[state.challengeIdx]?.goal.slice(0, 40) || '') + '...';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// ── Observe ──
function startObserve() {
  showStartup = false;
  isPlaying = true;
  animTime = 0;
  document.getElementById('modeToggle').textContent = '切换为启动场景';
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) { state.done.push(0); saveState(); updateUI(); }
    }
  }, 3500);
}

document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  showStartup = !showStartup;
  document.getElementById('modeToggle').textContent = showStartup ? '切换为刹车场景' : '切换为启动场景';
  isPlaying = true;
  animTime = 0;
});

// ── Explore ──
function startExplore() {
  exploreCard = -1;
  isPlaying = true;
  animTime = 0;
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission === 1) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleX;
    const cols = 3, cardW = 160, cardH = 60, gap = 12;
    const totalW = cols * cardW + (cols - 1) * gap;
    const startX2 = (W - totalW) / 2;
    for (let i = 0; i < CARDS.length; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;
      const cx = startX2 + col * (cardW + gap);
      const cy = 40 + row * (cardH + gap);
      if (x >= cx && x <= cx + cardW && y >= cy && y <= cy + cardH) {
        exploreCard = i;
        drawScene();
        if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); }
        return;
      }
    }
    return;
  }
  if (state.currentMission !== 2) return;
  const userInput = prompt('输入答案（选择题输入对应数字）:', '');
  if (userInput === null) return;
  const num = parseFloat(userInput);
  if (isNaN(num)) return;
  const ch = CHALLENGES[state.challengeIdx];
  if (Math.abs(num - ch.answer) <= ch.tolerance) {
    state.challengeIdx++;
    if (state.challengeIdx >= CHALLENGES.length) {
      if (!state.done.includes(2)) state.done.push(2);
      saveState(); updateUI();
      alert('🎉 恭喜通关！惯性知识掌握得很好！');
    } else { saveState(); updateUI(); }
  } else {
    alert('❌ 答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// ── Quiz ──
function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map((o,i) => '<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? '✅ 正确！'+q.explain : '❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

  },

         '• 锤头松了锤柄撞地 • 投篮\n\n' +
         '<em>防止</em> 惯性带来的危害：\n' +

  },
  3: {

    body: '通过选择题来检验你对惯性的理解。\n\n' +

         '刹车时人前倾、启动时人后仰，都是 <em>由于惯性</em>。'
  }
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
