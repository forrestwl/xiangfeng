<script>
// ── Storage Key ──
const STORAGE_KEY = 'physics_jian_dan_ji_xie_ch1';

// ── State ──
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Missions ──
const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '杠杆平衡条件', desc: '观看杠杆平衡的动画演示，理解 F₁L₁ = F₂L₂。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '拖拽调节杠杆', desc: '拖动滑块改变力臂或力的大小，观察杠杆平衡状态的变化。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '杠杆计算闯关', desc: '运用 F₁L₁ = F₂L₂ 公式完成计算挑战！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成几道选择题，巩固杠杆知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '杠杆动力臂 L₁=0.4m，阻力臂 L₂=0.2m，阻力 F₂=100N，求动力 F₁？', answer: 50, unit: 'N' },
  { goal: '撬棍动力 F₁=200N，动力臂 L₁=1.2m，阻力臂 L₂=0.3m，求阻力 F₂？', answer: 800, unit: 'N' },
  { goal: '动力 F₁=30N，阻力 F₂=90N，阻力臂 L₂=0.1m，求动力臂 L₁？', answer: 0.3, unit: 'm' },
  { goal: '动力臂 L₁=0.5m，阻力 F₂=60N，动力 F₁=20N，求阻力臂 L₂？', answer: 1.5, unit: 'm' },
  { goal: '一支扁担长 2m，左端挂 40kg 货物，右端挂 60kg 货物，支点应在距左端多少米处？（g=10N/kg，用 F₁L₁=F₂L₂）', answer: 1.2, unit: 'm' }

// ── Canvas & Animation ──
const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false, animComplete = false;

// Explore state
let exploreDrag = 0; // 0=left_weight, 1=right_weight, 2=fulcrum
let leftMass = 2, rightMass = 3, fulcrumPos = 0.5; // normalized

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuizBg(W, H);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawLever(W, H, f1, l1, f2, l2, highlight) {
  const cx = W / 2;
  const cy = 180;
  const scale = 140;

  // Fulcrum (triangle)
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.moveTo(cx - 12, cy + 10);
  ctx.lineTo(cx + 12, cy + 10);
  ctx.lineTo(cx, cy - 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('△ 支点', cx, cy + 28);

  // Lever bar
  const barLen = scale * 2;
  const leftX = cx - barLen / 2;
  const rightX = cx + barLen / 2;
  const barY = cy;

  // Determine tilt based on balance
  const f1l1 = f1 * l1;
  const f2l2 = f2 * l2;
  const diff = f1l1 - f2l2;
  let tilt = 0;
  if (Math.abs(diff) > 0.5) {
    tilt = Math.max(-0.15, Math.min(0.15, diff * 0.0005));
  }

  ctx.save();
  ctx.translate(cx, barY);
  ctx.rotate(tilt);

  // Bar
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(-barLen / 2, -4, barLen, 8);
  ctx.strokeStyle = '#6B4914';
  ctx.lineWidth = 1;
  ctx.strokeRect(-barLen / 2, -4, barLen, 8);

  // Fulcrum support mark
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';

  // Left side weight
  const lx = -l1 * scale;
  const lwSize = 14 + f1 * 0.08;
  ctx.fillStyle = highlight === 'left' ? '#C49632' : '#8B4513';
  roundRect(ctx, lx - lwSize / 2, -lwSize - 10, lwSize, lwSize, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(f1 + 'N', lx, -lwSize / 2 - 10);

  // Left arm label
  ctx.fillStyle = '#C49632';
  ctx.font = '12px sans-serif';
  ctx.fillText('L₁=' + l1 + 'm', lx / 2, 22);

  // Right side weight
  const rx = l2 * scale;
  const rwSize = 14 + f2 * 0.08;
  ctx.fillStyle = highlight === 'right' ? '#C49632' : '#8B4513';
  roundRect(ctx, rx - rwSize / 2, -rwSize - 10, rwSize, rwSize, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(f2 + 'N', rx, -rwSize / 2 - 10);

  // Right arm label
  ctx.fillStyle = '#06B6D4';
  ctx.font = '12px sans-serif';
  ctx.fillText('L₂=' + l2 + 'm', rx / 2, 22);

  ctx.restore();

  // Balance status
  ctx.textBaseline = 'top';
  ctx.font = '14px sans-serif';
  if (Math.abs(diff) < 0.5) {
    ctx.fillStyle = '#34C759';
    ctx.fillText('✅ 平衡  F₁L₁ = F₂L₂', W / 2, 10);
  } else {
    ctx.fillStyle = '#FF9500';
    const heavier = diff > 0 ? '左侧重' : '右侧重';
    ctx.fillText('⚖️ 不平衡 (' + heavier + ')', W / 2, 10);
  }

  // Show values
  updateDisplay(f1, l1, f2, l2, f1l1, f2l2);
}

function updateDisplay(f1, l1, f2, l2, p1, p2) {
  document.getElementById('dispF1').textContent = f1 + 'N';
  document.getElementById('dispL1').textContent = l1 + 'm';
  document.getElementById('dispF2').textContent = f2 + 'N';
  document.getElementById('dispL2').textContent = l2 + 'm';
  document.getElementById('dispEq1').textContent = p1.toFixed(1);
  document.getElementById('dispEq2').textContent = p2.toFixed(1);
}

function drawObserve(W, H) {
  const intensity = isPlaying ? Math.abs(Math.sin(animTime * 0.5)) : 0.5;
  const f1 = 2 + intensity * 2;
  const l1 = 0.4 + intensity * 0.2;
  const f2 = 2 + (1 - intensity) * 2;
  const l2 = 0.6 - intensity * 0.2;
  drawLever(W, H, f1, l1, f2, l2, null);
}

function drawExplore(W, H) {
  // Convert slider position to values
  const slider = document.getElementById('mainSlider');
  const sliderVal = document.getElementById('sliderVal');
  const val = parseInt(slider.value);

  let f1, l1, f2, l2;
  const mode = document.getElementById('sliderLabel').textContent;

  if (mode === '力臂') {
    l1 = 0.2 + val / 100 * 0.8;
    l2 = 0.2 + (100 - val) / 100 * 0.8;
    f1 = 3;
    f2 = 3;
  } else {
    f1 = 1 + val / 100 * 5;
    f2 = 1 + (100 - val) / 100 * 5;
    l1 = 0.5;
    l2 = 0.5;
  }

  sliderVal.textContent = val;
  drawLever(W, H, f1, l1, f2, l2, 'left');
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) {
      lines.push(line);
      line = '';
    }
  }
  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 28; });

  // Formula hint
  ctx.fillStyle = '#C49632';
  ctx.font = '14px sans-serif';
  ctx.fillText('公式: F₁ × L₁ = F₂ × L₂', W / 2, y + 20);

  // Draw placeholder for answer
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(ctx, W / 2 - 100, H / 2 + 20, 200, 50, 10);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('点击此处输入答案（' + ch.unit + '）', W / 2, H / 2 + 45);

  // Progress
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('第 ' + (state.challengeIdx + 1) + ' / ' + CHALLENGES.length + ' 关', W / 2, H - 10);
}

function drawQuizBg(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
}

// ── Animation ──
function animate() {
  if (isPlaying && state.currentMission === 0) {
    animTime += 0.03;
  }
  drawScene();
  animId = requestAnimationFrame(animate);
}

// ── Mission Switching ──
function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    }
    document.getElementById('sliderControl').className = 'slider-control';
    document.getElementById('exploreBtn').className = 'explore-btn';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索过。 <button onclick="switchMission(1)" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="markExploreDone()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 已完成探索</button>';
    }
    document.getElementById('sliderControl').className = 'slider-control show';
    document.getElementById('exploreBtn').className = 'explore-btn show';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('sliderControl').className = 'slider-control';
    document.getElementById('exploreBtn').className = 'explore-btn';
    document.getElementById('extraInfo').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('sliderControl').className = 'slider-control';
    document.getElementById('exploreBtn').className = 'explore-btn';
    document.getElementById('extraInfo').style.display = 'none';
  }

  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  // Progress dots
  MISSIONS.forEach(function(_, i) {
    var dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  // Challenge HUD
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
  }

  // Quiz overlay
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

// ── Observe ──
function startObserve() {
  isPlaying = true;
  animTime = 0;
  animComplete = false;
  setTimeout(function() {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      animComplete = true;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();
      }
    }
  }, 5000);
}

// ── Explore ──
document.getElementById('mainSlider').addEventListener('input', function() {
  if (state.currentMission === 1) drawScene();
});

document.getElementById('exploreBtn').addEventListener('click', function() {
  if (state.currentMission === 1) {
    document.getElementById('mainSlider').value = 50;
    document.getElementById('sliderVal').textContent = 50;
    drawScene();
  }
});

document.getElementById('sliderLabel').addEventListener('click', function() {
  if (state.currentMission === 1) {
    var label = document.getElementById('sliderLabel');
    label.textContent = label.textContent === '力臂' ? '力' : '力臂';
    drawScene();
  }
});

function markExploreDone() {
  if (!state.done.includes(1)) {
    state.done.push(1);
    saveState();
    updateUI();
  }
}

// ── Challenge ──
canvas.addEventListener('click', function(e) {
  if (state.currentMission !== 2) return;

  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const W = canvas.width, H = canvas.height;

  // Check if clicked on answer area
  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= H / 2 + 20 && y <= H / 2 + 70) {
    const userInput = prompt('输入你的答案（数字）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;

    const ch = CHALLENGES[state.challengeIdx];
    const tolerance = ch.answer < 1 ? 0.05 : ch.answer < 10 ? 0.5 : 5;
    if (Math.abs(num - ch.answer) <= tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
        alert('✅ 正确！进入下一关。');
      }
    } else {
      alert('❌ 答案不对，再想想！提示：用 F₁L₁ = F₂L₂ 公式。');
    }
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// ── Quiz ──
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map(function(o, i) {
    return '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>';
  }).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(el, i) {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

// ── Init ──
switchMission(state.currentMission);
animate();

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');

      document.getElementById('kbToggle').classList.add('open');

function closeQuiz() { switchMission(0); }
