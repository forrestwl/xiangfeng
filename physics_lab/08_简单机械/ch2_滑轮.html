<script>

const STORAGE_KEY = 'physics_jian_dan_ji_xie_ch2';

// ── State ──

let state = {
  done: saved.done || [],
  currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0,
  quizIdx: saved.quizIdx || 0,
  quizDone: saved.quizDone || []
};

  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}

  { id: 'observe', label: '🔬 观察', title: '定滑轮与动滑轮', desc: '观察定滑轮改变方向、动滑轮省力的工作方式。', doneLabel: '已观看' },

// ── Canvas ──
const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let pulleyMode = 0; // 0=fixed, 1=movable, 2=pulley system
let exploreN = 2;

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuizBg(W, H);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawPulley(W, H, cx, cy, radius, label) {
  // Pulley wheel
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();

  // Inner circle
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(cx, cy, radius - 4, 0, Math.PI * 2);
  ctx.fill();

  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();

  // Groove marks
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, radius - 2, 0.2, 0.8);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, radius - 2, Math.PI + 0.2, Math.PI + 0.8);
  ctx.stroke();

  if (label) {
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy + radius + 16);
  }
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const G = 100;
  const lift = isPlaying ? Math.sin(animTime * 1.5) * 40 : 0;

  if (pulleyMode === 0) {
    // Fixed pulley
    const cx = W / 2, cy = 80;
    drawPulley(W, H, cx, cy, 35, '定滑轮');

    // Ceiling mount
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(cx - 40, 0, 80, 6);
    ctx.fillRect(cx - 3, 6, 6, 35);

    // Rope over pulley
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 35, cy + 10);
    ctx.arc(cx, cy, 35, 0.3 + Math.PI, 0.3 + Math.PI);
    ctx.stroke();

    // Left side - pull force
    ctx.strokeStyle = '#C49632';
    ctx.lineWidth = 3;
    ctx.setLineDash([5, 5]);
    ctx.beginPath();
    ctx.moveTo(cx - 35, cy + 10);
    ctx.lineTo(cx - 80, cy + 60 + lift);
    ctx.stroke();
    ctx.setLineDash([]);

    // Pull arrow
    ctx.fillStyle = '#C49632';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↓ F=' + G + 'N', cx - 80, cy + 90 + lift);

    // Right side - load
    const loadY = cy + 35 + lift;
    ctx.fillStyle = '#8B4513';
    roundRect(ctx, cx - 20, loadY, 40, 30, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(G + 'N', cx, loadY + 15);

    // Rope to load
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 35, cy + 10);
    ctx.lineTo(cx + 35, loadY);
    ctx.stroke();

    // Arrow showing direction change
    if (isPlaying) {
      ctx.strokeStyle = '#C49632';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(cx, cy, 20, Math.PI * 0.8, Math.PI * 1.3);
      ctx.stroke();
      ctx.fillStyle = '#C49632';
      ctx.font = '11px sans-serif';
      ctx.fillText('改变方向', cx, cy - 28);
    }

    document.getElementById('dispType').textContent = '定滑轮';
    document.getElementById('dispF').textContent = G + 'N';
    document.getElementById('dispG').textContent = G + 'N';
    document.getElementById('dispRatio').textContent = '1';
  } else if (pulleyMode === 1) {
    // Movable pulley
    const cx = W / 2, cy = 90 + lift;
    drawPulley(W, H, cx, cy, 35, '动滑轮');

    // Ceiling
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(cx - 3, 0, 6, cy - 35);

    // Rope fixed at top
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 35);
    ctx.lineTo(cx, 0);
    ctx.stroke();

    // Rope around pulley
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 35, cy + 10);
    ctx.arc(cx, cy, 35, 0.3 + Math.PI, 0.3 + Math.PI);
    ctx.lineTo(cx - 60, cy + 50);
    ctx.stroke();

    // Pull arrow
    ctx.fillStyle = '#C49632';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↑ F=' + (G/2) + 'N', cx - 60, cy + 75);

    // Load attached to pulley center
    const loadTop = cy + 35;
    ctx.fillStyle = '#8B4513';
    roundRect(ctx, cx - 20, loadTop, 40, 30, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(G + 'N', cx, loadTop + 15);

    // Connecting rod from pulley to load
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fillRect(cx - 2, cy + 35, 4, 5);

    document.getElementById('dispType').textContent = '动滑轮';
    document.getElementById('dispF').textContent = (G/2) + 'N';
    document.getElementById('dispG').textContent = G + 'N';
    document.getElementById('dispRatio').textContent = '0.5';
  } else {
    // Pulley system
    const cx = W / 2, baseCy = 80;
    const lift2 = isPlaying ? Math.sin(animTime * 1.5) * 30 : 0;
    const cy1 = 70, cy2 = 110 + lift2;

    // Top fixed pulley
    drawPulley(W, H, cx, cy1, 25, '');
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(cx - 30, 0, 60, 6);
    ctx.fillRect(cx - 3, 6, 6, cy1 - 25);

    // Bottom movable pulley
    drawPulley(W, H, cx, cy2, 25, '');
    // Bottom pulley load
    const loadTop2 = cy2 + 25;
    ctx.fillStyle = '#8B4513';
    roundRect(ctx, cx - 18, loadTop2, 36, 26, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('100N', cx, loadTop2 + 13);

    // Rope routing: fixed at top, around bottom pulley, up to top pulley, down to hand
    ctx.strokeStyle = '#a08040';
    ctx.lineWidth = 2.5;

    // Fixed end (top left of bottom pulley -> mount)
    ctx.beginPath();
    ctx.moveTo(cx - 25, cy2);
    ctx.lineTo(cx - 25, 0);
    ctx.stroke();

    // Around bottom pulley
    ctx.beginPath();
    ctx.arc(cx, cy2, 25, Math.PI, 0);
    ctx.stroke();

    // From bottom pulley to top pulley (right side)
    ctx.beginPath();
    ctx.moveTo(cx + 25, cy2);
    ctx.lineTo(cx + 25, cy1);
    ctx.stroke();

    // Around top pulley
    ctx.beginPath();
    ctx.arc(cx, cy1, 25, 0, Math.PI);
    ctx.stroke();

    // From top pulley to hand
    ctx.beginPath();
    ctx.moveTo(cx - 25, cy1);
    ctx.lineTo(cx - 80, cy1 + 40);
    ctx.stroke();

    // Pull arrow
    ctx.fillStyle = '#C49632';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('↓ F=50N', cx - 80, cy1 + 60);

    // n label
    ctx.fillStyle = '#C49632';
    ctx.font = '13px sans-serif';
    ctx.fillText('n=2', cx + 25, (cy1 + cy2) / 2);

    document.getElementById('dispType').textContent = '滑轮组 (n=2)';
    document.getElementById('dispF').textContent = '50N';
    document.getElementById('dispG').textContent = '100N';
    document.getElementById('dispRatio').textContent = '0.5';
  }
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const n = exploreN;
  const G = 100;
  const F = G / n;

  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('滑轮组绕绳方式  n = ' + n, W / 2, 25);

  // Draw schematic based on n
  const cx = W / 2;
  const topY = 50, bottomY = 150;

  // Top pulley(s)
  if (n <= 3) {
    drawPulley(W, H, cx, topY, 28, '');
  } else {
    drawPulley(W, H, cx - 20, topY, 22, '');
    drawPulley(W, H, cx + 20, topY, 22, '');
  }

  // Bottom pulley(s)
  const botPulleys = n <= 3 ? 1 : 2;
  if (botPulleys === 1) {
    drawPulley(W, H, cx, bottomY, 28, '');
  } else {
    drawPulley(W, H, cx - 20, bottomY, 22, '');
    drawPulley(W, H, cx + 20, bottomY, 22, '');
  }

  // Ceiling mount
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(cx - 50, 0, 100, 5);

  // Draw ropes based on n
  ctx.strokeStyle = '#a08040';
  ctx.lineWidth = 2.5;

  if (n === 2) {
    // Fixed end
    ctx.beginPath(); ctx.moveTo(cx - 28, bottomY); ctx.lineTo(cx - 28, 0); ctx.stroke();
    // Movable end
    ctx.beginPath(); ctx.moveTo(cx + 28, bottomY); ctx.lineTo(cx + 28, topY);
    ctx.arc(cx, topY, 28, 0, Math.PI);
    ctx.lineTo(cx - 60, topY + 30); ctx.stroke();
    // Mark n
    ctx.fillStyle = '#C49632'; ctx.font = '12px sans-serif';
    ctx.fillText('①', cx - 28, bottomY / 2);
    ctx.fillText('②', (cx + 28 + cx - 60) / 2, topY + 15);
  } else if (n === 3) {
    ctx.beginPath(); ctx.moveTo(cx - 28, bottomY); ctx.lineTo(cx - 28, topY + 28); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, bottomY - 28); ctx.lineTo(cx, 50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 28, bottomY); ctx.lineTo(cx + 28, topY);
    ctx.arc(cx, topY, 28, 0, Math.PI);
    ctx.lineTo(cx - 70, topY + 30); ctx.stroke();
    ctx.fillStyle = '#C49632'; ctx.font = '12px sans-serif';
    ctx.fillText('①', cx - 28, (bottomY + topY) / 2);
    ctx.fillText('②', cx, (bottomY + topY) / 2);
    ctx.fillText('③', (cx + 28 + cx - 70) / 2, topY + 15);
  } else if (n === 4) {
    ctx.fillStyle = '#C49632'; ctx.font = '12px sans-serif';
    ctx.beginPath(); ctx.moveTo(cx - 22, bottomY); ctx.lineTo(cx - 22, 0); ctx.stroke();
    ctx.fillText('①', cx - 22, (bottomY + 50) / 2);
    ctx.beginPath(); ctx.moveTo(cx + 22, bottomY); ctx.lineTo(cx + 22, 0); ctx.stroke();
    ctx.fillText('②', cx + 22, (bottomY + 50) / 2);
    ctx.beginPath(); ctx.moveTo(cx - 22, bottomY - 22); ctx.lineTo(cx - 22 - 28, 50 + 22); ctx.stroke();
    // Wrap around top left, down
    ctx.beginPath(); ctx.moveTo(cx - 50, topY); ctx.lineTo(cx - 50 + 22, bottomY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + 22, bottomY - 22); ctx.lineTo(cx + 22 + 28, topY + 22);
    // To hand
    ctx.beginPath(); ctx.moveTo(cx + 50, topY); ctx.lineTo(cx + 70, topY + 30); ctx.stroke();
    ctx.fillText('③', cx - 50, (topY + bottomY) / 2);
    ctx.fillText('④', cx + 50, (topY + bottomY) / 2);
  }

  // Load
  const loadY = bottomY + 28;
  ctx.fillStyle = '#8B4513';
  roundRect(ctx, cx - 18, loadY, 36, 26, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(G + 'N', cx, loadY + 13);

  // Info
  ctx.fillStyle = '#C49632';
  ctx.font = '14px sans-serif';
  ctx.textBaseline = 'top';
  ctx.fillText('G = ' + G + 'N,  n = ' + n + ',  F = G/n = ' + F + 'N', W / 2, H - 30);

  // Click hint for changing n
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '11px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('💡 点击左上角按钮切换 n 值', 10, H - 5);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = [], line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; }
  }
  if (line) lines.push(line);
  let y = 50;
  lines.forEach(function(l) { ctx.fillText(l.trim(), W / 2, y); y += 28; });
  ctx.fillStyle = '#C49632';
  ctx.font = '14px sans-serif';
  ctx.fillText('公式: F = G/n,  s = n×h', W / 2, y + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  roundRect(ctx, W / 2 - 100, H / 2 + 20, 200, 50, 10);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.fillText('点击输入答案 (' + ch.unit + ')', W / 2, H / 2 + 45);
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('第 ' + (state.challengeIdx + 1) + ' / ' + CHALLENGES.length + ' 关', W / 2, H - 10);
}

function drawQuizBg(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
}

function animate() {
  if (isPlaying && state.currentMission === 0) { animTime += 0.03; }
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
  updateUI();
  drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="switchMission(1)" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="markExploreDone()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 已完成探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('extraInfo').style.display = 'none';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map(function(m, i) {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach(function(_, i) {
    var dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) {
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
  }
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

function startObserve() {
  isPlaying = true;
  animTime = 0;
  setTimeout(function() {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();
      }
    }
  }, 5000);
}

document.getElementById('modeToggle').addEventListener('click', function() {
  if (state.currentMission === 0) {
    pulleyMode = (pulleyMode + 1) % 3;
    var labels = ['切换动滑轮', '切换滑轮组', '切换定滑轮'];
    document.getElementById('modeToggle').textContent = labels[pulleyMode];
    if (isPlaying) { animTime = 0; }
    drawScene();
  } else if (state.currentMission === 1) {
    exploreN = exploreN >= 4 ? 2 : exploreN + 1;
    document.getElementById('modeToggle').textContent = 'n=' + exploreN;
    drawScene();
  }
});

function markExploreDone() {
  if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); }
}

canvas.addEventListener('click', function(e) {
  if (state.currentMission !== 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const W = canvas.width, H = canvas.height;
  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= H / 2 + 20 && y <= H / 2 + 70) {
    const userInput = prompt('输入你的答案（数字）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (Math.abs(num - ch.answer) <= 5) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState(); updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState(); updateUI();
        alert('✅ 正确！进入下一关。');
      }
    } else {
      alert('❌ 答案不对！提示：用 F = G/n 或 s = n×h 公式。');
    }
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map(function(o, i) {
    return '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>';
  }).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(el, i) {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

switchMission(state.currentMission);
animate();

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function closeQuiz() { switchMission(0); }
