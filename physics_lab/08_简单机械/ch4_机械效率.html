<script>
const STORAGE_KEY = 'physics_jian_dan_ji_xie_ch4';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [], currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0, quizIdx: saved.quizIdx || 0, quizDone: saved.quizDone || []
};
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '有用功与总功', desc: '观察滑轮组工作中的有用功、额外功和总功。', doneLabel: '已观看' },

  { id: 'challenge', label: '🎯 挑战', title: '机械效率计算', desc: '运用 η = W有/W总 公式完成计算！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成选择题，巩固机械效率知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '有用功 W有=800J，总功 W总=1000J，机械效率 η 是多少？', answer: 80, unit: '%' },
  { goal: '总功 W总=500J，机械效率 η=60%，有用功 W有 是多少？', answer: 300, unit: 'J' },
  { goal: '有用功 W有=600J，机械效率 η=75%，总功 W总 是多少？', answer: 800, unit: 'J' },
  { goal: '滑轮组提升 200N 物体上升 2m，拉力做功 500J，机械效率 η 是多少？', answer: 80, unit: '%' },
  { goal: '斜面长 5m，高 2m，拉力 150N，物重 300N，机械效率 η 是多少？', answer: 80, unit: '%' }
];

const QUIZ_POOL = [
  { q: '机械效率 η 总是？', opts: ['A. η > 1', 'B. η = 1', 'C. η < 1', 'D. η ≥ 1'], ans: 2, explain: '因为额外功不可避免，所以有用功总是小于总功，η=W有/W总<1（小于100%）。' },
  { q: '机械效率的计算公式是？', opts: ['A. η = W总/W有', 'B. η = W有/W总', 'C. η = W额/W总', 'D. η = W有/W额'], ans: 1, explain: '机械效率 η = 有用功 / 总功 × 100%，即 η = W有/W总。' },
  { q: '以下哪种方法不能提高机械效率？', opts: ['A. 减轻机械自重', 'B. 加润滑油', 'C. 增加物重', 'D. 增加额外功'], ans: 3, explain: '提高机械效率的方法：减轻机械自重、加润滑油减小摩擦、增加物重（有用功占比变大）。增加额外功会降低效率。' },
  { q: '关于机械效率，下列说法正确的是？', opts: ['A. 机械效率越高越省力', 'B. 功率大的机械效率高', 'C. 总功一定时有用功越多效率越高', 'D. 机械效率可以达到100%'], ans: 2, explain: '总功一定时，有用功越多，η越大。效率与功率、省力无关，且由于额外功不可避免，η总小于100%。' },
  { q: '用滑轮组提升重物，若增加提升的物重，机械效率将？', opts: ['A. 提高', 'B. 降低', 'C. 不变', 'D. 不确定'], ans: 0, explain: '增加物重时，有用功增加，而额外功（克服动滑轮重和摩擦）基本不变，所以机械效率提高。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0, isPlaying = false;
let machineType = 0; // 0=滑轮组, 1=斜面, 2=杠杆

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuizBg(W, H);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
}

function drawEfficiencyBars(W, H, Wyou, Wextra, Wtotal, label) {
  const barW = 200, barH = 30;
  const startX = (W - barW) / 2;
  const y1 = 60, y2 = 120, y3 = 180;

  // W有
  ctx.fillStyle = '#34C759';
  roundRect(ctx, startX, y1, barW * (Wyou / Wtotal), barH, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, startX + barW * (Wyou / Wtotal), y1, barW * (1 - Wyou / Wtotal), barH, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = '13px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('有用功 W有 = ' + Wyou + 'J', startX - 10, y1 + 20);

  // W额
  ctx.fillStyle = '#FF9500';
  roundRect(ctx, startX, y2, barW * (Wextra / Wtotal), barH, 6);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, startX + barW * (Wextra / Wtotal), y2, barW * (1 - Wextra / Wtotal), barH, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = '13px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('额外功 W额 = ' + Wextra + 'J', startX - 10, y2 + 20);

  // W总
  ctx.fillStyle = '#C49632';
  roundRect(ctx, startX, y3, barW, barH, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff'; ctx.font = '13px sans-serif'; ctx.textAlign = 'right';
  ctx.fillText('总功 W总 = ' + Wtotal + 'J', startX - 10, y3 + 20);

  // Eta
  const eta = (Wyou / Wtotal * 100).toFixed(1);
  ctx.fillStyle = '#C49632'; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('η = ' + eta + '%', W / 2, 260);

  ctx.fillStyle = 'rgba(255,255,255,0.65)'; ctx.font = '13px sans-serif';
  ctx.fillText(label || '', W / 2, 30);

  // Update display
  document.getElementById('dispWy').textContent = Wyou + 'J';
  document.getElementById('dispWe').textContent = Wextra + 'J';
  document.getElementById('dispWz').textContent = Wtotal + 'J';
  document.getElementById('dispEta').textContent = eta + '%';
}

function drawObserve(W, H) {
  // Animate the work values
  const phase = isPlaying ? animTime : 0;
  const t = Math.sin(phase * 0.5) * 0.5 + 0.5;

  const Wtotal = 1000;
  const Wyou = 600 + t * 200; // 600-800
  const Wextra = Wtotal - Wyou;

  drawEfficiencyBars(W, H, Math.round(Wyou), Math.round(Wextra), Wtotal, '滑轮组提升重物：有用功与总功');
  document.getElementById('dispType').textContent = '滑轮组';
}

function drawExplore(W, H) {
  const types = [
    { name: '滑轮组', Wyou: 800, Wextra: 200, Wtotal: 1000 },
    { name: '斜面', Wyou: 700, Wextra: 300, Wtotal: 1000 },
    { name: '杠杆', Wyou: 900, Wextra: 100, Wtotal: 1000 }
  ];
  const t = types[machineType];
  drawEfficiencyBars(W, H, t.Wyou, t.Wextra, t.Wtotal, t.name + '：有用功 vs 总功');
  document.getElementById('dispType').textContent = t.name;
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 50;
  lines.forEach(function(l) { ctx.fillText(l.trim(), W / 2, y); y += 28; });
  ctx.fillStyle = '#C49632'; ctx.font = '14px sans-serif';
  ctx.fillText('公式: η = W有/W总 × 100%', W / 2, y + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(ctx, W / 2 - 100, H / 2 + 20, 200, 50, 10); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textBaseline = 'middle';
  ctx.fillText('点击输入答案 (' + ch.unit + ')', W / 2, H / 2 + 45);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '12px sans-serif'; ctx.textBaseline = 'bottom';
  ctx.fillText('第 ' + (state.challengeIdx + 1) + ' / ' + CHALLENGES.length + ' 关', W / 2, H - 10);
}

function drawQuizBg(W, H) { ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H); }

function animate() {
  if (isPlaying && state.currentMission === 0) { animTime += 0.03; }
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) { state.currentMission = idx; saveState(); updateUI(); drawScene();;
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="switchMission(1)" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="markExploreDone()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 已完成探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#C49632;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  }
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map(function(_, i) {
    const cls = i === state.currentMission ? 'tab active' : state.done.includes(i) ? 'tab done' : 'tab';
    const check = state.done.includes(i) ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + MISSIONS[i].label + check + '</div>';
  }).join('');
  MISSIONS.forEach(function(_, i) {
    var d = document.getElementById('pdot' + i);
    if (state.done.includes(i)) d.className = 'dot done';
    else if (i === state.currentMission) d.className = 'dot active';
    else d.className = 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

function startObserve() { isPlaying = true; animTime = 0; }
document.getElementById('modeToggle').addEventListener('click', function() {
  if (state.currentMission === 1) {
    machineType = (machineType + 1) % 3;
    var names = ['滑轮组', '斜面', '杠杆'];
    document.getElementById('modeToggle').textContent = names[machineType];
    drawScene();
  }
});

function markExploreDone() { if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); } }

canvas.addEventListener('click', function(e) {
  if (state.currentMission !== 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const W = canvas.width, H = canvas.height;
  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= H / 2 + 20 && y <= H / 2 + 70) {
    const userInput = prompt('输入你的答案（数字）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (Math.abs(num - ch.answer) <= 3) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); saveState(); updateUI(); alert('🎉 恭喜通关！'); }
      else { saveState(); updateUI(); alert('✅ 正确！进入下一关。'); }
    } else { alert('❌ 答案不对！提示：用 η = W有/W总 公式。'); }
  }
});

function resetChallenges() { state.challengeIdx = 0; const idx = state.done.indexOf(2); if (idx >= 0) state.done.splice(idx, 1); saveState(); updateUI(); }
function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) { if (!state.done.includes(3)) { state.done.push(3); saveState(); } updateUI(); return; }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map(function(o, i) { return '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'; }).join('');
  document.getElementById('quizResult').textContent = ''; document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(el, i) { el.style.pointerEvents = 'none'; if (i === q.ans) el.className = 'quiz-opt correct'; else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx === q.ans ? '✅ 正确！' + q.explain : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

switchMission(state.currentMission);
animate();

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function closeQuiz() { switchMission(0); }
