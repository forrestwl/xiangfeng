<script>
const STORAGE_KEY = 'physics_gong_he_ji_xie_neng_ch1';
const saved = (() => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {} return null; })() || {};
let state = {
  done: saved.done || [], currentMission: saved.currentMission || 0,
  challengeIdx: saved.challengeIdx || 0, quizIdx: saved.quizIdx || 0, quizDone: saved.quizDone || []
};
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }

const MISSIONS = [
  { id: 'observe', label: '🔬 观察', title: '做功动画', desc: '观看推力做功的动画：W = F × s。', doneLabel: '已观看' },
  { id: 'explore', label: '✋ 探索', title: '不做功的三种情况', desc: '点击按钮了解不做功的三种典型情况。', doneLabel: '已探索' },
  { id: 'challenge', label: '🎯 挑战', title: '功的计算挑战', desc: '运用 W = Fs 公式完成计算！', doneLabel: '已闯关' },
  { id: 'quiz', label: '⭐ 测验', title: '知识检测', desc: '完成选择题，巩固做功知识。', doneLabel: '已完成' }
];

const CHALLENGES = [
  { goal: '用 50N 的力将物体水平推动 4m，做功多少？', answer: 200, unit: 'J' },
  { goal: '用 100N 的力将物体提升 2m，做功多少？', answer: 200, unit: 'J' },
  { goal: '做了 500J 的功，物体移动了 10m，拉力是多少？', answer: 50, unit: 'N' },
  { goal: '用 200N 的力拉物体，做了 800J 的功，物体移动了多少米？', answer: 4, unit: 'm' },
  { goal: '一个重 50N 的物体从 3m 高处落下，重力做功多少？', answer: 150, unit: 'J' }
];

const QUIZ_POOL = [
  { q: '做功的两个必要因素是？', opts: ['A. 力和距离', 'B. 作用在物体上的力和物体在力的方向上移动的距离', 'C. 力和速度', 'D. 质量和速度'], ans: 1, explain: '做功的两个必要因素：一是作用在物体上的力，二是物体在力的方向上移动的距离。' },
  { q: '下列情况中，力对物体做功的是？', opts: ['A. 提着水桶水平前进', 'B. 举着杠铃不动', 'C. 推石头没推动', 'D. 物体自由下落'], ans: 3, explain: '物体自由下落时，重力方向向下，物体在重力方向上移动了距离，重力做功。' },
  { q: '功的国际单位是？', opts: ['A. N（牛顿）', 'B. W（瓦特）', 'C. J（焦耳）', 'D. Pa（帕斯卡）'], ans: 2, explain: '功的单位是焦耳（J），1J = 1N·m。纪念物理学家焦耳。' },
  { q: '用 10N 的力将物体推动 5m，做功多少？', opts: ['A. 2J', 'B. 15J', 'C. 50J', 'D. 500J'], ans: 2, explain: 'W = Fs = 10N × 5m = 50J。' },
  { q: '下列哪种情况不做功？', opts: ['A. 起重机吊起货物', 'B. 人推车前进', 'C. 提着水桶原地不动', 'D. 马拉车前进'], ans: 2, explain: '提着水桶原地不动，有力但没有在力的方向上移动距离，不做功。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0, isPlaying = false;
let noWorkCase = 0; // 0=力与方向垂直, 1=有力无距离, 2=有距离无力

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuizBg(W, H);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r); ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r); ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r); ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r); ctx.closePath();
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const progress = isPlaying ? Math.min(1, animTime * 0.3) : 0;
  const moveX = progress * 200;
  const F = 50;
  const s = (moveX / 100).toFixed(1);

  // Ground
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(0, 230, W, 70);

  // Object
  const objX = 200 + moveX;
  const objY = 190;
  ctx.fillStyle = '#06B6D4';
  roundRect(ctx, objX - 30, objY - 20, 60, 40, 6);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('物体', objX, objY);

  // Force arrow
  ctx.strokeStyle = '#FF3B30';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(objX, objY);
  ctx.lineTo(objX + 60, objY);
  ctx.stroke();
  // Arrowhead
  ctx.fillStyle = '#FF3B30';
  ctx.beginPath();
  ctx.moveTo(objX + 65, objY);
  ctx.lineTo(objX + 58, objY - 5);
  ctx.lineTo(objX + 58, objY + 5);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#FF3B30';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('F = ' + F + 'N', objX + 35, objY - 15);

  // Distance marker
  if (moveX > 20) {
    ctx.strokeStyle = '#06B6D4';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.moveTo(200, objY + 35);
    ctx.lineTo(200 + moveX, objY + 35);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#06B6D4';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('s = ' + s + 'm', 200 + moveX / 2, objY + 50);
  }

  // Work done
  if (progress > 0) {
    const Wval = F * parseFloat(s);
    ctx.fillStyle = '#06B6D4';
    ctx.font = '18px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('W = F × s = ' + F + ' × ' + s + ' = ' + Wval.toFixed(1) + 'J', W / 2, 40);
    document.getElementById('dispF').textContent = F + 'N';
    document.getElementById('dispS').textContent = s + 'm';
    document.getElementById('dispW').textContent = Wval.toFixed(1) + 'J';
  }

  if (!isPlaying || (isPlaying && progress >= 1)) {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.textAlign = 'left';
    ctx.fillText('💡 点击"播放"观看做功演示', 10, H - 5);
  }
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;

  if (noWorkCase === 0) {
    // Force perpendicular to motion
    // Person carrying object walking
    ctx.fillStyle = '#f0c8a0';
    ctx.beginPath();
    ctx.arc(cx - 80, 150, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, cx - 100, 175, 40, 50, 6);
    ctx.fill();

    // Object in hand
    ctx.fillStyle = '#8B4513';
    roundRect(ctx, cx - 30, 120, 30, 30, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('水桶', cx - 15, 135);

    // Arms
    ctx.strokeStyle = '#f0c8a0';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cx - 80, 175);
    ctx.lineTo(cx - 30, 140);
    ctx.stroke();

    // Force arrow (up)
    ctx.strokeStyle = '#FF3B30';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 15, 120);
    ctx.lineTo(cx - 15, 80);
    ctx.stroke();
    ctx.fillStyle = '#FF3B30';
    ctx.font = '12px sans-serif';
    ctx.fillText('F ↑', cx - 15, 72);

    // Moving arrow (horizontal)
    ctx.strokeStyle = '#06B6D4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx - 120, 200);
    ctx.lineTo(cx + 50, 200);
    ctx.stroke();
    ctx.fillStyle = '#06B6D4';
    ctx.font = '12px sans-serif';
    ctx.fillText('→ s（水平移动）', cx - 20, 220);

    ctx.fillStyle = '#FF3B30';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText('❌ 不做功：力与运动方向垂直', cx, 10);

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('提着水桶水平行走 — 拉力向上，运动水平，垂直不做功', cx, 260);

    document.getElementById('dispF').textContent = 'F向上';
    document.getElementById('dispS').textContent = 's水平';
    document.getElementById('dispW').textContent = '0J';
  } else if (noWorkCase === 1) {
    // Force but no motion
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, cx - 40, 160, 80, 60, 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('大石头', cx, 190);

    // Person pushing
    ctx.fillStyle = '#f0c8a0';
    ctx.beginPath();
    ctx.arc(cx - 120, 150, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    roundRect(ctx, cx - 140, 175, 40, 50, 6);
    ctx.fill();

    // Push arrow
    ctx.strokeStyle = '#FF3B30';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx - 100, 190);
    ctx.lineTo(cx - 50, 190);
    ctx.stroke();
    ctx.fillStyle = '#FF3B30';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'bottom';
    ctx.fillText('F →', cx - 75, 185);

    // Cross mark
    ctx.strokeStyle = '#FF3B30';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(cx + 10, 145);
    ctx.lineTo(cx + 40, 175);
    ctx.moveTo(cx + 40, 145);
    ctx.lineTo(cx + 10, 175);
    ctx.stroke();

    ctx.fillStyle = '#FF3B30';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText('❌ 不做功：有力无距离（s=0）', cx, 10);

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('用力推石头但没推动 — 有力作用，但没有移动距离', cx, 270);

    document.getElementById('dispF').textContent = 'F≠0';
    document.getElementById('dispS').textContent = 's=0';
    document.getElementById('dispW').textContent = '0J';
  } else {
    // Motion but no force
    // Object sliding on ice
    ctx.fillStyle = '#e0f0ff';
    ctx.fillRect(0, 210, W, 90);

    ctx.fillStyle = '#06B6D4';
    roundRect(ctx, cx - 30, 175, 60, 40, 6);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('冰壶', cx, 195);

    // Motion arrow
    ctx.strokeStyle = '#06B6D4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + 30, 195);
    ctx.lineTo(cx + 100, 195);
    ctx.stroke();
    ctx.fillStyle = '#06B6D4';
    ctx.font = '12px sans-serif';
    ctx.fillText('→ v（有速度）', cx + 70, 210);

    // Cross on force
    ctx.strokeStyle = '#FF3B30';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, 165);
    ctx.lineTo(cx + 20, 145);
    ctx.moveTo(cx + 20, 165);
    ctx.lineTo(cx, 145);
    ctx.stroke();

    ctx.fillStyle = '#FF3B30';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'top';
    ctx.fillText('❌ 不做功：有距离无力（F=0）', cx, 10);

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '13px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText('冰壶在光滑冰面上滑行 — 没有推力，物体由于惯性继续运动', cx, 270);

    document.getElementById('dispF').textContent = 'F=0';
    document.getElementById('dispS').textContent = 's≠0';
    document.getElementById('dispW').textContent = '0J';
  }
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff'; ctx.font = '15px sans-serif'; ctx.textAlign = 'center';
  const maxW = W - 40;
  let lines = [], line = '';
  for (let c of ch.goal) { line += c; if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; } }
  if (line) lines.push(line);
  let y = 50;
  lines.forEach(function(l) { ctx.fillText(l.trim(), W / 2, y); y += 28; });
  ctx.fillStyle = '#06B6D4'; ctx.font = '14px sans-serif';
  ctx.fillText('公式: W = F × s', W / 2, y + 20);
  ctx.fillStyle = 'rgba(255,255,255,0.08)'; roundRect(ctx, W / 2 - 100, H / 2 + 20, 200, 50, 10); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.35)'; ctx.font = '13px sans-serif'; ctx.textBaseline = 'middle';
  ctx.fillText('点击输入答案 (' + ch.unit + ')', W / 2, H / 2 + 45);
  ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.font = '12px sans-serif'; ctx.textBaseline = 'bottom';
  ctx.fillText('第 ' + (state.challengeIdx + 1) + ' / ' + CHALLENGES.length + ' 关', W / 2, H - 10);
}

function drawQuizBg(W, H) { ctx.fillStyle = '#141626'; ctx.fillRect(0, 0, W, H); }

function animate() {
  if (isPlaying && state.currentMission === 0) { animTime += 0.03; }
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) { state.currentMission = idx; saveState(); updateUI(); drawScene();
  setKnowledge(idx);
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="switchMission(1)" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="markExploreDone()" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 已完成探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('extraInfo').style.display = 'flex';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#06B6D4;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('extraInfo').style.display = 'none';
  }
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map(function(_, i) {
    const cls = i === state.currentMission ? 'tab active' : state.done.includes(i) ? 'tab done' : 'tab';
    const check = state.done.includes(i) ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + MISSIONS[i].label + check + '</div>';
  }).join('');
  MISSIONS.forEach(function(_, i) {
    var d = document.getElementById('pdot' + i);
    if (state.done.includes(i)) d.className = 'dot done';
    else if (i === state.currentMission) d.className = 'dot active';
    else d.className = 'dot';
  });
  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  if (state.currentMission === 2) document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

function startObserve() { isPlaying = true; animTime = 0; }
document.getElementById('modeToggle').addEventListener('click', function() {
  if (state.currentMission === 1) {
    noWorkCase = (noWorkCase + 1) % 3;
    var labels = ['力⊥方向', '有力无距', '有距无力'];
    document.getElementById('modeToggle').textContent = labels[noWorkCase] + ' →';
    drawScene();
  }
});

function markExploreDone() { if (!state.done.includes(1)) { state.done.push(1); saveState(); updateUI(); } }

canvas.addEventListener('click', function(e) {
  if (state.currentMission !== 2) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;
  const W = canvas.width, H = canvas.height;
  if (x >= W / 2 - 100 && x <= W / 2 + 100 && y >= H / 2 + 20 && y <= H / 2 + 70) {
    const userInput = prompt('输入你的答案:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (Math.abs(num - ch.answer) <= 5) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) { if (!state.done.includes(2)) state.done.push(2); saveState(); updateUI(); alert('🎉 恭喜通关！'); }
      else { saveState(); updateUI(); alert('✅ 正确！进入下一关。'); }
    } else { alert('❌ 答案不对！提示：W = F × s。'); }
  }
});

function resetChallenges() { state.challengeIdx = 0; const idx = state.done.indexOf(2); if (idx >= 0) state.done.splice(idx, 1); saveState(); updateUI(); }
function startQuiz() { state.quizIdx = 0; state.quizDone = []; saveState(); showQuiz(); }
function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) { if (!state.done.includes(3)) { state.done.push(3); saveState(); } updateUI(); return; }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  document.getElementById('quizOptions').innerHTML = q.opts.map(function(o, i) { return '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'; }).join('');
  document.getElementById('quizResult').textContent = ''; document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}
function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach(function(el, i) { el.style.pointerEvents = 'none'; if (i === q.ans) el.className = 'quiz-opt correct'; else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong'; });
  document.getElementById('quizResult').textContent = idx === q.ans ? '✅ 正确！' + q.explain : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}
function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

switchMission(state.currentMission);
animate();

// Knowledge Points - 功和机械能 ch1

         '• 功的单位：<em>焦耳（J）</em>\n' +
         '• 使用任何机械都<em>不省功</em>'
  },
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

function closeQuiz() { switchMission(0); }
