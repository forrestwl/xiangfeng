<script>
const STORAGE_KEY='physics_nei_neng_ch1';
const saved=(()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){}return null})()||{};
let state={done:saved.done||[],currentMission:saved.currentMission||0,challengeIdx:saved.challengeIdx||0,quizIdx:saved.quizIdx||0,quizDone:saved.quizDone||[]};
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}

var MISSIONS=[
{id:'observe',label:'🔬 观察',title:'扩散现象',desc:'观看红墨水在水中的扩散过程。分子在不停地做无规则运动。'},
{id:'explore',label:'✋ 探索',title:'温度对扩散的影响',desc:'比较红墨水在冷水和热水中的扩散速度。'},
{id:'challenge',label:'🎯 挑战',title:'扩散速度挑战',desc:'运用分子动理论知识完成5关挑战！'},
{id:'quiz',label:'⭐ 测验',title:'知识检测',desc:'完成5道选择题，巩固分子动理论知识。'}
];

var CHALLENGES=[
{goal:'红墨水在热水中扩散比在冷水中___（填0=慢, 1=快）',answer:1,unit:'',tolerance:0},
{goal:'通常情况下气体分子间距约为液体分子间距的多少倍？（填约数）',answer:10,unit:'倍',tolerance:3},
{goal:'分子热运动的剧烈程度主要与什么有关？（0=颜色 1=温度 2=体积）',answer:1,unit:'',tolerance:0},
{goal:'水温20℃时红墨水扩散需20秒，60℃时约需几秒？（每升10℃速度翻倍）',answer:5,unit:'秒',tolerance:2},
{goal:'扩散现象最终红墨水在清水中会怎样？（0=沉底 1=均匀分布 2=浮表面）',answer:1,unit:'',tolerance:0}
];

var QUIZ_POOL=[
{q:'扩散现象表明：',opts:['A. 分子间有引力','B. 分子在不停地做无规则运动','C. 分子间有斥力','D. 分子有质量'],ans:1,explain:'扩散现象直接说明了分子在不停地做无规则运动。'},
{q:'下列现象中属于扩散的是：',opts:['A. 风吹树叶动','B. 扫地灰尘飞','C. 桂花满园香','D. 雪花飘飘'],ans:2,explain:'桂花香味扩散到空气中是分子运动，其他都是宏观物体的机械运动。'},
{q:'分子热运动的剧烈程度与___有关：',opts:['A. 温度','B. 质量','C. 体积','D. 颜色'],ans:0,explain:'温度越高，分子热运动越剧烈，扩散越快。'},
{q:'固体分子间的距离比气体分子间的距离：',opts:['A. 大','B. 小','C. 一样','D. 无法比较'],ans:1,explain:'固体分子间距最小，气体分子间距最大，液体居中。'},
{q:'下列哪种现象说明分子间有引力？',opts:['A. 铁块很难被拉断','B. 水往低处流','C. 扩散现象','D. 蒸发'],ans:0,explain:'铁块很难被拉断是因为分子间存在引力。'}
];

const canvas=document.getElementById('labCanvas');
const ctx=canvas.getContext('2d');
let animId=null,animTime=0,isPlaying=false;
let exploreHotWater=true;

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}

function drawScene(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);const m=state.currentMission;if(m===0)drawObserve(W,H);else if(m===1)drawExplore(W,H);else if(m===2)drawChallenge(W,H)}

// ── Observe: 扩散现象 ──
function drawObserve(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
// Beaker
const bx=W/2-80,by=60,bw=160,bh=200;
ctx.fillStyle='#e8f4ff';ctx.fillRect(bx,by,bw,bh);
ctx.strokeStyle='#007AFF';ctx.lineWidth=2;ctx.strokeRect(bx,by,bw,bh);
// Water level label
ctx.fillStyle='#007AFF';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText('水',W/2,by-8);
// Red ink diffusion
const progress=isPlaying?Math.min(1,animTime/120):0;
const centerY=by+bh/2;
for(let i=0;i<60;i++){
const angle=Math.random()*Math.PI*2;
const r=Math.random()*80*progress;
const px=W/2+Math.cos(angle)*r;
const py=centerY+Math.sin(angle)*r;
const alpha=0.3*(1-r/(80*progress+1))+0.1;
ctx.fillStyle=`rgba(255,50,50,${alpha})`;
ctx.beginPath();ctx.arc(px,py,3+Math.random()*3,0,Math.PI*2);ctx.fill();
}
// Ink drop at top
if(progress<0.1){
ctx.fillStyle='rgba(255,0,0,0.8)';
ctx.beginPath();ctx.arc(W/2,by+20,6,0,Math.PI*2);ctx.fill();
}
// Molecules (small circles jiggling)
ctx.fillStyle='rgba(100,100,100,0.3)';
for(let i=0;i<20;i++){
const angle=i*1.2+animTime*0.02;
const r=30+Math.sin(animTime*0.05+i)*20;
const mx=W/2+Math.cos(angle)*r;
const my=centerY+Math.sin(angle*1.3)*r*0.8;
ctx.beginPath();ctx.arc(mx,my,3,0,Math.PI*2);ctx.fill();
}
// Label
ctx.fillStyle='#666';ctx.font='13px sans-serif';ctx.textAlign='center';
if(!isPlaying)ctx.fillText('▶ 点击下方"观察"按钮开始演示',W/2,H-15);
else if(progress<1)ctx.fillText('🔬 红墨水正在扩散中...',W/2,H-15);
else ctx.fillText('✅ 红墨水已扩散均匀',W/2,H-15);
}

// ── Explore: 温度对扩散的影响 ──
function drawExplore(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
// Two beakers
for(let side=0;side<2;side++){
const cx=W/4+side*W/2,by=60,bw=120,bh=180;
// Beaker
ctx.fillStyle=side===0?'#ffe8e6':'#e8f4ff';
ctx.fillRect(cx-bw/2,by,bw,bh);
ctx.strokeStyle=side===0?'#FF3B30':'#007AFF';ctx.lineWidth=2;ctx.strokeRect(cx-bw/2,by,bw,bh);
// Label
ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText(side===0?'热水 (60℃)':'冷水 (10℃)',cx,by+bh+25);
// Icon
ctx.fillStyle=side===0?'#FF3B30':'#007AFF';ctx.font='16px sans-serif';
ctx.fillText(side===0?'🔥':'❄️',cx,by-10);
// Ink in this beaker
const speed=side===0?1:0.15;
const t=isPlaying?animTime*0.01*speed:0;
const prog=Math.min(1,t);
for(let i=0;i<30;i++){
const angle=Math.random()*Math.PI*2;
const r=Math.random()*50*prog;
const px=cx+Math.cos(angle)*r;
const py=by+bh/2+Math.sin(angle)*r;
const alpha=0.3*(1-r/(50*prog+1));
ctx.fillStyle=`rgba(255,50,50,${alpha})`;
ctx.beginPath();ctx.arc(px,py,2+i%3,0,Math.PI*2);ctx.fill();
}
// Progress indicator
if(isPlaying){
ctx.fillStyle='#999';ctx.font='11px sans-serif';
ctx.fillText(side===0?`已扩散 ${Math.round(prog*100)}%`:`已扩散 ${Math.round(prog*100)}%`,cx,by+bh+45);

// Instructions
if(!isPlaying){
ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText('点击"开始探索"按钮，观察冷热水中扩散速度差异',W/2,H-10);
}else{
ctx.fillStyle='#FF3B30';ctx.font='13px sans-serif';font-weight='bold';
ctx.fillText('🔥 热水中扩散更快！',W/2,25);

// ── Challenge ──
function drawChallenge(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
const ch=CHALLENGES[state.challengeIdx]||CHALLENGES[0];
ctx.fillStyle='#333';ctx.font='15px sans-serif';ctx.textAlign='center';
// Word wrap
const maxW=W-40;let lines=[],line='';
for(let c of ch.goal){line+=c;if(ctx.measureText(line).width>maxW&&line.length>10){lines.push(line);line=''}}
if(line)lines.push(line);
let y=40;lines.forEach(l=>{ctx.fillText(l.trim(),W/2,y);y+=28});
// Click hint
ctx.fillStyle='#999';ctx.font='13px sans-serif';ctx.textBaseline='bottom';
ctx.fillText('点击Canvas输入答案',W/2,H-10);
// Animation molecules
for(let i=0;i<12;i++){
const angle=i*0.5+animTime*0.03;
const r=60+Math.sin(animTime*0.04+i)*40;
const mx=W/2+Math.cos(angle)*r-200;
const my=120+Math.sin(angle*1.1)*30;
ctx.fillStyle='rgba(255,59,48,0.15)';ctx.beginPath();ctx.arc(mx,my,4,0,Math.PI*2);ctx.fill();

// ── Animation ──
function animate(){if(isPlaying)animTime+=1;drawScene();animId=requestAnimationFrame(animate)}

// ── Mission Switching ──
function switchMission(idx){
state.currentMission=idx;saveState();updateUI();drawScene();
if(idx===0){isPlaying=true;animTime=0;
setTimeout(()=>{if(state.currentMission===0&&isPlaying){isPlaying=false;if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}}},5000);
} else if(idx!==1)isPlaying=false;
}

function updateUI(){
const m=MISSIONS[state.currentMission];
document.getElementById('missionLabel').textContent=m.label;
document.getElementById('missionTitle').textContent=m.title;
const desc=document.getElementById('missionDesc');
const done=state.done.includes(state.currentMission);
if(state.currentMission===0)desc.innerHTML=done?'✅ 已观看扩散演示。 <button onclick="switchMission(0)" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>':m.desc+' <button onclick="switchMission(0)" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放演示</button>';
else if(state.currentMission===1)desc.innerHTML=done?'✅ 已探索温度对扩散的影响。 <button onclick="startExplore()" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>':m.desc+' <button onclick="startExplore()" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
else if(state.currentMission===2)desc.innerHTML=state.done.includes(2)?'🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>':`${m.desc} 当前第 ${state.challengeIdx+1}/${CHALLENGES.length} 关。`;
else if(state.currentMission===3)desc.innerHTML=done?'✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>':m.desc+' 点击下方按钮开始。';
// Tabs
const tabs=document.getElementById('missionTabs');
tabs.innerHTML=MISSIONS.map((m,i)=>{const a=i===state.currentMission,d=state.done.includes(i);return`<div class="${a?'tab active':d?'tab done':'tab'}" onclick="switchMission(${i})">${m.label}${d?'<span class="tab-check">✅</span>':''}</div>`}).join('');
// Dots
MISSIONS.forEach((_,i)=>{const dot=document.getElementById('pdot'+i);if(state.done.includes(i))dot.className='dot done';else if(i===state.currentMission)dot.className='dot active';else dot.className='dot'});
// HUD
document.getElementById('challengeHud').className=state.currentMission===2?'challenge-hud show':'challenge-hud';
if(state.currentMission===2){document.getElementById('chLevel').textContent='🎯 第 '+(state.challengeIdx+1)+'/'+CHALLENGES.length+' 关';document.getElementById('chGoal').textContent=(CHALLENGES[state.challengeIdx]?.goal.slice(0,35)||'')+'...'}
// Quiz overlay
document.getElementById('quizOverlay').className=state.currentMission===3&&state.quizIdx<QUIZ_POOL.length?'quiz-overlay show':'quiz-overlay';
}

function startExplore(){isPlaying=true;animTime=0;setTimeout(()=>{if(state.currentMission===1&&isPlaying){isPlaying=false;if(!state.done.includes(1)){state.done.push(1);saveState();updateUI()}}},6000)}

// ── Challenge ──
canvas.addEventListener('click',(e)=>{
if(state.currentMission!==2)return;
const input=prompt('输入你的答案（数字）:','');
if(input===null)return;
const num=parseFloat(input);
if(isNaN(num))return;
const ch=CHALLENGES[state.challengeIdx];
if(!ch)return;
if(Math.abs(num-ch.answer)<=ch.tolerance){
state.challengeIdx++;
if(state.challengeIdx>=CHALLENGES.length){if(!state.done.includes(2))state.done.push(2);saveState();updateUI();alert('🎉 恭喜通关！')}
else{saveState();updateUI()}
}else{alert('❌ 答案不对，再想想！')}
});

function resetChallenges(){state.challengeIdx=0;const idx=state.done.indexOf(2);if(idx>=0)state.done.splice(idx,1);saveState();updateUI()}

// ── Quiz ──
function startQuiz(){state.quizIdx=0;state.quizDone=[];saveState();showQuiz()}
function showQuiz(){
if(state.quizIdx>=QUIZ_POOL.length){if(!state.done.includes(3)){state.done.push(3);saveState()}updateUI();return}
const q=QUIZ_POOL[state.quizIdx];
document.getElementById('quizQ').textContent=(state.quizIdx+1)+'. '+q.q;
document.getElementById('quizOptions').innerHTML=q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
document.getElementById('quizResult').textContent='';document.getElementById('quizNext').style.display='none';document.getElementById('quizOverlay').className='quiz-overlay show';showQuiz()
}
function selectQuiz(idx){
const q=QUIZ_POOL[state.quizIdx];const opts=document.querySelectorAll('.quiz-opt');
opts.forEach((el,i)=>{el.style.pointerEvents='none';if(i===q.ans)el.className='quiz-opt correct';else if(i===idx&&idx!==q.ans)el.className='quiz-opt wrong'});
document.getElementById('quizResult').textContent=idx===q.ans?'✅ 正确！'+q.explain:'❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
document.getElementById('quizNext').style.display='block'
}
function nextQuiz(){state.quizIdx++;saveState();showQuiz()}

// ── Init ──

// ── Knowledge Points ──
const KNOWLEDGE = {
  0: {
    title: '💡 分子动理论',
    body: `物质是由大量分子组成的，分子在不停地做无规则运动，分子间存在引力和斥力。

这就是分子动理论的三个基本内容。`
  },
  1: {
    title: '💡 扩散现象',
    body: `不同物质相互接触时，彼此进入对方的现象叫做扩散。

扩散现象直接说明了分子在不停地做无规则运动。

温度越高，扩散越快，说明分子运动越剧烈。`
  },
  2: {
    title: '💡 温度与分子运动',
    body: `分子的无规则运动与温度有关，温度越高，分子运动越剧烈。

• 热水中扩散快 → 分子运动剧烈
• 冷水中扩散慢 → 分子运动缓慢

分子的这种无规则运动叫做热运动。`
  },
  3: {
    title: '💡 检测你的掌握',
    body: `通过几道选择题来检验你是否真正理解了分子动理论和扩散现象。

关键点：分子在不停地做无规则运动，温度越高运动越剧烈。`
  },
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);animate();

function closeQuiz() { switchMission(0); }
</script>
