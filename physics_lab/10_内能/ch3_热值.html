<script>
const STORAGE_KEY='physics_nei_neng_ch3';
const saved=(()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){}return null})()||{};
let state={done:saved.done||[],currentMission:saved.currentMission||0,challengeIdx:saved.challengeIdx||0,quizIdx:saved.quizIdx||0,quizDone:saved.quizDone||[]};
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}

var MISSIONS=[
{id:'observe',label:'🔬 观察',title:'燃料燃烧放热',desc:'观看不同燃料（木柴、煤、汽油）燃烧时火焰大小和放热差异。'},
{id:'explore',label:'✋ 探索',title:'不同燃料热值对比',desc:'比较常见燃料的热值大小，理解热值的物理意义。'},
{id:'challenge',label:'🎯 挑战',title:'热值计算',desc:'运用Q=mq公式完成5关计算挑战！'},
{id:'quiz',label:'⭐ 测验',title:'知识检测',desc:'完成5道选择题，巩固热值知识。'}
];

var CHALLENGES=[
{goal:'热值的单位是：（0=J/(kg·℃) 1=J/kg 2=J）',answer:1,unit:'',tolerance:0},
{goal:'无烟煤热值3.4×10⁷J/kg，完全燃烧2kg放热多少？（单位×10⁷J）',answer:6.8,unit:'×10⁷J',tolerance:0.5},
{goal:'相同质量下，热值大的燃料燃烧放热___（0=多 1=少 2=一样）',answer:0,unit:'',tolerance:0},
{goal:'汽油热值4.6×10⁷J/kg，需多少kg汽油获得9.2×10⁷J热量？',answer:2,unit:'kg',tolerance:0.1},
{goal:'酒精热值3.0×10⁷J/kg，10g酒精完全燃烧放热多少×10⁵J？',answer:3.0,unit:'×10⁵J',tolerance:0.3}
];

var QUIZ_POOL=[
{q:'热值的定义是：',opts:['A. 燃料燃烧放出的热量','B. 1kg燃料完全燃烧放出的热量','C. 燃料的温度','D. 燃料燃烧的时间'],ans:1,explain:'热值是指1kg某种燃料完全燃烧放出的热量，用q表示。'},
{q:'热值的单位是：',opts:['A. J','B. J/kg','C. J/(kg·℃)','D. kg/J'],ans:1,explain:'热值的单位是焦耳每千克，符号J/kg。'},
{q:'下列燃料中热值最大的是：',opts:['A. 干木柴≈1.2×10⁷J/kg','B. 无烟煤≈3.4×10⁷J/kg','C. 酒精≈3.0×10⁷J/kg','D. 汽油≈4.6×10⁷J/kg'],ans:3,explain:'汽油的热值最大，约4.6×10⁷J/kg；干木柴最小。'},
{q:'燃料燃烧时化学能转化为：',opts:['A. 内能','B. 光能','C. 电能','D. 机械能'],ans:0,explain:'燃料燃烧时化学能转化为内能（热能），释放出热量。'},
{q:'热值是燃料的___：',opts:['A. 特性','B. 状态','C. 温度','D. 质量'],ans:0,explain:'热值是燃料的一种特性，不同燃料的热值一般不同。'}
];

const canvas=document.getElementById('labCanvas');
const ctx=canvas.getContext('2d');
let animId=null,animTime=0,isPlaying=false;
let exploreFuel=0; // 0=wood, 1=coal, 2=gasoline

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}
function drawScene(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);const m=state.currentMission;if(m===0)drawObserve(W,H);else if(m===1)drawExplore(W,H);else if(m===2)drawChallenge(W,H)}

const FUELS=[{name:'干木柴',q:1.2e7,color:'#8B4513'},{name:'无烟煤',q:3.4e7,color:'#333'},{name:'汽油',q:4.6e7,color:'#FF6B00'}];

// ── Observe ──
function drawObserve(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
const fuels=[{name:'干木柴',x:W/4,color:'#8B4513',fh:0.8},{name:'无烟煤',x:W/2,color:'#333',fh:1.2},{name:'汽油',x:W*3/4,color:'#FF6B00',fh:1.6}];
fuels.forEach((f,i)=>{
// Fuel pile
ctx.fillStyle=f.color;
if(i===0)ctx.fillRect(f.x-15,220,30,40);
else if(i===1)ctx.fillRect(f.x-20,210,40,50);
else ctx.fillRect(f.x-10,215,20,45);
ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
ctx.fillText(f.name,f.x,275);
// Flame
if(isPlaying){
const t=animTime*0.05+i*0.5;
const fh=30*f.fh+Math.sin(t)*8*f.fh;
ctx.fillStyle='#FF6B3D';ctx.beginPath();ctx.ellipse(f.x,200-fh*0.5,fh*0.4,fh,0,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#FFD700';ctx.beginPath();ctx.ellipse(f.x,200-fh*0.4,fh*0.25,fh*0.5,0,0,Math.PI*2);ctx.fill();
// Heat waves
for(let j=0;j<3;j++){
const wy=180-fh-Math.sin(t+j)*15;
ctx.strokeStyle='rgba(255,100,50,0.2)';ctx.lineWidth=1;
ctx.beginPath();ctx.arc(f.x,wy,10+j*8,0,Math.PI);ctx.stroke()

});
if(!isPlaying){ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.fillText('▶ 点击"观察"演示不同燃料燃烧放热',W/2,290)}
}

// ── Explore ──
function drawExplore(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
// Fuel buttons
const btnW=120,btnH=36,startX=(W-(btnW*3+20))/2;
FUELS.forEach((f,i)=>{
const x=startX+i*(btnW+10),y=10;
ctx.fillStyle=i===exploreFuel?f.color:'#eee';roundRect(x,y,btnW,btnH,8);ctx.fill();
ctx.fillStyle=i===exploreFuel?'#fff':'#666';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(f.name,x+btnW/2,y+btnH/2);
});
// Bar chart
const barW=120,chartY=70,chartH=180,maxQ=5e7;
FUELS.forEach((f,i)=>{
const bx=startX+i*(btnW+10)+10;
const bh=(f.q/maxQ)*chartH;
const color=i===exploreFuel?f.color:'rgba(0,0,0,0.2)';
ctx.fillStyle=color;roundRect(bx,chartY+chartH-bh,barW-20,bh,6);ctx.fill();
ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='bottom';
ctx.fillText((f.q/1e7).toFixed(1)+'×10⁷J/kg',bx+(barW-20)/2,chartY+chartH-bh-4);
});
ctx.fillStyle='#999';ctx.font='11px sans-serif';ctx.textAlign='center';
ctx.fillText('点击燃料名称切换对比',W/2,chartY+chartH+20);
// Selected fuel detail
const sel=FUELS[exploreFuel];
ctx.fillStyle='#FF3B30';ctx.font='14px sans-serif';ctx.fillText('当前: '+sel.name+' q='+(sel.q/1e7).toFixed(2)+'×10⁷J/kg',W/2,chartY+chartH+42);
if(!isPlaying){ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.fillText('点击Canvas上的燃料按钮查看不同燃料的热值',W/2,290)}
}

// ── Challenge ──
function drawChallenge(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
const ch=CHALLENGES[state.challengeIdx]||CHALLENGES[0];
ctx.fillStyle='#333';ctx.font='15px sans-serif';ctx.textAlign='center';
const maxW=W-40;let lines=[],line='';
for(let c of ch.goal){line+=c;if(ctx.measureText(line).width>maxW&&line.length>10){lines.push(line);line=''}}
if(line)lines.push(line);
let y=40;lines.forEach(l=>{ctx.fillText(l.trim(),W/2,y);y+=28});
if(state.challengeIdx===1||state.challengeIdx===3||state.challengeIdx===4){
ctx.fillStyle='#FF3B30';ctx.font='20px sans-serif';ctx.fillText('Q = mq',W/2,155);
}
ctx.fillStyle='#999';ctx.font='13px sans-serif';ctx.textBaseline='bottom';
ctx.fillText('点击Canvas输入答案',W/2,H-10);
}

function animate(){if(isPlaying)animTime+=1;drawScene();animId=requestAnimationFrame(animate)}

function switchMission(idx){
state.currentMission=idx;saveState();updateUI();drawScene();
if(idx===0){isPlaying=true;animTime=0;
setTimeout(()=>{if(state.currentMission===0&&isPlaying){isPlaying=false;if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}}},5000);
}else isPlaying=false;
}

function updateUI(){
const m=MISSIONS[state.currentMission];
document.getElementById('missionLabel').textContent=m.label;
document.getElementById('missionTitle').textContent=m.title;
const desc=document.getElementById('missionDesc');const done=state.done.includes(state.currentMission);
if(state.currentMission===0)desc.innerHTML=done?'✅ 已观看。<button onclick="switchMission(0)" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看</button>':m.desc+'<button onclick="switchMission(0)" style="padding:6px 16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放</button>';
else if(state.currentMission===1)desc.innerHTML=done?'✅ 已探索。<button onclick="resetExplore()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看</button>':m.desc;
else if(state.currentMission===2)desc.innerHTML=state.done.includes(2)?'🎉 通关！<button onclick="resetChallenges()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重来</button>':m.desc+' 第'+(state.challengeIdx+1)+'/'+CHALLENGES.length+'关。';
else if(state.currentMission===3)desc.innerHTML=done?'✅ 已完成。<button onclick="startQuiz()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来</button>':m.desc+' 点击开始。';
const tabs=document.getElementById('missionTabs');
tabs.innerHTML=MISSIONS.map((m,i)=>{const a=i===state.currentMission,d=state.done.includes(i);return'<div class="'+(a?'tab active':d?'tab done':'tab')+'" onclick="switchMission('+i+')">'+m.label+(d?'<span class="tab-check">✅</span>':'')+'</div>'}).join('');
MISSIONS.forEach((_,i)=>{const dot=document.getElementById('pdot'+i);dot.className=state.done.includes(i)?'dot done':i===state.currentMission?'dot active':'dot'});
document.getElementById('challengeHud').className=state.currentMission===2?'challenge-hud show':'challenge-hud';
if(state.currentMission===2){document.getElementById('chLevel').textContent='🎯 第'+(state.challengeIdx+1)+'/'+CHALLENGES.length+'关';document.getElementById('chGoal').textContent=(CHALLENGES[state.challengeIdx]?.goal.slice(0,35)||'')+'...'}
document.getElementById('quizOverlay').className=state.currentMission===3&&state.quizIdx<QUIZ_POOL.length?'quiz-overlay show':'quiz-overlay';
}

// Explore: Click fuel buttons on canvas
canvas.addEventListener('click',(e)=>{
if(state.currentMission===1){
const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;
const x=(e.clientX-rect.left)*scaleX;const y=(e.clientY-rect.top)*scaleX;
const btnW=120,btnH=36,startX2=(canvas.width-(btnW*3+20))/2;
if(y>=10&&y<=10+btnH){for(let i=0;i<3;i++){const bx=startX2+i*(btnW+10);if(x>=bx&&x<=bx+btnW){exploreFuel=i;if(!state.done.includes(1)){state.done.push(1);saveState()}isPlaying=true;animTime=0;updateUI();drawScene();return}}}
}
if(state.currentMission!==2)return;
const input=prompt('输入你的答案（数字）:','');
if(input===null)return;
const num=parseFloat(input);if(isNaN(num))return;
const ch=CHALLENGES[state.challengeIdx];if(!ch)return;
if(Math.abs(num-ch.answer)<=ch.tolerance){
state.challengeIdx++;
if(state.challengeIdx>=CHALLENGES.length){if(!state.done.includes(2))state.done.push(2);saveState();updateUI();alert('🎉 恭喜通关！')}
else{saveState();updateUI()}
}else{alert('❌ 答案不对，再想想！')}
});

function resetExplore(){exploreFuel=0;if(!state.done.includes(1)){state.done.push(1);saveState();}updateUI();drawScene()}
function resetChallenges(){state.challengeIdx=0;const idx=state.done.indexOf(2);if(idx>=0)state.done.splice(idx,1);saveState();updateUI()}

function startQuiz(){state.quizIdx=0;state.quizDone=[];saveState();showQuiz()}
function showQuiz(){
if(state.quizIdx>=QUIZ_POOL.length){if(!state.done.includes(3)){state.done.push(3);saveState()}updateUI();return}
const q=QUIZ_POOL[state.quizIdx];
document.getElementById('quizQ').textContent=(state.quizIdx+1)+'. '+q.q;
document.getElementById('quizOptions').innerHTML=q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
document.getElementById('quizResult').textContent='';document.getElementById('quizNext').style.display='none';document.getElementById('quizOverlay').className='quiz-overlay show';showQuiz()
}
function selectQuiz(idx){
const q=QUIZ_POOL[state.quizIdx];const opts=document.querySelectorAll('.quiz-opt');
opts.forEach((el,i)=>{el.style.pointerEvents='none';if(i===q.ans)el.className='quiz-opt correct';else if(i===idx&&idx!==q.ans)el.className='quiz-opt wrong'});
document.getElementById('quizResult').textContent=idx===q.ans?'✅ 正确！'+q.explain:'❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
document.getElementById('quizNext').style.display='block'
}
function nextQuiz(){state.quizIdx++;saveState();showQuiz()}

// ── Knowledge Points ──
const KNOWLEDGE = {
  0: {
    title: '💡 热值的概念',
    body: `热值是燃料的一种特性，表示燃料燃烧放热的本领。

定义：1kg某种燃料完全燃烧放出的热量，叫做这种燃料的热值。
单位：J/kg`
  },
  1: {
    title: '💡 燃料燃烧放热',
    body: `核心公式：Q = mq

Q — 燃料完全燃烧放出的热量（J）
m — 燃料的质量（kg）
q — 燃料的热值（J/kg）`
  },
  2: {
    title: '💡 热机效率',
    body: `热机效率 = 用来做有用功的能量 ÷ 燃料完全燃烧放出的能量

公式：η = W有用 / Q总 × 100%

热机效率不可能达到100%。`
  },
  3: {
    title: '💡 检测你的掌握',
    body: `通过几道选择题来检验你对热值、燃料放热和热机效率的理解。`
  },
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);animate();

function closeQuiz() { switchMission(0); }
</script>
