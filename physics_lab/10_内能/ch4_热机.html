<script>
const STORAGE_KEY='physics_nei_neng_ch4';
const saved=(()=>{try{return JSON.parse(localStorage.getItem(STORAGE_KEY))}catch(e){}return null})()||{};
let state={done:saved.done||[],currentMission:saved.currentMission||0,challengeIdx:saved.challengeIdx||0,quizIdx:saved.quizIdx||0,quizDone:saved.quizDone||[]};
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}catch(e){}}

var MISSIONS=[
{id:'observe',label:'🔬 观察',title:'汽油机四冲程',desc:'观看汽油机四个冲程的连续工作动画演示。'},
{id:'explore',label:'✋ 探索',title:'冲程切换',desc:'点击切换查看每个冲程的详细工作过程。'},
{id:'challenge',label:'🎯 挑战',title:'冲程识别',desc:'判断冲程并回答能量转化问题，完成5关！'},
{id:'quiz',label:'⭐ 测验',title:'知识检测',desc:'完成5道选择题，巩固热机知识。'}
];

var CHALLENGES=[
{goal:'四冲程汽油机的四个冲程：吸气、压缩、做功、___（0=排气 1=点火 2=喷油）',answer:0,unit:'',tolerance:0},
{goal:'做功冲程中___能转化为机械能（0=机械 1=内 2=电）',answer:1,unit:'',tolerance:0},
{goal:'压缩冲程中机械能转化为___能（0=内 1=电 2=化学）',answer:0,unit:'',tolerance:0},
{goal:'一个工作循环中曲轴转___圈',answer:2,unit:'圈',tolerance:0},
{goal:'飞轮转速1800r/min，每秒做功多少次？（2圈做1次功）',answer:15,unit:'次',tolerance:1}
];

var QUIZ_POOL=[
{q:'汽油机的一个工作循环有几个冲程？',opts:['A. 2','B. 4','C. 6','D. 8'],ans:1,explain:'一个工作循环包括吸气、压缩、做功、排气四个冲程。'},
{q:'做功冲程的能量转化是：',opts:['A. 机械能→内能','B. 内能→机械能','C. 电能→机械能','D. 光能→内能'],ans:1,explain:'做功冲程中燃气膨胀推动活塞做功，内能转化为机械能。'},
{q:'压缩冲程中汽缸内气体的：',opts:['A. 温度降低','B. 温度升高','C. 体积增大','D. 压强减小'],ans:1,explain:'压缩冲程中活塞压缩气体做功，气体内能增加，温度升高。'},
{q:'汽油机和柴油机的主要区别是汽油机有：',opts:['A. 火花塞','B. 喷油嘴','C. 气缸','D. 活塞'],ans:0,explain:'汽油机有火花塞（点燃式），柴油机有喷油嘴（压燃式）。'},
{q:'排气冲程后活塞向___运动：',opts:['A. 上','B. 下','C. 左','D. 右'],ans:0,explain:'排气冲程结束后，活塞向上运动进入下一个吸气冲程。'}
];

const canvas=document.getElementById('labCanvas');
const ctx=canvas.getContext('2d');
let animId=null,animTime=0,isPlaying=false;
let exploreStroke=0; // 0=intake,1=compression,2=power,3=exhaust

function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath()}
function drawScene(){const W=canvas.width,H=canvas.height;ctx.clearRect(0,0,W,H);const m=state.currentMission;if(m===0)drawObserve(W,H);else if(m===1)drawExplore(W,H);else if(m===2)drawChallenge(W,H)}

const STROKES=[
{name:'吸气冲程',desc:'活塞向下，进气门打开，混合气进入气缸',color:'#007AFF'},
{name:'压缩冲程',desc:'活塞向上，进气门关闭，混合气被压缩',color:'#FF9500'},
{name:'做功冲程',desc:'火花塞点火，燃气膨胀推动活塞向下做功',color:'#FF3B30'},
{name:'排气冲程',desc:'排气门打开，活塞向上推出废气',color:'#34C759'}
];

function drawEngine(W,H,cx,cy,strokeIdx,highlight){
// Engine block
ctx.fillStyle='#888';ctx.fillRect(cx-50,cy-10,100,90);
ctx.fillStyle='#ccc';ctx.strokeStyle='#666';ctx.lineWidth=1;
ctx.fillRect(cx-40,cy-5,80,80);ctx.strokeRect(cx-40,cy-5,80,80);
// Cylinder
ctx.strokeStyle='#999';ctx.lineWidth=2;
ctx.beginPath();ctx.moveTo(cx-35,cy-5);ctx.lineTo(cx-35,cy+55);ctx.stroke();
ctx.beginPath();ctx.moveTo(cx+35,cy-5);ctx.lineTo(cx+35,cy+55);ctx.stroke();
// Piston
const strokeData=STROKES[strokeIdx];
const cycleT=animTime*0.05;
const positions=[70,20,70,20]; // piston Y positions for each stroke
let py=positions[0];
if(isPlaying){
if(strokeIdx===0)py=60+(1-Math.sin(cycleT*Math.PI/2))*30;
else if(strokeIdx===1)py=20+Math.sin(cycleT*Math.PI/2)*40;
else if(strokeIdx===2)py=60-Math.sin(cycleT*Math.PI/2)*40;
else if(strokeIdx===3)py=20+Math.sin(cycleT*Math.PI/2)*40;
}else py=positions[strokeIdx];
ctx.fillStyle='#666';roundRect(cx-25,cy+py-5,50,10,3);ctx.fill();
ctx.fillStyle='#555';ctx.fillRect(cx-2,cy+py+5,4,30);
// Crankshaft
const crankAngle=isPlaying?cycleT*Math.PI:strokeIdx*Math.PI/2;
const crankX=cx+Math.sin(crankAngle)*20;
const crankY=cy+85+Math.cos(crankAngle)*15;
ctx.strokeStyle='#444';ctx.lineWidth=4;
ctx.beginPath();ctx.moveTo(cx,cy+py+35);ctx.lineTo(crankX,crankY);ctx.stroke();
ctx.fillStyle='#444';ctx.beginPath();ctx.arc(crankX,crankY,5,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(cx,cy+85,8,0,Math.PI*2);ctx.fill();
// Valves
if(strokeIdx===0||strokeIdx===3){
ctx.fillStyle=strokeIdx===0?'#4CAF50':'#999';
ctx.fillRect(cx-20,cy-12,12,8);ctx.fillRect(cx+8,cy-12,12,8);
ctx.fillStyle='#333';ctx.font='8px sans-serif';ctx.textAlign='center';
ctx.fillText(strokeIdx===0?'进气门开':'排气门开',cx-14,cy-15);
if(strokeIdx===3)ctx.fillText('排气门开',cx+14,cy-15);
}
// Spark plug (power stroke)
if(strokeIdx===2){
ctx.fillStyle='#FF6B00';roundRect(cx-3,cy-18,6,14,3);ctx.fill();
if(isPlaying){
ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,cy-10,8,0,Math.PI*2);ctx.fill();
ctx.fillStyle='#FFF';ctx.beginPath();ctx.arc(cx,cy-10,4,0,Math.PI*2);ctx.fill();

// Stroke label
ctx.fillStyle='#333';ctx.font='14px sans-serif';ctx.textAlign='center';
if(highlight)ctx.fillText(strokeData.name,cx,cy+120);
ctx.fillStyle='#666';ctx.font='11px sans-serif';if(highlight)ctx.fillText(strokeData.desc,cx,cy+138);
}

// ── Observe: auto-cycle through 4 strokes ──
function drawObserve(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
const strokeIdx=isPlaying?Math.floor((animTime*0.02)%4):0;
drawEngine(W,H,W/2,80,strokeIdx,true);
// Cycle indicator
ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';
if(!isPlaying)ctx.fillText('▶ 点击"观察"查看四冲程循环',W/2,280);
else{
const names=['吸气→','压缩→','做功→','排气→'];
const idx=Math.floor((animTime*0.02)%4);
ctx.fillStyle='#FF3B30';ctx.font='14px sans-serif';
ctx.fillText('当前: '+STROKES[strokeIdx].name,W/2,270);
for(let i=0;i<4;i++){
ctx.fillStyle=i===idx?'#FF3B30':'#ccc';ctx.font=i===idx?'14px sans-serif':'12px sans-serif';
ctx.fillText(names[i],100+i*160,20);

}

// ── Explore: clickable stroke selector ──
function drawExplore(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
// Stroke selection buttons
const btnW=150,startX=(W-(btnW*4+30))/2;
for(let i=0;i<4;i++){
const x=startX+i*(btnW+10),y=8;
ctx.fillStyle=i===exploreStroke?STROKES[i].color:'#eee';
roundRect(x,y,btnW,28,6);ctx.fill();
ctx.fillStyle=i===exploreStroke?'#fff':'#666';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(STROKES[i].name,x+btnW/2,y+14);
}
drawEngine(W,H,W/2,120,exploreStroke,true);
// Click hint
ctx.fillStyle='#999';ctx.font='12px sans-serif';ctx.textAlign='center';
ctx.fillText('点击上方按钮切换查看每个冲程',W/2,285);
}

// ── Challenge ──
function drawChallenge(W,H){
ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
const ch=CHALLENGES[state.challengeIdx]||CHALLENGES[0];
ctx.fillStyle='#333';ctx.font='15px sans-serif';ctx.textAlign='center';
const maxW=W-40;let lines=[],line='';
for(let c of ch.goal){line+=c;if(ctx.measureText(line).width>maxW&&line.length>10){lines.push(line);line=''}}
if(line)lines.push(line);
let y=40;lines.forEach(l=>{ctx.fillText(l.trim(),W/2,y);y+=28});
// Draw small engine icon
drawEngine(W,H,W/2,180,state.challengeIdx%4,false);
ctx.fillStyle='#999';ctx.font='13px sans-serif';ctx.textBaseline='bottom';
ctx.fillText('点击Canvas输入答案',W/2,H-10);
}

function animate(){if(isPlaying)animTime+=1;drawScene();animId=requestAnimationFrame(animate)}

function switchMission(idx){
state.currentMission=idx;saveState();updateUI();drawScene();
if(idx===0){isPlaying=true;animTime=0;
setTimeout(()=>{if(state.currentMission===0&&isPlaying){isPlaying=false;if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}}},5000);
}else if(idx===1){isPlaying=true;animTime=0;
setTimeout(()=>{if(state.currentMission===1&&!state.done.includes(1)){state.done.push(1);saveState();updateUI()}},3000);
}else isPlaying=false;
}

function updateUI(){
const m=MISSIONS[state.currentMission];
document.getElementById('missionLabel').textContent=m.label;
document.getElementById('missionTitle').textContent=m.title;
const desc=document.getElementById('missionDesc');const done=state.done.includes(state.currentMission);
if(state.currentMission===0)desc.innerHTML=done?'✅ 已观看。<button onclick="switchMission(0)" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看</button>':m.desc+'<button onclick="switchMission(0)" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放</button>';
else if(state.currentMission===1)desc.innerHTML=done?'✅ 已探索各冲程。':m.desc;
else if(state.currentMission===2)desc.innerHTML=state.done.includes(2)?'🎉 通关！<button onclick="resetChallenges()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重来</button>':m.desc+' 第'+(state.challengeIdx+1)+'/'+CHALLENGES.length+'关。';
else if(state.currentMission===3)desc.innerHTML=done?'✅ 已完成。<button onclick="startQuiz()" style="padding:6px16px;background:#FF3B30;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来</button>':m.desc+' 点击开始。';
const tabs=document.getElementById('missionTabs');
tabs.innerHTML=MISSIONS.map((m,i)=>{const a=i===state.currentMission,d=state.done.includes(i);return'<div class="'+(a?'tab active':d?'tab done':'tab')+'" onclick="switchMission('+i+')">'+m.label+(d?'<span class="tab-check">✅</span>':'')+'</div>'}).join('');
MISSIONS.forEach((_,i)=>{const dot=document.getElementById('pdot'+i);dot.className=state.done.includes(i)?'dot done':i===state.currentMission?'dot active':'dot'});
document.getElementById('challengeHud').className=state.currentMission===2?'challenge-hud show':'challenge-hud';
if(state.currentMission===2){document.getElementById('chLevel').textContent='🎯 第'+(state.challengeIdx+1)+'/'+CHALLENGES.length+'关';document.getElementById('chGoal').textContent=(CHALLENGES[state.challengeIdx]?.goal.slice(0,35)||'')+'...'}
document.getElementById('quizOverlay').className=state.currentMission===3&&state.quizIdx<QUIZ_POOL.length?'quiz-overlay show':'quiz-overlay';
}

// Canvas click for explore
canvas.addEventListener('click',(e)=>{
if(state.currentMission===1){
const rect=canvas.getBoundingClientRect();const scaleX=canvas.width/rect.width;
const x=(e.clientX-rect.left)*scaleX;
const btnW=150,startX2=(canvas.width-(btnW*4+30))/2;
for(let i=0;i<4;i++){const bx=startX2+i*(btnW+10);if(x>=bx&&x<=bx+btnW){exploreStroke=i;isPlaying=true;animTime=0;if(!state.done.includes(1)){state.done.push(1);saveState()}updateUI();drawScene();return}}
}
if(state.currentMission!==2)return;
const input=prompt('输入你的答案（数字）:','');
if(input===null)return;
const num=parseFloat(input);if(isNaN(num))return;
const ch=CHALLENGES[state.challengeIdx];if(!ch)return;
if(Math.abs(num-ch.answer)<=ch.tolerance){
state.challengeIdx++;
if(state.challengeIdx>=CHALLENGES.length){if(!state.done.includes(2))state.done.push(2);saveState();updateUI();alert('🎉 恭喜通关！')}
else{saveState();updateUI()}
}else{alert('❌ 答案不对，再想想！')}
});

function resetChallenges(){state.challengeIdx=0;const idx=state.done.indexOf(2);if(idx>=0)state.done.splice(idx,1);saveState();updateUI()}

function startQuiz(){state.quizIdx=0;state.quizDone=[];saveState();showQuiz()}
function showQuiz(){
if(state.quizIdx>=QUIZ_POOL.length){if(!state.done.includes(3)){state.done.push(3);saveState()}updateUI();return}
const q=QUIZ_POOL[state.quizIdx];
document.getElementById('quizQ').textContent=(state.quizIdx+1)+'. '+q.q;
document.getElementById('quizOptions').innerHTML=q.opts.map((o,i)=>'<div class="quiz-opt" onclick="selectQuiz('+i+')">'+o+'</div>').join('');
document.getElementById('quizResult').textContent='';document.getElementById('quizNext').style.display='none';document.getElementById('quizOverlay').className='quiz-overlay show';showQuiz()
}
function selectQuiz(idx){
const q=QUIZ_POOL[state.quizIdx];const opts=document.querySelectorAll('.quiz-opt');
opts.forEach((el,i)=>{el.style.pointerEvents='none';if(i===q.ans)el.className='quiz-opt correct';else if(i===idx&&idx!==q.ans)el.className='quiz-opt wrong'});
document.getElementById('quizResult').textContent=idx===q.ans?'✅ 正确！'+q.explain:'❌ 正确答案是 '+q.opts[q.ans]+'。'+q.explain;
document.getElementById('quizNext').style.display='block'
}
function nextQuiz(){state.quizIdx++;saveState();showQuiz()}

// ── Knowledge Points ──
const KNOWLEDGE = {
  0: {
    title: '💡 热机的工作原理',
    body: `热机是将内能转化为机械能的装置。

工作原理：燃料燃烧产生高温高压气体，气体膨胀推动活塞做功。`
  },
  1: {
    title: '💡 四冲程汽油机',
    body: `汽油机的一个工作循环包含四个冲程：

• 吸气冲程
• 压缩冲程（机械能→内能）
• 做功冲程（内能→机械能）
• 排气冲程

一个工作循环：曲轴转2圈，做功1次。`
  },
  2: {
    title: '💡 热机效率',
    body: `汽油机效率：约20%～30%
柴油机效率：约30%～45%

提高效率的途径：减少热量损失、减少摩擦。`
  },
  3: {
    title: '💡 检测你的掌握',
    body: `通过几道选择题来检验你对热机工作原理和效率的理解。`
  },
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);animate();

function closeQuiz() { switchMission(0); }
</script>
