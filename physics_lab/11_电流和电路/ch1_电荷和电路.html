const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let observeMode = 0; // 0=friction, 1=electroscope
let exploreCharge1 = 1, exploreCharge2 = -1; // 1=positive, -1=negative

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuiz(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  if (observeMode === 0) {
    // Friction electrification
    const stickX = 180, stickY = 140;
    const clothX = 320, clothY = 160;

    // Glass rod
    ctx.fillStyle = '#b8e0ff';
    roundRect(ctx, stickX - 40, stickY - 8, 80, 16, 6);
    ctx.fill();
    ctx.strokeStyle = '#8ac8ff';
    ctx.lineWidth = 1;
    roundRect(ctx, stickX - 40, stickY - 8, 80, 16, 6);
    ctx.stroke();

    // Silk cloth
    ctx.fillStyle = '#e8c8a0';
    roundRect(ctx, clothX - 30, clothY - 5, 60, 30, 4);
    ctx.fill();
    ctx.fillStyle = '#d4b080';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('丝绸', clothX, clothY + 10);

    // Animation: rubbing
    if (isPlaying) {
      const offset = Math.sin(animTime * 0.15) * 30;
      const clothX2 = clothX + offset;

      // Draw silk at moved position
      ctx.fillStyle = '#e8c8a0';
      roundRect(ctx, clothX2 - 30, clothY - 5, 60, 30, 4);
      ctx.fill();

      // Sparks / charges
      if (Math.abs(offset) > 15) {
        const alpha = (Math.abs(offset) - 15) / 15;
        ctx.fillStyle = `rgba(0, 122, 255, ${alpha * 0.6})`;
        for (let i = 0; i < 5; i++) {
          const sx = (stickX + clothX2) / 2 + (Math.random() - 0.5) * 40;
          const sy = stickY + (Math.random() - 0.5) * 20;
          ctx.beginPath();
          ctx.arc(sx, sy, 2 + Math.random() * 3, 0, Math.PI * 2);
          ctx.fill();

      // After enough time, show charges
      if (animTime > 80) {
        ctx.fillStyle = '#007AFF';
        ctx.font = '14px sans-serif';
        ctx.fillText('⚡ 玻璃棒带正电', stickX, stickY - 30);
        ctx.fillStyle = '#FF9500';
        ctx.fillText('⚡ 丝绸带负电', clothX, clothY + 50);

        // Charges on rod
        ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
        for (let i = 0; i < 4; i++) {
          ctx.beginPath();
          ctx.arc(stickX - 20 + i * 12, stickY + 14, 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = 'rgba(0, 100, 255, 0.4)';
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(clothX - 12 + i * 10, clothY + 20, 3, 0, Math.PI * 2);
          ctx.fill();

    }

    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('玻璃棒', stickX, stickY + 35);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    if (!isPlaying) ctx.fillText('▶ 点击"开始观察"观看摩擦起电', W / 2, H - 15);
  } else {
    // Electroscope
    const cx = W / 2, cy = 120;

    // Metal ball
    ctx.fillStyle = '#ffd700';
    ctx.beginPath();
    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(cx, cy, 12, 0, Math.PI * 2);
    ctx.stroke();

    // Rod
    ctx.fillStyle = '#daa520';
    ctx.fillRect(cx - 2, cy + 10, 4, 40);

    // Foil leaves
    const angle = isPlaying ? Math.min(animTime * 0.02, 0.6) : 0;
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy + 50);
    ctx.lineTo(cx - 20 - angle * 50, cy + 80);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy + 50);
    ctx.lineTo(cx + 20 + angle * 50, cy + 80);
    ctx.stroke();

    // Glass case
    ctx.strokeStyle = 'rgba(180, 200, 255, 0.3)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(cx, cy + 60, 55, 50, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (isPlaying) {
      ctx.fillStyle = '#007AFF';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('⚡ 箔片张开（带同种电荷）', cx, cy + 130);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '12px sans-serif';
    ctx.fillText('验电器', cx, cy - 25);
    if (!isPlaying) ctx.fillText('▶ 点击"开始观察"让验电器带电', W / 2, H - 15);

function drawExplore(W, H) {
  ctx.fillStyle = '#f5f7ff';
  ctx.fillRect(0, 0, W, H);

  // Two charged objects
  const leftX = 200, rightX = 580, y = 150;

  // Left charge
  const lColor = exploreCharge1 > 0 ? '#ff6b6b' : '#4dabf7';
  const lLabel = exploreCharge1 > 0 ? '正电荷' : '负电荷';
  ctx.fillStyle = lColor;
  ctx.beginPath();
  ctx.arc(leftX, y, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(exploreCharge1 > 0 ? '+' : '−', leftX, y + 6);

  // Right charge
  const rColor = exploreCharge2 > 0 ? '#ff6b6b' : '#4dabf7';
  const rLabel = exploreCharge2 > 0 ? '正电荷' : '负电荷';
  ctx.fillStyle = rColor;
  ctx.beginPath();
  ctx.arc(rightX, y, 25, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '18px sans-serif';
  ctx.fillText(exploreCharge2 > 0 ? '+' : '−', rightX, y + 6);

  // Labels
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.fillText(lLabel, leftX, y + 50);
  ctx.fillText(rLabel, rightX, y + 50);

  // Interaction indicator
  const sameSign = exploreCharge1 * exploreCharge2 > 0;
  if (isPlaying) {
    // Movement animation
    const force = sameSign ? 1 : -1;
    const offset = Math.sin(animTime * 0.05) * 8 * force;
    const lx2 = leftX - offset;
    const rx2 = rightX + offset;

    // Redraw at new positions
    ctx.fillStyle = lColor;
    ctx.beginPath();
    ctx.arc(lx2, y, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText(exploreCharge1 > 0 ? '+' : '−', lx2, y + 6);
    ctx.fillStyle = rColor;
    ctx.beginPath();
    ctx.arc(rx2, y, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '18px sans-serif';
    ctx.fillText(exploreCharge2 > 0 ? '+' : '−', rx2, y + 6);

    // Force arrow
    const midY = y - 50;
    ctx.strokeStyle = sameSign ? '#FF3B30' : '#34C759';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    if (sameSign) {
      ctx.moveTo(leftX, midY - 10);
      ctx.lineTo(leftX - 30, midY - 10);
      ctx.moveTo(rightX, midY - 10);
      ctx.lineTo(rightX + 30, midY - 10);
      ctx.fillStyle = '#FF3B30';
      ctx.font = '13px sans-serif';
      ctx.fillText('排斥', W / 2, midY - 15);
    } else {
      ctx.moveTo(leftX + 10, midY - 10);
      ctx.lineTo(rightX - 10, midY - 10);
      ctx.fillStyle = '#34C759';
      ctx.font = '13px sans-serif';
      ctx.fillText('吸引', W / 2, midY - 15);
    }
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('点击下方「同种电荷」或「异种电荷」按钮开始探索', W / 2, H - 15);

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案编号（0或1）', W / 2, H - 20);
}

function drawQuiz(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📝 请完成右侧选择题', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
    updateUI();
  drawScene();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始观察</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('modeToggle').textContent = observeMode === 0 ? '切换到验电器' : '切换到摩擦起电';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  if (state.currentMission === 0) {
    const labels = ['正电荷', '负电荷'];
    const states = observeMode === 0 ? ['摩擦起电中...', '已带电'] : ['未带电', '已带电'];
    document.getElementById('dispCharge').textContent = labels[observeMode] || '-';
    document.getElementById('dispState').textContent = isPlaying ? states[1] : '静止';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// Observe
function startObserve() {
  isPlaying = true;
  animTime = 0;
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();

  }, 5000);
}

document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  observeMode = observeMode === 0 ? 1 : 0;
  document.getElementById('modeToggle').textContent = observeMode === 0 ? '切换到验电器' : '切换到摩擦起电';
  animTime = 0;
  if (!isPlaying) isPlaying = true;
  setTimeout(() => { isPlaying = false; }, 4000);
});

// Explore
function startExplore() {
  isPlaying = true;
  animTime = 0;
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 1) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;

  // Buttons area
  const btnY = 220;
  if (y >= btnY && y <= btnY + 40) {
    const btnW = 140;
    const startX = (canvas.width - btnW * 2 - 12) / 2;
    // "同种电荷" button
    if (x >= startX && x <= startX + btnW) {
      exploreCharge1 = 1; exploreCharge2 = 1;
      isPlaying = true; animTime = 0;
      return;
    }
    // "异种电荷" button
    if (x >= startX + btnW + 12 && x <= startX + btnW * 2 + 12) {
      exploreCharge1 = 1; exploreCharge2 = -1;
      isPlaying = true; animTime = 0;
      return;

  // Click center to mark done
  if (Math.hypot(x - canvas.width / 2, y - 150) < 80) {
    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();

});

// Draw explore buttons overlay
(function() {
  const origDrawExplore = drawExplore;
  drawExplore = function(W, H) {
    origDrawExplore(W, H);

    // Draw buttons at bottom
    const btnW = 140, btnH = 40;
    const startX = (W - btnW * 2 - 12) / 2;
    const btnY = 220;

    ctx.fillStyle = '#007AFF';
    roundRect(ctx, startX, btnY, btnW, btnH, 8);

    ctx.fillStyle = '#fff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('同种电荷', startX + btnW / 2, btnY + btnH / 2);

    ctx.fillStyle = '#FF9500';
    roundRect(ctx, startX + btnW + 12, btnY, btnW, btnH, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('异种电荷', startX + btnW + 12 + btnW / 2, btnY + btnH / 2);
  };
})();

// Challenge
function checkChallengeAnswer(input) {
  const ch = CHALLENGES[state.challengeIdx];
  if (!ch) return false;
  return Math.abs(input - ch.answer) <= ch.tolerance;
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission !== 2) return;
  const userInput = prompt('输入你的答案（数字）:', '');
  if (userInput === null) return;
  const num = parseFloat(userInput);
  if (isNaN(num)) return;

  if (checkChallengeAnswer(num)) {
    state.challengeIdx++;
    if (state.challengeIdx >= CHALLENGES.length) {
      if (!state.done.includes(2)) state.done.push(2);
      saveState();
      updateUI();
      alert('🎉 恭喜通关！');
    } else {
      saveState();
      updateUI();
    }
  } else {
    alert('❌ 答案不对，再想想！');
  }
});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}
