const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let observeMode = 0; // 0=ammeter, 1=voltmeter
let exploreMode = 0; // 0=series, 1=parallel

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuiz(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = 140;
  const isAmmeter = observeMode === 0;

  // Meter face
  const radius = 90;
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();

  // Arc scale
  const startAngle = Math.PI * 0.75;
  const endAngle = Math.PI * 0.25;
  const range = endAngle - startAngle;
  const divisions = 30;

  for (let i = 0; i <= divisions; i++) {
    const angle = startAngle + (range * i) / divisions;
    const isMain = i % 5 === 0;
    const innerR = isMain ? radius - 18 : radius - 10;
    const outerR = radius - 4;
    ctx.strokeStyle = '#333';
    ctx.lineWidth = isMain ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(angle) * innerR, cy + Math.sin(angle) * innerR);
    ctx.lineTo(cx + Math.cos(angle) * outerR, cy + Math.sin(angle) * outerR);
    ctx.stroke();

    if (isMain) {
      const labelR = radius - 28;
      const val = (i / 5) * (isAmmeter ? 0.6 : 3);
      ctx.fillStyle = '#ffffff';
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(val.toFixed(isAmmeter ? 1 : 0), cx + Math.cos(angle) * labelR, cy + Math.sin(angle) * labelR);

  // Unit label
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(isAmmeter ? 'A' : 'V', cx, cy + 20);

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.fillText(isAmmeter ? '电流表' : '电压表', cx, cy - radius - 15);

  // Needle
  if (isPlaying) {
    const needleAngle = startAngle + range * (0.1 + (Math.sin(animTime * 0.03) * 0.3 + 0.3));
    ctx.strokeStyle = '#007AFF';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(needleAngle) * (radius - 25), cy + Math.sin(needleAngle) * (radius - 25));
    ctx.stroke();

    // Center dot
    ctx.fillStyle = '#007AFF';
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();

    // Reading
    const val = (0.1 + (Math.sin(animTime * 0.03) * 0.3 + 0.3)) * (isAmmeter ? 0.6 : 3);
    document.getElementById('dispReading').textContent = val.toFixed(2) + ' ' + (isAmmeter ? 'A' : 'V');
  } else {
    // Static needle
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(startAngle + range * 0.3) * (radius - 25), cy + Math.sin(startAngle + range * 0.3) * (radius - 25));
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  if (!isPlaying) ctx.fillText('▶ 点击"开始观察"观看指针偏转', W / 2, H - 15);

  document.getElementById('dispRange').textContent = isAmmeter ? '0-0.6A' : '0-3V';
}

    ctx.beginPath();

    ctx.lineTo(340, 130);

    ctx.fillText('R₂', 340, 135);

    // Wire back

    }

    ctx.font = '12px sans-serif';

  } else {
    // Parallel circuit
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('电源', 80, 40);

    // Battery
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(60, 60);
    ctx.lineTo(60, 120);
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(55, 70, 10, 6);
    ctx.fillRect(57, 82, 6, 6);

    // Main wire
    ctx.strokeStyle = '#007AFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(60, 60);
    ctx.lineTo(60, 30);
    ctx.lineTo(500, 30);
    ctx.lineTo(500, 120);
    ctx.stroke();

    // Branch 1
    ctx.strokeStyle = '#FF9500';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(180, 30);
    ctx.lineTo(180, 100);
    ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(165, 100, 30, 60);
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(165, 100, 30, 60);
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.fillText('R₁', 180, 135);
    ctx.strokeStyle = '#FF9500';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(180, 160);
    ctx.lineTo(180, 200);
    ctx.stroke();

    // Branch 2
    ctx.strokeStyle = '#34C759';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(340, 30);
    ctx.lineTo(340, 100);
    ctx.stroke();
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(325, 100, 30, 60);
    ctx.strokeStyle = '#daa520';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(325, 100, 30, 60);
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.fillText('R₂', 340, 135);

    // Bottom wire
    ctx.strokeStyle = '#007AFF';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(180, 200);

    ctx.stroke();

    // Ammeter on main
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(500, 75, 14, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = '11px sans-serif';
    ctx.fillText('A', 500, 79);
    ctx.fillText('I', 490, 65);

    ctx.fillStyle = '#ffffff';
    ctx.font = '13px sans-serif';
    ctx.fillText('并联: I = I₁ + I₂', W / 2, 250);
    ctx.fillStyle = '#007AFF';
    ctx.font = '12px sans-serif';
    ctx.fillText('干路电流等于各支路电流之和', W / 2, 270);
  }

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  if (!isPlaying) {
    ctx.fillText('💡 点击下方切换串/并联，点击电路中间标记完成', 10, H - 10);

// Canvas arrow helper
CanvasRenderingContext2D.prototype.arrow = function(x1, y1, x2, y2) {
  this.beginPath();
  this.moveTo(x1, y1);
  this.lineTo(x2, y2);
  const angle = Math.atan2(y2 - y1, x2 - x1);
  this.lineTo(x2 - 6 * Math.cos(angle - 0.4), y2 - 6 * Math.sin(angle - 0.4));
  this.moveTo(x2, y2);
  this.lineTo(x2 - 6 * Math.cos(angle + 0.4), y2 - 6 * Math.sin(angle + 0.4));
  return this;
};

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案（数值）', W / 2, H - 20);
}

function drawQuiz(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

}

function drawExploreButtons(W, H) {
  const btnW = 140, btnH = 40;
  const startX = (W - btnW * 2 - 12) / 2;
  const btnY = H - 50;

  ctx.fillStyle = exploreMode === 0 ? '#007AFF' : '#ddd';
  roundRect(ctx, startX, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.fillStyle = exploreMode === 0 ? '#fff' : '#666';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('串联', startX + btnW / 2, btnY + btnH / 2);

  ctx.fillStyle = exploreMode === 1 ? '#007AFF' : '#ddd';
  roundRect(ctx, startX + btnW + 12, btnY, btnW, btnH, 8);
  ctx.fill();
  ctx.fillStyle = exploreMode === 1 ? '#fff' : '#666';
  ctx.fillText('并联', startX + btnW + 12 + btnW / 2, btnY + btnH / 2);
}

(function() {
  const orig = drawExplore;
  drawExplore = function(W, H) {
    orig(W, H);
    drawExploreButtons(W, H);
  };
})();

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
    updateUI();
  drawScene();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startObserve()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始观察</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('modeToggle').textContent = observeMode === 0 ? '切换到电压表' : '切换到电流表';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 重新探索</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="startExplore()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// Observe
function startObserve() {
  isPlaying = true;
  animTime = 0;
  setTimeout(() => {
    if (state.currentMission === 0 && isPlaying) {
      isPlaying = false;
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();

  }, 5000);
}

document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  observeMode = observeMode === 0 ? 1 : 0;
  document.getElementById('modeToggle').textContent = observeMode === 0 ? '切换到电压表' : '切换到电流表';
  document.getElementById('dispReading').textContent = '0.00 ' + (observeMode === 0 ? 'A' : 'V');
  document.getElementById('dispRange').textContent = observeMode === 0 ? '0-0.6A' : '0-3V';
  animTime = 0;
  if (!isPlaying) isPlaying = true;
});

// Explore
function startExplore() {
  isPlaying = true;
  animTime = 0;
}

canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleX;

  if (state.currentMission === 1) {
    const btnW = 140, btnH = 40;
    const startX = (canvas.width - btnW * 2 - 12) / 2;
    const btnY = canvas.height - 50;
    if (y >= btnY && y <= btnY + btnH) {
      if (x >= startX && x <= startX + btnW) {
        exploreMode = 0; isPlaying = true; animTime = 0; return;
      }
      if (x >= startX + btnW + 12 && x <= startX + btnW * 2 + 12) {
        exploreMode = 1; isPlaying = true; animTime = 0; return;

    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();
    }
  } else if (state.currentMission === 2) {
    const userInput = prompt('输入你的答案（数字）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
      }
    } else {
      alert('❌ 答案不对，再想想！');

});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
