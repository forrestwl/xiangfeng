const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let sliderPos = 50; // 0-100 percent
let exploreLength = 50;
let exploreThick = 50;

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuiz(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = 140;

  // Sliding rheostat body (coil tube)
  const tubeW = 300, tubeH = 20;
  ctx.fillStyle = '#e8e0d0';
  roundRect(ctx, cx - tubeW / 2, cy - tubeH / 2, tubeW, tubeH, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  roundRect(ctx, cx - tubeW / 2, cy - tubeH / 2, tubeW, tubeH, 10);
  ctx.stroke();

  // Coil pattern
  for (let i = 0; i < 20; i++) {
    const x = cx - tubeW / 2 + 8 + i * (tubeW - 16) / 19;
    ctx.strokeStyle = '#b8a888';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, cy - tubeH / 2 + 2);
    ctx.lineTo(x + 4, cy + tubeH / 2 - 2);
    ctx.stroke();
  }

  // Slider knob
  const knobX = cx - tubeW / 2 + 15 + (sliderPos / 100) * (tubeW - 30);
  ctx.fillStyle = '#007AFF';
  ctx.beginPath();
  ctx.arc(knobX, cy - tubeH / 2 - 12, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('P', knobX, cy - tubeH / 2 - 9);

  // Stem
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(knobX, cy - tubeH / 2);
  ctx.lineTo(knobX, cy - tubeH / 2 - 8);
  ctx.stroke();

  // Wiring terminals A, B
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('A', cx - tubeW / 2 - 15, cy + 5);
  ctx.fillText('B', cx + tubeW / 2 + 15, cy + 5);

  // Current path indicator
  const res = 10 + (sliderPos / 100) * 40;
  ctx.fillStyle = '#007AFF';
  ctx.font = '14px sans-serif';
  ctx.fillText('接入电阻: ' + res.toFixed(0) + ' Ω', cx, cy + 50);

  // Arrow hint
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.fillText('← 拖动滑片改变电阻 →', cx, cy + 80);
  ctx.fillText('💡 点击滑片左右区域拖动', cx, cy + 100);

  // Update display
  document.getElementById('dispResistance').textContent = res.toFixed(0) + ' Ω';
  const labels = ['左端', '偏左', '中间', '偏右', '右端'];
  const idx = sliderPos < 20 ? 0 : sliderPos < 40 ? 1 : sliderPos < 60 ? 2 : sliderPos < 80 ? 3 : 4;
  document.getElementById('dispSlider').textContent = labels[idx];
}

function drawExplore(W, H) {
  ctx.fillStyle = '#f5f7ff';
  ctx.fillRect(0, 0, W, H);

  // Draw two wires for comparison
  const drawWire = (x, lenPct, thickPct, color) => {
    const maxLen = 200;
    const maxThick = 20;
    const length = 30 + (lenPct / 100) * maxLen;
    const thick = 3 + (thickPct / 100) * maxThick;
    const y = 160;

    // Wire
    ctx.fillStyle = color;
    roundRect(ctx, x, y - thick / 2, length, thick, thick / 2);
    ctx.fill();

    // Labels
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('L=' + (20 + (lenPct / 100) * 80).toFixed(0) + 'cm', x + length / 2, y + thick + 18);
    ctx.fillText('S=' + (1 + (thickPct / 100) * 4).toFixed(1) + 'mm²', x + length / 2, y + thick + 34);

    // Resistance value
    const res = (100 - lenPct + 50) * (100 - thickPct + 50) / 100;
    ctx.fillStyle = '#007AFF';
    ctx.font = '13px sans-serif';
    ctx.fillText('R=' + res.toFixed(1) + ' Ω', x + length / 2, y - thick - 10);
  };

  // First wire (left)
  drawWire(100, exploreLength, exploreThick, '#FF9500');
  // Second wire (right) - doubled length
  drawWire(420, Math.min(100, exploreLength * 1.5), exploreThick, '#34C759');

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('导线甲', 100 + 30 + (exploreLength / 100) * 100, 60);
  ctx.fillText('导线乙（更长）', 420 + 30 + (Math.min(100, exploreLength * 1.5) / 100) * 100, 60);

  // Sliders for length and thickness
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('拖动下方控制导体长度和粗细', 10, H - 65);

  // Length slider (simplified)
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 60, H - 50, 320, 8, 4);
  ctx.fill();
  ctx.fillStyle = '#007AFF';
  const lenX = 60 + (exploreLength / 100) * 320;
  roundRect(ctx, lenX - 6, H - 56, 12, 20, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('长度', 30, H - 42);

  // Thickness slider
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 460, H - 50, 260, 8, 4);
  ctx.fill();
  ctx.fillStyle = '#FF9500';
  const thickX = 460 + (exploreThick / 100) * 260;
  roundRect(ctx, thickX - 6, H - 56, 12, 20, 6);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.fillText('粗细', 430, H - 42);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('点击圆圈标记完成探索', W / 2, 30);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案编号', W / 2, H - 20);
}

function drawQuiz(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📝 请完成右侧选择题', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
    updateUI();
  drawScene();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];

  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');

  if (state.currentMission === 0) {
    document.getElementById('modeToggle').className = 'mode-toggle';

    if (done) {
      desc.innerHTML = '✅ 已观察。 <button onclick="if(!state.done.includes(0)){state.done.push(0);saveState();}updateUI();" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记完成</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="if(!state.done.includes(0)){state.done.push(0);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记已观察</button>';
    }
  } else if (state.currentMission === 1) {
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记完成</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记已探索</button>';
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// Canvas click handler
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  const W = canvas.width, H = canvas.height;

  if (state.currentMission === 0) {
    // Slider interaction
    const cx = W / 2;
    const tubeW = 300;
    const startX = cx - tubeW / 2 + 15;
    const endX = cx + tubeW / 2 - 15;
    if (y > 100 && y < 180 && x > startX && x < endX) {
      sliderPos = ((x - startX) / (endX - startX)) * 100;
      sliderPos = Math.max(0, Math.min(100, sliderPos));
    }
  } else if (state.currentMission === 1) {
    // Length slider
    if (y >= H - 56 && y <= H - 36) {
      if (x >= 60 && x <= 380) {
        exploreLength = ((x - 60) / 320) * 100;
        exploreLength = Math.max(0, Math.min(100, exploreLength));
        return;
      }
      if (x >= 460 && x <= 720) {
        exploreThick = ((x - 460) / 260) * 100;
        exploreThick = Math.max(0, Math.min(100, exploreThick));
        return;

  } else if (state.currentMission === 2) {
    const userInput = prompt('输入你的答案编号:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
      }
    } else {
      alert('❌ 答案不对，再想想！');

});

  const scaleY = canvas.height / rect.height;

  if (state.currentMission === 0) {
    const cx = canvas.width / 2;

    const endX = cx + tubeW / 2 - 15;
    if (y > 100 && y < 180 && x > startX && x < endX) {
      isDragging = true;

});

canvas.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const x = (e.clientX - rect.left) * scaleX;

  const cx = canvas.width / 2;
  const tubeW = 300;
  const startX = cx - tubeW / 2 + 15;
  const endX = cx + tubeW / 2 - 15;
  if (x >= startX && x <= endX) {
    sliderPos = ((x - startX) / (endX - startX)) * 100;
    sliderPos = Math.max(0, Math.min(100, sliderPos));
  }
});

canvas.addEventListener('mouseup', () => { isDragging = false; });
canvas.addEventListener('mouseleave', () => { isDragging = false; });

// Challenge helper
function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}
