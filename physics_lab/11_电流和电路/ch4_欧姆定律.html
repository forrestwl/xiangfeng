  { q: '某导体两端电压为 0V 时，它的电阻是？', opts: ['A. 0Ω', 'B. 无穷大', 'C. 原来的阻值', 'D. 无法判断'], ans: 2, explain: '电阻是导体本身的性质，与电压和电流无关。即使两端电压为0，导体的电阻也不变。' },
  { q: '两电阻 R₁>R₂，串联后接在电路中，通过谁的电流大？', opts: ['A. R₁', 'B. R₂', 'C. 一样大', 'D. 无法比较'], ans: 2, explain: '串联电路中电流处处相等，所以通过 R₁ 和 R₂ 的电流一样大。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let observeR = 5; // 5 or 10 ohms
let exploreVoltage = 3;
let exploreResistance = 5;

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuiz(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const margin = { l: 70, r: 30, t: 30, b: 40 };
  const gW = W - margin.l - margin.r;
  const gH = H - margin.t - margin.b;

  // Coordinate axes
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(margin.l, H - margin.b);
  ctx.lineTo(W - margin.r, H - margin.b);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(margin.l, H - margin.b);
  ctx.lineTo(margin.l, margin.t);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('U/V', W - margin.r - 10, H - margin.b + 5);
  ctx.textAlign = 'right';
  ctx.fillText('I/A', margin.l - 5, margin.t + 10);

  // Scale marks
  for (let i = 0; i <= 4; i++) {
    const x = margin.l + (gW * i) / 4;
    const y = H - margin.b;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText((i * 1.5).toFixed(1), x, y + 14);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, y - 2);
    ctx.lineTo(x, margin.t);
    ctx.stroke();
  }
  for (let i = 0; i <= 4; i++) {
    const y = H - margin.b - (gH * i) / 4;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText((i * (observeR === 5 ? 0.6 : 0.3)).toFixed(1), margin.l - 5, y + 4);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(margin.l + 2, y);
    ctx.lineTo(W - margin.r, y);
    ctx.stroke();
  }

  // I-U line
  const maxU = 6;
  const maxI = observeR === 5 ? 1.2 : 0.6;
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 3;
  ctx.beginPath();
  const x1 = margin.l;
  const y1 = H - margin.b;
  const x2 = margin.l + gW;
  const y2 = H - margin.b - gH;
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // Data points with animation
  if (isPlaying) {
    const numPoints = 5;
    for (let i = 0; i <= numPoints; i++) {
      const progress = animTime > i * 20 ? 1 : Math.max(0, (animTime - i * 20) / 30);
      const u = (i / numPoints) * maxU * progress;
      const i_val = u / observeR;
      const px = margin.l + (u / maxU) * gW;
      const py = H - margin.b - (i_val / maxI) * gH;

      ctx.fillStyle = '#FF9500';
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();

      if (i > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.65)';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('(' + u.toFixed(1) + ',' + i_val.toFixed(2) + ')', px, py - 12);

  }

  // Equation
  ctx.fillStyle = '#007AFF';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('I = U / R', W / 2, 20);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.fillText('R = ' + observeR + ' Ω', W / 2, 290);

  document.getElementById('dispR').textContent = observeR + ' Ω';
  document.getElementById('dispSlope').textContent = (1 / observeR).toFixed(2);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#f5f7ff';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = 140;

  // Simple circuit: battery, resistor, ammeter, voltmeter
  // Battery
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('电源', 100, 60);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(85, 75, 10, 6);
  ctx.fillRect(87, 87, 6, 6);

  // Wire loop
  ctx.strokeStyle = '#007AFF';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(90, 60);
  ctx.lineTo(90, 30);
  ctx.lineTo(550, 30);
  ctx.lineTo(550, 120);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(90, 120);
  ctx.lineTo(90, 150);
  ctx.lineTo(550, 150);
  ctx.lineTo(550, 120);
  ctx.stroke();

  // Resistor
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(240, 100, 30, 50);
  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 1;
  ctx.strokeRect(240, 100, 30, 50);
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('R=' + exploreResistance + 'Ω', 255, 130);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(240, 105);
  ctx.lineTo(240, 100);
  ctx.lineTo(250, 96);
  ctx.lineTo(250, 104);
  ctx.lineTo(260, 96);
  ctx.lineTo(260, 104);
  ctx.lineTo(270, 96);
  ctx.lineTo(270, 100);
  ctx.lineTo(270, 105);
  ctx.stroke();

  // Ammeter
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(480, 75, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.fillText('A', 480, 79);

  // Voltmeter
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(420, 185, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.fillText('V', 420, 189);
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(420, 199);
  ctx.lineTo(420, 220);
  ctx.lineTo(255, 220);
  ctx.lineTo(255, 150);
  ctx.stroke();

  // Current value display
  const current = exploreVoltage / exploreResistance;
  ctx.fillStyle = '#007AFF';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('I = U / R = ' + exploreVoltage.toFixed(1) + 'V / ' + exploreResistance + 'Ω = ' + current.toFixed(2) + 'A', W / 2, 270);

  // Voltage control
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('拖动调节电压（1-12V）', 20, 240);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 150, 230, 450, 10, 5);
  ctx.fill();
  ctx.fillStyle = '#007AFF';
  const sliderX = 150 + (exploreVoltage - 1) / 11 * 450;
  roundRect(ctx, sliderX - 8, 222, 16, 26, 8);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(exploreVoltage.toFixed(1) + 'V', sliderX, 220);

  // Resistor toggle
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 620, 225, 120, 30, 8);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('R: ' + exploreResistance + 'Ω', 680, 245);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  // Formula hint
  ctx.fillStyle = '#007AFF';
  ctx.font = '20px sans-serif';
  ctx.fillText('I = U / R', W / 2, y + 30);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案（数值）', W / 2, H - 20);
}

function drawQuiz(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📝 请完成右侧选择题', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  if (idx === 0) isPlaying = true;
  saveState();
  updateUI();
  drawScene();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="isPlaying=true;animTime=0;" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看一次</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="isPlaying=true;animTime=0;if(!state.done.includes(0)){setTimeout(function(){if(state.currentMission===0){state.done.push(0);saveState();updateUI();}},5000);}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 播放</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('modeToggle').textContent = observeR === 5 ? '切换到10Ω' : '切换到5Ω';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 1) {
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记完成</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记已探索</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// Observe toggle
document.getElementById('modeToggle').addEventListener('click', () => {
  if (state.currentMission !== 0) return;
  observeR = observeR === 5 ? 10 : 5;
  document.getElementById('modeToggle').textContent = observeR === 5 ? '切换到10Ω' : '切换到5Ω';
  animTime = 0;
  isPlaying = true;
});

// Canvas click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  const W = canvas.width, H = canvas.height;

  if (state.currentMission === 1) {
    // Voltage slider
    if (y >= 222 && y <= 248) {
      if (x >= 150 && x <= 600) {
        exploreVoltage = 1 + ((x - 150) / 450) * 11;
        exploreVoltage = Math.max(1, Math.min(12, exploreVoltage));
        return;

    // Resistor toggle
    if (y >= 225 && y <= 255 && x >= 620 && x <= 740) {
      exploreResistance = exploreResistance === 5 ? 10 : 5;
      return;
    }
    // Mark done
    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();
    }
  } else if (state.currentMission === 2) {
    const userInput = prompt('输入你的答案（数值）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
      }
    } else {
      alert('❌ 答案不对，再想想！');

});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');

      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
