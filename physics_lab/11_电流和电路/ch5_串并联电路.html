function drawExplore(W, H) {
  ctx.fillStyle = '#f5f7ff';
  ctx.fillRect(0, 0, W, H);

  // Show formula comparison
  ctx.fillStyle = '#ffffff';
  ctx.font = '18px sans-serif';
  ctx.textAlign = 'center';

  // Series
  const seriesR = exploreR1 + exploreR2;
  ctx.fillStyle = '#007AFF';
  ctx.font = '15px sans-serif';
  ctx.fillText('串联 R = R₁ + R₂', W / 2, 40);
  ctx.fillStyle = '#ffffff';
  ctx.font = '24px sans-serif';
  ctx.fillText(exploreR1 + ' + ' + exploreR2 + ' = ' + seriesR + ' Ω', W / 2, 80);

  // Parallel
  const parallelR = (exploreR1 * exploreR2) / (exploreR1 + exploreR2);
  ctx.fillStyle = '#FF9500';
  ctx.font = '15px sans-serif';
  ctx.fillText('并联 1/R = 1/R₁ + 1/R₂', W / 2, 130);
  ctx.fillStyle = '#ffffff';
  ctx.font = '24px sans-serif';
  ctx.fillText('1/' + exploreR1 + ' + 1/' + exploreR2 + ' = 1/' + parallelR.toFixed(2), W / 2, 170);
  ctx.fillText('R = ' + parallelR.toFixed(2) + ' Ω', W / 2, 205);

  // Bar chart comparison
  const barY = 230;
  const maxBar = 40;
  // Series bar
  const sH = Math.min(maxBar, seriesR / 2);
  ctx.fillStyle = '#007AFF';
  roundRect(ctx, 150, barY - sH, 80, sH, 4);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('串联', 190, barY + 15);
  ctx.fillText(seriesR.toFixed(1) + 'Ω', 190, barY - sH - 5);

  // Parallel bar
  const pH = Math.min(maxBar, parallelR / 2);
  ctx.fillStyle = '#FF9500';
  roundRect(ctx, 550, barY - pH, 80, pH, 4);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.fillText('并联', 590, barY + 15);
  ctx.fillText(parallelR.toFixed(2) + 'Ω', 590, barY - pH - 5);

  // Resistor sliders
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('R₁=' + exploreR1 + 'Ω', 10, 20);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 60, 10, 180, 8, 4);
  ctx.fill();
  ctx.fillStyle = '#007AFF';
  const r1x = 60 + (exploreR1 / 50) * 180;
  roundRect(ctx, r1x - 5, 4, 10, 20, 5);
  ctx.fill();

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('R₂=' + exploreR2 + 'Ω', 10, 50);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 60, 40, 180, 8, 4);
  ctx.fill();
  ctx.fillStyle = '#FF9500';
  const r2x = 60 + (exploreR2 / 50) * 180;
  roundRect(ctx, r2x - 5, 34, 10, 20, 5);
  ctx.fill();
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  // Formula hints
  ctx.fillStyle = '#007AFF';
  ctx.font = '16px sans-serif';
  if (state.challengeIdx === 4) {
    ctx.fillText('先算并联部分，再加串联', W / 2, y + 30);
  } else {
    const isSeries = ch.goal.includes('串联');
    ctx.fillText(isSeries ? 'R = R₁ + R₂' : '1/R = 1/R₁ + 1/R₂', W / 2, y + 30);
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案（数值）', W / 2, H - 20);
}

function drawQuiz(W, H) {

  ctx.textBaseline = 'middle';
  ctx.fillText('📝 请完成右侧选择题', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

document.getElementById('modeToggle').addEventListener('click', () => {

// Canvas click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  if (state.currentMission === 1) {
    // R1 slider
    if (y >= 4 && y <= 24 && x >= 60 && x <= 240) {
      exploreR1 = Math.round(((x - 60) / 180) * 50);
      exploreR1 = Math.max(1, Math.min(50, exploreR1));
      return;
    }
    // R2 slider
    if (y >= 34 && y <= 54 && x >= 60 && x <= 240) {
      exploreR2 = Math.round(((x - 60) / 180) * 50);
      exploreR2 = Math.max(1, Math.min(50, exploreR2));
      return;
    }
    if (!state.done.includes(1)) {
      state.done.push(1);
      saveState();
      updateUI();
    }
  } else if (state.currentMission === 2) {
    const userInput = prompt('输入你的答案（数值）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
      }
    } else {
      alert('❌ 答案不对，再想想！');

});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

const KNOWLEDGE = {
  0: {
    title: '💡 串联电路的特点',
    body: `电流处处相等：I = I₁ = I₂
总电压等于各电压之和：U = U₁ + U₂
总电阻等于各电阻之和：R = R₁ + R₂`
  },
  1: {
    title: '💡 并联电路的特点',
    body: `干路电流等于各支路电流之和：I = I₁ + I₂
各支路电压相等：U = U₁ = U₂
总电阻倒数等于各电阻倒数之和。`
  },
  2: {
    title: '💡 串并联电路识别',
    body: `路径法：一条路径为串联，多条路径为并联。
拆除法：去掉一个用电器，其他不能工作为串联。`
  },
  3: {
    title: '💡 检测你的掌握',
    body: `通过几道选择题来检验你对串并联电路特点的理解。`
  },
};

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
