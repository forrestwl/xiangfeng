const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId = null, animTime = 0;
let isPlaying = false;
let sliderPos = 30; // 0-100
let currentData = { u: 0, i: 0 };
let dataPoints = [];

function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mission = state.currentMission;
  if (mission === 0) drawObserve(W, H);
  else if (mission === 1) drawExplore(W, H);
  else if (mission === 2) drawChallenge(W, H);
  else if (mission === 3) drawQuiz(W, H);
}

function drawCircuitBase(W, H) {
  // Battery
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('电源', 70, 35);
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillRect(55, 50, 10, 6);
  ctx.fillRect(57, 62, 6, 6);

  // Main loop
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, 45);
  ctx.lineTo(60, 15);
  ctx.lineTo(600, 15);
  ctx.lineTo(600, 90);
  ctx.stroke();

  // Switch
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.fillRect(350, 10, 25, 10);
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  ctx.strokeRect(350, 10, 25, 10);

  // Ammeter on main line
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(500, 15, 14, -Math.PI, 0);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('A', 500, 19);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(500, 15, 14, 0, Math.PI);
  ctx.stroke();

  // Wire from switch to Rx
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(375, 15);
  ctx.lineTo(450, 15);
  ctx.stroke();

  // Main wire cont.
  ctx.beginPath();
  ctx.moveTo(514, 15);
  ctx.lineTo(600, 15);
  ctx.stroke();

  // Right side down
  ctx.beginPath();
  ctx.moveTo(600, 90);
  ctx.lineTo(600, 170);
  ctx.stroke();

  // Bottom wire
  ctx.beginPath();
  ctx.moveTo(60, 170);
  ctx.lineTo(600, 170);
  ctx.stroke();

  // Left side up
  ctx.beginPath();
  ctx.moveTo(60, 170);
  ctx.lineTo(60, 100);
  ctx.stroke();

  // Rx - the unknown resistor
  ctx.fillStyle = '#ffd700';
  ctx.fillRect(95, 80, 30, 50);
  ctx.strokeStyle = '#daa520';
  ctx.lineWidth = 1;
  ctx.strokeRect(95, 80, 30, 50);
  ctx.fillStyle = '#ffffff';
  ctx.font = '13px sans-serif';
  ctx.fillText('Rx', 110, 110);

  // Sliding rheostat symbol
  const sliderY = 125;
  ctx.fillStyle = '#e8e0d0';
  roundRect(ctx, 460, sliderY - 8, 120, 16, 6);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1;
  roundRect(ctx, 460, sliderY - 8, 120, 16, 6);
  ctx.stroke();

  // Slider position
  const sPos = 460 + (sliderPos / 100) * 120;
  ctx.fillStyle = '#007AFF';
  ctx.beginPath();
  ctx.arc(sPos, sliderY - 16, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('P', sPos, sliderY - 14);

  // Wires to slider
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(600, 90);
  ctx.lineTo(600, sliderY);
  ctx.stroke();

  // Voltmeter (parallel to Rx)
  const voltX = 200, voltY = 60;
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 2;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(110, 80);
  ctx.lineTo(110, voltY);
  ctx.lineTo(voltX, voltY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(110, 130);
  ctx.lineTo(110, voltY + 40);
  ctx.lineTo(voltX, voltY + 40);
  ctx.stroke();
  ctx.setLineDash([]);

  // Voltmeter circle
  ctx.strokeStyle = '#FF9500';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(voltX, voltY + 20, 14, 0, Math.PI * 2);
  ctx.stroke();
  ctx.fillStyle = '#FF9500';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('V', voltX, voltY + 24);

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '11px sans-serif';
  ctx.fillText('滑动变阻器', 520, sliderY + 25);
  ctx.fillText('待测电阻', 110, 150);
  ctx.textAlign = 'left';
  ctx.fillText('电源', 40, 40);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  drawCircuitBase(W, H);

  // Values
  const U = 1.5 + (sliderPos / 100) * 3;
  const I = U / 10;
  currentData = { u: U, i: I };

  if (isPlaying) {
    document.getElementById('dispU').textContent = U.toFixed(2) + ' V';
    document.getElementById('dispI').textContent = I.toFixed(3) + ' A';
    document.getElementById('dispRx').textContent = (U / I).toFixed(1) + ' Ω';
  } else {
    document.getElementById('dispU').textContent = '0.00 V';
    document.getElementById('dispI').textContent = '0.000 A';
    document.getElementById('dispRx').textContent = '-- Ω';
  }

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('💡 点击滑动变阻器滑片调节电阻', W / 2, 260);
  ctx.fillStyle = '#007AFF';
  ctx.font = '15px sans-serif';
  ctx.fillText('R = U / I = ' + (isPlaying ? (U / I).toFixed(1) : '?') + ' Ω', W / 2, 240);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#f5f7ff';
  ctx.fillRect(0, 0, W, H);

  drawCircuitBase(W, H);

  // Calculate values
  const U = 1 + (sliderPos / 100) * 4;
  const I = U / 10;

  document.getElementById('dispU').textContent = U.toFixed(2) + ' V';
  document.getElementById('dispI').textContent = I.toFixed(3) + ' A';
  document.getElementById('dispRx').textContent = (U / I).toFixed(1) + ' Ω';

  // Data record area
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('测量记录', 620, 40);

  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.fillText('U=' + U.toFixed(2) + 'V', 620, 60);
  ctx.fillText('I=' + I.toFixed(3) + 'A', 620, 76);
  ctx.fillText('R=' + (U / I).toFixed(1) + 'Ω', 620, 92);

  // Data points table
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '11px sans-serif';
  ctx.fillText('已有记录:', 620, 115);
  dataPoints.forEach((d, i) => {
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText((i + 1) + ': U=' + d.u.toFixed(2) + ' I=' + d.i.toFixed(3), 620, 133 + i * 16);
  });

  // Average display
  if (dataPoints.length >= 2) {
    const avgR = dataPoints.reduce((s, d) => s + d.u / d.i, 0) / dataPoints.length;
    ctx.fillStyle = '#007AFF';
    ctx.font = '13px sans-serif';
    ctx.fillText('平均 R=' + avgR.toFixed(1) + 'Ω', 620, 133 + dataPoints.length * 16 + 5);
  }

  // Record button
  ctx.fillStyle = '#007AFF';
  roundRect(ctx, 620, 190, 120, 30, 8);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('📝 记录数据', 680, 210);

  // Clear button
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  roundRect(ctx, 620, 228, 120, 30, 8);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.65)';
  ctx.font = '12px sans-serif';
  ctx.fillText('🗑 清空记录', 680, 248);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  ctx.fillStyle = '#ffffff';
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  const maxW = W - 40;
  let lines = [];
  let line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 15) {
      lines.push(line);
      line = '';

  if (line) lines.push(line);
  let y = 50;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 30; });

  // Formula
  ctx.fillStyle = '#007AFF';
  ctx.font = '20px sans-serif';
  ctx.fillText('R = U / I', W / 2, y + 30);

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '14px sans-serif';
  ctx.fillText('💡 在弹窗中输入答案（数值）', W / 2, H - 20);
}

function drawQuiz(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('📝 请完成右侧选择题', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  if (isPlaying) animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  if (idx === 0) isPlaying = true;
  if (idx === 1) isPlaying = true;
  saveState();
  updateUI();
  drawScene();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);

  if (state.currentMission === 0) {
    if (done) {
      desc.innerHTML = '✅ 已观看。 <button onclick="isPlaying=true;" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 再看</button>';
    } else {
      desc.innerHTML = m.desc + ' <button onclick="isPlaying=true;if(!state.done.includes(0)){setTimeout(function(){if(state.currentMission===0){state.done.push(0);saveState();updateUI();}},4000);}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">▶ 开始观察</button>';
    }
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('speedDisplay').style.display = 'flex';
  } else if (state.currentMission === 1) {
    document.getElementById('modeToggle').className = 'mode-toggle show';
    document.getElementById('speedDisplay').style.display = 'flex';
    if (done) {
      desc.innerHTML = '✅ 已探索。 <button onclick="dataPoints=[];if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记完成</button>';
    } else {
      desc.innerHTML = m.desc + ' 拖动滑片改变电压，点击"记录数据"保存测量值。' + ' <button onclick="if(!state.done.includes(1)){state.done.push(1);saveState();updateUI();}" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">标记完成</button>';
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) {
      desc.innerHTML = '🎉 所有关卡挑战成功！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 重新挑战</button>';
    } else {
      desc.innerHTML = m.desc + ' 当前第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
    document.getElementById('chLevel').textContent = '🎯 第 ' + (state.challengeIdx + 1) + '/' + CHALLENGES.length + ' 关';
    document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) {
      desc.innerHTML = '✅ 测验已完成！ <button onclick="startQuiz()" style="padding:6px 16px;background:#007AFF;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">🔄 再来一轮</button>';
    } else {
      desc.innerHTML = m.desc + ' 点击下方按钮开始。';
    }
    document.getElementById('modeToggle').className = 'mode-toggle';
    document.getElementById('speedDisplay').style.display = 'none';
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return '<div class="' + cls + '" onclick="switchMission(' + i + ')">' + m.label + check + '</div>';
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });

  document.getElementById('challengeHud').className = state.currentMission === 2 ? 'challenge-hud show' : 'challenge-hud';
  document.getElementById('quizOverlay').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';

  if (state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length) showQuiz();}

// Canvas click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const x = (e.clientX - rect.left) * scaleX;
  const y = (e.clientY - rect.top) * scaleY;

  const W = canvas.width;

  if (state.currentMission === 0 || state.currentMission === 1) {
    // Slider interaction
    const sliderY = 125;
    const startX = 460, endX = 580;
    if (y >= sliderY - 20 && y <= sliderY + 10 && x >= startX && x <= endX) {
      sliderPos = ((x - startX) / (endX - startX)) * 100;
      sliderPos = Math.max(0, Math.min(100, sliderPos));
      isPlaying = true;
      return;
    }

    // Record button (explore mode only)
    if (state.currentMission === 1) {
      // Record
      if (y >= 190 && y <= 220 && x >= 620 && x <= 740) {
        const U = 1 + (sliderPos / 100) * 4;
        const I = U / 10;
        if (dataPoints.length < 6) {
          dataPoints.push({ u: U, i: I });
        } else {
          alert('记录已满，请先清空');
        }
        return;
      }
      // Clear
      if (y >= 228 && y <= 258 && x >= 620 && x <= 740) {
        dataPoints = [];
        return;

    if (state.currentMission === 0) {
      if (!state.done.includes(0)) {
        state.done.push(0);
        saveState();
        updateUI();

  } else if (state.currentMission === 2) {
    const userInput = prompt('输入你的答案（数值）:', '');
    if (userInput === null) return;
    const num = parseFloat(userInput);
    if (isNaN(num)) return;
    const ch = CHALLENGES[state.challengeIdx];
    if (!ch) return;
    if (Math.abs(num - ch.answer) <= ch.tolerance) {
      state.challengeIdx++;
      if (state.challengeIdx >= CHALLENGES.length) {
        if (!state.done.includes(2)) state.done.push(2);
        saveState();
        updateUI();
        alert('🎉 恭喜通关！');
      } else {
        saveState();
        updateUI();
      }
    } else {
      alert('❌ 答案不对，再想想！');

});

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState();
  updateUI();
}

// Quiz
function startQuiz() {
  state.quizIdx = 0;
  state.quizDone = [];
  saveState();
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) {
      state.done.push(3);
      saveState();
    }
    updateUI();
    return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = (state.quizIdx + 1) + '. ' + q.q;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o, i) =>
    '<div class="quiz-opt" onclick="selectQuiz(' + i + ')">' + o + '</div>'
  ).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans
    ? '✅ 正确！' + q.explain
    : '❌ 正确答案是 ' + q.opts[q.ans] + '。' + q.explain;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() {
  state.quizIdx++;
  saveState();
  showQuiz();
}

  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
</body>
</html>
