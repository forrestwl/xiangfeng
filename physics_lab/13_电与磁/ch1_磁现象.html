  { q: '磁感线的方向是？', opts: ['A. 从S极到N极', 'B. 从N极到S极', 'C. 从内到外', 'D. 没有方向'], ans: 1, explain: '磁感线从磁体N极出发，回到S极，是闭合曲线。' },
  { q: '关于磁感线的说法正确的是？', opts: ['A. 磁感线是真实存在的线', 'B. 磁感线越密磁场越弱', 'C. 磁感线越密磁场越强', 'D. 磁感线可以相交'], ans: 2, explain: '磁感线是假想的曲线，越密表示磁场越强，且磁感线不相交。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId, animTime = 0;
let fieldType = 0; // 0=bar, 1=horse-shoe
let exploreState = 0; // 0=attract, 1=repel

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (state.currentMission === 0) drawObserve(W, H);
  else if (state.currentMission === 1) drawExplore(W, H);
  else if (state.currentMission === 2) drawChallenge(W, H);
  else if (state.currentMission === 3) drawQuizBg(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Bar magnet
  const cx = W / 2, cy = H / 2;
  const mw = 200, mh = 36;
  // Magnet body
  const grad = ctx.createLinearGradient(cx - mw / 2, cy, cx + mw / 2, cy);
  grad.addColorStop(0, '#e74c3c');
  grad.addColorStop(0.48, '#e74c3c');
  grad.addColorStop(0.48, '#888');
  grad.addColorStop(0.52, '#888');
  grad.addColorStop(0.52, '#3498db');
  grad.addColorStop(1, '#3498db');
  ctx.fillStyle = grad;
  roundRect(ctx, cx - mw / 2, cy - mh / 2, mw, mh, 6);
  ctx.fill();
  ctx.strokeStyle = '#999';
  ctx.lineWidth = 1;
  roundRect(ctx, cx - mw / 2, cy - mh / 2, mw, mh, 6);
  ctx.stroke();

  // Labels
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx - mw / 4, cy);
  ctx.fillText('S', cx + mw / 4, cy);

  // Iron filings (field lines)
  const lines = 12;
  for (let i = 0; i < lines; i++) {
    const angle = (i / lines) * Math.PI * 2 + animTime * 0.002;
    const spread = 1.5 + Math.sin(angle * 2) * 0.3;
    ctx.strokeStyle = `rgba(175, 82, 222, ${0.2 + Math.sin(angle) * 0.1})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    for (let t = 0; t <= 1; t += 0.02) {
      const tx = cx + (t - 0.5) * mw * spread;
      const ty = cy + Math.sin(t * Math.PI) * 80 * (0.6 + Math.sin(angle) * 0.3);
      const sway = Math.sin(t * Math.PI * 3 + animTime * 0.02) * 3;
      if (t === 0) ctx.moveTo(tx, ty + sway);
      else ctx.lineTo(tx, ty + sway);
    }
    ctx.stroke();
  }

  // Tiny dots (iron filings)
  for (let i = 0; i < 80; i++) {
    const rx = (Math.random() - 0.5) * 400;
    const ry = (Math.random() - 0.5) * 200;
    const dist = Math.hypot(rx, ry);
    if (dist < 30) continue;
    ctx.fillStyle = `rgba(100, 100, 120, ${0.3 + Math.random() * 0.3})`;
    ctx.beginPath();
    ctx.arc(cx + rx, cy + ry, 1 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Title
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('条形磁铁周围磁场分布（铁屑模拟）', W / 2, H - 6);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  // Two small magnets
  const gap = 50;
  const mh = 28, mw = 70;
  const y1 = H / 2 - gap;
  const y2 = H / 2 + gap;

  // N pole indicator
  const attract = exploreState === 0;

  // Top magnet (N face down)
  const g1 = ctx.createLinearGradient(0, y1 - mh / 2, 0, y1 + mh / 2);
  g1.addColorStop(0, '#e74c3c');
  g1.addColorStop(0.35, '#e74c3c');
  g1.addColorStop(0.35, '#888');
  g1.addColorStop(0.65, '#888');
  g1.addColorStop(0.65, '#3498db');
  g1.addColorStop(1, '#3498db');
  ctx.fillStyle = g1;
  roundRect(ctx, W / 2 - mw / 2, y1 - mh / 2, mw, mh, 5);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  ctx.fillText('N', W / 2 - 18, y1);
  ctx.fillText('S', W / 2 + 18, y1);

  // Bottom magnet (orientation depends on attract/repel)
  const g2 = ctx.createLinearGradient(0, y2 - mh / 2, 0, y2 + mh / 2);
  if (attract) {
    // S face up -> attract
    g2.addColorStop(0, '#3498db');
    g2.addColorStop(0.35, '#3498db');
    g2.addColorStop(0.35, '#888');
    g2.addColorStop(0.65, '#888');
    g2.addColorStop(0.65, '#e74c3c');
    g2.addColorStop(1, '#e74c3c');
  } else {
    // N face up -> repel
    g2.addColorStop(0, '#e74c3c');
    g2.addColorStop(0.35, '#e74c3c');
    g2.addColorStop(0.35, '#888');
    g2.addColorStop(0.65, '#888');
    g2.addColorStop(0.65, '#3498db');
    g2.addColorStop(1, '#3498db');
  }
  ctx.fillStyle = g2;
  roundRect(ctx, W / 2 - mw / 2, y2 - mh / 2, mw, mh, 5);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'center';
  const bottomN = attract ? 'S' : 'N';
  ctx.fillText(bottomN, W / 2 - 18, y2);

  // Force arrows
  const arrowY = H / 2;
  ctx.fillStyle = attract ? '#e74c3c' : '#3498db';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (attract) {
    // Attract: arrows pointing toward each other
    ctx.fillText('⬇ 吸引 ⬆', W / 2, arrowY);
    // Draw small arrows
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 40, y1 + 25);
    ctx.lineTo(W / 2 - 40, y2 - 25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W / 2 + 40, y1 + 25);
    ctx.lineTo(W / 2 + 40, y2 - 25);
    ctx.stroke();
  } else {
    // Repel: arrows pushing apart
    ctx.fillText('⬆ 排斥 ⬇', W / 2, arrowY);
    ctx.strokeStyle = '#3498db';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 40, y2 - 25);
    ctx.lineTo(W / 2 - 40, y1 + 25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(W / 2 + 40, y2 - 25);
    ctx.lineTo(W / 2 + 40, y1 + 25);
    ctx.stroke();
  }

  // Instruction
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText(attract ? '💡 异名磁极相互吸引' : '💡 同名磁极相互排斥', W / 2, H - 6);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  const maxW = W - 40;
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  let lines = [], line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; }
  }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 28; });

  // Options for 0/1 questions
  const btnW = 120, btnH = 44;
  const opts = ['0：是/强/N', '1：否/弱/S'];
  const startX = (W - (btnW * 2 + 12)) / 2;
  opts.forEach((b, i) => {
    const bx = startX + i * (btnW + 12);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, bx, H / 2 - 10, btnW, btnH, 10);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(b, bx + btnW / 2, H / 2 + 12);
  });

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('点击选择答案（0 或 1）', W / 2, H - 6);
}

function drawQuizBg(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.font = '48px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⭐', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
    updateUI();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  document.getElementById('fieldControls').style.display = (state.currentMission <= 1) ? 'flex' : 'none';

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看。 <button onclick="if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 标记完成</button>';
    else desc.innerHTML = m.desc + '<br>磁感线从N极出发回到S极。';
    document.getElementById('dispField').textContent = '条形磁铁';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索。';
    else desc.innerHTML = `${m.desc}<br><button onclick="exploreState=0;updateUI()" style="padding:4px 12px;background:#AF52DE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">观察吸引</button> <button onclick="exploreState=1;updateUI()" style="padding:4px 12px;background:#AF52DE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">观察排斥</button>`;
    if (!state.done.includes(1)) {
      setTimeout(() => { if (state.currentMission === 1) { state.done.push(1); saveState(); updateUI(); } }, 6000);
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 重新挑战</button>';
    else desc.innerHTML = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    drawChallengeHUD();
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) desc.innerHTML = '✅ 测验已完成。 <button onclick="startQuiz()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
    document.getElementById('quizOverlay').className = state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
    if (state.quizIdx < QUIZ_POOL.length) showQuiz();
  }

  // Tabs
  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });
}

function drawChallengeHUD() {
  document.getElementById('challengeHud').className = 'challenge-hud show';
  document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
  document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
}

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

// Canvas clicks
canvas.addEventListener('click', (e) => {
  if (state.currentMission === 2) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const W = canvas.width;
    const btnW = 120, btnH = 44;
    const startX = (W - (btnW * 2 + 12)) / 2;

    for (let i = 0; i < 2; i++) {
      const bx = startX + i * (btnW + 12);
      const by = canvas.height / 2 - 10;
      if (x >= bx && x <= bx + btnW) {
        const ch = CHALLENGES[state.challengeIdx];
        if (ch && Math.abs(i - ch.answer) <= ch.tolerance) {
          state.challengeIdx++;
          if (state.challengeIdx >= CHALLENGES.length) {
            if (!state.done.includes(2)) state.done.push(2);
            saveState(); updateUI();
            alert('🎉 恭喜通关！');
          } else { saveState(); updateUI(); }
        } else {
          alert('❌ 答案不对，再想想！');
        }
        return;

  }
});

// ── Quiz ──
function startQuiz() {
  state.quizIdx = 0; state.quizDone = []; saveState();
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
