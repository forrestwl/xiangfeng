  { q: '感应电流的方向与什么有关？', opts: ['A. 导体长度', 'B. 导体运动方向和磁场方向', 'C. 导体的粗细', 'D. 磁铁大小'], ans: 1, explain: '感应电流的方向与导体切割磁感线的运动方向和磁场方向有关。' },
  { q: '电动机和发电机最主要的区别是？', opts: ['A. 大小不同', 'B. 能量转化方向不同', 'C. 颜色不同', 'D. 材料不同'], ans: 1, explain: '电动机消耗电能转化为机械能（电→动），发电机将机械能转化为电能（动→电），能量转化方向相反。' }
];

const canvas = document.getElementById('labCanvas');
const ctx = canvas.getContext('2d');
let animId, animTime = 0;
let isMoving = true;
let direction = 1; // 1=right, -1=left
let fieldDir = 1; // 1=N->S top->bottom

// ── Drawing ──
function drawScene() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  if (state.currentMission === 0) drawObserve(W, H);
  else if (state.currentMission === 1) drawExplore(W, H);
  else if (state.currentMission === 2) drawChallenge(W, H);
  else if (state.currentMission === 3) drawQuizBg(W, H);
}

function drawObserve(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 10;

  // N pole (top)
  ctx.fillStyle = '#e74c3c';
  roundRect(ctx, cx - 20, 15, 40, 50, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, 40);

  // S pole (bottom)
  ctx.fillStyle = '#3498db';
  roundRect(ctx, cx - 20, H - 65, 40, 50, 4);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillText('S', cx, H - 40);

  // Field lines
  ctx.strokeStyle = 'rgba(175, 82, 222, 0.2)';
  ctx.lineWidth = 1.5;
  for (let i = -2; i <= 2; i++) {
    const fx = cx + i * 20;
    ctx.beginPath();
    ctx.moveTo(fx, 65);
    ctx.lineTo(fx, H - 65);
    ctx.stroke();
  }

  // Conductor (wire) moving
  const wireX = cx + Math.sin(animTime * 0.03) * 120;
  const wireY = H / 2 + 10;

  // Wire
  ctx.strokeStyle = '#AF52DE';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(wireX, wireY - 30);
  ctx.lineTo(wireX, wireY + 30);
  ctx.stroke();

  // Circle for cross-section
  ctx.fillStyle = '#AF52DE';
  ctx.beginPath();
  ctx.arc(wireX, wireY, 6, 0, Math.PI * 2);
  ctx.fill();

  // Motion arrow
  const moving = isMoving;
  const dx = Math.cos(animTime * 0.03) > 0 ? 1 : -1;
  ctx.fillStyle = e74c3c;
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(dx > 0 ? '→ 运动 →' : '← 运动 ←', wireX, wireY + 55);

  // Galvanometer
  if (moving) {
    const gX = W - 70, gY = H / 2;
    ctx.fillStyle = '#141626';
    ctx.beginPath();
    ctx.arc(gX, gY, 22, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(gX, gY, 22, 0, Math.PI * 2);
    ctx.stroke();

    // Needle swing
    const swing = Math.sin(animTime * 0.06) * 0.4;
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(gX, gY);
    ctx.lineTo(gX + Math.sin(swing) * 16, gY - Math.cos(swing) * 16);
    ctx.stroke();

    ctx.fillStyle = '#e74c3c';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('⚡ 有电流', gX, gY + 32);
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText('电流表', gX, gY - 30);
  }

  // Labels
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('💡 导体切割磁感线产生感应电流（电磁感应）', W / 2, H - 4);
}

function drawExplore(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2, cy = H / 2 + 5;

  // N/S with fieldDir
  if (fieldDir > 0) {
    ctx.fillStyle = '#e74c3c';
    roundRect(ctx, cx - 18, 20, 36, 45, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('N', cx, 42);
    ctx.fillStyle = '#3498db';
    roundRect(ctx, cx - 18, H - 65, 36, 45, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('S', cx, H - 42);
  } else {
    ctx.fillStyle = '#3498db';
    roundRect(ctx, cx - 18, 20, 36, 45, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('S', cx, 42);
    ctx.fillStyle = '#e74c3c';
    roundRect(ctx, cx - 18, H - 65, 36, 45, 4);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillText('N', cx, H - 42);
  }

  // Field lines
  ctx.strokeStyle = 'rgba(175, 82, 222, 0.2)';
  ctx.lineWidth = 1.5;
  for (let i = -2; i <= 2; i++) {
    const fx = cx + i * 18;
    ctx.beginPath();
    ctx.moveTo(fx, 65);
    ctx.lineTo(fx, H - 65);
    ctx.stroke();
  }

  // Moving conductor
  const wireX = cx + Math.sin(animTime * 0.04) * 100;
  ctx.strokeStyle = '#AF52DE';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(wireX, H / 2 - 20);
  ctx.lineTo(wireX, H / 2 + 20);
  ctx.stroke();
  ctx.fillStyle = '#AF52DE';
  ctx.beginPath();
  ctx.arc(wireX, H / 2 + 5, 5, 0, Math.PI * 2);
  ctx.fill();

  const dx = Math.cos(animTime * 0.04) > 0 ? 1 : -1;
  ctx.fillStyle = '#e74c3c';
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText(dx > 0 ? '→ 向右运动' : '← 向左运动', wireX, H / 2 + 38);

  // Info
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.fillText('💡 点击按钮切换运动方向或磁场方向', W / 2, H - 4);
}

function drawChallenge(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  const ch = CHALLENGES[state.challengeIdx] || CHALLENGES[0];
  const maxW = W - 40;
  ctx.fillStyle = '#ffffff';
  ctx.font = '15px sans-serif';
  ctx.textAlign = 'center';
  let lines = [], line = '';
  for (let c of ch.goal) {
    line += c;
    if (ctx.measureText(line).width > maxW && line.length > 10) { lines.push(line); line = ''; }
  }
  if (line) lines.push(line);
  let y = 40;
  lines.forEach(l => { ctx.fillText(l.trim(), W / 2, y); y += 28; });

  const opts = ['0：对/是/右', '1：错/否/左'];
  const btnW = 120, btnH = 44;
  const startX = (W - (btnW * 2 + 12)) / 2;
  opts.forEach((b, i) => {
    const bx = startX + i * (btnW + 12);
    ctx.fillStyle = 'rgba(255,255,255,0.04)';
    roundRect(ctx, bx, H / 2 - 10, btnW, btnH, 10);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.font = '14px sans-serif';
    ctx.textBaseline = 'middle';
    ctx.fillText(b, bx + btnW / 2, H / 2 + 12);
  });
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '13px sans-serif';
  ctx.textBaseline = 'bottom';
  ctx.fillText('点击选择答案（0 或 1）', W / 2, H - 6);
}

function drawQuizBg(W, H) {
  ctx.fillStyle = '#141626';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.font = '48px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⭐', W / 2, H / 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function animate() {
  animTime += 1;
  drawScene();
  animId = requestAnimationFrame(animate);
}

function switchMission(idx) {
  state.currentMission = idx;
  saveState();
    updateUI();
}

function updateUI() {
  const m = MISSIONS[state.currentMission];
  document.getElementById('missionLabel').textContent = m.label;
  document.getElementById('missionTitle').textContent = m.title;
  const desc = document.getElementById('missionDesc');
  const done = state.done.includes(state.currentMission);
  document.getElementById('fieldControls').style.display = (state.currentMission <= 1) ? 'flex' : 'none';

  if (state.currentMission === 0) {
    if (done) desc.innerHTML = '✅ 已观看。 <button onclick="if(!state.done.includes(0)){state.done.push(0);saveState();updateUI()}" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;">✅ 标记完成</button>';
    else desc.innerHTML = `${m.desc}<br><button onclick="isMoving=!isMoving;updateUI()" style="padding:4px 12px;background:#AF52DE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;">${isMoving?'暂停':'继续运动'}</button>`;
    document.getElementById('dispState').textContent = isMoving ? '切割磁感线中' : '已停止';
  } else if (state.currentMission === 1) {
    if (done) desc.innerHTML = '✅ 已探索。';
    else desc.innerHTML = `${m.desc}<br><button onclick="direction*=-1;updateUI()" style="padding:4px 10px;background:#AF52DE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;">切换运动方向</button> <button onclick="fieldDir*=-1;updateUI()" style="padding:4px 10px;background:#AF52DE;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;">切换磁场方向</button>`;
    if (!state.done.includes(1)) {
      setTimeout(() => { if (state.currentMission === 1) { state.done.push(1); saveState(); updateUI(); } }, 7000);
    }
  } else if (state.currentMission === 2) {
    if (state.done.includes(2)) desc.innerHTML = '🎉 全部通关！ <button onclick="resetChallenges()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 重新挑战</button>';
    else desc.innerHTML = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
    drawChallengeHUD();
  } else if (state.currentMission === 3) {
    if (state.done.includes(3)) desc.innerHTML = '✅ 测验已完成。 <button onclick="startQuiz()" style="padding:6px 16px;background:#AF52DE;color:#fff;border:none;border-radius:8px;cursor:pointer;">🔄 再来一轮</button>';
    else desc.innerHTML = m.desc;
    document.getElementById('quizOverlay').className = state.quizIdx < QUIZ_POOL.length ? 'quiz-overlay show' : 'quiz-overlay';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
    if (state.quizIdx < QUIZ_POOL.length) showQuiz();
  }

  const tabs = document.getElementById('missionTabs');
  tabs.innerHTML = MISSIONS.map((m, i) => {
    const isActive = i === state.currentMission;
    const isDone = state.done.includes(i);
    const cls = isActive ? 'tab active' : isDone ? 'tab done' : 'tab';
    const check = isDone ? '<span class="tab-check">✅</span>' : '';
    return `<div class="${cls}" onclick="switchMission(${i})">${m.label}${check}</div>`;
  }).join('');

  MISSIONS.forEach((_, i) => {
    const dot = document.getElementById('pdot' + i);
    if (state.done.includes(i)) dot.className = 'dot done';
    else if (i === state.currentMission) dot.className = 'dot active';
    else dot.className = 'dot';
  });
}

function drawChallengeHUD() {
  document.getElementById('challengeHud').className = 'challenge-hud show';
  document.getElementById('chLevel').textContent = `🎯 第 ${state.challengeIdx+1}/${CHALLENGES.length} 关`;
  document.getElementById('chGoal').textContent = CHALLENGES[state.challengeIdx]?.goal.slice(0, 35) + '...' || '';
}

function resetChallenges() {
  state.challengeIdx = 0;
  const idx = state.done.indexOf(2);
  if (idx >= 0) state.done.splice(idx, 1);
  saveState(); updateUI();
}

canvas.addEventListener('click', (e) => {
  if (state.currentMission === 0 || state.currentMission === 1) {
    if (state.currentMission === 0) { isMoving = !isMoving; updateUI(); }
    return;
  }
  if (state.currentMission === 2) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const x = (e.clientX - rect.left) * scaleX;
    const W = canvas.width;
    const btnW = 120, btnH = 44;
    const startX = (W - (btnW * 2 + 12)) / 2;
    for (let i = 0; i < 2; i++) {
      const bx = startX + i * (btnW + 12);
      const by = canvas.height / 2 - 10;
      if (x >= bx && x <= bx + btnW) {
        const ch = CHALLENGES[state.challengeIdx];
        if (ch && Math.abs(i - ch.answer) <= ch.tolerance) {
          state.challengeIdx++;
          if (state.challengeIdx >= CHALLENGES.length) {
            if (!state.done.includes(2)) state.done.push(2);
            saveState(); updateUI();
            alert('🎉 恭喜通关！');
          } else { saveState(); updateUI(); }
        } else {
          alert('❌ 答案不对，再想想！');
        }
        return;

  }
});

function startQuiz() {
  state.quizIdx = 0; state.quizDone = []; saveState();
  document.getElementById('quizOverlay').className = 'quiz-overlay show';
  document.querySelector('.canvas-wrap').className = state.currentMission === 3 && state.quizIdx < QUIZ_POOL.length ? 'canvas-wrap quiz-active' : 'canvas-wrap';
  showQuiz();
}

function showQuiz() {
  if (state.quizIdx >= QUIZ_POOL.length) {
    if (!state.done.includes(3)) { state.done.push(3); saveState(); }
    updateUI(); return;
  }
  const q = QUIZ_POOL[state.quizIdx];
  document.getElementById('quizQ').textContent = `${state.quizIdx+1}. ${q.q}`;
  const opts = document.getElementById('quizOptions');
  opts.innerHTML = q.opts.map((o,i) => `<div class="quiz-opt" onclick="selectQuiz(${i})">${o}</div>`).join('');
  document.getElementById('quizResult').textContent = '';
  document.getElementById('quizNext').style.display = 'none';
}

function selectQuiz(idx) {
  const q = QUIZ_POOL[state.quizIdx];
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.ans) el.className = 'quiz-opt correct';
    else if (i === idx && idx !== q.ans) el.className = 'quiz-opt wrong';
  });
  document.getElementById('quizResult').textContent = idx === q.ans ? `✅ 正确！${q.explain}` : `❌ 正确答案是 ${q.opts[q.ans]}。${q.explain}`;
  document.getElementById('quizNext').style.display = 'block';
}

function nextQuiz() { state.quizIdx++; saveState(); showQuiz(); }

function toggleKnowledge() {
  const box = document.getElementById('knowledgeBox');
  const toggle = document.getElementById('kbToggle');
  box.classList.toggle('collapsed');
  toggle.classList.toggle('open');
}

function setKnowledge(idx) {
  const k = KNOWLEDGE[idx];
  if (k) {
    document.getElementById('kbTitle').textContent = k.title;
    document.getElementById('kbBody').innerHTML = k.body.replace(/\n/g, '<br>');
    // Auto-expand when switching to a new mission
    const box = document.getElementById('knowledgeBox');
    if (box.classList.contains('collapsed')) {
      box.classList.remove('collapsed');
      document.getElementById('kbToggle').classList.add('open');
    }
  }
}

switchMission(state.currentMission);
animate();

function closeQuiz() { switchMission(0); }
</script>
